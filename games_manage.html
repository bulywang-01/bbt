<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>⚾ 比賽管理 ⚾</title>
<style>
  body {
    font-family: system-ui;
    margin: 20px;
    line-height: 1.6;
  }
  h2 { margin-top: 0; }

  a {
    color: #0066cc;
    text-decoration: none;
  }
  a:hover { text-decoration: underline; }

  table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 10px;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 6px 8px;
    text-align: center;
  }
  th {
    background: #f0f0f0;
  }

  input, select {
    width: 100%;
    box-sizing: border-box;
  }

  .actions button {
    margin: 0 2px;
  }

  tr.editing {
    background: #fff8dc;
  }

  .msg {
    margin: 8px 0;
    color: #555;
  }
</style>
</head>
<body>

<!-- ===== 權限檢查 ===== -->
<script>
if (!localStorage.getItem('role')) location.href = 'login.html';
if (localStorage.getItem('role') !== 'admin') {
  alert('僅限管理者使用');
  location.href = 'index.html';
}
</script>

<h2>⚾ 比賽管理 ⚾</h2>
<p class="msg">
  <a href="index.html">🏠 回首頁</a>
</p>

<div id="content">載入中…</div>

<!-- ✅ 正確載入 config.js -->
<script src="js/config.js"></script>

<script>
const token = localStorage.getItem('token');
const content = document.getElementById('content');

/* ===== 日期轉換 ===== */
function toInputDate(str) {
  return str ? str.replace(/\//g, '-') : '';
}
function fromInputDate(str) {
  return str ? str.replace(/-/g, '/') : '';
}

/* =================================================
 * 載入比賽清單（唯讀）
 * ✅ 不使用逾時計時器
 * ✅ 不會再顯示假錯誤
 * ================================================= */
function loadGames() {
  content.textContent = '載入中…';

  const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);

  window[cb] = function(res) {
    if (!res || res.result !== 'ok') {
      content.textContent = '❌ 無法取得比賽資料';
      delete window[cb];
      return;
    }

    if (!res.games || res.games.length === 0) {
      content.textContent = '目前尚無比賽資料';
      delete window[cb];
      return;
    }

    let html = `<table>
      <tr>
        <th>ID</th>
        <th>日期</th>
        <th>球場</th>
        <th>盃賽</th>
        <th>組別</th>
        <th>客隊</th>
        <th>主隊</th>
        <th>裁判數</th>
        <th>操作</th>
      </tr>`;

    res.games.forEach(g => {
      html += `
      <tr id="row_${g.game_id}">
        <td>${g.game_id}</td>
        <td>${g.date}</td>
        <td>${g.field}</td>
        <td>${g.tournament}</td>
        <td>${g.category}</td>
        <td>${g.away_team}</td>
        <td>${g.home_team}</td>
        <td>${g.umpire_count}</td>
        <td class="actions">
          <button onclick="editGame('${g.game_id}')">✏️ 修改</button>
          <button onclick="deleteGame('${g.game_id}')">🗑 刪除</button>
        </td>
      </tr>`;
    });

    html += '</table>';
    content.innerHTML = html;
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=getAllSchedule' +
    '&token=' + encodeURIComponent(token) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===== 進入編輯模式 ===== */
function editGame(id) {
  const row = document.getElementById('row_' + id);
  row.classList.add('editing');

  const cells = row.children;
  const date = cells[1].textContent;
  const field = cells[2].textContent;
  const tournament = cells[3].textContent;
  const category = cells[4].textContent;
  const away = cells[5].textContent;
  const home = cells[6].textContent;
  const count = cells[7].textContent;

  cells[1].innerHTML = `<input type="date" id="d_${id}" value="${toInputDate(date)}">`;
  cells[2].innerHTML = `<input type="text" id="f_${id}" value="${field}">`;
  cells[3].innerHTML = `<input type="text" id="t_${id}" value="${tournament}">`;
  cells[4].innerHTML = `<input type="text" id="c_${id}" value="${category}">`;
  cells[5].innerHTML = `<input type="text" id="a_${id}" value="${away}">`;
  cells[6].innerHTML = `<input type="text" id="h_${id}" value="${home}">`;
  cells[7].innerHTML = `
    <select id="u_${id}">
      <option ${count==1?'selected':''}>1</option>
      <option ${count==2?'selected':''}>2</option>
      <option ${count==3?'selected':''}>3</option>
      <option ${count==4?'selected':''}>4</option>
    </select>`;

  cells[8].innerHTML = `
    <button onclick="saveGame('${id}')">✅ 儲存</button>
    <button onclick="loadGames()">❌ 取消</button>
  `;
}

/* ===== 儲存單筆修改 ===== */
function saveGame(id) {
  const dateVal = document.getElementById('d_' + id).value;
  if (!dateVal) return alert('日期不可為空');

  const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);

  window[cb] = function(res) {
    if (res && res.result === 'ok') {
      alert('✅ 修改完成');
      loadGames();
    } else {
      alert('❌ 修改失敗');
    }
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=updateGame' +
    '&token=' + encodeURIComponent(token) +
    '&game_id=' + encodeURIComponent(id) +
    '&date=' + encodeURIComponent(fromInputDate(dateVal)) +
    '&field=' + encodeURIComponent(document.getElementById('f_'+id).value) +
    '&tournament=' + encodeURIComponent(document.getElementById('t_'+id).value) +
    '&category=' + encodeURIComponent(document.getElementById('c_'+id).value) +
    '&away_team=' + encodeURIComponent(document.getElementById('a_'+id).value) +
    '&home_team=' + encodeURIComponent(document.getElementById('h_'+id).value) +
    '&umpire_count=' + encodeURIComponent(document.getElementById('u_'+id).value) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===== 刪除 ===== */
function deleteGame(id) {
  if (!confirm('確定刪除？')) return;

  const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  window[cb] = function(res) {
    if (res && res.result === 'ok') {
      alert('✅ 已刪除');
      loadGames();
    } else {
      alert('❌ 刪除失敗');
    }
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=deleteGame' +
    '&token=' + encodeURIComponent(token) +
    '&game_id=' + encodeURIComponent(id) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===== 初始化 ===== */
loadGames();
</script>

</body>
</html>
