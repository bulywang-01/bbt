<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>⚾ 比賽管理</title>
<style>
body{font-family:system-ui;margin:20px;background:#fafafa}
.header a{margin-right:12px;color:#0066cc;text-decoration:none}
.panel{background:#fff;padding:14px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ddd;padding:6px 8px;text-align:center}
th{background:#f0f0f0}
.actions button{margin:0 2px}
select,input{padding:4px}
</style>
</head>
<body>

<script>
if(!localStorage.getItem('role'))location.href='login.html';
</script>

<div class="header">
  <a href="index.html">🏠 回首頁</a>
  <a href="templates_manage.html">📦 模板管理</a>
  <a href="audit_log.html">📋 操作紀錄</a>
</div>

<h2>⚾ 比賽管理</h2>

<div class="panel">
  日期 <select id="q_date"></select>
  盃賽 <select id="q_tournament"></select>
  場地 <select id="q_field"></select>
  <button onclick="applyFilter()">查詢</button>
</div>

<div class="panel">
  <b>➕ 新增比賽</b><br>
  日期 <input id="n_date">
  場地 <input id="n_field">
  盃賽 <input id="n_tournament">
  組別 <input id="n_category">
  客隊 <input id="n_away">
  主隊 <input id="n_home">
  裁判 <input id="n_count" type="number" value="4" style="width:60px">
  <button onclick="addGame()">新增</button>
</div>

<div id="content">載入中…</div>

<script src="js/config.js"></script>
<script>
const token=localStorage.getItem('token');
let allGames=[];

/* 下拉工具 */
function fillSelectIncludeEmpty(selectEl, values){
  selectEl.innerHTML='<option value="">（全部）</option>';
  [...new Set(values.map(v=>v&&String(v).trim()?v:''))].sort().forEach(v=>{
    const o=document.createElement('option');
    if(v===''){o.value='__EMPTY__';o.textContent='（空白）'}
    else{o.value=v;o.textContent=v}
    selectEl.appendChild(o);
  });
}

/* 載入 */
function loadGames(){
  const cb='cb_'+Date.now();
  window[cb]=res=>{
    allGames=res.games||[];
    fillSelectIncludeEmpty(q_date,allGames.map(g=>g.date));
    fillSelectIncludeEmpty(q_tournament,allGames.map(g=>g.tournament));
    fillSelectIncludeEmpty(q_field,allGames.map(g=>g.field));
    render(allGames);
  };
  const s=document.createElement('script');
  s.src=API_URL+'?action=getAllSchedule&token='+token+'&callback='+cb;
  document.body.appendChild(s);
}

/* 篩選 */
function applyFilter(){
  let list=[...allGames];
  if(q_date.value==='__EMPTY__')list=list.filter(g=>!g.date);
  else if(q_date.value)list=list.filter(g=>g.date===q_date.value);

  if(q_tournament.value==='__EMPTY__')list=list.filter(g=>!g.tournament);
  else if(q_tournament.value)list=list.filter(g=>g.tournament===q_tournament.value);

  if(q_field.value==='__EMPTY__')list=list.filter(g=>!g.field);
  else if(q_field.value)list=list.filter(g=>g.field===q_field.value);

  render(list);
}

/* 顯示 */
function render(list){
  if(!list.length){content.textContent='無資料';return;}
  let html='<div class="panel"><table><tr><th>ID</th><th>日期</th><th>盃賽</th><th>組別</th><th>場地</th><th>主隊</th><th>客隊</th><th>裁判</th><th>操作</th></tr>';
  list.forEach(g=>{
    html+=`<tr>
      <td>${g.game_id}</td>
      <td>${g.date||''}</td>
      <td><input id="t_${g.game_id}" value="${g.tournament||''}"></td>
      <td><input id="c_${g.game_id}" value="${g.category||''}"></td>
      <td><input id="f_${g.game_id}" value="${g.field||''}"></td>
      <td><input id="h_${g.game_id}" value="${g.home_team||''}"></td>
      <td><input id="a_${g.game_id}" value="${g.away_team||''}"></td>
      <td><input id="u_${g.game_id}" type="number" value="${g.umpire_count||1}" style="width:50px"></td>
      <td class="actions">
        <button onclick="updateGame('${g.game_id}','${g.date||''}')">💾</button>
        <button onclick="delGame('${g.game_id}')">🗑</button>
      </td>
    </tr>`;
  });
  html+='</table></div>';
  content.innerHTML=html;
}

/* CRUD */
function addGame(){
  const cb='cb_'+Date.now();
  window[cb]=()=>loadGames();
  const s=document.createElement('script');
  s.src=API_URL+'?action=addGame&token='+token+
    '&date='+n_date.value+'&field='+n_field.value+
    '&tournament='+n_tournament.value+'&category='+n_category.value+
    '&away_team='+n_away.value+'&home_team='+n_home.value+
    '&umpire_count='+n_count.value+'&callback='+cb;
  document.body.appendChild(s);
}
function updateGame(id,date){
  const cb='cb_'+Date.now();
  window[cb]=()=>loadGames();
  const s=document.createElement('script');
  s.src=API_URL+'?action=updateGame&token='+token+
    '&game_id='+id+'&date='+date+
    '&tournament='+document.getElementById('t_'+id).value+
    '&category='+document.getElementById('c_'+id).value+
    '&field='+document.getElementById('f_'+id).value+
    '&home_team='+document.getElementById('h_'+id).value+
    '&away_team='+document.getElementById('a_'+id).value+
    '&umpire_count='+document.getElementById('u_'+id).value+
    '&callback='+cb;
  document.body.appendChild(s);
}
function delGame(id){
  if(!confirm('確定刪除？'))return;
  const cb='cb_'+Date.now();
  window[cb]=()=>loadGames();
  const s=document.createElement('script');
  s.src=API_URL+'?action=deleteGame&token='+token+'&game_id='+id+'&callback='+cb;
  document.body.appendChild(s);
}

loadGames();
</script>
</body>
</html>
