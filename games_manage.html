<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>比賽管理</title>
<style>
  body { font-family: system-ui; }
  .game { border-bottom: 1px solid #ccc; padding: 6px 0; }
</style>
</head>
<body>

<script>
if (!localStorage.getItem('role')) location.href='login.html';
if (localStorage.getItem('role') !== 'admin') {
  alert('僅限管理者');
  location.href='index.html';
}
</script>

<h2>⚾ 比賽管理</h2>
<a href="index.html">🏠 回首頁</a>
<hr>

<div id="list">載入中…</div>

<script src="js/config.js"></script>
<script>
const token = localStorage.getItem('token');
const box = document.getElementById('list');
const cb = 'cb_' + Date.now();

window[cb] = function(res){
  if(res.result !== 'ok'){
    box.innerHTML='❌ 無法取得比賽資料';
    return;
  }

  if(res.games.length === 0){
    box.innerHTML='目前尚無比賽資料';
    return;
  }

  let html='';
  res.games.forEach(g=>{
    html+=`
      <div class="game">
        <b>${g.game_id}</b><br>
        ${g.date}｜${g.tournament} ${g.category}<br>
        ${g.away_team} vs ${g.home_team}（${g.field}）
      </div>`;
  });
  box.innerHTML=html;
};

const s=document.createElement('script');
s.src=
  API_URL+
  '?action=getAllSchedule'+
  '&token='+encodeURIComponent(token)+
  '&callback='+cb;
document.body.appendChild(s);
</script>

</body>
</html>
