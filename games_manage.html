<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>⚾ 比賽管理（整合）</title>
<style>
  body { font-family: system-ui; line-height: 1.6; }
  table { border-collapse: collapse; width: 100%; margin-top: 8px; }
  th, td { border: 1px solid #ccc; padding: 6px; text-align: center; }
  th { background: #eee; }
  input, select { width: 100%; box-sizing: border-box; }
  .section { background: #f7f7f7; padding: 10px; margin: 12px 0; }
</style>
</head>
<body>

<!-- ===== 權限檢查 ===== -->
<script>
if (!localStorage.getItem('role')) location.href = 'login.html';
if (localStorage.getItem('role') !== 'admin') {
  alert('僅限管理者');
  location.href = 'index.html';
}
</script>

<h2>⚾ 比賽管理（整合）</h2>

<!-- ✅ 這次是正確的連結 -->
<a href="index.html">🏠 回首頁</a>

<!-- ===== 新增比賽 ===== -->
<div class="section">
  <h3>➕ 新增比賽</h3>
  <table>
    <tr>
      <th>日期</th><th>球場</th><th>盃賽</th><th>組別</th>
      <th>客隊</th><th>主隊</th><th>裁判數</th><th></th>
    </tr>
    <tr>
      <td><input type="date" id="n_date"></td>
      <td><input type="text" id="n_field"></td>
      <td><input type="text" id="n_tournament"></td>
      <td><input type="text" id="n_category"></td>
      <td><input type="text" id="n_away"></td>
      <td><input type="text" id="n_home"></td>
      <td>
        <select id="n_count">
          <option>1</option><option>2</option>
          <option>3</option><option>4</option>
        </select>
      </td>
      <td><button onclick="addGame()">新增</button></td>
    </tr>
  </table>
</div>

<!-- ===== 比賽清單 ===== -->
<div class="section">
  <h3>📋 目前比賽清單</h3>
  <div id="list">載入中…</div>
</div>

<!-- ✅ 一定要正確載入 -->
<script src="js/config.js"></script>

<script>
const listBox = document.getElementById('list');
const token = localStorage.getItem('token');

/* ===== 載入比賽 ===== */
function loadGames() {
  listBox.textContent = '載入中…';
  const cb = 'cb_' + Date.now();

  window[cb] = function(res) {
    if (!res || res.result !== 'ok') {
      listBox.textContent = '❌ 無法讀取比賽資料';
      return;
    }

    if (!res.games || res.games.length === 0) {
      listBox.textContent = '目前尚無比賽資料';
      return;
    }

    let html = `
      <table>
        <tr>
          <th>ID</th><th>日期</th><th>球場</th>
          <th>盃賽</th><th>組別</th>
          <th>客隊</th><th>主隊</th>
          <th>裁判數</th><th>操作</th>
        </tr>
    `;

    res.games.forEach(g => {
      html += `
        <tr>
          <td>${g.game_id}</td>
          <td><input type="date" id="d_${g.game_id}" value="${g.date}"></td>
          <td><input type="text" id="f_${g.game_id}" value="${g.field}"></td>
          <td><input type="text" id="t_${g.game_id}" value="${g.tournament}"></td>
          <td><input type="text" id="c_${g.game_id}" value="${g.category}"></td>
          <td><input type="text" id="a_${g.game_id}" value="${g.away_team}"></td>
          <td><input type="text" id="h_${g.game_id}" value="${g.home_team}"></td>
          <td>
            <select id="u_${g.game_id}">
              <option ${g.umpire_count==1?'selected':''}>1</option>
              <option ${g.umpire_count==2?'selected':''}>2</option>
              <option ${g.umpire_count==3?'selected':''}>3</option>
              <option ${g.umpire_count==4?'selected':''}>4</option>
            </select>
          </td>
          <td>
            <button onclick="updateGame('${g.game_id}')">儲存</button>
            <button onclick="deleteGame('${g.game_id}')">刪除</button>
          </td>
        </tr>`;
    });
    html += '</table>';
    listBox.innerHTML = html;
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=getAllSchedule' +
    '&token=' + encodeURIComponent(token) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===== 新增 ===== */
function addGame() {
  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    if (res.result === 'ok') loadGames();
    else alert('新增失敗');
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=addGame' +
    '&token=' + encodeURIComponent(token) +
    '&date=' + n_date.value +
    '&field=' + n_field.value +
    '&tournament=' + n_tournament.value +
    '&category=' + n_category.value +
    '&away_team=' + n_away.value +
    '&home_team=' + n_home.value +
    '&umpire_count=' + n_count.value +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===== 修改 ===== */
function updateGame(id) {
  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    if (res.result === 'ok') alert('已更新');
    else alert('更新失敗');
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=updateGame' +
    '&token=' + encodeURIComponent(token) +
    '&game_id=' + id +
    '&date=' + document.getElementById('d_'+id).value +
    '&field=' + document.getElementById('f_'+id).value +
    '&tournament=' + document.getElementById('t_'+id).value +
    '&category=' + document.getElementById('c_'+id).value +
    '&away_team=' + document.getElementById('a_'+id).value +
    '&home_team=' + document.getElementById('h_'+id).value +
    '&umpire_count=' + document.getElementById('u_'+id).value +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===== 刪除 ===== */
function deleteGame(id) {
  if (!confirm('確定刪除？')) return;
  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    if (res.result === 'ok') loadGames();
    else alert('刪除失敗');
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=deleteGame' +
    '&token=' + encodeURIComponent(token) +
    '&game_id=' + id +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* 初始載入 */
loadGames();
</script>

</body>
</html>
