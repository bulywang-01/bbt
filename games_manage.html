<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>⚾ 比賽管理</title>
<style>
body{font-family:system-ui;margin:20px;background:#fafafa}
.header a{margin-right:12px;color:#0066cc;text-decoration:none}
.panel{background:#fff;padding:14px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ddd;padding:6px 8px;text-align:center}
th{background:#f0f0f0}
.actions button{margin:0 2px}
select,input{padding:4px}
</style>
</head>
<body>

<script>
if(!localStorage.getItem('role'))location.href='login.html';
</script>

<div class="header">
  <a href="index.html">🏠 回首頁</a>
  <a href="templates_manage.html">📦 模板管理</a>
  <a href="audit_log.html">📋 操作紀錄</a>
</div>

<h2>⚾ 比賽管理</h2>

<!-- 🔍 搜尋（下拉、不重複） -->
<div class="panel">
  日期
  <select id="q_date">
    <option value="">（全部）</option>
  </select>

  盃賽
  <select id="q_tournament">
    <option value="">（全部）</option>
  </select>

  場地
  <select id="q_field">
    <option value="">（全部）</option>
  </select>

  <button onclick="applyFilter()">查詢</button>
</div>

<!-- ➕ 新增 -->
<div class="panel">
  <b>➕ 新增比賽</b><br>
  日期 <input id="n_date">
  場地 <input id="n_field">
  盃賽 <input id="n_tournament">
  組別 <input id="n_category">
  客隊 <input id="n_away">
  主隊 <input id="n_home">
  裁判 <input id="n_count" type="number" value="4" style="width:60px">
  <button onclick="addGame()">新增</button>
</div>

<div id="content">載入中…</div>

<script src="js/config.js"></script>
<script>
const token = localStorage.getItem('token');
let allGames = [];

/* =========================
 * 載入資料 + 建立下拉
 * ========================= */
function loadGames() {
  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    if (!res || res.result !== 'ok') {
      content.textContent = '❌ 讀取失敗';
      return;
    }
    allGames = res.games || [];
    buildSelects(allGames);
    render(allGames);
  };

  const s = document.createElement('script');
  s.src = API_URL + '?action=getAllSchedule&token=' + token + '&callback=' + cb;
  document.body.appendChild(s);
}

/* =========================
 * 建立不重複下拉選單
 * ========================= */
function buildSelects(games) {
  fillSelect(q_date, games.map(g=>g.date));
  fillSelect(q_tournament, games.map(g=>g.tournament));
  fillSelect(q_field, games.map(g=>g.field));
}

function fillSelect(sel, values) {
  sel.innerHTML = '<option value="">（全部）</option>';
  [...new Set(values.filter(v=>v))].sort().forEach(v => {
    const o = document.createElement('option');
    o.value = v;
    o.textContent = v;
    sel.appendChild(o);
  });
}

/* =========================
 * 套用搜尋
 * ========================= */
function applyFilter() {
  let list = [...allGames];
  if (q_date.value) list = list.filter(g => g.date === q_date.value);
  if (q_tournament.value) list = list.filter(g => g.tournament === q_tournament.value);
  if (q_field.value) list = list.filter(g => g.field === q_field.value);
  render(list);
}

/* =========================
 * 顯示清單
 * ========================= */
function render(list) {
  if (!list.length) {
    content.textContent = '無資料';
    return;
  }

  list.sort((a,b)=>a.date.localeCompare(b.date));

  let html = '<div class="panel"><table><tr>' +
    '<th>ID</th><th>日期</th><th>盃賽</th><th>組別</th><th>場地</th>' +
    '<th>主隊</th><th>客隊</th><th>裁判</th><th>操作</th></tr>';

  list.forEach(g => {
    html += `<tr>
      <td>${g.game_id}</td>
      <td>${g.date}</td>
      <td><input id="t_${g.game_id}" value="${g.tournament||''}"></td>
      <td><input id="c_${g.game_id}" value="${g.category||''}"></td>
      <td><input id="f_${g.game_id}" value="${g.field||''}"></td>
      <td><input id="h_${g.game_id}" value="${g.home_team||''}"></td>
      <td><input id="a_${g.game_id}" value="${g.away_team||''}"></td>
      <td><input id="u_${g.game_id}" type="number" style="width:50px" value="${g.umpire_count||1}"></td>
      <td class="actions">
        <button onclick="updateGame('${g.game_id}','${g.date}')">💾</button>
        <button onclick="delGame('${g.game_id}')">🗑</button>
      </td>
    </tr>`;
  });

  html += '</table></div>';
  content.innerHTML = html;
}

/* =========================
 * CRUD（沿用你既有）
 * ========================= */
function addGame(){
  const cb='cb_'+Date.now();
  window[cb]=()=>loadGames();
  const s=document.createElement('script');
  s.src=API_URL+'?action=addGame&token='+token+
    '&date='+n_date.value+'&field='+n_field.value+
    '&tournament='+n_tournament.value+'&category='+n_category.value+
    '&away_team='+n_away.value+'&home_team='+n_home.value+
    '&umpire_count='+n_count.value+'&callback='+cb;
  document.body.appendChild(s);
}

function updateGame(id,date){
  const cb='cb_'+Date.now();
  window[cb]=()=>loadGames();
  const s=document.createElement('script');
  s.src=API_URL+'?action=updateGame&token='+token+
    '&game_id='+id+'&date='+date+
    '&tournament='+t_(id).value+
    '&category='+c_(id).value+
    '&field='+f_(id).value+
    '&home_team='+h_(id).value+
    '&away_team='+a_(id).value+
    '&umpire_count='+u_(id).value+
    '&callback='+cb;
  document.body.appendChild(s);
}

function delGame(id){
  if(!confirm('確定刪除？'))return;
  const cb='cb_'+Date.now();
  window[cb]=()=>loadGames();
  const s=document.createElement('script');
  s.src=API_URL+'?action=deleteGame&token='+token+'&game_id='+id+'&callback='+cb;
  document.body.appendChild(s);
}

const t_ = id => document.getElementById('t_'+id);
const c_ = id => document.getElementById('c_'+id);
const f_ = id => document.getElementById('f_'+id);
const h_ = id => document.getElementById('h_'+id);
const a_ = id => document.getElementById('a_'+id);
const u_ = id => document.getElementById('u_'+id);

loadGames();
</script>
</body>
</html>
