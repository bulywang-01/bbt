<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>比賽管理</title>
</head>
<body>

<!-- 權限檢查 -->
<script>
if (!localStorage.getItem('role')) location.href='login.html';
if (localStorage.getItem('role')!=='admin'){
  alert('無管理權限'); location.href='index.html';
}
</script>

<h2>📋 比賽清單（可修改）</h2>

<div>
  <a href="index.html">🏠 回首頁</a> |
  <button onclick="logout()">登出</button>
</div>

<hr>

<h3>➕ 新增比賽（系統自動編號）</h3>

<table>
<tr><td>日期</td><td><input id="new_date" placeholder="2026-06-30"></td></tr>
<tr><td>球場</td><td><input id="new_field"></td></tr>
<tr><td>盃賽</td><td><input id="new_tournament"></td></tr>
<tr><td>組別</td><td><input id="new_category"></td></tr>
<tr><td>三壘（客隊）</td><td><input id="new_away"></td></tr>
<tr><td>一壘（主隊）</td><td><input id="new_home"></td></tr>
<tr>
  <td>裁判數</td>
  <td>
    <select id="new_count">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
    </select>
  </td>
</tr>
</table>

<br>
<button onclick="addGame()">新增比賽</button>

<hr>

<div id="games">載入中…</div>

<script src="js/config.js"></script>
  
<script>
function logout(){ localStorage.clear(); location.href='login.html'; }

function formatROC(d){
  if(!d) return '';
  const x=new Date(d);
  return (x.getFullYear()-1911)+'/'+(x.getMonth()+1)+'/'+x.getDate();
}

function loadGames(){
  const cb='cb'+Date.now();
  window[cb]=list=>{ render(list||[]); delete window[cb]; };
  const s=document.createElement('script');
  s.src=API_URL+'?action=games&callback='+cb;
  document.body.appendChild(s);
}

function render(list){
  const box=document.getElementById('games');
  box.innerHTML='';
  list.forEach(g=>{
    box.innerHTML+=`
<div>
<b>${g.game_id || '(無編號)'}</b>
日期 <input id="d_${g.game_id}" value="${g.date}">
(${formatROC(g.date)})
球場 <input id="f_${g.game_id}" value="${g.field}">
盃賽 <input id="t_${g.game_id}" value="${g.tournament}">
組別 <input id="c_${g.game_id}" value="${g.category}">
客隊 <input id="a_${g.game_id}" value="${g.away_team}">
主隊 <input id="h_${g.game_id}" value="${g.home_team}">
裁判
<select id="u_${g.game_id}">
<option ${g.umpire_count==1?'selected':''}>1</option>
<option ${g.umpire_count==2?'selected':''}>2</option>
<option ${g.umpire_count==3?'selected':''}>3</option>
<option ${g.umpire_count==4?'selected':''}>4</option>
</select>
<button onclick="updateGame('${g.game_id}')">💾 修改</button>
<button onclick="deleteGame('${g.game_id}')">🗑 刪除</button>
</div>`;
  });
}

function addGame(){
  const cb='add'+Date.now();
  window[cb]=res=>{
    alert('新增成功，編號：'+res.game_id);
    loadGames();
    delete window[cb];
  };
  const s=document.createElement('script');
  s.src=
    API_URL+
    '?action=add_game'+
    '&date='+new_date.value+
    '&field='+new_field.value+
    '&tournament='+new_tournament.value+
    '&category='+new_category.value+
    '&away_team='+new_away.value+
    '&home_team='+new_home.value+
    '&umpire_count='+new_count.value+
    '&callback='+cb;
  document.body.appendChild(s);
}

function updateGame(id){
  const cb='upd'+Date.now();
  window[cb]=()=>{ alert('修改完成'); loadGames(); delete window[cb]; };
  const s=document.createElement('script');
  s.src=
    API_URL+
    '?action=update_game'+
    '&game_id='+id+
    '&date='+document.getElementById('d_'+id).value+
    '&field='+document.getElementById('f_'+id).value+
    '&tournament='+document.getElementById('t_'+id).value+
    '&category='+document.getElementById('c_'+id).value+
    '&away_team='+document.getElementById('a_'+id).value+
    '&home_team='+document.getElementById('h_'+id).value+
    '&umpire_count='+document.getElementById('u_'+id).value+
    '&callback='+cb;
  document.body.appendChild(s);
}

function deleteGame(id){
  if(!confirm('確定刪除？')) return;
  const cb='del'+Date.now();
  window[cb]=()=>{ loadGames(); delete window[cb]; };
  const s=document.createElement('script');
  s.src=API_URL+'?action=delete_game&game_id='+id+'&callback='+cb;
  document.body.appendChild(s);
}

loadGames();
</script>

</body>
</html>
