<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>⚾ 比賽管理</title>
<style>
  body { font-family: system-ui; margin: 20px; }
  h2 { margin-top: 0; }

  a {
    color: #0066cc;
    text-decoration: none;
    margin-right: 12px;
  }
  a:hover { text-decoration: underline; }

  table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 6px;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 6px 8px;
    text-align: center;
    white-space: nowrap;
  }
  th { background: #f0f0f0; }

  .date-block {
    margin-bottom: 24px;
  }

  .date-title {
    margin: 14px 0 6px;
    font-size: 18px;
    font-weight: bold;
  }
</style>
</head>
<body>

<!-- ===== 權限檢查 ===== -->
<script>
if (!localStorage.getItem('role')) location.href = 'login.html';
if (localStorage.getItem('role') !== 'admin') {
  alert('僅限管理者使用');
  location.href = 'index.html';
}
</script>

<!-- ===== Header（超連結固定）===== -->
<div>
  <a href="index.html">🏠 回首頁</a>
  <a href="templates_manage.html">📦 模板管理</a>
</div>

<h2>⚾ 比賽清單管理</h2>

<div id="content">載入中…</div>

<!-- ✅ JS 設定檔（這行一定要正確） -->
<script src="js/config.js"></script>

<script>
const token = localStorage.getItem('token');
const content = document.getElementById('content');

/* ===============================
 * 載入所有比賽
 * =============================== */
function loadGames() {
  content.textContent = '載入中…';

  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    if (!res || res.result !== 'ok') {
      content.textContent = '❌ 無法取得比賽資料';
      return;
    }
    renderGames(res.games || []);
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=getAllSchedule' +
    '&token=' + encodeURIComponent(token) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===============================
 * 依日期分組顯示比賽
 * =============================== */
function renderGames(games) {
  if (!games.length) {
    content.textContent = '目前尚無比賽資料';
    return;
  }

  // 依日期排序
  games.sort((a, b) => a.date.localeCompare(b.date));

  // 依日期分組
  const map = {};
  games.forEach(g => {
    if (!map[g.date]) map[g.date] = [];
    map[g.date].push(g);
  });

  let html = '';

  Object.keys(map).forEach(date => {
    html += `
      <div class="date-block">
        <div class="date-title">📅 ${date}</div>
        <table>
          <tr>
            <th>Game ID</th>
            <th>盃賽</th>
            <th>組別</th>
            <th>場地</th>
            <th>主隊</th>
            <th>客隊</th>
            <th>裁判數</th>
          </tr>
    `;

    map[date].forEach(g => {
      html += `
        <tr>
          <td>${g.game_id}</td>
          <td>${g.tournament || ''}</td>
          <td>${g.category || ''}</td>
          <td>${g.field || ''}</td>
          <td>${g.home_team || ''}</td>
          <td>${g.away_team || ''}</td>
          <td>${g.umpire_count || ''}</td>
        </tr>
      `;
    });

    html += `
        </table>
      </div>
    `;
  });

  content.innerHTML = html;
}

/* 初始化 */
loadGames();
</script>

</body>
</html>
