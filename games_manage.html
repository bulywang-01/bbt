<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>比賽管理</title>
<style>
  body { font-family: system-ui; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid #ccc; padding: 6px 8px; text-align: center; }
  th { background: #eee; }
  tr.editing { background: #fff8dc; }
  .toolbar { margin: 10px 0; }
  button { margin: 0 2px; }
</style>
</head>
<body>

<script>
if (!localStorage.getItem('role')) location.href='login.html';
if (localStorage.getItem('role') !== 'admin') {
  alert('僅限管理者');
  location.href='index.html';
}
</script>

<h2>⚾ 比賽管理</h2>
index.html🏠 回首頁</a>

<div class="toolbar">
  <button onclick="selectAll()">✅ 全選</button>
  <button onclick="bulkDelete()">🗑 大量刪除</button>
</div>

<div id="content">載入中…</div>

<!-- ✅ 正確載入，避免再踩雷 -->
<script src="js/config.js"></script>

<script>
const token = localStorage.getItem('token');
const content = document.getElementById('content');

/* ===== 載入比賽清單 ===== */
function loadGames(){
  content.textContent = '載入中…';
  const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);

  window[cb] = res => {
    if (!res || res.result !== 'ok') {
      content.textContent = '❌ 無法載入比賽清單';
      return;
    }

    if (!res.games.length) {
      content.textContent = '目前尚無比賽資料';
      return;
    }

    let html = `<table>
      <tr>
        <th><input type="checkbox" onclick="toggleAll(this)"></th>
        <th>ID</th><th>日期</th><th>盃賽</th><th>組別</th>
        <th>客隊</th><th>主隊</th><th>裁判數</th><th>操作</th>
      </tr>`;

    res.games.forEach(g=>{
      html += `
      <tr id="row_${g.game_id}">
        <td><input type="checkbox" class="sel" data-id="${g.game_id}"></td>
        <td>${g.game_id}</td>
        <td>${g.date}</td>
        <td>${g.tournament}</td>
        <td>${g.category}</td>
        <td>${g.away_team}</td>
        <td>${g.home_team}</td>
        <td>${g.umpire_count}</td>
        <td>
          <button onclick="editRow('${g.game_id}')">✏️ 修改</button>
          <button onclick="deleteOne('${g.game_id}')">🗑</button>
        </td>
      </tr>`;
    });

    html += '</table>';
    content.innerHTML = html;
  };

  const s=document.createElement('script');
  s.src =
    API_URL +
    '?action=getAllSchedule' +
    '&token='+encodeURIComponent(token) +
    '&callback='+cb;
  document.body.appendChild(s);
}

/* ===== 操作 ===== */
function toggleAll(cb){
  document.querySelectorAll('.sel').forEach(c=>c.checked = cb.checked);
}

function selectAll(){
  document.querySelectorAll('.sel').forEach(c=>c.checked = true);
}

function deleteOne(id){
  if (!confirm('確定刪除？')) return;
  callDelete([id]);
}

function bulkDelete(){
  const ids=[...document.querySelectorAll('.sel:checked')].map(c=>c.dataset.id);
  if (!ids.length) return alert('未選擇任何比賽');
  if (!confirm(`確定刪除 ${ids.length} 筆？`)) return;
  callDelete(ids);
}

function callDelete(ids){
  ids.forEach(id=>{
    const cb='cb_'+id+'_'+Date.now();
    window[cb]=()=>loadGames();
    const s=document.createElement('script');
    s.src=
      API_URL+
      '?action=deleteGame'+
      '&token='+encodeURIComponent(token)+
      '&game_id='+encodeURIComponent(id)+
      '&callback='+cb;
    document.body.appendChild(s);
  });
}

/* ===== 初始化 ===== */
loadGames();
</script>

</body>
</html>
