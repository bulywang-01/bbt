<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>⚾ 比賽管理</title>
<style>
  body {
    font-family: system-ui;
    margin: 20px;
    line-height: 1.6;
  }
  h2 { margin-top: 0; }

  a {
    color: #0066cc;
    text-decoration: none;
  }
  a:hover { text-decoration: underline; }

  table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 10px;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 6px 8px;
    text-align: center;
  }
  th {
    background: #f0f0f0;
  }

  input, select {
    box-sizing: border-box;
  }

  .actions button {
    margin: 0 2px;
  }

  tr.editing {
    background: #fff8dc;
  }

  .toolbar {
    margin: 10px 0;
    padding: 10px;
    background: #f9f9f9;
  }

  .msg {
    margin: 8px 0;
    color: #555;
  }
</style>
</head>
<body>

<!-- ===== 權限檢查 ===== -->
<script>
if (!localStorage.getItem('role')) location.href = 'login.html';
if (localStorage.getItem('role') !== 'admin') {
  alert('僅限管理者使用');
  location.href = 'index.html';
}
</script>

<h2>⚾ 比賽管理</h2>
<p class="msg">
  <a href="index.html">🏠 回首頁</a>
</p>

<!-- ===== 工具列 ===== -->
<div class="toolbar">
  📅 月份篩選：
  <select id="monthFilter" onchange="renderTable()">
    <option value="">全部</option>
  </select>
</div>

<div id="content">載入中…</div>

<!-- ✅ 正確載入 config.js -->
<script src="js/config.js"></script>

<script>
const token = localStorage.getItem('token');
const content = document.getElementById('content');
let allGames = [];

/* ===== 日期工具 ===== */
function toInputDate(str) {
  return str ? str.replace(/\//g, '-') : '';
}
function fromInputDate(str) {
  return str ? str.replace(/-/g, '/') : '';
}
function addOneDay(dateStr) {
  const [y,m,d] = dateStr.split('/').map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate() + 1);
  const yy = dt.getFullYear();
  const mm = String(dt.getMonth()+1).padStart(2,'0');
  const dd = String(dt.getDate()).padStart(2,'0');
  return `${yy}/${mm}/${dd}`;
}

/* ===== 載入資料 ===== */
function loadGames() {
  content.textContent = '載入中…';

  const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  window[cb] = function(res) {
    if (!res || res.result !== 'ok') {
      content.textContent = '❌ 無法取得比賽資料';
      return;
    }

    allGames = res.games || [];
    buildMonthFilter(allGames);
    renderTable();
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=getAllSchedule' +
    '&token=' + encodeURIComponent(token) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===== 建立月份選單 ===== */
function buildMonthFilter(games) {
  const select = document.getElementById('monthFilter');
  const months = new Set();

  games.forEach(g => {
    if (g.date && g.date.length >= 7) {
      months.add(g.date.substring(0,7)); // yyyy/MM
    }
  });

  const current = select.value;
  select.innerHTML = '<option value="">全部</option>';
  [...months].sort().forEach(m => {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m;
    if (m === current) opt.selected = true;
    select.appendChild(opt);
  });
}

/* ===== 畫表格 ===== */
function renderTable() {
  const month = document.getElementById('monthFilter').value;
  let games = allGames;

  if (month) {
    games = games.filter(g => g.date.startsWith(month));
  }

  if (!games.length) {
    content.textContent = '目前尚無比賽資料';
    return;
  }

  let html = `<table>
    <tr>
      <th>ID</th>
      <th>日期</th>
      <th>球場</th>
      <th>盃賽</th>
      <th>組別</th>
      <th>客隊</th>
      <th>主隊</th>
      <th>裁判數</th>
      <th>操作</th>
    </tr>`;

  games.forEach(g => {
    html += `
    <tr id="row_${g.game_id}">
      <td>${g.game_id}</td>
      <td>${g.date}</td>
      <td>${g.field}</td>
      <td>${g.tournament}</td>
      <td>${g.category}</td>
      <td>${g.away_team}</td>
      <td>${g.home_team}</td>
      <td>${g.umpire_count}</td>
      <td class="actions">
        <button onclick="editGame('${g.game_id}')">✏️ 修改</button>
        <button onclick="copyGame('${g.game_id}')">📄 複製</button>
        <button onclick="deleteGame('${g.game_id}')">🗑 刪除</button>
      </td>
    </tr>`;
  });

  html += '</table>';
  content.innerHTML = html;
}

/* ===== 進入編輯 ===== */
function editGame(id) {
  const g = allGames.find(x => x.game_id === id);
  if (!g) return;

  const row = document.getElementById('row_' + id);
  row.classList.add('editing');

  row.innerHTML = `
    <td>${g.game_id}</td>
    <td><input type="date" id="d_${id}" value="${toInputDate(g.date)}"></td>
    <td><input type="text" id="f_${id}" value="${g.field}"></td>
    <td><input type="text" id="t_${id}" value="${g.tournament}"></td>
    <td><input type="text" id="c_${id}" value="${g.category}"></td>
    <td><input type="text" id="a_${id}" value="${g.away_team}"></td>
    <td><input type="text" id="h_${id}" value="${g.home_team}"></td>
    <td>
      <select id="u_${id}">
        <option ${g.umpire_count==1?'selected':''}>1</option>
        <option ${g.umpire_count==2?'selected':''}>2</option>
        <option ${g.umpire_count==3?'selected':''}>3</option>
        <option ${g.umpire_count==4?'selected':''}>4</option>
      </select>
    </td>
    <td>
      <button onclick="saveGame('${id}')">✅ 儲存</button>
      <button onclick="renderTable()">❌ 取消</button>
    </td>
  `;
}

/* ===== 儲存 ===== */
function saveGame(id) {
  const dateVal = document.getElementById('d_' + id).value;
  if (!dateVal) return alert('日期不可為空');

  const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  window[cb] = function(res) {
    if (res && res.result === 'ok') {
      alert('✅ 修改完成');
      loadGames();
    } else {
      alert('❌ 修改失敗');
    }
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=updateGame' +
    '&token=' + encodeURIComponent(token) +
    '&game_id=' + encodeURIComponent(id) +
    '&date=' + encodeURIComponent(fromInputDate(dateVal)) +
    '&field=' + encodeURIComponent(document.getElementById('f_'+id).value) +
    '&tournament=' + encodeURIComponent(document.getElementById('t_'+id).value) +
    '&category=' + encodeURIComponent(document.getElementById('c_'+id).value) +
    '&away_team=' + encodeURIComponent(document.getElementById('a_'+id).value) +
    '&home_team=' + encodeURIComponent(document.getElementById('h_'+id).value) +
    '&umpire_count=' + encodeURIComponent(document.getElementById('u_'+id).value) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===== 複製比賽（日期 +1） ===== */
function copyGame(id) {
  const g = allGames.find(x => x.game_id === id);
  if (!g) return;

  const newDate = addOneDay(g.date);
  if (!confirm(`複製此比賽，日期改為 ${newDate}？`)) return;

  const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  window[cb] = function(res) {
    if (res && res.result === 'ok') {
      alert('✅ 比賽已複製');
      loadGames();
    } else {
      alert('❌ 複製失敗');
    }
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=addGame' +
    '&token=' + encodeURIComponent(token) +
    '&date=' + encodeURIComponent(newDate) +
    '&field=' + encodeURIComponent(g.field) +
    '&tournament=' + encodeURIComponent(g.tournament) +
    '&category=' + encodeURIComponent(g.category) +
    '&away_team=' + encodeURIComponent(g.away_team) +
    '&home_team=' + encodeURIComponent(g.home_team) +
    '&umpire_count=' + encodeURIComponent(g.umpire_count) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===== 刪除 ===== */
function deleteGame(id) {
  if (!confirm('確定刪除？')) return;

  const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  window[cb] = function(res) {
    if (res && res.result === 'ok') {
      alert('✅ 已刪除');
      loadGames();
    } else {
      alert('❌ 刪除失敗');
    }
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=deleteGame' +
    '&token=' + encodeURIComponent(token) +
    '&game_id=' + encodeURIComponent(id) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* 初始化 */
loadGames();
</script>

</body>
</html>
