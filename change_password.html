<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>設定新密碼</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  height: 100vh;
  font-family: system-ui,-apple-system;
  background: linear-gradient(135deg,#e9f0fb,#f7f9fc);
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  width: 100%;
  max-width: 380px;
  background: #fff;
  padding: 28px 32px 32px;
  border-radius: 10px;
  box-shadow: 0 8px 28px rgba(0,0,0,.1);
}

.card h2 {
  margin: 0 0 8px;
  text-align: center;
  font-size: 20px;
  color: #2c3e50;
}

.card .hint {
  text-align: center;
  font-size: 13px;
  color: #666;
  margin-bottom: 18px;
}

.form-group {
  margin-bottom: 14px;
}

.form-group label {
  display: block;
  font-size: 13px;
  margin-bottom: 6px;
  color: #555;
}

.form-group input {
  width: 100%;
  padding: 9px 10px;
  font-size: 14px;
  border: 1px solid #ccd3dc;
  border-radius: 5px;
}

.form-group input:focus {
  outline: none;
  border-color: #2c7be5;
  box-shadow: 0 0 0 2px rgba(44,123,229,.15);
}

.btn {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  background: #2c7be5;
  border: none;
  border-radius: 5px;
  font-size: 15px;
  color: #fff;
  cursor: pointer;
}

.btn:hover {
  background: #1a68d1;
}

.msg {
  margin-top: 12px;
  min-height: 18px;
  font-size: 13px;
  text-align: center;
  color: #c0392b;
}
</style>
</head>

<body>

<div class="card">
  <h2>首次登入設定密碼</h2>
  <div class="hint">請設定一組新的登入密碼（至少 8 碼）</div>

  <div class="form-group">
    <label>新密碼</label>
    <input id="pwd1" type="password">
  </div>

  <div class="form-group">
    <label>再次確認新密碼</label>
    <input id="pwd2" type="password">
  </div>

  <button class="btn" onclick="changePwd()">送出並登入</button>

  <div id="msg" class="msg"></div>
</div>

<script src="js/config.js"></script>
<script>
  
const sessionRaw = localStorage.getItem('session_user');
if (!sessionRaw) {
  // 第一次跳轉，給瀏覽器一次機會
  setTimeout(() => {
    if (!localStorage.getItem('session_user')) {
      location.replace('login.html');
    }
  }, 100);
}
  
const session = JSON.parse(sessionRaw);

function changePwd() {
  const p1 = document.getElementById('pwd1').value.trim();
  const p2 = document.getElementById('pwd2').value.trim();
  const msg = document.getElementById('msg');
  msg.textContent = '';

  if (!p1 || !p2) {
    msg.textContent = '請輸入新密碼';
    return;
  }
  if (p1.length < 8) {
    msg.textContent = '密碼至少 8 碼';
    return;
  }
  if (p1 !== p2) {
    msg.textContent = '兩次輸入的密碼不一致';
    return;
  }

  callApi({
    action: 'changePassword',
    user_id: session.user_id,
    new_password: p1
  }, res => {
    if (res && res.result === 'ok') {
      alert('密碼設定完成，請重新登入');
      localStorage.removeItem('session_user');
      location.replace('login.html');
    } else {
      msg.textContent = res?.message || '更新失敗';
    }
  });
}
</script>

</body>
</html>
