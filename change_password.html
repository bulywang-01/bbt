<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>首次設定密碼</title>
</head>
<body>

<h2>首次登入，請設定新密碼</h2>

<input id="pwd1" type="password" placeholder="新密碼">
<input id="pwd2" type="password" placeholder="再次確認">
<button onclick="changePwd()">送出</button>

<div id="msg"></div>

<!-- ================= Script ================= -->
<script src="js/config.js"></script>
  
<script>
function changePwd(){
  if (pwd1.value !== pwd2.value) {
    msg.textContent = '密碼不一致';
    return;
  }

  callApi(
    'action=changePassword&new_password=' + encodeURIComponent(pwd1.value),
    res => {
      if (res.result === 'ok') {
        alert('密碼更新成功');
        location.replace('index.html');
      } else {
        msg.textContent = '更新失敗';
      }
    }
  );
}
</script>
</body>
</html>
