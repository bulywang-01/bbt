<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>登入</title>
</head>
<body>

<h2>🔐 登入</h2>

<input id="u" placeholder="帳號"><br><br>
<input id="p" type="password" placeholder="密碼"><br><br>
<button onclick="login()">登入</button>

<script>

const API_URL =
  'https://script.google.com/macros/s/【你最新新增部署的 exec ID】/exec';

  
  function handleLogin(res) {
  if (res.result === 'ok') {
    localStorage.setItem('role', res.role);
    localStorage.setItem('judge_id', res.judge_id || '');
    location.href = 'index.html';
  } else {
    alert('登入失敗');
  }
}

function login() {
  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=login' +
    '&username=' + encodeURIComponent(u.value) +
    '&password=' + encodeURIComponent(p.value) +
    '&callback=handleLogin' +
    '&_=' + Date.now();
  document.body.appendChild(s);
}
</script>

</body>
</html>
