<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>系統登入</title>

<style>
body{font-family:system-ui;background:#f4f6f8}
.box{width:260px;margin:120px auto;background:#fff;padding:24px;border-radius:8px}
.err{color:red}
</style>
</head>
<body>

<div class="box">
  <h2>系統登入</h2>
  <input id="username" placeholder="帳號">
  <input id="password" type="password" placeholder="密碼">
  <button onclick="doLogin()">登入</button>
  <div id="msg" class="err"></div>
</div>

<script src="js/config.js"></script>

<script>
function doLogin(){
  msg.textContent = '';

  const u = username.value.trim();
  const p = password.value.trim();
  if(!u || !p){
    msg.textContent='請輸入帳密';
    return;
  }

  const cb='cb_'+Date.now();
  window[cb]=function(res){
    console.log('LOGIN RESPONSE', res);  // ✅ 關鍵驗證
    delete window[cb];

    if(res && res.result==='ok'){
      localStorage.setItem('token', res.token);
      localStorage.setItem('session_user', JSON.stringify(res.auth));
      console.log('SESSION_USER SAVED', localStorage.getItem('session_user'));
      location.href='index.html';
      return;
    }

    if(res && res.result==='inactive'){
      msg.textContent='帳號尚未啟用，請聯絡管理員';
      return;
    }

    msg.textContent='登入失敗，請檢查帳號密碼';
  };

  const s=document.createElement('script');
  s.src=API_URL+
    '?action=login'+
    '&username='+encodeURIComponent(u)+
    '&password='+encodeURIComponent(p)+
    '&callback='+cb;
  document.body.appendChild(s);
}
</script>

</body>
</html>
