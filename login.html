<h2>🔐 登入</h2>
<input id="u" placeholder="帳號">
<input id="p" type="password" placeholder="密碼">
<button onclick="login()">登入</button>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
async function login() {
  const res = await fetch(
    API_URL +
    '?action=login' +
    '&username=' + encodeURIComponent(u.value) +
    '&password=' + encodeURIComponent(p.value)
  ).then(r => r.json());

  if (res.result === 'ok') {
    localStorage.setItem('role', res.role);
    localStorage.setItem('judge_id', res.judge_id || '');
    location.href = 'index.html';
  } else {
    alert('登入失敗');
  }
}
</script>
