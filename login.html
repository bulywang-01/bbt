<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>登入</title>
</head>
<body>

<h2>🔐 登入</h2>

<input id="u" placeholder="帳號"><br><br>
<input id="p" type="password" placeholder="密碼"><br><br>
<button onclick="login()">登入</button>

<script>
const API_URL = 'https://script.google.com/macros/s/你的最新部署ID/exec';

function login() {
  const username = encodeURIComponent(u.value);
  const password = encodeURIComponent(p.value);

  const script = document.createElement('script');
  script.src =
    API_URL +
    '?action=login' +
    '&username=' + username +
    '&password=' + password +
    '&callback=handleLogin';

  document.body.appendChild(script);
}

// ✅ 這個函式會被 GAS 呼叫
function handleLogin(res) {
  if (res.result === 'ok') {
    localStorage.setItem('role', res.role);
    localStorage.setItem('judge_id', res.judge_id || '');
    alert('登入成功');
    location.href = 'index.html';
  } else {
    alert('登入失敗');
  }
}
</script>

</body>
</html>
