<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>裁判系統登入</title>
</head>
<body>

<h1 style="color:red">LOGIN V1000</h1>

<h2>🔒 裁判系統登入</h2>
 
<div>
  帳號：
  <input id="u" value="admin"><br><br>

  密碼：
  <input id="p" type="password" value="1234"><br><br>

  <button id="loginBtn">登入</button>
</div>

<!-- ✅ 正確載入設定檔（唯一責任：提供 API_URL） -->
<script src="js/config.js"></script>

<!-- ✅ 登入邏輯 -->
<script>
(function () {
  console.log('login.html loaded');

  var btn = document.getElementById('loginBtn');
  btn.addEventListener('click', login);

  function login() {
    console.log('login clicked');

    var user = document.getElementById('u').value.trim();
    var pass = document.getElementById('p').value.trim();

    var cb = 'login_cb_' + Date.now();
    window[cb] = function (res) {
      console.log('login response:', res);

      if (res && res.result === 'ok') {
        localStorage.setItem('role', res.role);
        localStorage.setItem('judge_id', res.judge_id || '');
        location.href = 'index.html';
      } else {
        alert('登入失敗');
      }

      delete window[cb];
    };

    var s = document.createElement('script');
    s.src =
      API_URL +
      '?action=login' +
      '&username=' + encodeURIComponent(user) +
      '&password=' + encodeURIComponent(pass) +
      '&callback=' + cb +
      '&_=' + Date.now();

    document.body.appendChild(s);
  }
})();
</script>

</body>
</html>
