<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>系統登入</title>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont;
  background:#f5f6f8;
}
.login-box{
  width:360px;
  margin:120px auto;
  background:#fff;
  padding:24px;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
h2{
  margin-top:0;
  text-align:center;
}
input{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  font-size:14px;
  box-sizing:border-box;
}
button{
  width:100%;
  padding:10px;
  font-size:15px;
  cursor:pointer;
}
.message{
  margin-top:10px;
  color:#c00;
  font-size:14px;
  text-align:center;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>裁判出勤系統</h2>

  <input
    id="username"
    placeholder="帳號"
    autocomplete="username"
  >

  <input
    id="password"
    type="password"
    placeholder="密碼"
    autocomplete="current-password"
  >

  <button type="button" onclick="doLogin()">登入</button>

  <div id="msg" class="message"></div>
</div>

<!-- ✅ 共用 API 設定 -->
<script src="js/config.js"></script>

<script>

/**
 * 執行登入
 */
function doGet(e) {
  const action = (e && e.parameter && e.parameter.action) || '';
  let result;

  try {
    switch (action) {

      case 'login':
        result = api_login(e);
        break;

      case 'getSignableGames':
        result = api_getSignableGames(e);
        break;

      case 'judgeSignupByGames':
        result = api_judgeSignupByGames(e);
        break;

      case 'ping':
        result = {
          result: 'ok',
          message: 'pong',
          time: new Date().toISOString()
        };
        break;

      default:
        result = {
          result: 'error',
          message: 'unknown_action'
        };
    }

  } catch (err) {
    result = {
      result: 'error',
      message: err.message,
      stack: err.stack
    };
  }

  // ✅ ⭐ 核心：JSONP 支援 ⭐
  const cb = e && e.parameter && e.parameter.callback;
  if (cb) {
    return ContentService
      .createTextOutput(`${cb}(${JSON.stringify(result)})`)
      .setMimeType(ContentService.MimeType.JAVASCRIPT);
  }

  // ✅ 沒 callback 就回純 JSON
  return ContentService
    .createTextOutput(JSON.stringify(result))
    .setMimeType(ContentService.MimeType.JSON);
}

</script>

</body>
</html>
