<h2>🔐 登入</h2>
<input id="u" placeholder="帳號">
<input id="p" placeholder="密碼" type="password">
<button onclick="login()">登入</button>

js/config.js</script>
js/api.js</script>

<script>
async function login(){
  const res = await apiPost({
    action:'login',
    username:u.value,
    password:p.value
  });
  if(res.result==='ok'){
    localStorage.setItem('role',res.role);
    localStorage.setItem('judge_id',res.judge_id||'');
    location.href='index.html';
  }else alert('登入失敗');
}
</script>
