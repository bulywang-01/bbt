<script>
function formatDateToTW(iso) {
  const d = new Date(iso);
  d.setHours(d.getHours() + 8); // 台灣時區
  const y = d.getFullYear();
  const m = d.getMonth() + 1;
  const day = d.getDate();
  const week = ['日','一','二','三','四','五','六'][d.getDay()];
  return `${y}/${m}/${day}（${week}）`;
}
