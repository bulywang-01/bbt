<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>比賽清單</title>
</head>
<body>

<script>
if (!localStorage.getItem('role')) location.href='login.html';
</script>

<h2>⚾ 比賽清單</h2>

<div id="games">載入中…</div>

<script src="js/config.js"></script>
  
<script>
function formatROC(d){
  const x=new Date(d);
  return (x.getFullYear()-1911)+'/'+(x.getMonth()+1)+'/'+x.getDate();
}

function load(){
  const cb='g'+Date.now();
  window[cb]=list=>{
    const box=document.getElementById('games');
    box.innerHTML='';
    list.forEach(g=>{
      box.innerHTML+=`
<div>
<b>${g.game_id}</b>
${formatROC(g.date)}｜
${g.tournament}｜
${g.category}｜
${g.away_team} vs ${g.home_team}｜
${g.field}｜
裁判 ${g.umpire_count} 人
</div>`;
    });
    delete window[cb];
  };
  const s=document.createElement('script');
  s.src=API_URL+'?action=games&callback='+cb;
  document.body.appendChild(s);
}
load();
</script>

</body>
</html>
