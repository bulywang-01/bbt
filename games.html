<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>比賽列表</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>⚾ 比賽列表</h2>

<div id="games">載入中…</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>

<!-- ✅ 直接內嵌 games.js 內容 -->
<script>
(async () => {
  const gamesDiv = document.getElementById('games');
  console.log('開始載入比賽');

  try {
    const res = await fetch(API_URL + '?action=games');
    const games = await res.json();

    console.log('API 回傳資料：', games);

    if (!Array.isArray(games)) {
      gamesDiv.innerHTML = '<p style="color:red">資料格式錯誤</p>';
      return;
    }

    if (games.length === 0) {
      gamesDiv.innerHTML = '<p>目前沒有比賽資料</p>';
      return;
    }

    gamesDiv.innerHTML = '';

    games.forEach(g => {
      const d = new Date(g.date);
      d.setHours(d.getHours() + 8);

      const y = d.getFullYear();
      const m = d.getMonth() + 1;
      const day = d.getDate();
      const week = ['日','一','二','三','四','五','六'][d.getDay()];

      const div = document.createElement('div');
      div.style.border = '1px solid #ccc';
      div.style.padding = '10px';
      div.style.marginBottom = '10px';

      div.innerHTML = `
        <b>${y}/${m}/${day}（${week}）</b> | ${g.field}<br>
        ${g.category}<br>
        <a href="game.html?game_id=${g.game_id}">→ 出勤點名</a>
      `;
      gamesDiv.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    gamesDiv.innerHTML = '<p style="color:red">載入比賽失敗</p>';
  }
})();
</script>
