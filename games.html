}
</script>

<h2>⚾ 比賽列表</h2>
<div id="games"></div>

<!-- ✅ 一定要先載入 config.js -->
<script src="js/config.js"></script>

<script>
/* JSONP callback */
function handleGames(list) {
  const div = document.getElementById('games');
  div.innerHTML = '';

  list.forEach(g => {
    div.innerHTML += `
      <div style="border:1px solid #ccc;margin:5px;padding:5px">
        ${g.date}｜${g.field}｜${g.category}｜${g.umpire_count} 人制
        <a href="game.html?game_id=${g.game_id}">出勤點名</a>
      </div>
    `;
  });
}

/* 載入比賽 */
(function loadGames() {
  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=games' +
    '&callback=handleGames' +
    '&_=' + Date.now();
  document.body.appendChild(s);
})();
</script>
