<!DOCTYPE html>
<html>
<body>

<script>
if (!localStorage.getItem('role')) location.href='login.html';
</script>

<h2>⚾ 比賽列表</h2>
<div id="games">載入中…</div>

<script src="js/config.js"></script>
<script>
function handleGames(list){
  const d=document.getElementById('games');
  d.innerHTML='';
  list.forEach(g=>{
    d.innerHTML+=`
      <div>
        ${g.date}｜${g.field}｜${g.category}｜${g.umpire_count}人制
        <a href="game.html?game_id=${g.game_id}">出勤點名</a>
      </div>`;
  });
}
const s=document.createElement('script');
s.src=API_URL+'?action=games&callback=handleGames';
document.body.appendChild(s);
</script>

</body
