<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紀錄員報名</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system;
  background: #f3f5f7;
}

/* ===== 標題 ===== */
.page-title {
  background: #0d4c63;
  color: #fff;
  padding: 12px;
  font-size: 20px;
  font-weight: 800;
  text-align: center;
}

.hint {
  font-size: 13px;
  color: #555;
  margin: 8px 12px;
}

/* ===== 日期 / 組別 ===== */
.date-title {
  margin: 20px 12px 8px;
  font-size: 20px;
  font-weight: 800;
}
.group-title {
  margin: 10px 12px 6px;
  font-weight: 700;
  border-left: 4px solid #1976d2;
  padding-left: 8px;
}

/* ===== 表格 ===== */
.record-table {
  width: calc(100% - 24px);
  margin: 0 12px 16px;
  border-collapse: collapse;
  background: #fff;
}
.record-table th,
.record-table td {
  border: 1px solid #ccc;
  padding: 6px 8px;
  text-align: center;
}
.record-table th {
  background: #0d4c63;
  color: #fff;
}

/* ===== select ===== */
select {
  width: 100%;
  padding: 4px 6px;
  border-radius: 12px;
  font-weight: 600;
}
select.me {
  background: #e8f5e9;
  border: 2px solid #2e7d32;
}
select.locked {
  background: #e0e0e0;
}

/* ✅ 四、搭配的 CSS（視覺就是裁判頁）*/
.signup-btn {
  color: #1976d2;
  cursor: pointer;
  font-weight: 700;
}
.signup-btn:hover {
  text-decoration: underline;
}

.signup-me {
  color: #2e7d32;
  font-weight: 700;
}
.cancel-btn {
  margin-left: 8px;
  color: #c62828;
  cursor: pointer;
  font-size: 12px;
}
.cancel-btn:hover {
  text-decoration: underline;
}

.signup-other {
  color: #555;
  font-weight: 700;
}

/* ===== 操作提示 toast ===== */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  min-width: 200px;
  background: #323232;
  color: #fff;
  padding: 10px 16px;
  border-radius: 6px;
  font-size: 14px;
  text-align: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 9999;
}

.toast.show {
  opacity: 1;
}

.toast.success {
  background: #2e7d32;
}

.toast.error {
  background: #c62828;
}

/* ===== 報名狀態 ===== */
.signup-btn {
  color: #1565c0;          /* 藍：可操作 */
  font-weight: 700;
  cursor: pointer;
}
.signup-btn:hover {
  text-decoration: underline;
}

.signup-me {
  color: #2e7d32;          /* 綠：自己 */
  font-weight: 700;
  white-space: nowrap;
}

.signup-other {
  color: #555;             /* 灰：他人 */
  font-weight: 700;
  white-space: nowrap;
}

/* 取消按鈕（小而明確） */
.cancel-btn {
  margin-left: 8px;
  font-size: 12px;
  color: #c62828;          /* 紅：危險操作 */
  cursor: pointer;
}
.cancel-btn:hover {
  text-decoration: underline;
}

/* ✅ 3️⃣ CSS：直接共用「裁判長頁的 header CSS」*/
#header {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 12px 20px;
  background: #ffffff;
  border-bottom: 1px solid #e0e0e0;
}

#header a {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 15px;
  padding: 10px 14px;
  color: #0066cc;
  text-decoration: none;
  border-radius: 6px;
}

#header a:hover {
  background: #f2f5fa;
}

#header #u_name {
  margin-left: auto;
  padding: 10px 14px;
  font-weight: 600;
}

</style>
</head>

<body>
<div id="header-container"></div>
  <div id="toast" class="toast"></div>

<div class="page-title">BBT 軟式棒球聯盟｜紀錄員報名表</div>
<div class="hint">※ 只能在「無」的欄位選擇自己</div>

<!-- ✅ 唯一主容器 -->
<div id="recordContainer"></div>

<script src="js/config.js"></script>

<script>
/* ===== 全域 ===== */
let session;
let games = [];

/* ===== 初始化 ===== */
document.addEventListener('DOMContentLoaded', () => {
  initHeader();   // 只管 header
  initPage();     // 只管登入與資料
});

/* ===== Header ===== */
function initHeader() {
  fetch('header.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('header-container').innerHTML = html;
    });
}

/* ===== Page / Data ===== */
function initPage() {
  const raw = localStorage.getItem('session_user');
  if (!raw) {
    location.replace('login.html');
    return;
  }

  session = JSON.parse(raw);          // ✅ 關鍵修正：指定給全域
  if (!session.user_id) {
    location.replace('login.html');
    return;
  }

  loadGames();
}

/* ===== Toast ===== */
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  setTimeout(() => el.className = 'toast', 2000);
}

/* ===== 取資料 ===== */
function loadGames() {
  callApi({
    action: 'getRecordSignableGames',
    user_id: session.user_id
  }, res => {
    if (!res || res.result !== 'ok') {
      showToast('載入賽事失敗', 'error');
      return;
    }

    games = Array.isArray(res.games) ? res.games : [];
    renderRecordDashboard(games);
  });
}

/* ===== 分組 ===== */
function groupGames(list) {
  const map = {};
  list.forEach(g => {
    const date = formatDateTW(g.date);
    const cat  = g.category || '未分類';

    if (!map[date]) map[date] = {};
    if (!map[date][cat]) map[date][cat] = [];
    map[date][cat].push(g);
  });

  Object.values(map).forEach(catMap => {
    Object.values(catMap).forEach(arr => {
      arr.sort((a, b) => a.time.localeCompare(b.time)); // ✅ 正確排序
    });
  });

  return map;
}

/* ===== Render ===== */
function renderRecordDashboard(list) {
  const root = document.getElementById('recordContainer');
  root.innerHTML = '';

  const grouped = groupGames(list);
  Object.keys(grouped).sort().forEach(date => {
    root.insertAdjacentHTML('beforeend', `<div class="date-title">${date}</div>`);

    Object.keys(grouped[date]).forEach(cat => {
      root.insertAdjacentHTML('beforeend', `<div class="group-title">│ ${cat}</div>`);
      root.insertAdjacentHTML('beforeend', buildGroupTable(grouped[date][cat]));
    });
  });
}

/* ===== Table ===== */
function buildGroupTable(list) {
  return `
  <table class="record-table">
    <thead>
      <tr>
        <th>時間</th>
        <th>客隊（三壘）</th>
        <th>主隊（一壘）</th>
        <th>地點</th>
        <th>記錄員</th>
        <th>見習記錄員</th>
        <th>影像記錄員</th>
      </tr>
    </thead>
    <tbody>
      ${list.map(buildRow).join('')}
    </tbody>
  </table>`;
}

function buildRow(g) {
  return `
  <tr>
    <td>${formatTimeTW(g.time)}</td>
    <td>${g.away_team}</td>
    <td>${g.home_team}</td>
    <td>${g.field}</td>
    <td>${renderSignupCell(g,'REC_MAIN')}</td>
    <td>${renderSignupCell(g,'REC_TRAINEE')}</td>
    <td>${renderSignupCell(g,'REC_VIDEO')}</td>
  </tr>`;
}

/* ===== Signup UI ===== */
function renderSignupCell(g, role) {
  const slot = g.record_slots?.[role];

  if (!slot) {
    return `<span class="signup-btn" onclick="signup('${g.game_id}','${role}')">＋報名</span>`;
  }

  if (slot.user_id === session.user_id) {
    return `<span class="signup-me">${slot.name || '我'}
      <span class="cancel-btn" onclick="cancelSignup('${g.game_id}','${role}')">取消</span>
    </span>`;
  }

  return `<span class="signup-other">${slot.name}</span>`;
}

/* ===== Actions ===== */
function signup(gameId, role) {
  showToast('報名中...');
  callApi({
    action:'recordSignup',
    user_id: session.user_id,
    game_id: gameId,
    record_role: role
  }, res => {
    res?.result === 'ok' ? (showToast('報名成功'), loadGames())
                         : showToast(res?.message||'報名失敗','error');
  });
}

function cancelSignup(gameId, role) {
  if (!confirm('確定取消此場紀錄？')) return;
  showToast('取消中...');
  callApi({
    action:'cancelRecordSignup',
    user_id: session.user_id,
    game_id: gameId,
    record_role: role
  }, res => {
    res?.result === 'ok' ? (showToast('已取消'), loadGames())
                         : showToast(res?.message||'取消失敗','error');
  });
}

/* ===== 時間 ===== */
function formatDateTW(v) {
  return new Date(v).toLocaleDateString('zh-TW',{timeZone:'Asia/Taipei'});
}
function formatTimeTW(v) {
  return v; // 已是 HH:mm
}
</script>

</body>
</html>
