<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紀錄長指派</title>

<style>
/* ===== Header（與 judge_dashboard_admin 對齊） ===== */
#header {
  display:flex;
  align-items:center;
  gap:4px;
  padding:6px 12px;
  background:#fff;
  border-bottom:1px solid #e0e0e0;
}
#header a {
  display:flex;
  align-items:center;
  gap:6px;
  font-size:15px;
  padding:10px 14px;
  color:#0066cc;
  text-decoration:none;
  border-radius:6px;
}
#header a:hover { background:#f2f5fa; }
#header a.active {
  background:#e3f2fd;
  color:#1565c0;
  font-weight:700;
}
#header #u_name {
  margin-left:auto;
  padding:10px 14px;
  font-weight:600;
}

/* ===== 主內容 ===== */
body {
  margin:0;
  background:#f5f6f8;
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC";
}
.main {
  max-width:1100px;
  margin:0 auto;
  padding:16px;
}

/* ===== 卡片 ===== */
.panel {
  background:#fff;
  border-radius:14px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 4px 14px rgba(0,0,0,0.1);
}
.game-header {
  font-size:16px;
  font-weight:800;
  margin-bottom:12px;
}

/* ===== Grid ===== */
.pos-grid {
  display:grid;
  grid-template-columns:repeat(3, minmax(0,1fr));
  gap:14px;
}
.pos-cell {
  border:1px solid #e0e0e0;
  border-radius:10px;
  padding:12px;
  text-align:center;
}
.pos-cell.assigned {
  background:#eef5ff;
  border-color:#4a7ef5;
}
.role {
  font-weight:700;
}
.name {
  margin:6px 0;
  font-weight:700;
}
.signup-list {
  font-size:13px;
  color:#777;
}

/* ===== 按鈕 ===== */
button {
  border:none;
  border-radius:8px;
  padding:6px 14px;
  font-size:14px;
  cursor:pointer;
}
.btn-assign { background:#4a7ef5;color:#fff; }
.btn-change { background:#f39c12;color:#fff; }

/* ===== Modal ===== */
#recordModal.hidden { display:none; }
#recordModal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.modal-box {
  background:#fff;
  border-radius:14px;
  padding:20px;
  width:90%;
  max-width:420px;
}
.record-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  margin-top:12px;
}
.record-card {
  border:1px solid #ddd;
  border-radius:10px;
  padding:10px;
  text-align:center;
  font-weight:700;
  cursor:pointer;
}
.record-card:hover {
  background:#eef5ff;
  border-color:#4a7ef5;
}
</style>
</head>

<body>
<div id="header"></div>

<div class="main">
  <div id="content"></div>
</div>

<!-- ===== 指派 Modal ===== -->
<div id="recordModal" class="hidden">
  <div class="modal-box">
    <h3 id="recordModalTitle">指派紀錄員</h3>
    <div id="recordList" class="record-grid"></div>
    <div style="margin-top:12px;text-align:right;">
      <button onclick="closeRecordModal()">取消</button>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/record_dashboard_admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  fetch('header.html')
    .then(r=>r.text())
    .then(html=>{
      document.getElementById('header').innerHTML = html;
      document.querySelectorAll('#header a').forEach(a=>{
        if (a.getAttribute('href') === 'record_dashboard_admin.html') {
          a.classList.add('active');
        }
      });
    });
});
</script>
</body>
</html>
