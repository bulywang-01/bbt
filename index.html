<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>裁判系統首頁</title>
  <style>
    body { font-family: system-ui; }
    li { margin: 8px 0; }
    a {
      color: #0b5ed7;
      text-decoration: none;
      font-size: 18px;
    }
    a:hover { text-decoration: underline; }
    .box {
      background: #f7f7f7;
      padding: 10px;
      margin-bottom: 14px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

<!-- ✅ 登入門禁 -->
<script>
if (!localStorage.getItem('role')) {
  location.href = 'login.html';
}
</script>

<h1>🏠 裁判系統首頁</h1>

<!-- ✅ 狀態顯示 -->
<div class="box" id="status"></div>

<ul id="menu"></ul>

<button onclick="logout()">登出</button>

<script>
function logout() {
  localStorage.clear();
  location.href = 'login.html';
}

const username = localStorage.getItem('username') || '(unknown)';
const role = (localStorage.getItem('role') || '').trim().toLowerCase();

document.getElementById('status').textContent =
  '目前登入帳號：' + username + ' ｜ 角色：' + role;

const menu = document.getElementById('menu');
menu.innerHTML = '';

function addMenu(text, href) {
  const li = document.createElement('li');
  const a = document.createElement('a');
  a.textContent = text;
  a.href = href;
  li.appendChild(a);
  menu.appendChild(li);
}

/* ===== admin 管理介面 ===== */
if (role === 'admin') {
  addMenu('⚾ 比賽管理（檢視）', 'schedule.html');
  addMenu('➕ 新增比賽', 'add_game.html');
  addMenu('📅 月班表', 'schedule.html');
  addMenu('📊 出勤統計', 'stats.html');
}

/* ===== judge 操作介面 ===== */
if (role === 'judge') {
  addMenu('➕ 出勤回報', 'add_attendance.html');
  addMenu('📊 我的班表 / 出勤', 'judge_dashboard.html');
}

/* 防呆 */
if (!menu.children.length) {
  addMenu('⚠ 無可用功能，請重新登入', '#');
}
</script>

</body>
</html>
