<!-- ================= Script ================= -->
<script src="js/config.js"></script>
<script>

/* ===== 載入共用 Header ===== */
function loadHeader(){
  fetch('header.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('header-container').innerHTML = html;

      const s = JSON.parse(localStorage.getItem('session_user') || '{}');
      if (s.name) {
        const u = document.getElementById('u_name');
        if (u) u.textContent = s.name;
      }

      const t = document.getElementById('pageTitle');
      if (t) t.textContent = '系統首頁';

      const page = location.pathname.split('/').pop();
      document.querySelectorAll('.nav a').forEach(a=>{
        if(a.getAttribute('href') === page){
          a.classList.add('active');
        }
      });
    });
}
  
function isToday(dateStr) {
  const today = new Date();
  const y = today.getFullYear();
  const m = String(today.getMonth() + 1).padStart(2, '0');
  const d = String(today.getDate()).padStart(2, '0');
  const todayStr = `${y}-${m}-${d}`;
  return dateStr === todayStr;
}

function isThisWeek(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const today = new Date();

  const start = new Date(today);
  start.setDate(today.getDate() - today.getDay()); // 週日

  const end = new Date(start);
  end.setDate(start.getDate() + 6); // 週六

  return d >= start && d <= end;
}

function isThisMonth(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const now = new Date();
  return (
    d.getFullYear() === now.getFullYear() &&
    d.getMonth() === now.getMonth()
  );
}

/* ===== 登出 ===== */
function logout(){
  if(!confirm('確定要登出系統？')) return;
  localStorage.clear();
  location.replace('login.html');
}

/* ===== 初始化 ===== */
// ✅ 將各種 time 型別統一轉成 HH:mm
function formatTime(t) {
  if (!t) return '';

  // ISO / Date 字串
  if (typeof t === 'string' && t.includes('T')) {
    const d = new Date(t);
    return d.toISOString().slice(11, 16); // HH:mm
  }

  // 已經是 HH:mm
  if (typeof t === 'string') {
    return t.slice(0, 5);
  }

  return '';
}

// ✅ 站位中文化
function positionText(pos) {
  const map = {
    PU: '主　審',
    U1: '一壘審',
    U2: '二壘審',
    U3: '三壘審'
  };
  return map[pos] || pos || '';
}

document.addEventListener('DOMContentLoaded', () => {

  const raw = localStorage.getItem('session_user');
  if (!raw) {
    location.replace('login.html');
    return;
  }

  let s;
  try {
    s = JSON.parse(raw);
  } catch (e) {
    location.replace('login.html');
    return;
  }

  if (!s.user_id) {
    location.replace('login.html');
    return;
  }

  if (s.must_change_pwd === 'Y') {
    location.replace('change_password.html');
    return;
  }

  loadHeader();
});

/* 近期站場資訊 */
function loadMonthlyGames() {

  const panel = document.getElementById('monthly-games-panel');
  if (!panel) return;

  callApi(
    { action: 'getGames' },
    res => {

      // 清舊內容
      panel.querySelectorAll('.monthly-list, .monthly-empty')
        .forEach(el => el.remove());

      if (!res || res.result !== 'ok' || !res.games) {
        panel.insertAdjacentHTML(
          'beforeend',
          `<p class="monthly-empty">讀取賽事失敗。</p>`
        );
        return;
      }

      const now = new Date();
      const thisYear = now.getFullYear();
      const thisMonth = now.getMonth(); // 0-based

      // ✅ 只取本月賽事
      const list = res.games.filter(g => {
        if (!g.date) return false;
        const d = new Date(g.date + 'T00:00:00'); // 僅用於比對月份
        return d.getFullYear() === thisYear && d.getMonth() === thisMonth;
      });

      if (list.length === 0) {
        panel.insertAdjacentHTML(
          'beforeend',
          `<p class="monthly-empty">本月尚無賽事。</p>`
        );
        return;
      }

      res.games.forEach(g => {
      
        const todayTag = isToday(g.date)
          ? '<span style="color:#d32f2f;font-weight:bold;">【今日】</span> '
          : '';
        
        const line = [
          g.todayTag,
          g.position,
          g.date,
          g.time,
          g.category,
          g.game_code,
          g.matchup
        ].filter(Boolean).join('　');
      
        const li = document.createElement('li');
        li.textContent = line;
      
        list.appendChild(li);
      });

      html += `</ul>`;
      panel.insertAdjacentHTML('beforeend', html);
    }
  );
}

  
function loadUpcomingGames() {

  const s = JSON.parse(localStorage.getItem('session_user') || '{}');
  if (!s.user_id) return;

  const panel = document.getElementById('upcoming-panel');
  if (!panel) return;

  callApi(
    {
      action: 'getMyUpcomingGames',
      user_id: s.user_id
    },
    res => {
      
    console.log('getMyUpcomingGames response =', res);

      // 清掉舊內容
      panel.querySelectorAll('.upcoming-empty, .upcoming-list').forEach(el => el.remove());

      if (!res || res.result !== 'ok' || !res.games || res.games.length === 0) {
        panel.insertAdjacentHTML(
          'beforeend',
          `<p class="upcoming-empty">本月尚未安排執勤賽事。</p>`
        );
        return;
      }

      const weekGames = res.games.filter(g => isThisWeek(g.date));
      const monthGames = res.games.filter(
        g => isThisMonth(g.date) && !isThisWeek(g.date)
      );
      const container = document.getElementById('upcoming-container');
      
      let html = '';
      
      if (weekGames.length) {
        html += '<h4>📅 本週賽事</h4><ul class="upcoming-list">';
        weekGames.forEach(e => {
          html += `
            <li>
              <span class="upcoming-position">
                【${positionText(e.position)}】　
              </span>
              ${e.date} ${formatTime(e.time)}　
              ${e.category}　
              <b>${e.game_code}</b>　
              ${e.matchup}
            </li>
          `;
        });
        html += '</ul>';
      }
      
      if (monthGames.length) {
        html += '<h4>🗓 本月其它賽事</h4><ul class="upcoming-list">';
        monthGames.forEach(e => {
          html += `
            <li>
              <span class="upcoming-position">
                【${positionText(e.position)}】　
              </span> 
              ${e.date} ${formatTime(e.time)}　
              ${e.category}　
              <b>${e.game_code}</b>　
              ${e.matchup}
            </li>
          `;
        });
        html += '</ul>';
      }
      
      container.innerHTML = html || '<p class="upcoming-empty">目前尚無執勤賽事</p>';
    }
  );
}


loadHeader();
loadUpcomingGames(); // 我將執勤的比賽
loadMonthlyGames();  // ✅ 本月賽事


</script>
