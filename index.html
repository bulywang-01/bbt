<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>系統首頁</title>

<style>
body{
  margin:0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont;
  background:#f5f6f8;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#ffffff;
  border-bottom:1px solid #ddd;
}
.nav a{
  margin-right:16px;
  color:#0066cc;
  text-decoration:none;
  font-weight:500;
}
.nav a:hover{
  text-decoration:underline;
}
.user-info{
  text-align:right;
  line-height:1.6;
}

/* 帳號 */
.user-username{
  font-size:15px;
  color:#555;
}

/* 姓名：最大、最顯眼 */
.user-name{
  font-size:18px;
  font-weight:600;
}

/* 角色：給一點視覺層級 */
.user-role{
  font-size:14px;
  color:#666;
}

/* 登出 */
.user-logout{
  margin-top:4px;
  font-size:13px;
}
.main{
  padding:20px;
}
.panel{
  background:#ffffff;
  padding:16px;
  border-radius:6px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}
.admin-only{
  display:none;
}
</style>
</head>

<body>

<!-- ================= Header ================= -->
<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="judge_dashboard.html">🧑‍⚖️ 裁判報名</a>

    <!-- 管理者專用 -->
    <span class="admin-only">
      <a href="judge_signup_review.html">📋 報名審核</a>
    </span>
  </div>

<div class="user-info"><div class="user-username">
    👤 <b id="u_username"></b>
  </div>
  <div class="user-name">
    🧑 <b id="u_name"></b>
  </div>
  <div class="user-role">
    🛡 <b id="u_role"></b>
  </div>
  <div class="user-logout">
    <a href="#" onclick="logout()">🚪 登出</a>
  </div>
</div>


</div>

<!-- ================= Main ================= -->
<div class="main">
  <h2>系統首頁</h2>

  <div class="panel">
    歡迎使用裁判出勤管理系統。  
    請由上方選單選擇功能。
  </div>
</div>

<!-- ================= Script ================= -->
<script src="js/config.js"></script>
<script>

/**
 * 系統首頁初始化
 * - 檢查登入狀態
 * - 顯示使用者資訊
 * - 依角色顯示選單
 */
document.addEventListener('DOMContentLoaded', function () {

  const raw = localStorage.getItem('session_user');
  if (!raw) {
    location.replace('login.html');
    return;
  }

  let session;
  try {
    session = JSON.parse(raw);
  } catch (e) {
    location.replace('login.html');
    return;
  }

  if (!session.user_id) {
    location.replace('login.html');
    return;
  }

  // 顯示使用者資訊
  document.getElementById('u_username').textContent = session.username || '';
  document.getElementById('u_name').textContent = session.name || '';
  document.getElementById('u_role').textContent = session.role || '';

  // 管理者顯示管理選單
  if (session.role === 'admin') {
    document.querySelectorAll('.admin-only').forEach(el=>{
      el.style.display = 'inline';
    });
  }
});

/**
 * 登出
 */
function logout(){
  if (!confirm('確定要登出系統？')) return;
  localStorage.clear();
  location.replace('login.html');
}
</script>

</body>
</html>
