<!-- ================= Script ================= -->
<script src="js/config.js"></script>
<script>
/* ===== 載入共用 Header ===== */
function loadHeader(){
  fetch('header.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('header-container').innerHTML = html;

      // 使用者名稱
      const s = JSON.parse(localStorage.getItem('session_user') || '{}');
      if(s.name){
        const u = document.getElementById('u_name');
        if(u) u.textContent = s.name;
      }

      // 頁面標題
      const t = document.getElementById('pageTitle');
      if(t) t.textContent = '系統首頁';

      // Nav active
      const page = location.pathname.split('/').pop();
      document.querySelectorAll('.nav a').forEach(a=>{
        if(a.getAttribute('href') === page){
          a.classList.add('active');
        }
      });
    });
}

/* ===== 登出 ===== */
function logout(){
  if(!confirm('確定要登出系統？')) return;
  localStorage.clear();
  location.replace('login.html');
}

/* ===== 初始化 ===== */
document.addEventListener('DOMContentLoaded', () => {

  const raw = localStorage.getItem('session_user');
  if (!raw) {
    location.replace('login.html');
    return;
  }

  let s;
  try {
    s = JSON.parse(raw);
  } catch (e) {
    location.replace('login.html');
    return;
  }

  // ✅ 未登入
  if (!s.user_id) {
    location.replace('login.html');
    return;
  }

  // ✅ 必須改密碼的使用者，不能進 index
  if (s.must_change_pwd === 'Y') {
    location.replace('change_password.html');
    return;
  }

  // ✅ 正常使用者
  loadHeader();
});

</script>
