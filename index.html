<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>裁判系統首頁</title>
</head>
<body>

<!-- ✅ 未登入就去登入頁 -->
<script>
if (!localStorage.getItem('role')) {
  location.href = 'login.html';
}
</script>

<h1>🏠 裁判系統首頁</h1>

<ul id="menu"></ul>

<button onclick="logout()">登出</button>

<script>
function logout() {
  localStorage.clear();
  location.href = 'login.html';
}

/* ✅ 穩定版角色判斷 */
const role = (localStorage.getItem('role') || '')
  .trim()
  .toLowerCase();

const menu = document.getElementById('menu');

/* 管理員 */
if (role === 'admin') {
  menu.innerHTML = `
    <li><a href="games_manage.html></li>
    <li><a href="judges_manage.html理</a></li>
    <li><a hrefe.html📅 月班表</a></li>
    <li><a href="stats勤統計</a></li>
  `;
}

/* 裁判 */
if (role === 'judge') {
  menu.innerHTML = `
    <li><a href="nup.html📋 報名盃賽／場次</a></li>
    <li><a href="judge_availability上班時段</a></li>
    <li><a href="judged.html📊 我的班表／統計</a></li>
  `;
}
</script>

</body>
</html>
``
