<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>系統首頁｜裁判出勤管理系統</title>

  <!-- ✅ 共用樣式 -->
  <link rel="stylesheet" href="common.css">
</head>

<body>

<!-- ✅ 共用 Header -->
<div id="header-container"></div>

<!-- ================= Main ================= -->
<div class="main">

  <h2>系統首頁</h2>

  <!-- ✅ 歡迎區塊 -->
  <div class="panel">
    <p>
      歡迎使用 <b>裁判出勤管理系統</b>。<br>
      請由上方功能選單進行操作。
    </p>
  </div>

  <!-- ✅ 系統公告 -->
  <div class="panel">
    <h3>📢 系統公告</h3>
    <p style="color:#666;">
      目前尚無最新公告。
    </p>
  </div>

  <!-- ✅ 我的本週班表 -->
  <div class="panel">
    <h3>🗓 我的本週班表</h3>
    <p style="color:#666;">
      本週尚未安排任何執勤賽事。
    </p>
  </div>

  <!-- ✅ 文件下載 -->
  <div class="panel">
    <h3>📄 文件下載</h3>
    <ul class="download-list">
      <li>
        <a href="files/referee_notice.pdf" target="_blank">
          裁判執勤注意事項（PDF）
        </a>
      </li>
      <li>
        <a href="files/referee_rules.docx" target="_blank">
          裁判出勤規範（Word）
        </a>
      </li>
      <li>
        <a href="files/game_day_flow.xlsx" target="_blank">
          比賽日流程表（Excel）
        </a>
      </li>
    </ul>
  </div>

</div>

<!-- ================= Script ================= -->
<script src="js/config.js"></script>
<script>
/* ===== 載入共用 Header ===== */
function loadHeader(){
  fetch('header.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('header-container').innerHTML = html;

      // 使用者名稱
      const s = JSON.parse(localStorage.getItem('session_user') || '{}');
      if(s.name){
        const u = document.getElementById('u_name');
        if(u) u.textContent = s.name;
      }

      // 頁面標題
      const t = document.getElementById('pageTitle');
      if(t) t.textContent = '系統首頁';

      // Nav active
      const page = location.pathname.split('/').pop();
      document.querySelectorAll('.nav a').forEach(a=>{
        if(a.getAttribute('href') === page){
          a.classList.add('active');
        }
      });
    });
}

/* ===== 登出 ===== */
function logout(){
  if(!confirm('確定要登出系統？')) return;
  localStorage.clear();
  location.replace('login.html');
}

/* ===== 初始化 ===== */
document.addEventListener('DOMContentLoaded', ()=>{
  // 必須先確保登入
  const raw = localStorage.getItem('session_user');
  if(!raw){
    location.replace('login.html');
    return;
  }
try {
  const s = JSON.parse(raw);

  // ✅ 未登入
  if (!s.user_id) {
    location.replace('login.html');
    return;
  }

  // ✅ 必須先改密碼的使用者，只能進 change_password.html
  if (s.must_change_pwd === 'Y') {
    location.replace('change_password.html');
    return;
  }

} catch (e) {
  location.replace('login.html');
  return;
}

loadHeader();
});
</script>

</body>
</html>
