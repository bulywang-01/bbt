<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>系統首頁</title>

<style>
body{
  font-family: system-ui;
  margin: 20px;
  background: #fafafa;
}
.header{
  margin-bottom: 16px;
}
.header a{
  margin-right: 14px;
  color: #0066cc;
  text-decoration: none;
}
.header a:hover{
  text-decoration: underline;
}
.panel{
  background: #fff;
  padding: 14px;
  border-radius: 6px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  margin-bottom: 16px;
}
.admin-only{
  display: none;
}
</style>
</head>
<body>

<!-- ✅ 正確載入 config（順序很重要） -->
<script src="js/config.js"></script>

<script>
/* ===============================
 * ✅ 全站唯一登入檢查
 * =============================== */
const sessionRaw = localStorage.getItem('session_user');
console.log('INDEX session_user =', sessionRaw);

if (!sessionRaw) {
  location.href = 'login.html';
}

let session;
try {
  session = JSON.parse(sessionRaw);
} catch (e) {
  location.href = 'login.html';
}

if (!session.user_id) {
  location.href = 'login.html';
}
</script>

<!-- ===============================
     Header（導覽列）
     =============================== -->
<div class="header">
  <a href="index.html">🏠 首頁</a>
  <a href="judge_dashboard.html">🧑‍⚖️ 裁判報名</a>

  <!-- ✅ 管理功能（admin 才顯示） -->
  <span class="admin-only">
    <a href="judge_signup_review.html">✅ 報名審核</a>
    <a href="games_manage.html">⚾ 比賽管理</a>
    <a href="users_manage.html">👤 使用者管理</a>
  </span>

  <span style="float:right">
    <a href="javascript:void(0)" onclick="logout()">🚪 登出</a>
  </span>
</div>

<!-- ===============================
     登入者資訊
     =============================== -->
<div class="panel">
  👤 帳號：<b id="u_username"></b><br>
  🧑 姓名：<b id="u_name"></b><br>
  🛡 權限：<b id="u_role"></b>
</div>

<h2>系統首頁</h2>

<div class="panel">
  歡迎使用裁判管理系統。  
  請由上方選單選擇要進行的功能。
</div>

<script>
/* ===============================
 * ✅ 顯示登入者資訊
 * =============================== */
document.getElementById('u_username').textContent = session.username || '';
document.getElementById('u_name').textContent = session.name || '';
document.getElementById('u_role').textContent = session.role || '';

/* admin 額外顯示管理選單 */
if (session.role === 'admin') {
  document.querySelectorAll('.admin-only').forEach(el=>{
    el.style.display = 'inline';
  });
}

/* ===============================
 * ✅ 登出（全站一致）
 * =============================== */
function logout() {
  if (!confirm('確定要登出系統？')) return;
  localStorage.clear();
  location.href = 'login.html';
}
</script>

</body>
</html>
