<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>裁判系統首頁 V1</title>
  <style>
    body { font-family: system-ui; }
    li { margin: 6px 0; }
    a { color: #0b5ed7; text-decoration: none; font-size: 18px; }
    a:hover { text-decoration: underline; }
    .box { background:#f7f7f7; padding:8px; margin-bottom:12px; }
  </style>
</head>
<body>

<script>
if (!localStorage.getItem('role')) {
  location.href = 'login.html';
}
</script>

<h1>🏠 裁判系統首頁</h1>

<div class="box" id="status"></div>

<ul id="menu"></ul>

<button onclick="logout()">登出</button>

<script>
function logout() {
  localStorage.clear();
  location.href = 'login.html';
}

const username = localStorage.getItem('username') || '(unknown)';
const role = (localStorage.getItem('role') || '').trim().toLowerCase();

document.getElementById('status').textContent =
  '目前登入帳號：' + username + ' ｜ 角色：' + role;

const menu = document.getElementById('menu');

function addMenu(text, href) {
  const li = document.createElement('li');
  const a = document.createElement('a');
  a.textContent = text;
  a.href = href;
  li.appendChild(a);
  menu.appendChild(li);
}

if (role === 'admin') {
  addMenu('⚾ 比賽管理', 'games_manage.html');
  addMenu('👨‍⚖️ 裁判管理', 'judges_manage.html');
  addMenu('📅 月班表', 'schedule.html');
  addMenu('📊 出勤統計', 'stats.html');
}

if (role === 'judge') {
  addMenu('📊 我的班表／統計', 'judge_dashboard.html');
}

if (!menu.children.length) {
  addMenu('⚠ 權限異常，請重新登入', '#');
}
</script>

</body>
</html>
