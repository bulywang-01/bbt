<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>裁判系統首頁</title>
</head>
<body>

<!-- ✅ 未登入者導向 login.html -->
<script>
if (!localStorage.getItem('role')) {
  location.href = 'login.html';
}
</script>

<h1>🏠 裁判系統首頁</h1>

<ul id="menu"></ul>

<button onclick="logout()">登出</button>

<script>
function logout() {
  localStorage.clear();
  location.href = 'login.html';
}

// const role = localStorage.getItem('role');
const role = (localStorage.getItem('role') || '').trim().toLowerCase();
const menu = document.getElementById('menu');

/* ===== 管理者選單 ===== */
if (role === 'admin') {
  menu.innerHTML = `
    <li><a href="gamestml⚾ 比賽管理</a></li>
    <li><a href="judgestml👨‍⚖️ 裁判管理</a></li>
    <li><a href="html📅 月班表</a></li>
    <li><a href="stats勤統計</a></li>
  `;
}

/* ===== 裁判選單 ===== */
if (role === 'judge') {
  menu.innerHTML = `
    <li><a href="judgetml📋 報名盃賽／場次</a></li>
    <li><a href="judge_avy.html🕒 可上班時段</a></li>
    <li><a href="judge_dashboard.html計</a></li>
  `;
}
</script>

</body>
</html>
