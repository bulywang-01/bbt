<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>裁判系統首頁 V1</title>

  <!-- ✅ 明確指定樣式，避免文字被吃掉 -->
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    ul {
      margin-left: 20px;
    }
    li {
      margin: 6px 0;
    }
    a {
      color: #0b5ed7;          /* 明確指定藍色 */
      text-decoration: none;
      font-size: 16px;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<!-- ✅ 未登入就轉登入頁 -->
<script>
if (!localStorage.getItem('role')) {
  location.href = 'login.html';
}
</script>

<h1>🏠 裁判系統首頁</h1>

<!-- 狀態顯示 -->
<div id="status" style="margin-bottom: 12px;"></div>

<hr>

<ul id="menu"></ul>

<hr>

<button onclick="logout()">登出</button>

<script>
function logout() {
  localStorage.clear();
  location.href = 'login.html';
}

const username = localStorage.getItem('username') || '(unknown)';
const role = (localStorage.getItem('role') || '').trim().toLowerCase();

document.getElementById('status').innerHTML =
  '<b>目前登入帳號：</b>' + username + '<br>' +
  '<b>角色：</b>' + role;

const menu = document.getElementById('menu');

if (role === 'admin') {
  menu.innerHTML = `
    <li><a href="games_manage.html></li>
    <li><a href="jude.html👨‍⚖️ 裁判管理</a></li>
    <li><a href="schedule.html></li>
    <li><a href="stats.htmla></li>
  `;
}

if (role === 'judge') {
  menu.innerHTML = `
    <li><a hrefignup.html📋 報名盃賽／場次</a></li>
    <li><a href="judge_availability.html/a></li>
    <li><a href="judge_dashboard.html計</a></li>
  `;
}
</script>

</body>
</html>
