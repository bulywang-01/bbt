<!-- ================= Script ================= -->
<script src="js/config.js"></script>
<script>

/* ===== 載入共用 Header ===== */
function loadHeader(){
  fetch('header.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('header-container').innerHTML = html;

      const s = JSON.parse(localStorage.getItem('session_user') || '{}');
      if (s.name) {
        const u = document.getElementById('u_name');
        if (u) u.textContent = s.name;
      }

      const t = document.getElementById('pageTitle');
      if (t) t.textContent = '系統首頁';

      const page = location.pathname.split('/').pop();
      document.querySelectorAll('.nav a').forEach(a=>{
        if(a.getAttribute('href') === page){
          a.classList.add('active');
        }
      });
    });
}

/* ===== 登出 ===== */
function logout(){
  if(!confirm('確定要登出系統？')) return;
  localStorage.clear();
  location.replace('login.html');
}

/* ===== 初始化 ===== */
document.addEventListener('DOMContentLoaded', () => {

  const raw = localStorage.getItem('session_user');
  if (!raw) {
    location.replace('login.html');
    return;
  }

  let s;
  try {
    s = JSON.parse(raw);
  } catch (e) {
    location.replace('login.html');
    return;
  }

  if (!s.user_id) {
    location.replace('login.html');
    return;
  }

  if (s.must_change_pwd === 'Y') {
    location.replace('change_password.html');
    return;
  }

  loadHeader();
});

/* 近期站場資訊 */
function loadMonthlyGames() {

  const panel = document.getElementById('monthly-games-panel');
  if (!panel) return;

  callApi(
    { action: 'getGames' },
    res => {

      // 清舊內容
      panel.querySelectorAll('.monthly-list, .monthly-empty')
        .forEach(el => el.remove());

      if (!res || res.result !== 'ok' || !res.games) {
        panel.insertAdjacentHTML(
          'beforeend',
          `<p class="monthly-empty">讀取賽事失敗。</p>`
        );
        return;
      }

      const now = new Date();
      const thisYear = now.getFullYear();
      const thisMonth = now.getMonth(); // 0-based

      // ✅ 只取本月賽事
      const list = res.games.filter(g => {
        if (!g.date) return false;
        const d = new Date(g.date + 'T00:00:00'); // 僅用於比對月份
        return d.getFullYear() === thisYear && d.getMonth() === thisMonth;
      });

      if (list.length === 0) {
        panel.insertAdjacentHTML(
          'beforeend',
          `<p class="monthly-empty">本月尚無賽事。</p>`
        );
        return;
      }

      let html = `<ul class="monthly-list">`;

      list.forEach(g => {
        html += `
          <li>
            ${g.date}　${g.time || ''}　
            <b>${g.game_code || ''}</b>　
            ${g.field || ''}
          </li>
        `;
      });

      html += `</ul>`;
      panel.insertAdjacentHTML('beforeend', html);
    }
  );
}

  
function loadUpcomingGames() {

  const s = JSON.parse(localStorage.getItem('session_user') || '{}');
  if (!s.user_id) return;

  const panel = document.getElementById('upcoming-panel');
  if (!panel) return;

  callApi(
    {
      action: 'getMyUpcomingGames',
      user_id: s.user_id
    },
    res => {
      
    console.log('getMyUpcomingGames response =', res);

      // 清掉舊內容
      panel.querySelectorAll('.upcoming-empty, .upcoming-list').forEach(el => el.remove());

      if (!res || res.result !== 'ok' || !res.games || res.games.length === 0) {
        panel.insertAdjacentHTML(
          'beforeend',
          `<p class="upcoming-empty">本月尚未安排執勤賽事。</p>`
        );
        return;
      }

      let html = `<ul class="upcoming-list">`;

      res.games.forEach(g => {
        html += `
          <li>
            ${g.date}　${g.time}　
            <b>${g.game_code}</b>　
            ${g.position}　
            ${g.field || ''}
          </li>
        `;
      });

      html += `</ul>`;
      panel.insertAdjacentHTML('beforeend', html);
    }
  );
}


loadHeader();
loadUpcomingGames(); // 我將執勤的比賽
loadMonthlyGames();  // ✅ 本月賽事


</script>
