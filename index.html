<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>裁判系統首頁</title>
</head>
<body>

<!-- ✅ 登入門禁 -->
<script>
if (!localStorage.getItem('role')) {
  location.href = 'login.html';
}
</script>

<h1>🏠 裁判系統首頁</h1>

<ul id="menu"></ul>

<button onclick="logout()">登出</button>

<script>
function logout() {
  localStorage.clear();
  location.href = 'login.html';
}

/* ✅ 核心修正：標準化 role */
const role = (localStorage.getItem('role') || '')
  .trim()
  .toLowerCase();

const menu = document.getElementById('menu');

/* ===== 管理者 ===== */
if (role === 'admin') {
  menu.innerHTML = `
    <li><a href="games_manage.html></li>
    <li><a href="judges_manage.html理</a></li>
    <li><a href="html📅 月班表</a></li>
    <li><a href="stats.htmla></li>
  `;
}

/* ===== 裁判 ===== */
if (role === 'judge') {
  menu.innerHTML = `
    <li><a href="judgetml📋 報名盃賽／場次</a></li>
    <li><a href="judgelity.html🕒 可上班時段</a></li>
    <li><a href="judge_dashboard的班表／統計</a></li>
  `;
}
</script>

</body>
</html>
