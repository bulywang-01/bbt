<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>系統首頁</title>

<style>
body{
  font-family: system-ui;
  margin: 20px;
  background: #fafafa;
}
.header{
  margin-bottom: 16px;
}
.header a{
  margin-right: 14px;
  color: #0066cc;
  text-decoration: none;
}
.header a:hover{
  text-decoration: underline;
}
.panel{
  background: #fff;
  padding: 14px;
  border-radius: 6px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  margin-bottom: 16px;
}
.admin-only{
  display: none;
}
</style>
</head>

<body>

<!-- ✅ 導覽列 -->
<div class="header">
  <a href="index.html">首頁</a>
  <a href="judge_dashboard.html">裁判報名</a>

  <span class="admin-only">
    <a href="judge_signup_review.html">✅ 報名審核</a>
    <a href="games_manage.html">⚾ 比賽管理</a>
    <a href="users_manage.html">users_manage</a>
  </span>

  <span style="float:right">
    <a href="#" onclick="logout

<!-- ✅ 使用者資訊 -->
<div class="panel">
  👤 帳號：<b id="u_username"></b><br>
  🧑 姓名：<b id="u_name"></b><br>
  🛡 權限：<b id="u_role"></b>
</div>

<h2>系統首頁</h2>

<div class="panel">
  歡迎使用裁判管理系統。  
  請由上方選單選擇功能。
</div>

<!-- ✅ 正確載入 config -->
<script src="js/config.jscript>
/* =================================================
 * ✅ 唯一登入檢查：只做一次、只在 DOM Ready 後
 * ================================================= */
document.addEventListener('DOMContentLoaded', function () {

  const raw = localStorage.getItem('session_user');
  if (!raw) {
    location.replace('login.html');
    return;
  }

  let session;
  try {
    session = JSON.parse(raw);
  } catch (e) {
    location.replace('login.html');
    return;
  }

  if (!session.user_id) {
    location.replace('login.html');
    return;
  }

  /* ✅ 顯示使用者資訊 */
  document.getElementById('u_username').textContent = session.username || '';
  document.getElementById('u_name').textContent = session.name || '';
  document.getElementById('u_role').textContent = session.role || '';

  /* ✅ admin 才顯示管理選單 */
  if (session.role === 'admin') {
    document.querySelectorAll('.admin-only').forEach(el => {
      el.style.display = 'inline';
    });
  }
});

/* ✅ 登出 */
function logout() {
  if (!confirm('確定要登出系統？')) return;
  localStorage.clear();
  location.replace('login.html');
}
</script>

</body>
</html>
