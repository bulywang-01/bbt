<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>裁判系統首頁</title>
</head>
<body>

<!-- ✅ 未登入者導向登入頁 -->
<script>
if (!localStorage.getItem('role')) {
  location.href = 'login.html';
}
</script>

<h1>🏠 裁判系統首頁</h1>

<ul id="menu"></ul>

<button onclick="logout()">登出</button>

<script>
function logout() {
  localStorage.clear();
  location.href = 'login.html';
}

const role = localStorage.getItem('role');
const menu = document.getElementById('menu');

/* ===== 管理者選單 ===== */
if (role === 'admin') {
  menu.innerHTML = `
    <li>games_manage.html⚾ 比賽管理</a></li>
    <li>judges_manage.html👨‍⚖️ 裁判管理</a></li>
    <li>schedule.html📅 月班表</a></li>
    <li>stats.html📊 出勤統計</a></li>
  `;
}

/* ===== 裁判選單 ===== */
if (role === 'judge') {
  menu.innerHTML = `
    <li>judge_signup.html📋 報名盃賽／場次</a></li>
    <li>judge_availability.html🕒 可上班時段</a></li>
    <li>judge_dashboard.html📊 我的班表／統計</a></li>
  `;
}
</script>

</body>
</html>
