<!DOCTYPE html>
<html>
<body>

<script>
if (!localStorage.getItem('role')) location.href='login.html';
</script>

<h2>✅ 出勤點名</h2>
<p id="info"></p>
<div id="judges">載入中…</div>
<button onclick="submitAttendance()">送出出勤</button>

<script src="js/config.js"></script>
<script>
const gid = new URLSearchParams(location.search).get('game_id');
document.getElementById('info').innerText='比賽ID：'+gid;

let judges=[], checked=[];

function handleJudges(list){judges=list; render();}
function handleAttendance(list){
  checked=list.filter(a=>a.game_id===gid).map(a=>a.judge_id);
  render();
}

function render(){
  const d=document.getElementById('judges'); d.innerHTML='';
  judges.forEach(j=>{
    const lock=checked.includes(j.judge_id);
    d.innerHTML+=`
      <div>
        <input type="checkbox" value="${j.judge_id}" ${lock?'checked disabled':''}>
        ${j.name}
        <select>
          <option>主審</option>
          <option>一壘審</option>
          <option>二壘審</option>
          <option>三壘審</option>
        </select>
      </div>`;
  });
}

function submitAttendance(){
  document.querySelectorAll('input[type=checkbox]:checked').forEach((c,i)=>{
    if(c.disabled) return;
    const role=c.nextElementSibling.nextElementSibling.value;
    const s=document.createElement('script');
    s.src=API_URL+
      '?action=attend'+
      '&game_id='+gid+
      '&judge_id='+c.value+
      '&role='+encodeURIComponent(role)+
      '&callback=alert';
    document.body.appendChild(s);
  });
}

['judges','attendance'].forEach((a,cb)=>
  document.body.appendChild(Object.assign(document.createElement('script'),{
    src:API_URL+'?action='+a+'&callback='+(a==='judges'?'handleJudges':'handleAttendance')
  }))
);
</script>

</body>
</html>
