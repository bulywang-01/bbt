<script>
/* 登入檢查 */
if (!localStorage.getItem('role')) {
  location.href = 'login.html';
}

/* 讀取 game_id */
const params = new URLSearchParams(location.search);
const gameId = params.get('game_id');

document.getElementById('info').innerText =
  '比賽 ID：' + gameId;

/* 全域暫存 */
let allJudges = [];
let checkedJudges = [];

/* JSONP callback：裁判名冊 */
function handleJudges(list) {
  allJudges = list;
  render();
}

/* JSONP callback：已出勤名單 */
function handleAttendance(list) {
  checkedJudges = list
    .filter(a => a.game_id === gameId)
    .map(a => a.judge_id);
  render();
}

/* 畫面渲染 */
function render() {
  if (!allJudges.length) return;

  const box = document.getElementById('judges');
  box.innerHTML = '';

  allJudges.forEach(j => {
    const checked = checkedJudges.includes(j.judge_id);
    box.innerHTML += `
      <div>
        <label>
          <input type="checkbox"
                 value="${j.judge_id}"
                 ${checked ? 'checked disabled' : ''}>
          ${j.name}
        </label>
      </div>
    `;
  });
}

/* 載入裁判名冊（JSONP） */
(function loadJudges(){
  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=judges' +
    '&callback=handleJudges' +
    '&_=' + Date.now();
  document.body.appendChild(s);
})();

/* 載入已出勤紀錄（JSONP） */
(function loadAttendance(){
  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=attendance' +
    '&callback=handleAttendance' +
    '&_=' + Date.now();
  document.body.appendChild(s);
})();
</script>
