  const ul = document.getElementById('list');
  judges.forEach(j => {
    const li = document.createElement('li');
    li.innerHTML = `
      ${j.name}
      <a href="judge.html?judge_id=${j.judge_id}">→ 個人紀錄</a>
    `;
    ul.appendChild(li);
  });
})();
</script>
