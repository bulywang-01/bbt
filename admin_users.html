<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判帳號管理</title>
<style>
body{margin:0;font-family:system-ui;background:#f5f6f8}
.header{display:flex;justify-content:space-between;align-items:center;
 padding:12px 20px;background:#fff;border-bottom:1px solid #ddd}
.nav a{margin-right:16px;color:#0066cc;text-decoration:none}
.main{padding:20px}
.panel{background:#fff;padding:16px;border-radius:6px}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{border:1px solid #ddd;padding:6px 8px;text-align:center}
th{background:#eef2f6}
tr.inactive{background:#f3f3f3;color:#999}
input,select{width:100%}
button{padding:4px 10px}
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    <a href="index.html">🏠 系統首頁</a>
    <a href="admin_dashboard.html">⚙️ 後端管理</a>
    <b>👤 裁判帳號管理</b>
  </div>
  <div>
    <b id="u_name"></b>
    <a href="#" onclick="logout()" style="margin-left:12px;color:#c00">登出</a>
  </div>
</div>

<div class="main">
<div class="panel">

<h2>裁判帳號管理</h2>

<table>
<thead>
<tr>
  <th>帳號</th>
  <th>新密碼</th>
  <th>姓名</th>
  <th>電話</th>
  <th>Email</th>
  <th>Level</th>
  <th>角色</th>
  <th>狀態</th>
  <th>操作</th>
</tr>
</thead>
<tbody id="userBody">
<tr><td colspan="9">載入中…</td></tr>
</tbody>
</table>

</div>
</div>

<script>
/* ===== ✅ 這裡是關鍵：直接內建 callApi，不靠 config.js ===== */
const API_URL = 'https://script.google.com/macros/s/【請換成你的部署ID】/exec';

function callApi(query, callback){
  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    delete window[cb];
    callback(res);
    script.remove();
  };
  const script = document.createElement('script');
  script.src = API_URL + '?' + query + '&callback=' + cb;
  document.body.appendChild(script);
}

/* ===== Page Init ===== */
document.addEventListener('DOMContentLoaded', ()=>{
  const raw = localStorage.getItem('session_user');
  if(!raw){location.href='login.html';return;}
  const session = JSON.parse(raw);
  document.getElementById('u_name').textContent = session.name || '';

  if(!['admin','judge_admin'].includes(session.role)){
    alert('沒有權限');
    location.href='index.html';
    return;
  }

  loadUsers();
});

/* ===== 功能 ===== */
function loadUsers(){
  callApi('action=getUsers', res=>{
    const body=document.getElementById('userBody');
    body.innerHTML='';

    if(!res || res.result!=='ok'){
      body.innerHTML='<tr><td colspan="9">讀取失敗</td></tr>';
      return;
    }

    res.users.forEach(u=>{
      const tr=document.createElement('tr');
      if(u.active!=='Y')tr.classList.add('inactive');

      tr.innerHTML=`
        <td><input value="${u.username}"
          onchange="updateUser('${u.user_id}','username',this.value)"></td>
        <td><input type="password" placeholder="留空不修改"
          onchange="updateUser('${u.user_id}','password',this.value)"></td>
        <td><input value="${u.name}"
          onchange="updateUser('${u.user_id}','name',this.value)"></td>
        <td><input value="${u.phone||''}"
          onchange="updateUser('${u.user_id}','phone',this.value)"></td>
        <td><input value="${u.email||''}"
          onchange="updateUser('${u.user_id}','email',this.value)"></td>
        <td><input value="${u.level||''}"
          onchange="updateUser('${u.user_id}','level',this.value)"></td>
        <td>${u.role}</td>
        <td>${u.active==='Y'?'啟用':'停用'}</td>
        <td>
          <button onclick="toggleActive('${u.user_id}')">
            ${u.active==='Y'?'停用':'啟用'}
          </button>
        </td>
      `;
      body.appendChild(tr);
    });
  });
}

function updateUser(uid, field, value){
  if(field==='password' && !value) return;
  callApi(
    `action=updateUserField&user_id=${uid}&field=${field}&value=${encodeURIComponent(value)}`,
    ()=>{}
  );
}

function toggleActive(uid){
  callApi(`action=toggleUserActive&user_id=${uid}`, loadUsers);
}

function logout(){
  localStorage.clear();
  location.href='login.html';
}
</script>

</body>
</html>
