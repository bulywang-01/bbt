<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判帳號管理</title>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system;
  background:#f5f6f8;
}

/* ===== Header ===== */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#ffffff;
  border-bottom:1px solid #ddd;
}
.nav a{
  margin-right:16px;
  color:#0066cc;
  text-decoration:none;
  font-weight:500;
}
.nav a:hover{
  text-decoration:underline;
}

/* ===== Layout ===== */
.main{ padding:20px; }
.panel{
  background:#ffffff;
  padding:16px;
  border-radius:6px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}

/* ===== Table ===== */
table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
th,td{
  border:1px solid #ddd;
  padding:6px 8px;
  text-align:center;
}
th{
  background:#eef2f6;
}
tr.inactive{
  background:#f4f4f4;
  color:#999;
}

input{
  width:100%;
  box-sizing:border-box;
  padding:2px 4px;
}
select{
  width:100%;
}

/* ===== Button ===== */
button{
  padding:4px 10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- ===== Header ===== -->
<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="judge_dashboard.html"><b>🧑‍⚖️ 裁判報名</b></a>
    <a href="admin_dashboard.html">⚙️ 後端管理</a>
    <b>👤 裁判帳號管理</b>
  </div>
  <div>
    <b id="u_name"></b>
    <a href="#" onclick="logout()" style="margin-left:12px;color:#c00;">登出</a>
  </div>
</div>

<!-- ===== Main ===== -->
<div class="main">
<h2>裁判帳號管理</h2>

<div class="panel">
<table>
<thead>
<tr>
  <th>帳號</th>
  <th>新密碼</th>
  <th>姓名</th>
  <th>電話</th>
  <th>Email</th>
  <th>Level</th>
  <th>角色</th>
  <th>狀態</th>
  <th>操作</th>
</tr>
</thead>
<tbody id="userBody">
  <tr>
    <td colspan="9">載入中…</td>
  </tr>
</tbody>
</table>
</div>
</div>

<!-- ✅ 一定要用正確的 script tag -->
<script src="js/config.js"></script>

<script>
/* ================= Page Init ================= */
document.addEventListener('DOMContentLoaded', () => {

  const raw = localStorage.getItem('session_user');
  if (!raw) {
    location.replace('login.html');
    return;
  }

  const session = JSON.parse(raw);
  document.getElementById('u_name').textContent = session.name || '';

  if (!['admin','judge_admin'].includes(session.role)) {
    alert('沒有權限訪問此頁');
    location.replace('index.html');
    return;
  }

  loadUsers();
});

/* ================= Load Users ================= */
function loadUsers(){
  console.log('呼叫 getUsers');

callApi('action=getUsers', res => {

  console.log('getUsers response 👇', res);
  alert('getUsers callback 有進來，請看 console');

  const body = document.getElementById('userBody');
  body.innerHTML = '';

  if (!res) {
    body.innerHTML = '<tr><td colspan="9">res 是空的</td></tr>';
    return;
  }

  if (res.result !== 'ok') {
    body.innerHTML = `<tr><td colspan="9">result 不正確：${res.result}</td></tr>`;
    return;
  }

  if (!Array.isArray(res.users)) {
    body.innerHTML = '<tr><td colspan="9">users 不是 array</td></tr>';
    return;
  }

  if (res.users.length === 0) {
    body.innerHTML = '<tr><td colspan="9">users 為空</td></tr>';
    return;
  }

  res.users.forEach(u => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${u.username}</td>
      <td>---</td>
      <td>${u.name}</td>
      <td>${u.phone || ''}</td>
      <td>${u.email || ''}</td>
      <td>${u.level || ''}</td>
      <td>${u.role}</td>
      <td>${u.active}</td>
      <td>OK</td>
    `;
    body.appendChild(tr);
  });
});
  
}

/* ================= Helpers ================= */
function renderRoleOptions(role){
  const roles = ['admin','match_admin','judge_admin','chief_judge','judge'];
  return roles.map(r =>
    `<option value="${r}" ${r === role ? 'selected' : ''}>${r}</option>`
  ).join('');
}

function updateUser(uid, field, value){
  if (field === 'password' && !value) return;

  callApi(
    `action=updateUserField&user_id=${uid}&field=${field}&value=${encodeURIComponent(value)}`,
    res => {
      if (res.result !== 'ok') {
        alert('更新失敗');
      }
    }
  );
}

function toggleActive(uid){
  if (!confirm('確定要切換狀態？')) return;
  callApi(
    `action=toggleUserActive&user_id=${uid}`,
    () => loadUsers()
  );
}

function logout(){
  if (!confirm('確定要登出？')) return;
  localStorage.clear();
  location.replace('login.html');
}
</script>

</body>
</html>
