<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判帳號管理</title>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system;
  background:#f5f6f8;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#ffffff;
  border-bottom:1px solid #ddd;
}

.nav a{
  margin-right:16px;
  color:#0066cc;
  text-decoration:none;
  font-weight:500;
}

.main{ padding:20px; }

.panel{
  background:#fff;
  padding:16px;
  border-radius:6px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
th,td{
  border:1px solid #ddd;
  padding:6px 8px;
  text-align:center;
}
th{ background:#eef2f6; }

input,select{
  width:100%;
  box-sizing:border-box;
  padding:4px;
  font-size:13px;
}

tr.inactive{
  background:#f3f3f3;
  color:#888;
}

button{
  padding:6px 12px;
  cursor:pointer;
}

/* toast */
#toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#2c7be5;
  color:#fff;
  padding:10px 16px;
  border-radius:6px;
  font-size:14px;
  opacity:0;
  pointer-events:none;
  transition:opacity .3s;
  z-index:9999;
}
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="admin_dashboard.html">⚙️ 後端管理</a>
    <b>👤 裁判帳號管理</b>
  </div>
  <div>
    <b id="u_name"></b>
    <a href="#" onclick="logout()" style="margin-left:12px;color:#c00;">登出</a>
  </div>
</div>

<div class="main">
<div class="panel">

<table>
<thead>
<tr>
  <th>帳號</th>
  <th>新密碼</th>
  <th>姓名</th>
  <th>電話</th>
  <th>Email</th>
  <th>Level</th>
  <th>角色</th>
  <th>狀態</th>
  <th>操作</th>
</tr>
</thead>
<tbody id="userBody">
<tr><td colspan="9">載入中…</td></tr>
</tbody>
</table>

</div>
</div>

<div id="toast">✅ 已更新</div>

<script src="js/config.js"></script>
<script>
/* ===== Init ===== */
document.addEventListener('DOMContentLoaded',()=>{
  const raw = localStorage.getItem('session_user');
  if(!raw){ location.href='login.html'; return; }

  const session = JSON.parse(raw);
  document.getElementById('u_name').textContent = session.name || '';

  if(!['admin','judge_admin'].includes(session.role)){
    alert('沒有權限');
    location.href='index.html';
    return;
  }
  loadUsers();
});

/* ===== Load Users ===== */
function loadUsers(){
  callApi('action=getUsers', res=>{
    const body = document.getElementById('userBody');
    body.innerHTML = '';

    if(!res || res.result!=='ok'){
      body.innerHTML='<tr><td colspan="9">讀取失敗</td></tr>';
      return;
    }

    res.users.forEach(u=>{
      const tr=document.createElement('tr');
      tr.dataset.userId=u.user_id;
      if(u.active!=='Y') tr.classList.add('inactive');

      tr.innerHTML=`
        <td><input name="username" value="${u.username||''}"></td>
        <td><input name="password" type="password" placeholder="留空不修改"></td>
        <td><input name="name" value="${u.name||''}"></td>
        <td><input name="phone" value="${u.phone||''}"></td>
        <td><input name="email" value="${u.email||''}"></td>
        <td><input name="level" value="${u.level||''}"></td>
        <td>
          <select name="role">
            ${renderRoleOptions(u.role)}
          </select>
        </td>
        <td>
          <select name="active">
            <option value="Y" ${u.active==='Y'?'selected':''}>啟用</option>
            <option value="N" ${u.active!=='Y'?'selected':''}>停用</option>
          </select>
        </td>
        <td>
          <button onclick="saveUser(this)">儲存</button>
        </td>
      `;
      body.appendChild(tr);
    });
  });
}

/* ===== Save One User ===== */
function saveUser(btn){
  const tr = btn.closest('tr');
  const uid = tr.dataset.userId;

  const data = { user_id: uid };

  tr.querySelectorAll('input,select').forEach(el=>{
    if(el.name==='password' && !el.value) return; // 空密碼不更新
    data[el.name] = el.value.trim();
  });

  callApi('action=updateUser', data, res=>{
    if(res && res.result==='ok'){
      showToast('✅ 已更新');
      loadUsers();
    }else{
      alert('更新失敗');
    }
  });
}

/* ===== Helpers ===== */
function renderRoleOptions(role){
  const roles=['admin','match_admin','judge_admin','chief_judge','judge'];
  return roles.map(r =>
    `<option value="${r}" ${r===role?'selected':''}>${r}</option>`
  ).join('');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
 t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',2000);
}

function logout(){
  localStorage.clear();
  location.href='login.html';
}
</script>

</body>
</html>
