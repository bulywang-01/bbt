<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判帳號管理</title>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system;
  background:#f5f6f8;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#fff;
  border-bottom:1px solid #ddd;
}
.nav a{
  margin-right:16px;
  color:#0066cc;
  text-decoration:none;
  font-weight:500;
}
.main{padding:20px}
.panel{
  background:#fff;
  padding:16px;
  border-radius:6px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
th,td{
  border:1px solid #ddd;
  padding:6px 8px;
  text-align:center;
}
th{background:#eef2f6}

select{
  padding:2px 4px;
}
button{
  padding:4px 10px;
}
.inactive{
  background:#f3f3f3;
  color:#999;
}
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="judge_dashboard.html"><b>🧑‍⚖️ 裁判報名</b></a>
    <a href="admin_dashboard.html">⚙️ 後端管理</a>
    <a href="index.html">🏠 系統首頁</a>
  </div>
  <div>
    <b id="u_name"></b>
    <a href="#" onclick="logout()" style="margin-left:12px;color:#c00;">登出</a>
  </div>
</div>

<div class="main">
<h2>裁判帳號管理</h2>

<div class="panel">
  <table>
    <thead>
      <tr>
        <th>帳號</th>
        <th>新密碼</th>
        <th>姓名</th>
        <th>電話</th>
        <th>Email</th>
        <th>Level</th>
        <th>角色</th>
        <th>狀態</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="userBody">
      <tr><td colspan="9">載入中…</td></tr>
    </tbody>
  </table>
</div>
</div>

<script src="js/config.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const raw = localStorage.getItem('session_user');
  if(!raw){location.href='login.html';return;}
  const session = JSON.parse(raw);
  document.getElementById('u_name').textContent = session.name || '';

  if(!['admin','judge_admin'].includes(session.role)){
    alert('沒有權限');
    location.href='index.html';
    return;
  }

callApi('action=getUsers', res => {
  const body = document.getElementById('userBody');
  body.innerHTML = '';

  res.users.forEach(u => {
    const tr = document.createElement('tr');
    if (u.active !== 'Y') tr.classList.add('inactive');

    tr.innerHTML = `
      <td><input value="${u.username}" onchange="updateUser('${u.user_id}','username',this.value)"></td>
      <td><input type="password" placeholder="不修改留空"
                 onchange="updateUser('${u.user_id}','password',this.value)"></td>
      <td><input value="${u.name}" onchange="updateUser('${u.user_id}','name',this.value)"></td>
      <td><input value="${u.phone || ''}" onchange="updateUser('${u.user_id}','phone',this.value)"></td>
      <td><input value="${u.email || ''}" onchange="updateUser('${u.user_id}','email',this.value)"></td>
      <td><input value="${u.level || ''}" style="width:50px"
                 onchange="updateUser('${u.user_id}','level',this.value)"></td>
      <td>
        <select onchange="updateUser('${u.user_id}','role',this.value)">
          ${renderRoleOptions(u.role)}
        </select>
      </td>
      <td>${u.active === 'Y' ? '啟用' : '停用'}</td>
      <td>
        <button onclick="toggleActive('${u.user_id}')">
          ${u.active === 'Y' ? '停用' : '啟用'}
        </button>
      </td>
    `;
    body.appendChild(tr);
  });
});
  
});

function renderRoleOptions(role){
  const roles=['admin','match_admin','judge_admin','chief_judge','judge'];
  return roles.map(r=>
    `<option value="${r}" ${r===role?'selected':''}>${r}</option>`
  ).join('');
}

function toggleActive(uid,active){
  callApi(
    `action=toggleUserActive&user_id=${uid}&active=${active}`,
    ()=>location.reload()
  );
}

function updateRole(uid,role){
  callApi(
    `action=updateUserRole&user_id=${uid}&role=${role}`,
    ()=>alert('權限已更新')
  );
}

function updateUser(uid, field, value) {
  if (field === 'password' && !value) return;

  callApi(
    `action=updateUserField&user_id=${uid}&field=${field}&value=${encodeURIComponent(value)}`,
    () => console.log('updated', uid, field)
  );
}
function callApi(q,cb){
  const f='cb_'+Date.now();
  window[f]=r=>{delete window[f];cb(r)};
  const s=document.createElement('script');
  s.src=API_URL+'?'+q+'&callback='+f;
  document.body.appendChild(s);
}

function logout(){
  localStorage.clear();
  location.href='login.html';
}
</script>

</body>
</html>
