<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判帳號管理</title>

<style>

/* === 新增帳號卡片 === */
.create-user-card {
  background:#f9fafb;
  border:1px solid #e2e8f0;
  border-radius:8px;
  padding:16px;
  margin-top:24px;
}

.create-user-card h3 {
  margin:0 0 12px;
  font-size:16px;
  color:#333;
}

/* === 新增帳號表單排列 === */
.create-user-grid {
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:12px;
}

.create-user-field {
  display:flex;
  flex-direction:column;
}

.create-user-field label {
  font-size:12px;
  color:#555;
  margin-bottom:4px;
}

.create-user-field input,
.create-user-field select {
  padding:6px 8px;
  font-size:13px;
}

/* === 行動列 === */
.create-user-actions {
  grid-column: 1 / -1;
  display:flex;
  justify-content:flex-end;
  margin-top:8px;
}

/* === 新增按鈕 === */
.btn-primary {
  background:#2c7be5;
  color:#fff;
  border:none;
  padding:8px 16px;
  font-size:14px;
  border-radius:4px;
  cursor:pointer;
}

.btn-primary:hover {
  background:#1a68d1;
}

/* 小提醒文字 */
.form-hint {
  grid-column: 1 / -1;
  font-size:12px;
  color:#666;
}


body{
  margin:0;
  font-family:system-ui,-apple-system;
  background:#f5f6f8;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#ffffff;
  border-bottom:1px solid #ddd;
}

.nav a{
  margin-right:16px;
  color:#0066cc;
  text-decoration:none;
  font-weight:500;
}

.main{ padding:20px; }

.panel{
  background:#fff;
  padding:16px;
  border-radius:6px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
th,td{
  border:1px solid #ddd;
  padding:6px 8px;
  text-align:center;
}
th{ background:#eef2f6; }

input,select{
  width:100%;
  box-sizing:border-box;
  padding:4px;
  font-size:13px;
}

tr.inactive{
  background:#f3f3f3;
  color:#888;
}

button{
  padding:6px 12px;
  cursor:pointer;
}

/* toast */
#toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#2c7be5;
  color:#fff;
  padding:10px 16px;
  border-radius:6px;
  font-size:14px;
  opacity:0;
  pointer-events:none;
  transition:opacity .3s;
  z-index:9999;
}
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="admin_dashboard.html">⚙️ 後端管理</a>
    <b>👤 裁判帳號管理</b>
  </div>
  <div>
    <b id="u_name"></b>
    <a href="#" onclick="logout()" style="margin-left:12px;color:#c00;">登出</a>
  </div>
</div>

<div class="main">
<div class="panel">

<table>
<thead>
<tr>
  <th>帳號</th>
  <th>新密碼</th>
  <th>姓名</th>
  <th>電話</th>
  <th>Email</th>
  <th>Level</th>
  <th>角色</th>
  <th>狀態</th>
  <th>操作</th>
</tr>
</thead>
<tbody id="userBody">
<tr><td colspan="9">載入中…</td></tr>
</tbody>
</table>

</div>
</div>

<div class="create-user-card">
  <h3>➕ 新增裁判帳號</h3>

  <div class="create-user-grid">

    <div class="create-user-field">
      <label>帳號（登入用）</label>
      <input id="new_username" placeholder="例如：admin01">
    </div>

    <div class="create-user-field">
      <label>姓名</label>
      <input id="new_name" placeholder="真實姓名">
    </div>

    <div class="create-user-field">
      <label>電話</label>
      <input id="new_phone" placeholder="09xxxxxxxx">
    </div>

    <div class="create-user-field">
      <label>Email</label>
      <input id="new_email" placeholder="example@mail.com">
    </div>

    <div class="create-user-field">
      <label>Level</label>
      <input id="new_level" placeholder="A / B / C">
    </div>

    <div class="create-user-field">
      <label>角色</label>
      <select id="new_role">
        <option value="judge">judge</option>
        <option value="chief_judge">chief_judge</option>
        <option value="judge_admin">judge_admin</option>
        <option value="match_admin">match_admin</option>
        <option value="admin">admin</option>
      </select>
    </div>

    <div class="form-hint">
      ℹ️ 新帳號將自動設定預設密碼 <b>00000000</b>，首次登入需自行修改。
    </div>

    <div class="create-user-actions">
      <button class="btn-primary" onclick="createUser()">新增帳號</button>
    </div>

  </div>
</div>


<hr>


<div id="toast">✅ 已更新</div>

<script src="js/config.js"></script>
<script>
  
/* ===== Init ===== */
document.addEventListener('DOMContentLoaded',()=>{
  const raw = localStorage.getItem('session_user');
  if(!raw){ location.href='login.html'; return; }

  const session = JSON.parse(raw);
  document.getElementById('u_name').textContent = session.name || '';

  if(!['admin','judge_admin'].includes(session.role)){
    alert('沒有權限');
    location.href='index.html';
    return;
  }
  loadUsers();
});

/* ===== Load Users ===== */
function loadUsers(){

  callApi(
    { action: 'getUsers' },
    res => {
      const body = document.getElementById('userBody');
      body.innerHTML = '';

      if (!res || res.result !== 'ok') {
        body.innerHTML = '<tr><td colspan="9">讀取失敗</td></tr>';
        return;
      }

    res.users.forEach(u=>{
      const tr=document.createElement('tr');
      tr.dataset.userId=u.user_id;
      if(u.active!=='Y') tr.classList.add('inactive');

      tr.innerHTML=`
        <td><input name="username" value="${u.username||''}"></td>
        <td><input name="password" type="password" placeholder="留空不修改"></td>
        <td><input name="name" value="${u.name||''}"></td>
        <td><input name="phone" value="${u.phone||''}"></td>
        <td><input name="email" value="${u.email||''}"></td>
        <td><input name="level" value="${u.level||''}"></td>
        <td>
          <select name="role">
            ${renderRoleOptions(u.role)}
          </select>
        </td>
        <td>
          <select name="active">
            <option value="Y" ${u.active==='Y'?'selected':''}>啟用</option>
            <option value="N" ${u.active!=='Y'?'selected':''}>停用</option>
          </select>
        </td>
        <td>
          <button onclick="saveUser(this)">儲存</button>
        </td>
      `;
      body.appendChild(tr);
    });
  });
}

/* ===== Save One User ===== */
function saveUser(btn) {
  const tr = btn.closest('tr');
  const uid = tr.dataset.userId;

  // ✅ 改成「物件型」資料
  const data = {
    action: 'updateUser',
    user_id: uid
  };

  tr.querySelectorAll('input, select').forEach(el => {
    // ✅ 密碼留空＝不更新
    if (el.name === 'password' && !el.value) return;

    data[el.name] = el.value.trim();
  });

  console.log('updateUser payload:', data);

  callApi(data, res => {
    console.log('updateUser response:', res);

    if (res && res.result === 'ok') {
      showToast('✅ 儲存成功');
      loadUsers();               // ✅ 重新載入以確保一致
    } else {
      showToast('❌ 儲存失敗');
      alert(res?.message || '儲存失敗，請查看 Console');
    }
  });
}
  
function createUser() {
  const username = new_username.value.trim();
  const name = new_name.value.trim();
  const phone = new_phone.value.trim();
  const email = new_email.value.trim();
  const level = new_level.value.trim();
  const role = new_role.value;

  if (!username || !name) {
    alert('帳號與姓名為必填');
    return;
  }

  // ✅ 改成物件模式（符合 config.js）
  const data = {
    action: 'createUser',
    username: username,
    name: name,
    phone: phone,
    email: email,
    level: level,
    role: role
  };

  console.log('createUser payload:', data);

  callApi(data, res => {
    console.log('createUser response:', res);

    if (res && res.result === 'ok') {
      showToast('✅ 帳號已建立，預設密碼為 00000000');
      loadUsers();
    } else {
      alert(res?.message || '新增失敗');
    }
  });
}


/* ===== Helpers ===== */
function renderRoleOptions(role){
  const roles=['admin','match_admin','judge_admin','chief_judge','judge'];
  return roles.map(r =>
    `<option value="${r}" ${r===role?'selected':''}>${r}</option>`
  ).join('');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
 t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',2000);
}

function logout(){
  localStorage.clear();
  location.href='login.html';
}
</script>

</body>
</html>
