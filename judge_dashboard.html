<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判報名</title>

<style>
body{margin:0;font-family:system-ui;background:#f5f6f8}
.header{display:flex;justify-content:space-between;padding:12px 20px;background:#fff;border-bottom:1px solid #ddd}
.nav a{margin-right:16px;color:#0066cc;text-decoration:none}
.main{padding:20px}
.panel{background:#fff;padding:16px;border-radius:6px;margin-bottom:24px}

table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:8px;border-bottom:1px solid #eee;text-align:center}
th{background:#f0f2f5}

tr.signed{background:#eef5ff}
tr.full{color:#999}

.status{font-weight:bold}
.status.pending{color:#d48806}
.status.approved{color:#389e0d}
.status.rejected{color:#cf1322}

button{padding:6px 14px}
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="judge_dashboard.html">🧑‍⚖️ 裁判報名</a>
  </div>
  <div>
    <b id="u_name"></b>
    <a onclick="logout()" style="margin-left:12px;cursor:pointer">🚪 登出</a>
  </div>
</div>

<div class="main">

  <div class="panel">
    <h3>可報名比賽</h3>
    <table>
      <thead>
        <tr>
          <th>選取</th><th>日期</th><th>盃賽</th><th>組別</th>
          <th>對戰</th><th>場地</th><th>裁判</th><th>狀態</th>
        </tr>
      </thead>
      <tbody id="gamesBody">
        <tr><td colspan="8">載入中…</td></tr>
      </tbody>
    </table>
    <br>
    <button onclick="submitSignup()">送出報名</button>
  </div>

  <div class="panel">
    <h3>我的報名</h3>
    <table>
      <thead>
        <tr>
          <th>日期</th><th>盃賽</th><th>組別</th>
          <th>對戰</th><th>場地</th><th>狀態</th>
        </tr>
      </thead>
      <tbody id="myBody">
        <tr><td colspan="6">載入中…</td></tr>
      </tbody>
    </table>
    <div style="font-size:13px;color:#888;margin-top:8px">
      ※ 狀態每 10 秒自動更新
    </div>
  </div>

</div>


<!-- ========= Script ========= -->
<script src="js/config.js"></script>

<script>
const token = localStorage.getItem('token');
const session = JSON.parse(localStorage.getItem('session_user')||'{}');
if(!token) location.href='login.html';
u_name.textContent = session.name;

function logout(){
  localStorage.clear();
  location.href='login.html';
}

function formatDate(v){
  if(!v) return '';
  if(typeof v==='string' && v.includes('/')) return v;
  const d=new Date(v); if(isNaN(d)) return v;
  return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
}

function statusText(s){
  return s==='approved'?'已核准':s==='rejected'?'退回':'審核中';
}

/* JSONP */
function callApi(q,cb){
  const f='cb_'+Date.now();
  window[f]=r=>{delete window[f];cb(r);}
  const s=document.createElement('script');
  s.src=API_URL+'?'+q+'&token='+token+'&callback='+f;
  document.body.appendChild(s);
}

const selected=new Set();
let myGameStatus={};

/* 抓取我的報名狀態 */
function loadMy(cb){
  callApi('action=getMyGameSignups',res=>{
    myGameStatus={};
    myBody.innerHTML='';

    if(res.signups.length){
      res.signups.forEach(s=>{
        s.games.forEach(g=>{
          myGameStatus[g.game_id]=s.status;
          myBody.innerHTML+=`
            <tr>
              <td>${formatDate(g.date)}</td>
              <td>${g.tournament}</td>
              <td>${g.category}</td>
              <td>${g.home_team} vs ${g.away_team}</td>
              <td>${g.field}</td>
              <td class="status ${s.status}">${statusText(s.status)}</td>
            </tr>`;
        });
      });
    }else{
      myBody.innerHTML='<tr><td colspan="6">尚無報名紀錄</td></tr>';
    }

    if(cb) cb();
  });
}

/* 抓取比賽 */
function loadGames(){
  callApi('action=getSignableGames',res=>{
    gamesBody.innerHTML='';
    selected.clear();

    res.games.forEach(g=>{
      const st=myGameStatus[g.game_id];
      if(st) selected.add(g.game_id);

      gamesBody.innerHTML+=`
        <tr class="${st?'signed':''} ${g.full&&!st?'full':''}">
          <td>
            <input type="checkbox"
              value="${g.game_id}"
              ${st?'checked':''}
              ${g.full&&!st?'disabled':''}
              onchange="this.checked?selected.add(this.value):selected.delete(this.value)">
          </td>
          <td>${formatDate(g.date)}</td>
          <td>${g.tournament}</td>
          <td>${g.category}</td>
          <td>${g.home_team} vs ${g.away_team}</td>
          <td>${g.field}</td>
          <td>${g.signed_count}/${g.need_count}</td>
          <td class="status ${st||''}">${st?statusText(st):''}</td>
        </tr>`;
    });
  });
}

/* 送出報名 */
function submitSignup(){
  if(!selected.size){alert('請選擇比賽');return;}
  callApi(
    'action=judgeSignupByGames&game_ids='+Array.from(selected).join(','),
    ()=>{
      alert('報名完成');
      refreshAll(); // ✅ 立即更新
    }
  );
}

/* ✅ 核心：即時刷新 */
function refreshAll(){
  loadMy(()=>loadGames());
}

/* 初始化 */
refreshAll();

/* ✅ Polling：每 10 秒刷新一次 */
setInterval(refreshAll, 10000);
</script>

</body>
</html>
