<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判報名</title>

<style>
body{
  margin:0;
  font-family: system-ui;
  background:#f5f6f8;
}
.header{
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
  background:#fff;
  border-bottom:1px solid #ddd;
}
.nav a{
  margin-right:16px;
  color:#0066cc;
  text-decoration:none;
  font-weight:500;
}
.panel{
  margin:20px;
  background:#fff;
  padding:16px;
  border-radius:6px;
}
.game{
  padding:6px;
  border-bottom:1px solid #eee;
}
.game.signed{
  background:#eef5ff;
}
.status{
  font-size:12px;
  color:#555;
}
</style>
</head>

<body>

<!-- ===== Header ===== -->
<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="judge_dashboard.html">🧑‍⚖️ 裁判報名</a>
    <span id="adminMenu" style="display:none">
      <a href="judge_signup_review.html">✅ 報名審核</a>
    </span>
  </div>

  <div>
    <span id="u_name"></span>
    <a href="#" onclick="logout()">🚪 登出</a>
  </div>
</div>

<!-- ===== Main ===== -->
<div class="panel">
  <h3>可報名比賽</h3>
  <div id="gamesBox">載入中…</div>
  <br>
  <button onclick="submitSignup()">送出報名</button>
</div>

<div class="panel">
  <h3>我的報名</h3>
  <div id="myBox">載入中…</div>
</div>

<!-- ===== Script ===== -->
<script src="js/config.js"></script>
<script>
const token = localStorage.getItem('token');
const session = JSON.parse(localStorage.getItem('session_user')||'{}');
if(!token) location.href='login.html';

u_name.textContent = session.name;
if(session.role==='admin'){
  adminMenu.style.display='inline';
}

function logout(){
  localStorage.clear();
  location.href='login.html';
}

/* ===== JSONP helper ===== */
function callApi(q,cb){
  const f='cb_'+Date.now();
  window[f]=r=>{delete window[f];cb(r);}
  const s=document.createElement('script');
  s.src=API_URL+'?'+q+'&token='+token+'&callback='+f;
  document.body.appendChild(s);
}

/* ===== 狀態暫存 ===== */
const selected = new Set();
let myGameStatus = {}; // { game_id: status }

/* ===== 讀取我的報名 ===== */
function loadMy(){
  callApi('action=getMyGameSignups',res=>{
    myBox.innerHTML='';
    myGameStatus = {};

    if(!res.signups.length){
      myBox.textContent='尚無報名紀錄';
      return;
    }

    res.signups.forEach(s=>{
      s.games.forEach(g=>{
        myGameStatus[g.game_id] = s.status;
      });

      const ul=document.createElement('ul');
      s.games.forEach(g=>{
        const li=document.createElement('li');
        li.textContent =
          `${g.date} ${g.category} ${g.home_team} vs ${g.away_team}（${s.status}）`;
        ul.appendChild(li);
      });
      myBox.appendChild(ul);
    });
  });
}

/* ===== 讀取比賽 ===== */
function loadGames(){
  callApi('action=getSignableGames',res=>{
    gamesBox.innerHTML='';
    res.games.forEach(g=>{
      const signed = myGameStatus[g.game_id];
      if(signed) selected.add(g.game_id);

      const div=document.createElement('div');
      div.className='game'+(signed?' signed':'');
      div.innerHTML=`
        <label>
          <input type="checkbox"
            ${signed?'checked':''}
            ${g.full && !signed?'disabled':''}
            value="${g.game_id}"
            onchange="toggle(this)">
          ${g.date} ${g.category}
          ${g.home_team} vs ${g.away_team}
          (${g.signed_count}/${g.need_count})
          ${signed?`[${signed}]`:''}
        </label>`;
      gamesBox.appendChild(div);
    });
  });
}

function toggle(cb){
  cb.checked ? selected.add(cb.value) : selected.delete(cb.value);
}

/* ===== 送出 ===== */
function submitSignup(){
  if(!selected.size){
    alert('請選擇比賽');
    return;
  }
  callApi(
    'action=judgeSignupByGames&game_ids='+Array.from(selected).join(','),
    r=>{
      alert('報名完成');
      selected.clear();
      loadMy();
      loadGames();
    }
  );
}

/* ===== init ===== */
loadMy();
setTimeout(loadGames,300);
</script>

</body>
</html>
