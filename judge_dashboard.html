<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判報名</title>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system;
  background:#f5f6f8;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#ffffff;
  border-bottom:1px solid #ddd;
}
.nav a{
  margin-right:16px;
  color:#0066cc;
  text-decoration:none;
  font-weight:500;
}
.user-box a{
  margin-left:12px;
  color:#c00;
  text-decoration:none;
}

.main{ padding:20px }

.panel{
  background:#fff;
  padding:16px;
  border-radius:6px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
  margin-bottom:24px;
}

h2{ margin-top:0 }
h3{ margin:24px 0 8px }

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  font-size:14px;
}
th,td{
  border:1px solid #dcdcdc;
  padding:6px 8px;
  text-align:center;
}
th{ background:#eef2f6 }

.badge{
  padding:2px 8px;
  border-radius:999px;
  font-size:13px;
  display:inline-block;
  background:#2c7be5;
  color:#fff;
}
.badge.me{
  background:#ffd6e5;
  color:#0f3d5e;
}

tr.full{ background:#ffecec }
tr.expired{ background:#f2f2f2; color:#999 }

button{ padding:8px 16px; margin-top:16px }
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    <a href="index.html">🏠 系統首頁</a>
    <a href="judge_dashboard.html">📋 裁判報名</a>
  </div>
  <div class="user-box">
    <span id="u_name"></span>
    <a href="#" onclick="logout()">登出</a>
  </div>
</div>

<div class="main">
  <h2>裁判報名</h2>

  <!-- 篩選 -->
  <div style="margin-bottom:12px;">
    <select id="filterRange" onchange="render()">
      <option value="all">全部</option>
      <option value="month">本月</option>
      <option value="week">本週</option>
    </select>

    <label style="margin-left:8px;">
      <input type="checkbox" id="showPast" onchange="render()"> 顯示過期賽事
    </label>

    <input
      type="text"
      id="keyword"
      placeholder="搜尋球隊 / 場地 / 組別"
      style="margin-left:8px;"
      oninput="render()"
    >
  </div>

  <div id="content"></div>

  <button onclick="submitSignup()">送出報名</button>
</div>

<script src="js/config.js"></script>

<script>
/* ===== 狀態 ===== */
let allGames = [];
let selectedPositions = {}; // game_id -> role

/* ===== 初始化 ===== */
document.addEventListener('DOMContentLoaded', () => {
  const session = JSON.parse(localStorage.getItem('session_user') || '{}');
  if (!session.user_id) {
    location.replace('login.html');
    return;
  }
  document.getElementById('u_name').textContent = session.name || '';
  loadGames();
});

/* ===== API ===== */
function loadGames() {
  const session = JSON.parse(localStorage.getItem('session_user') || {});
  callApi(
    { action:'getSignableGames', user_id: session.user_id || '' },
    res => {
      if (!res || res.result !== 'ok') {
        alert(res?.message || '無法取得賽事資訊');
        return;
      }
      allGames = res.games || [];
      render();
    }
  );
}

/* ===== 工具 ===== */
function formatTime(t){
  const d = new Date(t);
  return d.getHours().toString().padStart(2,'0') + ':' +
         d.getMinutes().toString().padStart(2,'0');
}

function rememberSelection(gameId, role){
  selectedPositions[gameId] = role;
}

/* ===== 繪製 ===== */
function render() {
  const box = document.getElementById('content');
  box.innerHTML = '';

  if (!allGames.length) {
    box.innerHTML = '<div class="panel">目前沒有可報名賽事</div>';
    return;
  }

  const range = filterRange.value;
  const showPastChecked = showPast.checked;
  const kw = keyword.value.trim();
  const today = new Date(); today.setHours(0,0,0,0);

  const filtered = allGames.filter(g => {
    const gd = new Date(g.date.replace(/\//g,'-'));
    if (gd < today && !showPastChecked) return false;
    if (range === 'month' && gd.getMonth() !== today.getMonth()) return false;
    if (range === 'week') {
      const s = new Date(today); s.setDate(today.getDate()-today.getDay());
      const e = new Date(s); e.setDate(s.getDate()+6);
      if (gd < s || gd > e) return false;
    }
    if (kw) {
      const txt = `${g.away_team} ${g.home_team} ${g.field} ${g.category}`;
      if (!txt.includes(kw)) return false;
    }
    return true;
  });

  const groups = {};
  filtered.forEach(g=>{
    const m = g.date.slice(0,7);
    if(!groups[m]) groups[m]=[];
    groups[m].push(g);
  });

  Object.keys(groups).sort().forEach(month=>{
    const h3 = document.createElement('h3');
    h3.textContent = `${month} 月`;
    box.appendChild(h3);

    const panel = document.createElement('div');
    panel.className='panel';

    const table = document.createElement('table');
    table.innerHTML = `
      <thead>
        <tr>
          <th>日期</th><th>時間</th><th>組別</th>
          <th>客隊</th><th>主隊</th><th>場地</th><th>站位</th>
        </tr>
      </thead>
      <tbody></tbody>`;
    const tbody = table.querySelector('tbody');

    let lastTime=null, zebra=false;

    groups[month]
      .sort((a,b)=> new Date(a.date+' '+a.time_range)-new Date(b.date+' '+b.time_range))
      .forEach(g=>{
        const tr=document.createElement('tr');

        const gd=new Date(g.date.replace(/\//g,'-'));
        const isPast = gd<today;
        if(isPast) tr.classList.add('expired');

        if(g.time_range!==lastTime){ zebra=!zebra; lastTime=g.time_range; }
        if(zebra) tr.style.backgroundColor='#fafafa';

        const filled=Object.keys(g.occupied_positions||{}).length;
        if(filled>=g.need_count) tr.classList.add('full');

        let posHtml='';
        ['PU','U1','U2','U3'].forEach(r=>{
          if(g.need_count===1 && r!=='PU')return;
          if(g.need_count===2 && !['PU','U1'].includes(r))return;
          if(g.need_count===3 && r==='U2')return;

          if(g.occupied_positions && g.occupied_positions[r]){
            const cls = g.my_position===r?'badge me':'badge';
            posHtml+=`<div class="${cls}">${r}:${g.occupied_positions[r]}</div>`;
          }else if(!isPast && filled<g.need_count){
            const ck = selectedPositions[g.game_id]===r?'checked':'';
            posHtml+=`
              <label>
                <input type="radio" name="pos_${g.game_id}" value="${r}"
                  ${ck}
                  onchange="rememberSelection('${g.game_id}','${r}')">
                ${r}
              </label><br>`;
          }
        });

        tr.innerHTML=`
          <td>${g.date}</td>
          <td>${formatTime(g.time_range)}</td>
          <td>${g.category||''}</td>
          <td>${g.away_team||''}</td>
          <td>${g.home_team||''}</td>
          <td>${g.field||''}</td>
          <td>${posHtml}</td>`;
        tbody.appendChild(tr);
      });

    panel.appendChild(table);
    box.appendChild(panel);
  });
}

/* ===== 送出 ===== */
function submitSignup(){
  const entries = Object.keys(selectedPositions);
  if(!entries.length){ alert('尚未選擇站位'); return; }

  const payload = entries.map(id=>`${id}:${selectedPositions[id]}`);
  callApi(
    { action:'judgeSignupByGames', games_with_position: payload.join(',') },
    res=>{
      if(res && res.result==='ok'){
        alert('報名完成');
        selectedPositions={};
        loadGames();
      }else{
        alert(res?.message||'報名失敗');
      }
    }
  );
}

function logout(){
  localStorage.clear();
  location.replace('login.html');
}
</script>

</body>
</html>
