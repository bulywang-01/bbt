<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判報名</title>

<style>
body{margin:0;font-family:system-ui;background:#f5f6f8}

/* ===== Header ===== */
.header{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 20px;background:#fff;border-bottom:1px solid #ddd
}
.nav a{
  margin-right:16px;color:#0066cc;
  text-decoration:none;font-weight:500
}
.nav a:hover{text-decoration:underline}
.user-info a{margin-left:12px;cursor:pointer}

/* ===== Main ===== */
.main{padding:20px}
.panel{
  background:#fff;padding:16px;
  border-radius:6px;margin-bottom:24px
}

/* ===== Tables ===== */
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:8px;border-bottom:1px solid #eee;text-align:center}
th{background:#f0f2f5}

/* 上表狀態 */
tr.full{background:#ffecec;color:#a8071a}
.status{font-weight:bold}
.status.open{color:#389e0d}
.status.full{color:#cf1322}

/* 個人狀態 */
.status.pending{color:#d48806}
.status.approved{color:#389e0d}
.status.rejected{color:#cf1322}

/* 我的報名版面 */
.my-grid{
  display:grid;
  grid-template-columns:1fr 1fr; /* 左右等寬 */
  gap:20px
}

button{padding:6px 14px}
</style>
</head>

<body>

<!-- ===== Header ===== -->
<div class="header">
  <div class="nav">
    <a href="index.html">首頁</a>
    <a href="judge_dashboard.html">裁判報名</a>
  </div>
  <div class="user-info">
    <b id="u_name"></b>
    <a id="btnLogout">登出</a>
  </div>
</div>

<div class="main">

  <!-- ===== 可報名比賽 ===== -->
  <div class="panel">
    <h3>可報名比賽</h3>

    <table>
      <thead>
        <tr>
          <th>選取</th>
          <th>日期</th>
          <th>盃賽</th>
          <th>組別</th>
          <th>對戰</th>
          <th>場地</th>
          <th>裁判需求</th>
          <th>狀態</th>
        </tr>
      </thead>
      <tbody id="gamesBody">
        <tr><td colspan="8">載入中…</td></tr>
      </tbody>
    </table>

    <br>
    <button id="btnSubmit">送出報名</button>
  </div>

  <!-- ===== 我的報名 ===== -->
  <div class="panel">
    <h3>我的報名</h3>

    <div class="my-grid">

      <!-- 左：進行中 / 已核准 -->
      <div>
        <h4>進行中 / 已核准</h4>
        <table>
          <thead>
            <tr>
              <th>日期</th><th>組別</th>
              <th>對戰</th><th>場地</th><th>狀態</th>
            </tr>
          </thead>
          <tbody id="myActive"></tbody>
        </table>
      </div>

      <!-- 右：退回 -->
      <div>
        <h4>退回</h4>
        <table>
          <thead>
            <tr>
              <th>日期</th><th>組別</th>
              <th>對戰</th><th>場地</th><th>狀態</th>
            </tr>
          </thead>
          <tbody id="myRejected"></tbody>
        </table>
      </div>

    </div>
  </div>

</div>

<!-- ===== Scripts ===== -->
<script src="js/config.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{

  const token = localStorage.getItem('token');
  const session = JSON.parse(localStorage.getItem('session_user')||'{}');
  if(!token){location.href='login.html';return;}

  document.getElementById('u_name').textContent=session.name;
  document.getElementById('btnLogout').onclick=()=>{
    localStorage.clear();location.href='login.html';
  };

  const gamesBody  = document.getElementById('gamesBody');
  const myActive   = document.getElementById('myActive');
  const myRejected = document.getElementById('myRejected');
  const btnSubmit  = document.getElementById('btnSubmit');

  const selected = new Set();
  let myStatusMap = {};

  function formatDate(v){
    const d=new Date(v);
    return isNaN(d)?v:
      d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+
      String(d.getDate()).padStart(2,'0');
  }

  function personStatusText(s){
    if(s==='approved') return '已核准';
    if(s==='rejected') return '退回';
    return '審核中';
  }

  function matchStatusText(g){
    const lack = g.need_count - g.signed_count;
    return lack<=0 ? '已滿額' : `尚缺 ${lack} 人`;
  }

  function callApi(q,cb){
    const f='cb_'+Date.now();
    window[f]=r=>{delete window[f];cb(r);};
    const s=document.createElement('script');
    s.src=API_URL+'?'+q+'&token='+token+'&callback='+f;
    document.body.appendChild(s);
  }

  /* ===== 我的報名 ===== */
  function loadMy(next){
    myActive.innerHTML='';
    myRejected.innerHTML='';
    myStatusMap={};

    callApi('action=getMyGameSignups',res=>{
      if(!res.signups.length){
        myActive.innerHTML='<tr><td colspan="5">尚無報名</td></tr>';
        myRejected.innerHTML='<tr><td colspan="5">—</td></tr>';
        if(next)next();return;
      }

      res.signups.forEach(s=>{
        s.games.forEach(g=>{
          myStatusMap[g.game_id]=s.status;
          const row=`
            <tr>
              <td>${formatDate(g.date)}</td>
              <td>${g.category}</td>
              <td>${g.home_team} vs ${g.away_team}</td>
              <td>${g.field}</td>
              <td class="status ${s.status}">${personStatusText(s.status)}</td>
            </tr>`;
          if(s.status==='rejected') myRejected.innerHTML+=row;
          else myActive.innerHTML+=row;
        });
      });

      if(next)next();
    });
  }

  /* ===== 可報名比賽 ===== */
  function loadGames(){
    gamesBody.innerHTML='';
    selected.clear();

    callApi('action=getSignableGames',res=>{
      res.games.forEach(g=>{
        const myStatus = myStatusMap[g.game_id];
        const full = g.signed_count >= g.need_count;
        const locked = myStatus==='approved';
        const disabled = full || locked;

        if(myStatus && myStatus!=='rejected'){
          selected.add(g.game_id);
        }

        gamesBody.innerHTML+=`
        <tr class="${full?'full':''}">
          <td>
            <input type="checkbox"
              value="${g.game_id}"
              ${selected.has(g.game_id)?'checked':''}
              ${disabled?'disabled':''}
              onchange="this.checked?selected.add(this.value):selected.delete(this.value)">
          </td>
          <td>${formatDate(g.date)}</td>
          <td>${g.tournament}</td>
          <td>${g.category}</td>
          <td>${g.home_team} vs ${g.away_team}</td>
          <td>${g.field}</td>
          <td>${g.need_count} 人制</td>
          <td class="status ${full?'full':'open'}">
            ${matchStatusText(g)}
            ${locked?'（已核准）':''}
          </td>
        </tr>`;
      });
    });
  }

  /* ===== 送出報名 ===== */
  btnSubmit.onclick=()=>{
    if(!selected.size){alert('請選擇比賽');return;}
    callApi(
      'action=judgeSignupByGames&game_ids='+Array.from(selected).join(','),
      ()=>{alert('報名完成');refresh();}
    );
  };

  function refresh(){loadMy(loadGames);}

  refresh();
  setInterval(refresh,180000);

});
</script>

</body>
</html>
