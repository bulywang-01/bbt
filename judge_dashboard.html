<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判報名</title>

<style>
body{margin:0;font-family:system-ui;background:#f5f6f8}
.header{display:flex;justify-content:space-between;align-items:center;
 padding:12px 20px;background:#ffffff;border-bottom:1px solid #ddd}
.nav a{margin-right:16px;color:#0066cc;text-decoration:none;font-weight:500}
.main{padding:20px}
.panel{background:#fff;padding:16px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.08)}

table{width:100%;border-collapse:collapse;font-size:14px;margin-top:10px}
th,td{border:1px solid #dcdcdc;padding:6px 8px;text-align:center}
th{background:#eef2f6}

.badge{padding:2px 10px;border-radius:999px;font-size:13px;background:#2c7be5;color:#fff}
.badge.me{background:#ffd6e5;color:#0f3d5e}
.badge.gray{background:#999}

.empty{
  padding:20px;
  text-align:center;
  color:#444;
  background:#fff3cd;
  border:1px solid #ffeeba;
  font-size:14px;
}

.debug{
  padding:8px;
  margin-top:10px;
  background:#eef2f6;
  font-size:12px;
  color:#333;
}

label{cursor:pointer;white-space:nowrap}
button{padding:8px 16px;margin-top:10px}
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="judge_dashboard.html"><b>🧑‍⚖️ 裁判報名</b></a>
  </div>
  <div>
    <b id="u_name"></b>
    #登出</a>
  </div>
</div>

<div class="main">
<h2>裁判報名</h2>

<div class="panel">

<label>
  <input type="checkbox" id="showPast" onchange="loadGames()">
  顯示已過期比賽
</label>

<table>
<thead>
<tr>
  <th>日期</th>
  <th>時間</th>
  <th>組別</th>
  <th>客隊</th>
  <th>主隊</th>
  <th>地點</th>
  <th>裁判制</th>
  <th>主審</th>
  <th>一壘</th>
  <th>二壘</th>
  <th>三壘</th>
</tr>
</thead>
<tbody id="gameBody">
<tr><td colspan="11">載入中…</td></tr>
</tbody>
</table>

<button onclick="submitSignup()">送出報名</button>

<div id="debug" class="debug"></div>

</div>
</div>

<script src="js/config.js"></script>
<script>
const today = new Date();
today.setHours(0,0,0,0);

document.addEventListener('DOMContentLoaded',()=>{
  const s = JSON.parse(localStorage.getItem('session_user') || '{}');
  if(!s.user_id){
    location.href='login.html';
    return;
  }
  document.getElementById('u_name').textContent = s.name || '';
  loadGames();
});

function callApi(q,cb){
  const f='cb_'+Date.now();
  window[f]=r=>{
    delete window[f];
    cb(r);
  };
  const s=document.createElement('script');
  s.src=API_URL+'?'+q+'&callback='+f;
  document.body.appendChild(s);
}

function needRole(n,r){
  if(n>=4)return true;
  if(n===3)return r!=='U2';
  if(n===2)return r==='PU'||r==='U1';
  if(n===1)return r==='PU';
  return false;
}

function renderCell(g,r){
  if(!needRole(g.need_count,r))
    return '<span class="badge gray">不需要</span>';

  const name=(g.occupied_positions||{})[r];
  if(name){
    const cls=g.my_position===r?'badge me':'badge';
    return `<span class="${cls}">${name}</span>`;
  }
  return `<label><input type="radio" name="pos_${g.game_id}" value="${r}"> ${r}</label>`;
}

function loadGames(){
  const body = document.getElementById('gameBody');
  const dbg  = document.getElementById('debug');
  const showPast = document.getElementById('showPast').checked;

  body.innerHTML = `<tr><td colspan="11">載入中…</td></tr>`;
  dbg.textContent = '';

  callApi('action=getSignableGames', res => {
    console.log('API 回傳:', res);
    dbg.textContent = 'API 原始回傳：' + JSON.stringify(res);

    body.innerHTML='';

    // ✅ 防呆：API 沒回 games
    if(!res || !Array.isArray(res.games)){
      body.innerHTML = `
        <tr>
          <td colspan="11" class="empty">
            ❌ API 未回傳 games 陣列<br>
            請確認 getSignableGames 的輸出格式
          </td>
        </tr>`;
      return;
    }

    // ✅ 日期過濾（過期不顯示）
    //const list = res.games.filter(g=>{
    //  if(showPast) return true;
    //  const d = new Date(g.date);
    //  if(isNaN(d)) return false; // 日期格式錯誤直接排除
    //  d.setHours(0,0,0,0);
    //  return d >= today;
    //});

   const list = res.games.filter(g => {
      if (showPast) return true;
    
      // ✅ g.date = '2026/04/02'
      const parts = g.date.split('/');
      if (parts.length !== 3) return false;
    
      const d = new Date(
        Number(parts[0]),
        Number(parts[1]) - 1, // 月份 0-based
        Number(parts[2])
      );
      d.setHours(0, 0, 0, 0);
    
      return d >= today;
    });
   
    dbg.textContent +=
      `\n總筆數=${res.games.length}，顯示筆數=${list.length}`;

    // ✅ 沒資料也一定顯示原因
    if(list.length === 0){
      body.innerHTML = `
        <tr>
          <td colspan="11" class="empty">
            ⚠️ 目前沒有可報名的比賽<br>
            （可能原因：<br>
            1️⃣ 全部比賽已過期<br>
            2️⃣ 後端已先過濾<br>
            3️⃣ 尚未建立賽事）
          </td>
        </tr>`;
      return;
    }

    // ✅ 正常渲染
    list.forEach(g=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`
        <td>${g.date}</td>
        <td>${g.time_range}</td>
        <td>${g.category}</td>
        <td>${g.away_team}</td>
        <td>${g.home_team}</td>
        <td>${g.field}</td>
        <td>${g.need_count}人制</td>
        <td>${renderCell(g,'PU')}</td>
        <td>${renderCell(g,'U1')}</td>
        <td>${renderCell(g,'U2')}</td>
        <td>${renderCell(g,'U3')}</td>`;
      body.appendChild(tr);
    });
  });
}

function submitSignup(){
  const sel=[];
  document.querySelectorAll('input[type=radio]:checked')
    .forEach(r=>sel.push(r.name.replace('pos_','')+':'+r.value));
  if(!sel.length){
    alert('尚未選擇站位');
    return;
  }
  callApi(
    'action=judgeSignupByGames&games_with_position='+encodeURIComponent(sel.join(',')),
    ()=>{
      alert('報名完成');
      loadGames();
    }
  );
}

function logout(){
  localStorage.clear();
  location.href='login.html';
}
</script>
</body>
</html>
