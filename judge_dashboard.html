<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>🧑‍⚖️ 裁判報名比賽</title>

<style>
body{
  font-family: system-ui;
  margin: 20px;
  background: #fafafa;
}
.header a{
  margin-right: 14px;
  color: #0066cc;
  text-decoration: none;
}
.header a:hover{
  text-decoration: underline;
}
.panel{
  background: #fff;
  padding: 14px;
  border-radius: 6px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  margin-bottom: 16px;
}
.group{
  margin-bottom: 14px;
}
</style>
</head>
<body>

<script>
/* ✅ 權限檢查 */
if (localStorage.getItem('role') !== 'judge') {
  location.href = 'index.html';
}
</script>

<!-- ✅ Header（100% 正確寫法） -->
<div class="header">
  <a href="index.html">🏠 首頁</a>
  <a href="javascript:void(0)" onclick="logout()">🚪 登出</a>
</div>

<h2>🧑‍⚖️ 可報名比賽</h2>

<div class="panel" id="gamesBox">載入中…</div>

<div class="panel">
  <button onclick="submitSignup()">送出報名</button>
</div>

<div class="panel">
  <b>我已報名</b>
  <div id="myList">載入中…</div>
</div>

<!-- ✅ 正確載入 config.js（關鍵） -->
<script src="js/config.js"></script>

<script>
/* ===== 共用資料 ===== */
const token = localStorage.getItem('token');
let selected = new Set();

/* ===== 登出 ===== */
function logout() {
  if (!confirm('確定要登出？')) return;
  localStorage.clear();
  location.href = 'login.html';
}

/* ===== 載入可報名比賽 ===== */
function loadGames() {
  const cb = 'cb_games_' + Date.now();
  window[cb] = res => {
    if (!res || res.result !== 'ok') {
      document.getElementById('gamesBox').textContent = '讀取失敗';
      return;
    }
    renderGames(res.games || []);
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=getSignableGames' +
    '&token=' + encodeURIComponent(token) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===== 顯示比賽（依盃賽分組） ===== */
function renderGames(games) {
  if (!games.length) {
    document.getElementById('gamesBox').textContent = '目前沒有可報名的比賽';
    return;
  }

  const map = {};
  games.forEach(g => {
    if (!map[g.tournament]) map[g.tournament] = [];
    map[g.tournament].push(g);
  });

  let html = '';
  Object.keys(map).forEach(t => {
    html += `<div class="group"><b>${t}</b><br>`;
    map[t].forEach(g => {
      html += `
        <label>
          <input type="checkbox"
                 value="${g.game_id}"
                 onchange="toggleGame(this)">
          ${g.date}｜${g.category}｜${g.field}
        </label><br>`;
    });
    html += '</div>';
  });

  document.getElementById('gamesBox').innerHTML = html;
}

function toggleGame(cb) {
  cb.checked ? selected.add(cb.value) : selected.delete(cb.value);
}

/* ===== 送出報名 ===== */
function submitSignup() {
  if (!selected.size) {
    alert('請至少選擇一場比賽');
    return;
  }

  const cb = 'cb_signup_' + Date.now();
  window[cb] = res => {
    if (res && res.result === 'ok') {
      alert('✅ 報名完成');
      selected.clear();
      loadMySignups();
    } else {
      alert('❌ 報名失敗');
    }
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=judgeSignupByGames' +
    '&token=' + encodeURIComponent(token) +
    '&game_ids=' + encodeURIComponent([...selected].join(',')) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===== 我的報名 ===== */
function loadMySignups() {
  const cb = 'cb_my_' + Date.now();
  window[cb] = res => {
    const box = document.getElementById('myList');
    if (!res || res.result !== 'ok') {
      box.textContent = '讀取失敗';
      return;
    }
    if (!res.signups.length) {
      box.textContent = '尚無報名紀錄';
      return;
    }

    let html = '<ul>';
    res.signups.forEach(s => {
      html += `<li>${s.games.length} 場比賽（${s.status}）</li>`;
    });
    html += '</ul>';
    box.innerHTML = html;
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=getMyGameSignups' +
    '&token=' + encodeURIComponent(token) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===== init ===== */
loadGames();
loadMySignups();
</script>

</body>
</html>
