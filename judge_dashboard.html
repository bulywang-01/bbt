<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判報名</title>

<style>
body{
  margin:0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont;
  background:#f5f6f8;
}

/* ===== Header ===== */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#ffffff;
  border-bottom:1px solid #ddd;
}
.nav a{
  margin-right:16px;
  color:#0066cc;
  text-decoration:none;
  font-weight:500;
}
.nav a:hover{
  text-decoration:underline;
}
.user-info{
  font-size:14px;
}
.user-info a{
  margin-left:12px;
  color:#0066cc;
  cursor:pointer;
}

/* ===== Main ===== */
.main{
  padding:20px;
}
.panel{
  background:#ffffff;
  padding:16px;
  border-radius:6px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
  margin-bottom:24px;
}

/* ===== Table ===== */
table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
th, td{
  padding:8px 10px;
  border-bottom:1px solid #eee;
  text-align:center;
}
th{
  background:#f0f2f5;
}
tr.signed{
  background:#eef5ff;
}
tr.full{
  color:#999;
}

/* ===== Status ===== */
.status{
  font-weight:bold;
}
.status.pending{
  color:#d48806;
}
.status.approved{
  color:#389e0d;
}

/* ===== Button ===== */
button{
  padding:8px 14px;
  font-size:14px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- ===== Header ===== -->
<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="judge_dashboard.html">🧑‍⚖️ 裁判報名</a>
    <span id="adminMenu" style="display:none">
      <a href="judge_signup_review.html">✅ 報名審核</a>
    </span>
  </div>

  <div class="user-info">
    <b id="u_name"></b>
    <a onclick="logout()">🚪 登出</a>
  </div>
</div>

<div class="main">

  <!-- ================= 可報名比賽 ================= -->
  <div class="panel">
    <h3>可報名比賽</h3>

    <table>
      <thead>
        <tr>
          <th>選取</th>
          <th>日期</th>
          <th>盃賽</th>
          <th>組別</th>
          <th>對戰</th>
          <th>場地</th>
          <th>裁判</th>
          <th>狀態</th>
        </tr>
      </thead>
      <tbody id="gamesBody">
        <tr><td colspan="8">載入中…</td></tr>
      </tbody>
    </table>

    <br>
    <button onclick="submitSignup()">送出報名</button>
  </div>

  <!-- ================= 我的報名 ================= -->
  <div class="panel">
    <h3>我的報名</h3>

    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>盃賽</th>
          <th>組別</th>
          <th>對戰</th>
          <th>場地</th>
          <th>狀態</th>
        </tr>
      </thead>
      <tbody id="myBody">
        <tr><td colspan="6">載入中…</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- ================= Scripts ================= -->
<script src="js/config.js"></script>
<script>
const token = localStorage.getItem('token');
const session = JSON.parse(localStorage.getItem('session_user')||'{}');
if(!token||!session.user_id) location.href='login.html';

u_name.textContent = session.name;
if(session.role==='admin') adminMenu.style.display='inline';

function logout(){
  localStorage.clear();
  location.href='login.html';
}

/* ===== JSONP ===== */
function callApi(q,cb){
  const f='cb_'+Date.now();
  window[f]=r=>{delete window[f];cb(r);}
  const s=document.createElement('script');
  s.src=API_URL+'?'+q+'&token='+token+'&callback='+f;
  document.body.appendChild(s);
}

/* ===== State ===== */
const selected = new Set();
let myGameStatus = {}; // game_id → status

/* ===== 我的報名 ===== */
function loadMy(){
  callApi('action=getMyGameSignups',res=>{
    myGameStatus = {};
    myBody.innerHTML='';

    if(!res.signups.length){
      myBody.innerHTML='<tr><td colspan="6">尚無報名紀錄</td></tr>';
      return;
    }

    res.signups.forEach(s=>{
      s.games.forEach(g=>{
        myGameStatus[g.game_id]=s.status;

        const tr=document.createElement('tr');
        tr.innerHTML=`
          <td>${g.date}</td>
          <td>${g.tournament}</td>
          <td>${g.category}</td>
          <td>${g.home_team} vs ${g.away_team}</td>
          <td>${g.field}</td>
          <td class="status ${s.status}">${s.status}</td>
        `;
        myBody.appendChild(tr);
      });
    });
  });
}

/* ===== 可報名比賽 ===== */
function loadGames(){
  callApi('action=getSignableGames',res=>{
    gamesBody.innerHTML='';
    res.games.forEach(g=>{
      const signed = myGameStatus[g.game_id];
      if(signed) selected.add(g.game_id);

      const tr=document.createElement('tr');
      tr.className =
        (signed?'signed ':'') +
        (g.full && !signed?'full':'');

      tr.innerHTML=`
        <td>
          <input type="checkbox"
            value="${g.game_id}"
            ${signed?'checked':''}
            ${g.full && !signed?'disabled':''}
            onchange="toggle(this)">
        </td>
        <td>${g.date}</td>
        <td>${g.tournament}</td>
        <td>${g.category}</td>
        <td>${g.home_team} vs ${g.away_team}</td>
        <td>${g.field}</td>
        <td>${g.signed_count}/${g.need_count}</td>
        <td class="status ${signed||''}">${signed|| (g.full?'full':'')}</td>
      `;
      gamesBody.appendChild(tr);
    });
  });
}

function toggle(cb){
  cb.checked ? selected.add(cb.value) : selected.delete(cb.value);
}

/* ===== 送出 ===== */
function submitSignup(){
  if(!selected.size){
    alert('請選擇比賽');
    return;
  }
  callApi(
    'action=judgeSignupByGames&game_ids='+
    Array.from(selected).join(','),
    ()=>{
      alert('✅ 報名完成');
      selected.clear();
      loadMy();
      loadGames();
    }
  );
}

/* ===== init ===== */
loadMy();
setTimeout(loadGames,300);
</script>

</body>
</html>
