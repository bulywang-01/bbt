<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>🧑‍⚖️ 裁判報名比賽</title>

<style>
body{
  font-family: system-ui;
  margin: 20px;
  background: #fafafa;
}
.header a{
  margin-right: 14px;
  color: #0066cc;
  text-decoration: none;
}
.header a:hover{
  text-decoration: underline;
}
.panel{
  background: #fff;
  padding: 14px;
  border-radius: 6px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  margin-bottom: 16px;
}
.group{
  margin-bottom: 18px;
}
.game-row{
  padding: 4px 0;
}
.game-row.signed{
  background: #e8f0fe;
  border-radius: 4px;
}
.game-row.signed b{
  color: #1a73e8;
}
.full{
  color: red;
  font-weight: bold;
}
.status{
  margin-left: 6px;
  font-size: 12px;
}
.status.pending{ color: #946200; }
.status.approved{ color: #137333; }
.status.rejected{ color: #a50e0e; }
</style>
</head>
<body>

<script>
/* ✅ 僅裁判可進 */
if (localStorage.getItem('role') !== 'judge') {
  location.href = 'index.html';
}
</script>

<!-- ✅ Header -->
<div class="header">
  <a href="index.html">🏠 首頁</a>
  <a href="javascript:void(0)" onclick="logout()">🚪 登出</a>
</div>

<h2>🧑‍⚖️ 可報名比賽</h2>

<div class="panel" id="gamesBox">載入中…</div>

<div class="panel">
  <button onclick="submitSignup()">✅ 送出報名（新增）</button>
</div>

<div class="panel">
  <b>📄 我的報名紀錄</b>
  <div id="myList">載入中…</div>
</div>

<!-- ✅ 正確載入 config.js -->
<script src="js/config.js"></script>

<script>
/* ===== 共用資料 ===== */
const token = localStorage.getItem('token');
let selected = new Set();

/* 已報名的 game_id → status */
const mySignedGames = {};

/* ===== 工具：台灣日期格式 ===== */
function formatDateTW(v){
  if(!v) return '';
  const d = new Date(v);
  return d.getFullYear() + '/' +
         String(d.getMonth()+1).padStart(2,'0') + '/' +
         String(d.getDate()).padStart(2,'0');
}

/* ===== 登出 ===== */
function logout(){
  if(!confirm('確定要登出？')) return;
  localStorage.clear();
  location.href='login.html';
}

/* ===== 載入我的報名（先做，才能反白） ===== */
function loadMySignups(cbAfter){
  const cb='cb_my_'+Date.now();
  window[cb]=res=>{
    mySignedGamesClear();
    if(res && res.result==='ok'){
      res.signups.forEach(s=>{
        s.games.forEach(g=>{
          mySignedGames[g.game_id] = s.status;
        });
      });
    }
    if(cbAfter) cbAfter();
    renderMyList(res && res.signups ? res.signups : []);
  };
  const s=document.createElement('script');
  s.src=API_URL+
    '?action=getMyGameSignups&token='+encodeURIComponent(token)+
    '&callback='+cb;
  document.body.appendChild(s);
}

function mySignedGamesClear(){
  for(const k in mySignedGames) delete mySignedGames[k];
}

/* ===== 載入可報名比賽 ===== */
function loadGames(){
  const cb='cb_games_'+Date.now();
  window[cb]=res=>{
    if(!res || res.result!=='ok'){
      gamesBox.textContent='讀取失敗';
      return;
    }
    renderGames(res.games || []);
  };
  const s=document.createElement('script');
  s.src=API_URL+
    '?action=getSignableGames&token='+encodeURIComponent(token)+
    '&callback='+cb;
  document.body.appendChild(s);
}

/* ===== 顯示比賽 ===== */
function renderGames(games){
  if(!games.length){
    gamesBox.textContent='目前沒有可報名的比賽';
    return;
  }

  const map = {};
  games.forEach(g=>{
    if(!map[g.tournament]) map[g.tournament]=[];
    map[g.tournament].push(g);
  });

  let html='';
  Object.keys(map).forEach(t=>{
    html+=`<div class="group"><b>${t}</b><br>`;

    map[t].forEach(g=>{
      const signedStatus = mySignedGames[g.game_id];
      const isSigned = !!signedStatus;
      const isFull = g.full;

      const disabled = isFull && !isSigned ? 'disabled' : '';
      const checked = isSigned ? 'checked' : '';
      const rowClass = isSigned ? 'game-row signed' : 'game-row';

      const statusText = isSigned
        ? `<span class="status ${signedStatus}">（${signedStatus}）</span>`
        : '';

      const fullText = isFull && !isSigned
        ? `<span class="full">（已額滿）</span>`
        : '';

      if(isSigned) selected.add(g.game_id);

      html+=`
        <div class="${rowClass}">
          <label>
            <input type="checkbox"
                   value="${g.game_id}"
                   ${checked}
                   ${disabled}
                   onchange="toggleGame(this)">
            
            <b>${formatDateTW(g.date)}</b>
            ｜ ${g.category}
            ｜ ${g.home_team} vs ${g.away_team}
            ｜ ${g.field}
            ｜ 裁判 ${g.signed_count} / ${g.need_count}
            ${fullText}
            ${statusText}
          </label>
        </div>
      `;
    });

    html+='</div>';
  });

  gamesBox.innerHTML=html;
}

function toggleGame(cb){
  cb.checked ? selected.add(cb.value) : selected.delete(cb.value);
}

/* ===== 送出報名（僅新增部分） ===== */
function submitSignup(){
  if(!selected.size){
    alert('請至少選擇一場比賽');
    return;
  }

  const cb='cb_signup_'+Date.now();
  window[cb]=res=>{
    if(res && res.result==='ok'){
      alert('✅ 報名送出完成');
      selected.clear();
      loadMySignups(loadGames);
    }else{
      alert('❌ 送出失敗');
    }
  };

  const s=document.createElement('script');
  s.src=API_URL+
    '?action=judgeSignupByGames&token='+encodeURIComponent(token)+
    '&game_ids='+encodeURIComponent([...selected].join(','))+
    '&callback='+cb;
  document.body.appendChild(s);
}

/* ===== 顯示我的報名摘要 ===== */
function renderMyList(signups){
  const box=document.getElementById('myList');
  if(!signups.length){
    box.textContent='尚無報名紀錄';
    return;
  }
  let html='<ul>';
  signups.forEach(s=>{
    html+=`<li>${s.games.length} 場比賽（${s.status}）</li>`;
  });
  html+='</ul>';
  box.innerHTML=html;
}

/* ===== init ===== */
loadMySignups(loadGames);
</script>

</body>
</html>
