<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判報名</title>

<style>
body{
  margin:0;
  font-family: system-ui;
  background:#f5f6f8;
}
.header{
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
  background:#fff;
  border-bottom:1px solid #ddd;
}
.nav a{
  margin-right:16px;
  color:#0066cc;
  text-decoration:none;
}
.user-info{font-size:14px;}
.main{padding:20px;}
.panel{
  background:#fff;
  padding:16px;
  border-radius:6px;
  margin-bottom:24px;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
th, td{
  padding:8px;
  border-bottom:1px solid #eee;
  text-align:center;
}
th{background:#f0f2f5;}
tr.signed{background:#eef5ff;}
tr.full{color:#999;}
.status.pending{color:#d48806;font-weight:bold;}
.status.approved{color:#389e0d;font-weight:bold;}
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    index.html
    judge_dashboard.html
    <span id="adminMenu" style="display:none">
      judge_signup_review.html
    </span>
  </div>
  <div class="user-info">
    <b id="u_name"></b>
    #
  </div>
</div>

<div class="main">

  <div class="panel">
    <h3>可報名比賽</h3>
    <table>
      <thead>
        <tr>
          <th>選取</th>
          <th>日期</th>
          <th>盃賽</th>
          <th>組別</th>
          <th>對戰</th>
          <th>場地</th>
          <th>裁判</th>
          <th>狀態</th>
        </tr>
      </thead>
      <tbody id="gamesBody">
        <tr><td colspan="8">載入中…</td></tr>
      </tbody>
    </table>
    <br>
    <button onclick="submitSignup()">送出報名</button>
  </div>

  <div class="panel">
    <h3>我的報名</h3>
    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>盃賽</th>
          <th>組別</th>
          <th>對戰</th>
          <th>場地</th>
          <th>狀態</th>
        </tr>
      </thead>
      <tbody id="myBody">
        <tr><td colspan="6">載入中…</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script src="js/config.js"></script>
<script>
const token = localStorage.getItem('token');
const session = JSON.parse(localStorage.getItem('session_user')||'{}');
if(!token) location.href='login.html';

u_name.textContent = session.name;
if(session.role==='admin') adminMenu.style.display='inline';

/* ✅ 統一日期格式處理（關鍵） */
function formatDate(v){
  if(!v) return '';
  if(typeof v === 'string' && v.includes('/')) return v;
  const d = new Date(v);
  if(isNaN(d)) return v;
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}/${m}/${day}`;
}

/* JSONP */
function callApi(q,cb){
  const f='cb_'+Date.now();
  window[f]=r=>{delete window[f];cb(r);}
  const s=document.createElement('script');
  s.src=API_URL+'?'+q+'&token='+token+'&callback='+f;
  document.body.appendChild(s);
}

const selected = new Set();
let myGameStatus = {};

/* 我的報名 */
function loadMy(){
  callApi('action=getMyGameSignups',res=>{
    myBody.innerHTML='';
    myGameStatus={};

    if(!res.signups.length){
      myBody.innerHTML='<tr><td colspan="6">尚無報名紀錄</td></tr>';
      return;
    }

    res.signups.forEach(s=>{
      s.games.forEach(g=>{
        myGameStatus[g.game_id]=s.status;
        myBody.innerHTML+=`
          <tr>
            <td>${formatDate(g.date)}</td>
            <td>${g.tournament}</td>
            <td>${g.category}</td>
            <td>${g.home_team} vs ${g.away_team}</td>
            <td>${g.field}</td>
            <td class="status ${s.status}">${s.status}</td>
          </tr>
        `;
      });
    });
  });
}

/* 可報名比賽 */
function loadGames(){
  callApi('action=getSignableGames',res=>{
    gamesBody.innerHTML='';
    res.games.forEach(g=>{
      const signed=myGameStatus[g.game_id];
      if(signed) selected.add(g.game_id);

      gamesBody.innerHTML+=`
        <tr class="${signed?'signed':''} ${g.full&&!signed?'full':''}">
          <td>
            <input type="checkbox"
              value="${g.game_id}"
              ${signed?'checked':''}
              ${g.full&&!signed?'disabled':''}
              onchange="this.checked?selected.add(this.value):selected.delete(this.value)">
          </td>
          <td>${formatDate(g.date)}</td>
          <td>${g.tournament}</td>
          <td>${g.category}</td>
          <td>${g.home_team} vs ${g.away_team}</td>
          <td>${g.field}</td>
          <td>${g.signed_count}/${g.need_count}</td>
          <td class="status ${signed||''}">${signed||''}</td>
        </tr>
      `;
    });
  });
}

function submitSignup(){
  if(!selected.size){alert('請選擇比賽');return;}
  callApi(
    'action=judgeSignupByGames&game_ids='+Array.from(selected).join(','),
    ()=>{
      alert('報名完成');
      selected.clear();
      loadMy();
      loadGames();
    }
  );
}

loadMy();
setTimeout(loadGames,300);
</script>

</body>
</html>
