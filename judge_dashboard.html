<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>我的班表與統計</title>
</head>
<body>

<script>
if (!localStorage.getItem('judge_id')) location.href='login.html';
</script>

<h2>📊 我的班表</h2>
<div id="schedule"></div>

<h2>📈 我的出勤統計</h2>
<div id="stats"></div>

<script src="js/config.js"></script>
<script>
const jid = localStorage.getItem('judge_id');

function roc(d){
  const x=new Date(d);
  return (x.getFullYear()-1911)+'/'+(x.getMonth()+1)+'/'+x.getDate();
}

function loadAll(){
  load('games');
  load('attendance');
}

const data={games:[],att:[]};

function load(action){
  const cb=action+Date.now();
  window[cb]=list=>{
    data[action]=list;
    if(data.games.length&&data.att.length)render();
    delete window[cb];
  };
  const s=document.createElement('script');
  s.src=API_URL+'?action='+action+'&callback='+cb;
  document.body.appendChild(s);
}

function render(){
  const my=data.att.filter(a=>a.judge_id===jid);
  document.getElementById('schedule').innerHTML=
    my.map(a=>{
      const g=data.games.find(x=>x.game_id===a.game_id);
      return `<div>${roc(g.date)} ${g.away_team} vs ${g.home_team}（${a.role}）</div>`;
    }).join('');

  const total=my.length;
  document.getElementById('stats').innerHTML=
    `總出勤：${total}<br>`+
    ['主審','一壘審','二壘審','三壘審']
      .map(r=>r+'：'+my.filter(x=>x.role===r).length).join('<br>');
}

loadAll();
</script>

</body>
</html>
