<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>我的班表</title>
</head>
<body>

<script>
if (!localStorage.getItem('role')) location.href = 'login.html';
if (localStorage.getItem('role') !== 'judge') {
  alert('無權限');
  location.href = 'index.html';
}
</script>

<h2>📊 我的班表</h2>
<div id="content">載入中…</div>

<script>
const token = localStorage.getItem('token');
const cb = 'cb_' + Date.now();

window[cb] = function(res) {
  if (res.result !== 'ok') {
    document.getElementById('content').textContent = '無法取得資料';
    return;
  }

  const { games, attendance } = res;
  let html = '<ul>';

  attendance.forEach(a => {
    const g = games.find(g => g.game_id === a.game_id);
    if (!g) return;

    html += `
      <li>
        ${g.date}｜
        ${g.tournament} ${g.category}｜
        ${g.away_team} vs ${g.home_team}｜
        ${a.role}（${a.attend || '未確認'}）
      </li>
    `;
  });

  html += '</ul>';
  document.getElementById('content').innerHTML = html;
};

const s = document.createElement('script');
s.src =
  API_URL +
  '?action=getMySchedule' +
  '&token=' + encodeURIComponent(token) +
  '&callback=' + cb;

document.body.appendChild(s);
</script>

</body>
</html>
