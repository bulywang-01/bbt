<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判報名</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f5f6f8;
}

/* ===== Header ===== */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#ffffff;
  border-bottom:1px solid #ddd;
}
.nav a{
  margin-right:16px;
  color:#0066cc;
  text-decoration:none;
  font-weight:500;
}
.nav a:hover{
  text-decoration:underline;
}
.user-info a{
  margin-left:12px;
  cursor:pointer;
}

/* ===== Main ===== */
.main{
  padding:20px;
}
.panel{
  background:#ffffff;
  padding:16px;
  border-radius:6px;
  margin-bottom:24px;
}

/* ===== Tables ===== */
table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
th,td{
  padding:8px;
  border-bottom:1px solid #eee;
  text-align:center;
}
th{
  background:#f0f2f5;
}

/* ===== My signup layout ===== */
.my-grid{
  display:grid;
  grid-template-columns: 1fr 1fr;   /* ✅ 左右等寬 */
  gap:20px;
}

button{
  padding:6px 14px;
}
</style>
</head>

<body>

<!-- ========= Header ========= -->
<div class="header">
  <div class="nav">
    <a href="index.html">首頁</a>
    <a href="judge_dashboard.html">裁判報名</a>
  </div>
  <div class="user-info">
    <b id="u_name"></b>
    <a id="btnLogout">登出</a>
  </div>
</div>

<div class="main">

  <!-- ===== 可報名比賽 ===== -->
  <div class="panel">
    <h3>可報名比賽</h3>

    <table>
      <thead>
        <tr>
          <th>選取</th>
          <th>日期</th>
          <th>盃賽</th>
          <th>組別</th>
          <th>對戰</th>
          <th>場地</th>
          <th>裁判需求</th>
          <th>狀態</th>
        </tr>
      </thead>
      <tbody id="gamesBody">
        <tr><td colspan="8">載入中…</td></tr>
      </tbody>
    </table>

    <br>
    <button id="btnSubmit">送出報名</button>
  </div>

  <!-- ===== 我的報名 ===== -->
  <div class="panel">
    <h3>我的報名</h3>

    <div class="my-grid">

      <div>
        <h4>進行中 / 已核准</h4>
        <table>
          <thead>
            <tr>
              <th>日期</th>
              <th>組別</th>
              <th>對戰</th>
              <th>場地</th>
              <th>狀態</th>
            </tr>
          </thead>
          <tbody id="myActive">
            <tr><td colspan="5">載入中…</td></tr>
          </tbody>
        </table>
      </div>

      <div>
        <h4>退回</h4>
        <table>
          <thead>
            <tr>
              <th>日期</th>
              <th>組別</th>
              <th>對戰</th>
              <th>場地</th>
              <th>狀態</th>
            </tr>
          </thead>
          <tbody id="myRejected">
            <tr><td colspan="5">載入中…</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

</div>

<!-- ✅ JS 區塊（順序嚴格） -->
<script src="js/config.js"></script>
<script>
document.addEventListener('DOMContentLoaded',function(){

  const token = localStorage.getItem('token');
  const session = JSON.parse(localStorage.getItem('session_user')||'{}');
  if(!token){
    location.href = 'login.html';
    return;
  }

  document.getElementById('u_name').textContent = session.name;
  document.getElementById('btnLogout').onclick = function(){
    localStorage.clear();
    location.href = 'login.html';
  };

  // ✅ 目前版本只做結構驗證，不再展開複雜 JS
  const gamesBody  = document.getElementById('gamesBody');
  const myActive   = document.getElementById('myActive');
  const myRejected = document.getElementById('myRejected');

  // 如果你看到這三個不是 null，代表結構已穩
  console.log('DOM OK:', !!gamesBody, !!myActive, !!myRejected);
});
</script>

</body>
</html>
