<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判報名</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f5f6f8;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#ffffff;
  border-bottom:1px solid #ddd;
}

.main{
  padding:20px;
}

.panel{
  background:#fff;
  padding:16px;
  border-radius:6px;
}

.game-row{
  border-bottom:1px solid #eee;
  padding:12px 0;
}

.game-row.full{
  background:#f4f4f4;
  color:#888;
}

.game-title{
  font-weight:bold;
  margin-bottom:4px;
}

.position-options{
  margin-top:6px;
  font-size:14px;
}

.position-options label{
  margin-right:12px;
}

.position-selected{
  display:none;
  margin-left:8px;
  font-weight:bold;
  color:#0b5ed7;
}

button{
  margin-top:16px;
  padding:6px 14px;
}
</style>
</head>

<body>

<div class="header">
  <div>可報名比賽</div>
  <div>
    <b id="u_name"></b>
    <a id="btnLogout" style="margin-left:12px;cursor:pointer;">登出</a>
  </div>
</div>

<div class="main">
  <div class="panel">
    <div id="gameList">載入中…</div>
    <button id="btnSubmit">送出報名</button>
  </div>
</div>

<script src="js/config.js"></script>
<script>
document.addEventListener('DOMContentLoaded', ()=>{

  const token = localStorage.getItem('token');
  const session = JSON.parse(localStorage.getItem('session_user')||'{}');
  if(!token){
    location.href = 'login.html';
    return;
  }

  document.getElementById('u_name').textContent = session.name;
  document.getElementById('btnLogout').onclick = ()=>{
    localStorage.clear();
    location.href='login.html';
  };

  const gameList = document.getElementById('gameList');
  const btnSubmit = document.getElementById('btnSubmit');

  function formatDate(v){
    const d = new Date(v);
    if(isNaN(d)) return v;
    return d.getFullYear() + '/' +
      String(d.getMonth()+1).padStart(2,'0') + '/' +
      String(d.getDate()).padStart(2,'0');
  }

  function positionText(p){
    return {
      auto:'排班',
      PU:'主審',
      U1:'一壘',
      U3:'三壘'
    }[p] || p;
  }

  function getAllowedPositions(n){
    if(n === 2) return ['auto','PU','U1'];
    if(n === 3) return ['auto','PU','U1','U3'];
    return ['auto'];
  }

  function callApi(q, cb){
    const f = 'cb_' + Date.now();
    window[f] = r => { delete window[f]; cb(r); };
    const s = document.createElement('script');
    s.src = API_URL + '?' + q + '&token=' + token + '&callback=' + f;
    document.body.appendChild(s);
  }

  function loadGames(){
    gameList.innerHTML = '載入中…';

    callApi('action=getSignableGames', res=>{
      if(res.result !== 'ok' || !res.games.length){
        gameList.innerHTML = '目前沒有可報名比賽';
        return;
      }

      gameList.innerHTML = '';

      res.games.forEach(g=>{
        const isFull = g.full === true;
        const allowed = getAllowedPositions(g.need_count);

        const radios = allowed.map(p=>{
          return `
            <label>
              <input type="radio"
                name="pos_${g.game_id}"
                value="${p}"
                ${p==='auto'?'checked':''}
                ${isFull?'disabled':''}>
              ${positionText(p)}
            </label>`;
        }).join('');

        const row = document.createElement('div');
        row.className = 'game-row' + (isFull ? ' full' : '');
        row.innerHTML = `
          <div class="game-title">
            ${formatDate(g.date)} ｜ ${g.category}
            ${isFull ? '（已額滿）' : ''}
          </div>
          <div>VS ｜ ${g.home_team || ''} ｜ ${g.field}</div>
          <div class="position-options">
            站位偏好：
            ${radios}
            <span class="position-selected">※ 已選擇：</span>
          </div>
        `;

        // ✅ 關鍵修正：只有使用者 change 才顯示「已選擇」
        row.querySelectorAll('input[type=radio]').forEach(radio=>{
          radio.addEventListener('change', ()=>{
            const span = row.querySelector('.position-selected');
            span.textContent = '※ 已選擇：' + positionText(radio.value);
            span.style.display = 'inline';
          });
        });

        gameList.appendChild(row);
      });
    });
  }

  btnSubmit.onclick = ()=>{
    const selections = [];
    document.querySelectorAll('.game-row').forEach(row=>{
      const radios = row.querySelectorAll('input[type=radio]');
      if(!radios.length) return;

      const name = radios[0].name;
      const gameId = name.replace('pos_','');
      const selected = row.querySelector('input[type=radio]:checked');
      if(selected){
        selections.push(gameId + ':' + selected.value);
      }
    });

    if(!selections.length){
      alert('尚未選擇任何比賽');
      return;
    }

    callApi(
      'action=judgeSignupByGames&games_with_position=' +
        encodeURIComponent(selections.join(',')),
      ()=>{
        alert('報名完成');
        loadGames();
      }
    );
  };

  loadGames();
});
</script>

</body>
</html>
