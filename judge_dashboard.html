<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判排班表</title>

<style>
body{margin:0;font-family:system-ui;background:#f5f6f8}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#0f3d5e;color:#fff}
.nav a{margin-right:16px;color:#fff;text-decoration:none;font-weight:500}
.nav a:hover{text-decoration:underline}
.main{padding:20px}
.panel{background:#fff;padding:16px;border-radius:6px}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{border:1px solid #dcdcdc;padding:6px 8px;text-align:center}
th{background:#e9eef3}
.badge{display:inline-block;padding:2px 10px;border-radius:999px;font-weight:600;color:#fff;background:#2c7be5}
.badge.gray{background:#999}
.badge.empty{background:#f1f1f1;color:#555;font-weight:normal}
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    index.html🏠 首頁</a>
    judge_dashboard.html🧑‍⚖️ 裁判報名</a>
  </div>
  <div>
    <span id="u_name"></span>
    <a id="btnLogout" style="margin-left:12px;cursor:pointer;color:#fff;">登出</a>
  </div>
</div>

<div class="main">
<div class="panel">
<h3>裁判排班表</h3>

<table>
<thead>
<tr>
<th>組別</th>
<th>日期</th>
<th>時間</th>
<th>客隊</th>
<th>主隊</th>
<th>地點</th>
<th>裁判數</th>
<th>主審</th>
<th>一壘</th>
<th>二壘</th>
<th>三壘</th>
</tr>
</thead>
<tbody id="gameBody">
<tr><td colspan="11">載入中…</td></tr>
</tbody>
</table>
</div>
</div>

js/config.jsscript>

<script>
const token = localStorage.getItem('token');
const user  = JSON.parse(localStorage.getItem('session_user')||'{}');
if(!token){location.href='login.html';}

document.getElementById('u_name').textContent = user.name||'';
document.getElementById('btnLogout').onclick=()=>{
  localStorage.clear();location.href='login.html';
};

function callApi(q,cb){
  const f='cb_'+Date.now();
  window[f]=(r)=>{delete window[f];cb(r)};
  const s=document.createElement('script');
  s.src=API_URL+'?'+q+'&token='+token+'&callback='+f;
  document.body.appendChild(s);
}

function judgeCell(name, needed){
  if(!needed) return '<span class="badge gray">不需要</span>';
  if(name)   return `<span class="badge">${name}</span>`;
  return '<span class="badge empty">尚未指派</span>';
}

callApi('action=getSignableGames', res=>{
  const tb=document.getElementById('gameBody');
  tb.innerHTML='';
  res.games.forEach(g=>{
    const n=g.need_count;
    const need={
      PU:true,
      U1:n>=2,
      U2:n===4,
      U3:n>=3
    };
    tb.innerHTML+=`
<tr>
<td>${g.category||''}</td>
<td>${g.date}</td>
<td>${g.time_range}</td>
<td>${g.away_team||''}</td>
<td>${g.home_team||''}</td>
<td>${g.field||''}</td>
<td>${n}人制</td>
<td>${judgeCell(g.occupied_positions.PU,need.PU)}</td>
<td>${judgeCell(g.occupied_positions.U1,need.U1)}</td>
<td>${judgeCell(g.occupied_positions.U2,need.U2)}</td>
<td>${judgeCell(g.occupied_positions.U3,need.U3)}</td>
</tr>`;
  });
});
</script>

</body>
</html>
