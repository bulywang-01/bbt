<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判報名</title>
<style>
body{margin:0;font-family:system-ui;background:#f5f6f8}
.header{padding:12px 20px;background:#fff;border-bottom:1px solid #ddd}
.panel{margin:20px;padding:16px;background:#fff;border-radius:6px}
.game{border-bottom:1px solid #eee;padding:6px}
.full{color:#999}
</style>
</head>
<body>

<div class="header">
  <a href="index.html">🏠 首頁</a>
</div>

<div class="panel">
  <h3>可報名比賽</h3>
  <div id="gamesBox">載入中…</div>
  <button onclick="submit()">送出報名</button>
</div>

<div class="panel">
  <h3>我的報名</h3>
  <div id="myBox">載入中…</div>
</div>

<script src="js/config.js"></script>
<script>
const token=localStorage.getItem('token');
if(!token) location.replace('login.html');
const selected=new Set();

function callApi(q,cb){
  const fn='cb'+Date.now();
  window[fn]=r=>{delete window[fn];cb(r);}
  const s=document.createElement('script');
  s.src=API_URL+'?'+q+'&token='+token+'&callback='+fn;
  document.body.appendChild(s);
}

function loadGames(){
  callApi('action=getSignableGames',r=>{
    gamesBox.innerHTML='';
    r.games.forEach(g=>{
      const d=document.createElement('div');
      d.className='game'+(g.full?' full':'');
      d.innerHTML=
        `<label>
          <input type="checkbox" ${g.full?'disabled':''}
           onchange="this.checked?selected.add('${g.game_id}'):selected.delete('${g.game_id}')">
          ${g.date} ${g.tournament} ${g.category}
          ${g.home_team} vs ${g.away_team}
          (${g.signed_count}/${g.need_count})
        </label>`;
      gamesBox.appendChild(d);
    });
  });
}

function submit(){
  if(!selected.size){alert('請選擇比賽');return;}
  callApi('action=judgeSignupByGames&game_ids='+Array.from(selected).join(','),r=>{
    alert('報名完成');
    selected.clear();
    loadGames();
    loadMy();
  });
}

function loadMy(){
  callApi('action=getMyGameSignups',r=>{
    if(!r.signups.length){myBox.textContent='尚無';return;}
    myBox.innerHTML='<ul>'+r.signups.map(s=>`<li>${s.games.length} 場 (${s.status})</li>`).join('')+'</ul>';
  });
}

loadGames();
loadMy();
</script>
</body>
</html>
