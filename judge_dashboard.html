<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判報名</title>

<style>
body{margin:0;font-family:system-ui;background:#f5f6f8}

/* ===== Header ===== */
.header{
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
  background:#fff;
  border-bottom:1px solid #ddd
}
.nav a{
  margin-right:16px;
  color:#0066cc;
  text-decoration:none;
  font-weight:500
}
.nav a:hover{text-decoration:underline}
.user-info a{margin-left:12px;cursor:pointer}

/* ===== Main ===== */
.main{padding:20px}
.panel{
  background:#fff;
  padding:16px;
  border-radius:6px;
  margin-bottom:24px
}

/* ===== Tables ===== */
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:8px;border-bottom:1px solid #eee;text-align:center}
th{background:#f0f2f5}

tr.full{background:#ffecec;color:#a8071a}
.status{font-weight:bold}
.status.open{color:#389e0d}
.status.full{color:#cf1322}

.status.pending{color:#d48806}
.status.approved{color:#389e0d}
.status.rejected{color:#cf1322}

button{padding:6px 14px}

/* ===== My signup layout ===== */
.my-grid{
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:20px
}
h4{margin-top:0}
</style>
</head>

<body>

<!-- ===== Header ===== -->
<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="judge_dashboard.html">🧑‍⚖️ 裁判報名</a>
  </div>
  <div>
    <b id="u_name"></b>
    <a onclick="logout()" style="margin-left:12px;cursor:pointer">🚪 登出</a>
  </div>
</div>


<div class="main">

  <!-- ================= 可報名比賽（比賽導向） ================= -->
  <div class="panel">
    <h3>可報名比賽</h3>
    <table>
      <thead>
        <tr>
          <th>選取</th>
          <th>日期</th>
          <th>盃賽</th>
          <th>組別</th>
          <th>對戰</th>
          <th>場地</th>
          <th>裁判數</th>
          <th>狀態</th>
        </tr>
      </thead>
      <tbody id="gamesBody">
        <tr><td colspan="8">載入中…</td></tr>
      </tbody>
    </table>
    <br>
    <button onclick="submitSignup()">送出報名</button>
  </div>

  <!-- ================= 我的報名（人導向） ================= -->
  <div class="panel">
    <h3>我的報名</h3>

    <div class="my-grid">

      <!-- 左：進行中 / 已核准 -->
      <div>
        <h4>📌 進行中 / 已核准</h4>
        <table>
          <thead>
            <tr>
              <th>日期</th><th>組別</th><th>對戰</th><th>場地</th><th>狀態</th>
            </tr>
          </thead>
          <tbody id="myActive">
            <tr><td colspan="5">載入中…</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 右：退回 -->
      <div>
        <h4>❌ 退回</h4>
        <table>
          <thead>
            <tr>
              <th>日期</th><th>組別</th><th>對戰</th><th>場地</th><th>狀態</th>
            </tr>
          </thead>
          <tbody id="myRejected">
            <tr><td colspan="5">載入中…</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

</div>

<!-- ========= Script ========= -->
<script src="js/config.js"></script>

<script>
const token = localStorage.getItem('token');
const session = JSON.parse(localStorage.getItem('session_user')||'{}');
if(!token) location.href='login.html';

u_name.textContent = session.name;

function logout(){
  localStorage.clear();
  location.href='login.html';
}

/* ===== utils ===== */
function formatDate(v){
  const d=new Date(v);
  return isNaN(d)?v:
    d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
}

function statusText(s){
  if(s==='approved') return '已核准';
  if(s==='rejected') return '退回';
  return '審核中';
}

/* JSONP */
function callApi(q,cb){
  const f='cb_'+Date.now();
  window[f]=r=>{delete window[f];cb(r);}
  const s=document.createElement('script');
  s.src=API_URL+'?'+q+'&token='+token+'&callback='+f;
  document.body.appendChild(s);
}

// ✅ DOM 參照一定要先抓
const gamesBody  = document.getElementById('gamesBody');
const myActive   = document.getElementById('myActive');
const myRejected = document.getElementById('myRejected');
const selected=new Set();

/* ===== 我的報名 ===== */
function loadMy(cb){
  callApi('action=getMyGameSignups',res=>{
    myActive.innerHTML='';
    myRejected.innerHTML='';

    if(!res.signups.length){
      myActive.innerHTML='<tr><td colspan="5">尚無報名</td></tr>';
      myRejected.innerHTML='<tr><td colspan="5">—</td></tr>';
      return;
    }

    res.signups.forEach(s=>{
      s.games.forEach(g=>{
        const row=`
          <tr>
            <td>${formatDate(g.date)}</td>
            <td>${g.category}</td>
            <td>${g.home_team} vs ${g.away_team}</td>
            <td>${g.field}</td>
            <td class="status ${s.status}">${statusText(s.status)}</td>
          </tr>`;
        if(s.status==='rejected'){
          myRejected.innerHTML+=row;
        }else{
          myActive.innerHTML+=row;
          selected.add(g.game_id);
        }
      });
    });

    if(cb) cb();
  });
}

/* ===== 可報名比賽 ===== */
function loadGames(){
  callApi('action=getSignableGames',res=>{
    gamesBody.innerHTML='';
    res.games.forEach(g=>{
      const isFull = g.signed_count >= g.need_count;
      gamesBody.innerHTML+=`
        <tr class="${isFull?'full':''}">
          <td>
            <input type="checkbox"
              value="${g.game_id}"
              ${isFull?'disabled':''}
              onchange="this.checked?selected.add(this.value):selected.delete(this.value)">
          </td>
          <td>${formatDate(g.date)}</td>
          <td>${g.tournament}</td>
          <td>${g.category}</td>
          <td>${g.home_team} vs ${g.away_team}</td>
          <td>${g.field}</td>
          <td>${g.signed_count}/${g.need_count}</td>
          <td class="status ${isFull?'full':'open'}">
            ${isFull?'已滿額':'報名中'}
          </td>
        </tr>`;
    });
  });
}

/* ===== submit ===== */
function submitSignup(){
  if(!selected.size){alert('請選擇比賽');return;}
  callApi(
    'action=judgeSignupByGames&game_ids='+Array.from(selected).join(','),
    ()=>{
      alert('報名完成');
      refreshAll();
    }
  );
}

function refreshAll(){
  selected.clear();
  loadMy(loadGames);
}

/* init + polling */
refreshAll();
setInterval(refreshAll,10000);
</script>

</body>
</html>
