<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>裁判報名表</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system;
      background: #f5f6f8;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: #0f3d5e;
      color: #fff;
    }
    .nav a {
      margin-right: 16px;
      color: #fff;
      text-decoration: none;
      font-weight: 500;
    }

    .main { padding: 20px; }
    .panel {
      background: #fff;
      padding: 16px;
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border: 1px solid #dcdcdc;
      padding: 6px 8px;
      text-align: center;
      vertical-align: middle;
    }
    th { background: #e9eef3; }

    tr.full { background: #fff3f6; }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 13px;
      background: #2c7be5;
      color: #fff;
      white-space: nowrap;
    }
    .badge.me {
      background: #ffd6e5;
      color: #0f3d5e;
    }
    .badge.gray {
      background: #999;
      color: #fff;
    }

    label.option {
      white-space: nowrap;
      cursor: pointer;
    }

    button {
      margin-top: 12px;
      padding: 8px 18px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="judge_dashboard.html">🧑‍⚖️ 裁判報名</a>
  </div>
  <div>
    <span id="u_name"></span>
    <a id="btnLogout" style="margin-left:12px;cursor:pointer;color:#fff;">登出</a>
  </div>
</div>

<div class="main">
<div class="panel">
<h3>裁判報名表</h3>

<table>
<thead>
<tr>
  <th>日期</th>
  <th>組別</th>
  <th>時間</th>
  <th>客隊</th>
  <th>主隊</th>
  <th>地點</th>
  <th>裁判制</th>
  <th>主審</th>
  <th>一壘</th>
  <th>二壘</th>
  <th>三壘</th>
</tr>
</thead>
<tbody id="gameBody">
<tr><td colspan="11">載入中…</td></tr>
</tbody>
</table>

<button id="btnSubmit">送出報名</button>
</div>
</div>

<!-- ✅ 正確的 JS 載入（重點） -->
<script src="js/config.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {

  const token = localStorage.getItem('token');
  const session = JSON.parse(localStorage.getItem('session_user') || '{}');
  if (!token) {
    location.href = 'login.html';
    return;
  }

  document.getElementById('u_name').textContent = session.name || '';
  document.getElementById('btnLogout').onclick = () => {
    localStorage.clear();
    location.href = 'login.html';
  };

  const gameBody = document.getElementById('gameBody');

  function callApi(q, cb) {
    const f = 'cb_' + Date.now();
    window[f] = r => { delete window[f]; cb(r); };
    const s = document.createElement('script');
    s.src = API_URL + '?' + q + '&token=' + token + '&callback=' + f;
    document.body.appendChild(s);
  }

  function needRole(cnt, role) {
    if (cnt >= 4) return true;
    if (cnt === 3) return role !== 'U2';
    if (cnt === 2) return role === 'PU' || role === 'U1';
    if (cnt === 1) return role === 'PU';
    return false;
  }

  function renderCell(g, role) {
    if (!needRole(g.need_count, role)) {
      return '<span class="badge gray">不需要</span>';
    }

    const name = (g.occupied_positions || {})[role];
    if (name) {
      const cls = g.my_position === role ? 'badge me' : 'badge';
      return `<span class="${cls}">${name}</span>`;
    }

    return `
      <label class="option">
        <input type="radio" name="pos_${g.game_id}" value="${role}">
        ${role}
      </label>
    `;
  }

  function loadGames() {
    callApi('action=getSignableGames', res => {

      if (!res || !Array.isArray(res.games)) {
        gameBody.innerHTML = '<tr><td colspan="11">讀取失敗</td></tr>';
        return;
      }

      // ✅ 排序：日期 → 組別 → 時間
      const data = res.games.slice().sort((a,b) => {
        if (a.date !== b.date) return a.date.localeCompare(b.date);
        if (a.category !== b.category) return a.category.localeCompare(b.category);
        return a.time_range.localeCompare(b.time_range);
      });

      gameBody.innerHTML = '';

      let dateStart = 0;
      while (dateStart < data.length) {
        let dateEnd = dateStart;
        while (dateEnd < data.length && data[dateEnd].date === data[dateStart].date) {
          dateEnd++;
        }

        let catStart = dateStart;
        while (catStart < dateEnd) {
          let catEnd = catStart;
          while (catEnd < dateEnd && data[catEnd].category === data[catStart].category) {
            catEnd++;
          }

          for (let i = catStart; i < catEnd; i++) {
            const g = data[i];
            const tr = document.createElement('tr');
            if (g.full) tr.classList.add('full');

            if (i === dateStart) {
              const td = document.createElement('td');
              td.rowSpan = dateEnd - dateStart;
              td.textContent = g.date;
              tr.appendChild(td);
            }

            if (i === catStart) {
              const td = document.createElement('td');
              td.rowSpan = catEnd - catStart;
              td.textContent = g.category;
              tr.appendChild(td);
            }

            tr.innerHTML += `
              <td>${g.time_range}</td>
              <td>${g.away_team}</td>
              <td>${g.home_team}</td>
              <td>${g.field}</td>
              <td>${g.need_count}人制</td>
              <td>${renderCell(g,'PU')}</td>
              <td>${renderCell(g,'U1')}</td>
              <td>${renderCell(g,'U2')}</td>
              <td>${renderCell(g,'U3')}</td>
            `;

            gameBody.appendChild(tr);
          }

          catStart = catEnd;
        }

        dateStart = dateEnd;
      }
    });
  }

  document.getElementById('btnSubmit').onclick = () => {
    const sel = [];
    document.querySelectorAll('input[type=radio]:checked').forEach(r => {
      sel.push(r.name.replace('pos_','') + ':' + r.value);
    });

    if (!sel.length) {
      alert('尚未選擇任何站位');
      return;
    }

    callApi(
      'action=judgeSignupByGames&games_with_position=' +
      encodeURIComponent(sel.join(',')),
      () => {
        alert('報名完成');
        loadGames();
      }
    );
  };

  loadGames();
});
</script>

</body>
</html>
