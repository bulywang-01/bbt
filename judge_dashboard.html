<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判報名</title>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system;
  background:#f5f6f8;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#ffffff;
  border-bottom:1px solid #ddd;
}
.nav a{
  margin-right:16px;
  color:#0066cc;
  text-decoration:none;
  font-weight:500;
}
.user-box a{
  margin-left:12px;
  color:#c00;
  text-decoration:none;
}

.main{ padding:20px }

.panel{
  background:#fff;
  padding:16px;
  border-radius:6px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
  margin-bottom:24px;
}

h2{ margin-top:0 }
h3{ margin:24px 0 8px }

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  font-size:14px;
}
th,td{
  border:1px solid #dcdcdc;
  padding:6px 8px;
  text-align:center;
}
th{ background:#eef2f6 }

.badge{
  padding:2px 8px;
  border-radius:999px;
  font-size:13px;
  display:inline-block;
  background:#2c7be5;
  color:#fff;
}
.badge.me{
  background:#ffd6e5;
  color:#0f3d5e;
}

tr.full{ background:#ffecec }
tr.expired{ background:#f2f2f2; color:#999 }

button{ padding:8px 16px; margin-top:16px }

/* 站位黑格（不需裁判） */
.cell-na {
  background: #000;
  color: #000;
}

/* 站位表格格子 */
.pos-cell {
  min-width: 70px;
}

td.cell-na {
  background: #000;
  color: #000;
}

/* 裁判姓名顯示（取代 badge） */
.judge-name {
  font-size: 16px;
  font-weight: bold;
  color: #0b3c8a; /* 深藍色 */
}

/* 自己報名的裁判姓名 */
.judge-name.me {
  font-weight: 900;
  color: #2e7d32;  /* 深綠色 */
}

/* 星星（自己） */
.judge-star {
  margin-right: 4px;
  color: #2e7d32;
  opacity: 0.85;
}

/* 上方篩選列 */
.filter-bar {
  margin-bottom: 16px;
  font-size: 16px;        /* 整體放大 */
}

.filter-bar select,
.filter-bar input,
.filter-bar label {
  font-size: 16px;
}

.filter-bar select {
  padding: 4px 6px;
}

.filter-bar input[type="checkbox"] {
  transform: scale(1.2); /* 勾勾放大 */
  margin-right: 4px;
}

.filter-bar input[type="text"] {
  padding: 4px 6px;
}

/* 取消選擇按鈕 */
.cancel-btn {
  margin-left: 4px;
  cursor: pointer;
  font-weight: bold;
  color: #c00;
  font-size: 14px;
}

.cancel-btn:hover {
  opacity: 0.7;
}

</style>
</head>

<!-- <body> -->
  
<!-- 共用 Header -->
<body data-page-title="裁判報名">
<div id="header"></div>

<!--
<div class="header">
  <div class="nav">
    <a href="index.html">🏠 系統首頁</a>
    <a href="judge_dashboard.html">📋 裁判報名</a>
  </div>
  <div class="user-box">
    <span id="u_name"></span>
    <a href="#" onclick="logout()">登出</a>
  </div>
</div>
-->
  
<div class="main">
  <!-- 篩選 -->
  <div class="filter-bar">
    <select id="filterRange" onchange="render()">
      <option value="all">全部</option>
      <option value="month">本月</option>
      <option value="week">本週</option>
    </select>

    <label style="margin-left:10px;">
      <input type="checkbox" id="showPast" onchange="render()"> 顯示過期賽事
    </label>

    <input
      type="text"
      id="keyword"
      placeholder="搜尋球隊 / 場地 / 組別"
      style="margin-left:8px;"
      oninput="render()"
    >
  </div>

  <div id="content"></div>

  <!--
  <button onclick="cancelSelectedByDate()">取消當日選擇</button>
  <button onclick="cancelAllSelected()" style="margin-left:8px;">
  全部取消
  </button>
  -->
  <button onclick="submitSignup()">送出報名</button>
</div>

<script src="js/config.js"></script>

<script>
/* ===== 給共用header.html使用 ===== */

document.addEventListener('DOMContentLoaded', () => {
  fetch('header.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('header').innerHTML = html;

      // 設定頁面標題
      const title = document.body.dataset.pageTitle;
      if (title) {
        const el = document.querySelector('.page-title');
        if (el) el.textContent = title;
      }
    });

  // 原本的初始化
  const session = JSON.parse(localStorage.getItem('session_user') || '{}');
  if (!session.user_id) {
    location.replace('login.html');
    return;
  }
  document.getElementById('u_name').textContent = session.name || '';
  loadGames();
});

/* ===== 狀態 ===== */
let allGames = [];
let selectedPositions = {}; // game_id -> role

/* ===== 初始化 ===== */
document.addEventListener('DOMContentLoaded', () => {
  const session = JSON.parse(localStorage.getItem('session_user') || '{}');
  if (!session.user_id) {
    location.replace('login.html');
    return;
  }
  document.getElementById('u_name').textContent = session.name || '';
  loadGames();
});

/* ===== API ===== */
function loadGames() {
  const session = JSON.parse(localStorage.getItem('session_user') || {});
  callApi(
    { action:'getSignableGames', user_id: session.user_id || '' },
    res => {
      if (!res || res.result !== 'ok') {
        alert(res?.message || '無法取得賽事資訊');
        return;
      }
      allGames = res.games || [];
      render();
    }
  );
}

/* ===== 工具 ===== */
function cancelSelected(gameId) {
  delete selectedPositions[gameId];
  render();
}
  
function cancelSelectedByDate() {
  if (!Object.keys(selectedPositions).length) {
    alert('目前沒有已選擇的站位');
    return;
  }

  const date = prompt('請輸入要取消的日期（yyyy/MM/dd）');
  if (!date) return;

  let removed = 0;

  allGames.forEach(g => {
    if (g.date === date && selectedPositions[g.game_id]) {
      delete selectedPositions[g.game_id];
      removed++;
    }
  });

  if (!removed) {
    alert('該日期沒有已選擇的站位');
  } else {
    alert(`已取消 ${date} 的 ${removed} 筆選擇`);
    render();
  }
}

function formatTime(t){
  const d = new Date(t);
  return d.getHours().toString().padStart(2,'0') + ':' +
         d.getMinutes().toString().padStart(2,'0');
}

function rememberSelection(gameId, role){
  selectedPositions[gameId] = role;
}

/* ===== 產置出表格及內容 ===== */
function render() {

  function timeToMinutes(t){
  const d = new Date(t);
  return d.getHours() * 60 + d.getMinutes();
  }

  const box = document.getElementById('content');
  box.innerHTML = '';

  if (!allGames || allGames.length === 0) {
    box.innerHTML = '<div class="panel">目前沒有可報名賽事</div>';
    return;
  }

  const range = filterRange.value;
  const showPastChecked = showPast.checked;
  const kw = keyword.value.trim();

  const today = new Date();
  today.setHours(0,0,0,0);

  /* ===== 工具 ===== */
  function formatTime(t){
    const d = new Date(t);
    return d.getHours().toString().padStart(2,'0') + ':' +
           d.getMinutes().toString().padStart(2,'0');
  }

  function inThisMonth(dateStr) {
    const d = new Date(dateStr.replace(/\//g,'-'));
    return d.getFullYear() === today.getFullYear() &&
           d.getMonth() === today.getMonth();
  }

  function inThisWeek(dateStr) {
    const d = new Date(dateStr.replace(/\//g,'-'));
    const s = new Date(today);
    s.setDate(today.getDate() - today.getDay());
    const e = new Date(s);
    e.setDate(s.getDate() + 6);
    return d >= s && d <= e;
  }

  /* ===== 前置篩選 ===== */
  const filtered = allGames.filter(g => {
    const gd = new Date(g.date.replace(/\//g,'-'));
    if (gd < today && !showPastChecked) return false;
    if (range === 'month' && !inThisMonth(g.date)) return false;
    if (range === 'week' && !inThisWeek(g.date)) return false;
    if (kw) {
      const txt = `${g.away_team} ${g.home_team} ${g.field} ${g.category}`;
      if (!txt.includes(kw)) return false;
    }
    return true;
  });

  if (!filtered.length) {
    box.innerHTML = '<div class="panel">沒有符合條件的賽事</div>';
    return;
  }

  /* ===== 依年月分組 ===== */
  const groups = {};
  filtered.forEach(g => {
    const m = g.date.slice(0,7); // yyyy/MM
    if (!groups[m]) groups[m] = [];
    groups[m].push(g);
  });

  /* ===== 逐月輸出 ===== */
  Object.keys(groups).sort().forEach(month => {

    const h3 = document.createElement('h3');
    h3.textContent = `${month} 月`;
    box.appendChild(h3);

    const panel = document.createElement('div');
    panel.className = 'panel';

    const table = document.createElement('table');
    table.innerHTML = `
      <thead>
        <tr>
          <th>日期</th>
          <th>時間</th>
          <th>組別</th>
          <th>客隊</th>
          <th>主隊</th>
          <th>場地</th>
          <th>時長</th>
          <th>裁判數</th>
          <th class="pos-cell">主審</th>
          <th class="pos-cell">一壘</th>
          <th class="pos-cell">二壘</th>
          <th class="pos-cell">三壘</th>
        </tr>
      </thead>
      <tbody></tbody>
    `;
    const tbody = table.querySelector('tbody');

    // let lastTime = null;
    let lastDate = null;
    let zebra = false;

    groups[month]
      .sort((a, b) => {
        // 先比日期
        if (a.date !== b.date) {
          return a.date.localeCompare(b.date);
        }
        // 同一天再比時間
        return timeToMinutes(a.time_range) - timeToMinutes(b.time_range);
      })

      .forEach(g => {

        const tr = document.createElement('tr');

        const gd = new Date(g.date.replace(/\//g,'-'));
        const isPast = gd < today;

        if (isPast) tr.classList.add('expired');

        /* zebra（同月不同時間） */
        //if (g.time_range !== lastTime) {
        //  zebra = !zebra;
        //  lastTime = g.time_range;
        //}
        if (g.date !== lastDate) {
          zebra = !zebra;
          lastDate = g.date;
        }
        if (zebra) tr.style.backgroundColor = '#fafafa';

        /* 滿額覆蓋 */
        const filled = Object.keys(g.occupied_positions || {}).length;
        if (filled >= g.need_count) tr.classList.add('full');

        /* ===== 站位格 ===== */
        function renderPos(role) {
          // 不需裁判 → 整格黑
          if (
            g.need_count === 0 ||
            (g.need_count === 1 && role !== 'PU') ||
            (g.need_count === 2 && ['U2','U3'].includes(role)) ||
            (g.need_count === 3 && role === 'U2')
          ) {
            return '__NA__';
          }
        
          // 已佔用（approved）
          if (g.occupied_positions && g.occupied_positions[role]) {
            const isMe = g.my_position === role;
            if (isMe) {
              return `
                <div class="judge-name me">
                  <span class="judge-star">★</span>${g.occupied_positions[role]}
                </div>`;
            }
            return `<div class="judge-name">${g.occupied_positions[role]}</div>`;
          }
        
          // 尚未送出，且是我選的
          if (selectedPositions[g.game_id] === role) {
            return `
              <label>
                <input type="radio" checked>
                ${role}
              </label>
              <span class="cancel-btn"
                    onclick="cancelSelected('${g.game_id}')">✖</span>
            `;
          }
        
          // 尚未選
          return `
            <label>
              <input type="radio"
                     onchange="rememberSelection('${g.game_id}','${role}')">
              ${role}
            </label>
          `;
        }

        tr.innerHTML = `
          <td>${g.date}</td>
          <td>${formatTime(g.time_range)}</td>
          <td>${g.category || ''}</td>
          <td>${g.away_team || ''}</td>
          <td>${g.home_team || ''}</td>
          <td>${g.field || ''}</td>
          <td>${g.duration || ''}</td>
          <td>${g.need_count}</td>${(() => {
          const v = renderPos('PU');
          if (v === '__NA__') return '<td class="pos-cell cell-na"></td>';
          return `<td class="pos-cell">${v}</td>`;
        })()}
        ${(() => {
          const v = renderPos('U1');
          if (v === '__NA__') return '<td class="pos-cell cell-na"></td>';
          return `<td class="pos-cell">${v}</td>`;
        })()}
        ${(() => {
          const v = renderPos('U2');
          if (v === '__NA__') return '<td class="pos-cell cell-na"></td>';
          return `<td class="pos-cell">${v}</td>`;
        })()}
        ${(() => {
          const v = renderPos('U3');
          if (v === '__NA__') return '<td class="pos-cell cell-na"></td>';
          return `<td class="pos-cell">${v}</td>`;
        })()}

        `;

        tbody.appendChild(tr);
      });

    panel.appendChild(table);
    box.appendChild(panel);
  });
}


/* ===== 送出 ===== */

function submitSignup(){
  const entries = Object.keys(selectedPositions);
  if (!entries.length){
    alert('尚未選擇站位');
    return;
  }

  const session = JSON.parse(localStorage.getItem('session_user') || {});
  if (!session.user_id) {
    alert('登入狀態已失效，請重新登入');
    location.replace('login.html');
    return;
  }

  const payload = entries.map(
    id => `${id}:${selectedPositions[id]}`
  );

 /* 
 callApi(
    {
      action: 'judgeSignupByGames',
      user_id: session.user_id,                // ✅ 關鍵補這行
      games_with_position: payload.join(',')
    },
    res => {
      if (res && res.result === 'ok') {
        alert(res.message || '報名已送出，等待系統確認');
        selectedPositions = {}; // 清空暫存選擇
        loadGames();
      } else {
        alert(res?.message || '報名失敗');
      }
    }
  );
*/

  callApi(
  {
    action: 'judgeSignupByGames',
    user_id: session.user_id,
    games_with_position: payload.join(',')
  },
  res => {
    console.log('Signup API raw response:', res);
    alert(JSON.stringify(res));
  }
);
}
  
function logout(){
  localStorage.clear();
  location.replace('login.html');
}
</script>

</body>
</html>
