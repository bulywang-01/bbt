<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判報名</title>

<style>
body{margin:0;font-family:system-ui;background:#f5f6f8}

/* ===== Header ===== */
.header{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 20px;background:#fff;border-bottom:1px solid #ddd
}
.nav a{
  margin-right:16px;
  color:#0066cc;
  text-decoration:none;
  font-weight:500
}
.nav a.active{
  font-weight:bold;
  text-decoration:underline
}
.nav a:hover{text-decoration:underline}
.user-info a{margin-left:12px;cursor:pointer}

/* ===== Main ===== */
.main{padding:20px}
.panel{
  background:#fff;
  padding:16px;
  border-radius:6px;
  margin-bottom:24px
}

/* ===== Tables ===== */
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:8px;border-bottom:1px solid #eee;text-align:center}
th{background:#f0f2f5}

/* ===== 賽事狀態 ===== */
tr.full{background:#ffecec;color:#a8071a}
tr.signed-by-me{background:#fffbe6} /* ✅ 我已報名但未滿額 */

.status{font-weight:bold}
.status.open{color:#389e0d}
.status.full{color:#cf1322}

/* ===== 個人狀態 ===== */
.status.pending{color:#d48806}
.status.approved{color:#389e0d}
.status.rejected{color:#cf1322}

/* ===== 我的報名版面 ===== */
.my-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px
}

.hidden{display:none}
button{padding:6px 14px}
</style>
</head>

<body>

<!-- ===== Header ===== -->
<div class="header">
  <div class="nav">
    <a href="index.html">首頁</a>
    <a href="#" id="tabGames" class="active">報名賽事</a>
    <a href="#" id="tabMy">我的報名</a>
  </div>
  <div class="user-info">
    <b id="u_name"></b>
    <a id="btnLogout">登出</a>
  </div>
</div>

<div class="main">

  <!-- ===== 報名賽事 ===== -->
  <div class="panel" id="panelGames">
    <h3>可報名比賽</h3>
    <table>
      <thead>
        <tr>
          <th>選取</th>
          <th>日期</th>
          <th>盃賽</th>
          <th>組別</th>
          <th>對戰</th>
          <th>場地</th>
          <th>裁判需求</th>
          <th>狀態</th>
        </tr>
      </thead>
      <tbody id="gamesBody">
        <tr><td colspan="8">載入中…</td></tr>
      </tbody>
    </table>
    <br>
    <button id="btnSubmit">送出報名</button>
    <div style="margin-top:10px;font-size:16px;color:#666">
  ※ 如需刪除報名，僅需將已勾選的場次取消勾選後，再點擊「送出報名」即可，已滿額賽事無法取消。
    </div>

  </div>

  <!-- ===== 我的報名 ===== -->
  <div class="panel hidden" id="panelMy">
    <h3>我的報名</h3>
    <div class="my-grid">

      <div>
        <h4>進行中 / 已核准</h4>
        <table>
          <thead>
            <tr>
              <th>日期</th><th>組別</th><th>對戰</th><th>場地</th><th>狀態</th>
            </tr>
          </thead>
          <tbody id="myActive"><tr><td colspan="5">載入中…</td></tr></tbody>
        </table>
      </div>

      <div>
        <h4>退回</h4>
        <table>
          <thead>
            <tr>
              <th>日期</th><th>組別</th><th>對戰</th><th>場地</th><th>狀態</th>
            </tr>
          </thead>
          <tbody id="myRejected"><tr><td colspan="5">載入中…</td></tr></tbody>
        </table>
      </div>

    </div>
  </div>

</div>

<script src="js/config.js"></script>
  
<script>
document.addEventListener('DOMContentLoaded',()=>{

  const token = localStorage.getItem('token');
  const session = JSON.parse(localStorage.getItem('session_user')||'{}');
  if(!token){location.href='login.html';return;}

  const uName=document.getElementById('u_name');
  const btnLogout=document.getElementById('btnLogout');
  uName.textContent=session.name;
  btnLogout.onclick=()=>{localStorage.clear();location.href='login.html';};

  /* ===== Tab ===== */
  const tabGames=document.getElementById('tabGames');
  const tabMy=document.getElementById('tabMy');
  const panelGames=document.getElementById('panelGames');
  const panelMy=document.getElementById('panelMy');

  tabGames.onclick=e=>{
    e.preventDefault();
    tabGames.classList.add('active');
    tabMy.classList.remove('active');
    panelGames.classList.remove('hidden');
    panelMy.classList.add('hidden');
  };
  tabMy.onclick=e=>{
    e.preventDefault();
    tabMy.classList.add('active');
    tabGames.classList.remove('active');
    panelMy.classList.remove('hidden');
    panelGames.classList.add('hidden');
  };

  const gamesBody=document.getElementById('gamesBody');
  const myActive=document.getElementById('myActive');
  const myRejected=document.getElementById('myRejected');
  const btnSubmit=document.getElementById('btnSubmit');

  const selected=new Set();
  let myStatusMap={};

  function formatDate(v){
    const d=new Date(v);
    return isNaN(d)?v:
      d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
  }
  function personStatusText(s){
    if(s==='approved') return '已核准';
    if(s==='rejected') return '退回';
    return '審核中';
  }
  function matchStatusText(g){
    const lack=g.need_count-g.signed_count;
    return lack<=0?'已滿額':`尚缺 ${lack} 人`;
  }
  function callApi(q,cb){
    const f='cb_'+Date.now();
    window[f]=r=>{delete window[f];cb(r);};
    const s=document.createElement('script');
    s.src=API_URL+'?'+q+'&token='+token+'&callback='+f;
    document.body.appendChild(s);
  }

  function loadMy(next){
    myActive.innerHTML='';
    myRejected.innerHTML='';
    myStatusMap={};

    callApi('action=getMyGameSignups',res=>{
      if(!res.signups.length){
        myActive.innerHTML='<tr><td colspan="5">尚無報名</td></tr>';
        myRejected.innerHTML='<tr><td colspan="5">—</td></tr>';
        if(next)next();return;
      }

      res.signups.forEach(s=>{
        s.games.forEach(g=>{
          myStatusMap[g.game_id]=s.status;
          const row=`
            <tr>
              <td>${formatDate(g.date)}</td>
              <td>${g.category}</td>
              <td>${g.home_team} vs ${g.away_team}</td>
              <td>${g.field}</td>
              <td class="status ${s.status}">${personStatusText(s.status)}</td>
            </tr>`;
          if(s.status==='rejected') myRejected.innerHTML+=row;
          else myActive.innerHTML+=row;
        });
      });
      if(next)next();
    });
  }

  function loadGames(){
    gamesBody.innerHTML='';
    selected.clear();

    callApi('action=getSignableGames',res=>{
      res.games.forEach(g=>{
        const myStatus=myStatusMap[g.game_id];
        const hasSigned=myStatus && myStatus!=='rejected';
        const full=g.signed_count>=g.need_count;
        const disabled=full || hasSigned;

        if(hasSigned) selected.add(g.game_id);

        const rowClass = full ? 'full' : hasSigned ? 'signed-by-me' : '';

        gamesBody.innerHTML+=`
          <tr class="${rowClass}">
            <td>
              <input type="checkbox"
                value="${g.game_id}"
                ${selected.has(g.game_id)?'checked':''}
                ${disabled?'disabled':''}>
            </td>
            <td>${formatDate(g.date)}</td>
            <td>${g.tournament}</td>
            <td>${g.category}</td>
            <td>${g.home_team} vs ${g.away_team}</td>
            <td>${g.field}</td>
            <td>${g.need_count} 人制</td>
            <td class="status ${full?'full':'open'}">${matchStatusText(g)}</td>
          </tr>`;
      });
    });
  }

  btnSubmit.onclick=()=>{
    if(!selected.size){alert('請選擇比賽');return;}
    callApi(
      'action=judgeSignupByGames&game_ids='+Array.from(selected).join(','),
      ()=>{alert('報名完成');refresh();}
    );

    const ids = Array.from(
    document.querySelectorAll('#gamesBody input[type=checkbox]:checked')
  ).map(cb => cb.value);

  console.log('📤 實際送出的 game_ids =', ids);

  callApi(
    'action=judgeSignupByGames&game_ids=' + ids.join(','),
    () => {
      alert('已送出');
      refresh();
    }
  );
};
  };

  function refresh(){loadMy(loadGames);}
  refresh();

  /* ✅ refresh：3 分鐘 */
  setInterval(refresh,180000);

});
</script>

</body>
</html>
