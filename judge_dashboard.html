<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判 Dashboard｜可報名比賽</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #f5f6f8;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  background: #ffffff;
  border-bottom: 1px solid #ddd;
}

.nav a {
  margin-right: 16px;
  color: #0066cc;
  text-decoration: none;
  font-weight: 500;
}

.nav a:hover {
  text-decoration: underline;
}

.main {
  padding: 20px;
}

.panel {
  background: #ffffff;
  padding: 16px;
  border-radius: 6px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid #eee;
  text-align: left;
}

th {
  background: #f0f2f5;
}

.badge-ended { color: #999; font-weight: bold; }
.badge-open { color: #0b5ed7; font-weight: bold; }

.action-btn {
  padding: 4px 10px;
  font-size: 13px;
  text-decoration: none;
  border: 1px solid #0066cc;
  border-radius: 4px;
  color: #0066cc;
}

.action-btn.disabled {
  pointer-events: none;
  border-color: #ccc;
  color: #aaa;
}
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    <a href="dashboard.html</a>
    <a href="judge_dashboard</a>
  </div>
  <div>
    <span id="u_name"></span>
    <a href="#" id="btnLogout<div class="main">
  <div class="panel">
    <h3>可報名比賽</h3>

    <table>
      <thead>
        <tr>
          <th>狀態</th>
          <th>日期</th>
          <th>組別</th>
          <th>對戰</th>
          <th>場地</th>
          <th>站位狀態</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="gameBody">
        <tr>
          <td colspan="7">載入中…</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script src="js/config"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const token = localStorage.getItem('token');
  const session = JSON.parse(localStorage.getItem('session_user') || '{}');

  if (!token) {
    location.href = 'login.html';
    return;
  }

  document.getElementById('u_name').textContent = session.name || '';
  document.getElementById('btnLogout').onclick = e => {
    e.preventDefault();
    localStorage.clear();
    location.href = 'login.html';
  };

  const body = document.getElementById('gameBody');

  function callApi(action, cb) {
    const cbName = 'cb_' + Date.now();
    window[cbName] = r => { delete window[cbName]; cb(r); };
    const s = document.createElement('script');
    s.src = API_URL + '?action=' + action + '&token=' + token + '&callback=' + cbName;
    document.body.appendChild(s);
  }

  callApi('getSignableGames', res => {
    body.innerHTML = '';

    if (!res || res.result !== 'ok') {
      body.innerHTML = '<tr><td colspan="7">無法讀取資料</td></tr>';
      return;
    }

    res.games.forEach(g => {
      const ended = g.past;
      const signed = g.signed;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>
          ${ended
            ? '<span class="badge-ended">已結束</span>'
            : '<span class="badge-open">進行中</span>'}
        </td>
        <td>${g.date}</td>
        <td>${g.category}</td>
        <td>${g.away_team || ''} vs ${g.home_team || ''}</td>
        <td>${g.field || ''}</td>
        <td>
          ${signed
            ? `已報名（${g.my_position || '排班'}）`
            : '尚未報名'}
        </td>
        <td>
          <a
            href="judge_dashboard.html?game=${g.game_id}"
            class="action-btn ${ended ? 'disabled' : '' `;
      body.appendChild(tr);
    });
  });
});
</script>

</body>
</html>
