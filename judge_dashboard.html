<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判報名</title>

<style>
body{font-family:system-ui;background:#f5f6f8;margin:0}
.header,.panel{background:#fff}
.header{padding:10px;border-bottom:1px solid #ccc}
.panel{margin:15px;padding:15px;border-radius:6px}
.full{color:red}
</style>
</head>
<body>

<div class="header">
  <a href="index.html">首頁</a>
  <a href="#" onclick="logout()">登出</a>
</div>

<div class="panel">
  👤 <span id="u_name"></span>
</div>

<div class="panel">
  <h3>可報名比賽</h3>
  <div id="gamesBox">載入中…</div>
  <button onclick="submitSignup()">送出報名</button>
</div>

<div class="panel">
  <h3>我的報名紀錄</h3>
  <div id="myList">載入中…</div>
</div>

<script src="js/config.js"></script>

<script>
const token = localStorage.getItem('token');
const session = JSON.parse(localStorage.getItem('session_user') || '{}');
document.getElementById('u_name').textContent = session.name || '';

const selected = new Set();

function loadGames(){
  const cb='cb_g_'+Date.now();
  window[cb]=res=>{
    const box=document.getElementById('gamesBox');
    box.innerHTML='';
    res.games.forEach(g=>{
      const disabled = g.full ? 'disabled' : '';
      box.innerHTML += `
        <label>
          <input type="checkbox" value="${g.game_id}" ${disabled}
                 onchange="toggle(this)">
          ${g.date} ${g.tournament} ${g.category}
          ${g.home_team} vs ${g.away_team}
          (${g.signed}/${g.need})
          ${g.full?'<span class="full">已滿</span>':''}
        </label><br>
      `;
    });
  };
  appendScript(`?action=getSignableGames&callback=${cb}`);
}

function toggle(cb){
  cb.checked ? selected.add(cb.value) : selected.delete(cb.value);
}

function submitSignup(){
  if(!selected.size){
    alert('請選擇比賽');
    return;
  }
  const cb='cb_s_'+Date.now();
  window[cb]=res=>{
    if(res.result==='ok'){
      alert('報名成功');
      selected.clear();
      loadGames();
      loadMySignups();
    }
  };
  appendScript(`?action=judgeSignupByGames&game_ids=${[...selected].join(',')}&callback=${cb}`);
}

function loadMySignups(){
  const cb='cb_m_'+Date.now();
  window[cb]=res=>{
    const box=document.getElementById('myList');
    if(res.signups.length===0){
      box.textContent='尚無報名紀錄';
      return;
    }
    box.innerHTML='<ul>'+res.signups
      .map(s=>`<li>${s.games.length} 場（${s.status}）</li>`)
      .join('')+'</ul>';
  };
  appendScript(`?action=getMyGameSignups&callback=${cb}`);
}

function appendScript(q){
  const s=document.createElement('script');
  s.src=API_URL+q+'&token='+token;
  document.body.appendChild(s);
}

function logout(){
  localStorage.clear();
  location.href='login.html';
}

loadGames();
loadMySignups();
</script>

</body>
</html>
