<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判報名</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f5f6f8;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#fff;
  border-bottom:1px solid #ddd;
}
.nav a{let cell = '';

if (g.signed) {
  cell = `已報名（站位：${posText[g.my_position] || '排班'}）`;
}
else if (g.position_mode !== 'allow_select') {
  cell = '排班';
}
else {
  cell = allowedPositions(g.need_count).map(p => {
    const occupied = g.occupied_positions.includes(p);
    const disabled = occupied || g.full || g.past;

    return `
      <label>
        <input type="radio"
          name="pos_${g.game_id}"
          value="${p}"
          ${disabled ? 'disabled' : ''}>
        ${posText[p] || p}
        ${occupied ? '（已有人）' : ''}
      </label>
    `;
  }).join(' ');
}
  margin-right:16px;
  color:#0066cc;
  text-decoration:none;
}
.nav a:hover{text-decoration:underline}
.main{padding:20px}
.panel{
  background:#fff;
  padding:16px;
  border-radius:6px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
th,td{
  padding:8px;
  border-bottom:1px solid #eee;
  vertical-align:top;
}
th{background:#f0f2f5}

tr.locked{
  background:#f3f3f3;
  color:#777;
}

.badge{
  font-weight:bold;
  color:#0b5ed7;
  margin-left:6px;
}

button{
  margin-top:16px;
  padding:6px 14px;
}
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    <a href="index.html">首頁</a>
    <a href="judge_dashboard.html">裁判報名</a>
  </div>
  <div>
    <b id="u_name"></b>
    <a id="btnLogout" style="margin-left:12px;cursor:pointer;">登出</a>
  </div>
</div>

<div class="main">
  <div class="panel">
    <h3>可報名比賽</h3>

    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>組別</th>
          <th>對戰</th>
          <th>場地</th>
          <th>站位偏好</th>
        </tr>
      </thead>
      <tbody id="gameBody">
        <tr><td colspan="5">載入中…</td></tr>
      </tbody>
    </table>

    <button id="btnSubmit">送出報名</button>
  </div>
</div>

<script src="js/config.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{

  const token = localStorage.getItem('token');
  const session = JSON.parse(localStorage.getItem('session_user')||'{}');
  if(!token){location.href='login.html';return;}
  document.getElementById('u_name').textContent=session.name;
  document.getElementById('btnLogout').onclick=()=>{
    localStorage.clear();location.href='login.html';
  };

  const gameBody=document.getElementById('gameBody');
  const btnSubmit=document.getElementById('btnSubmit');

  function formatDate(v){
    const d=new Date(v);
    return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
  }

  const posText={auto:'排班',PU:'主審',U1:'一壘',U3:'三壘'};

  function callApi(q,cb){
    const f='cb_'+Date.now();
    window[f]=r=>{delete window[f];cb(r);};
    const s=document.createElement('script');
    s.src=API_URL+'?'+q+'&token='+token+'&callback='+f;
    document.body.appendChild(s);
  }

  function loadGames(){
    gameBody.innerHTML='<tr><td colspan="5">載入中…</td></tr>';

    callApi('action=getSignableGames',res=>{
      gameBody.innerHTML='';
      res.games.forEach(g=>{
        const tr=document.createElement('tr');
        const locked=g.full||g.past||g.signed;

        if(locked) tr.classList.add('locked');

        let cell = '';
        
        if (g.signed) {
          cell = `已報名（站位：${posText[g.my_position] || '排班'}）`;
        }
        else if (g.position_mode !== 'allow_select') {
          cell = '排班';
        }
        else {
          cell = allowedPositions(g.need_count).map(p => {
            const occupied = g.occupied_positions.includes(p);
            const disabled = occupied || g.full || g.past;
        
            return `
              <label>
                <input type="radio"
                  name="pos_${g.game_id}"
                  value="${p}"
                  ${disabled ? 'disabled' : ''}>
                ${posText[p] || p}
                ${occupied ? '（已有人）' : ''}
              </label>
            `;
          }).join(' ');
        }

        tr.innerHTML=`
          <td>${formatDate(g.date)}</td>
          <td>${g.category}${g.full?'（已額滿）':''}${g.past?'（已結束）':''}</td>
          <td>${g.away_team} vs ${g.home_team}</td>
          <td>${g.field}</td>
          <td>${cell}</td>
        `;
        gameBody.appendChild(tr);
      });
    });
  }

  btnSubmit.onclick=()=>{
    const out=[];
    document.querySelectorAll('input[type=radio]:checked').forEach(r=>{
      out.push(r.name.replace('pos_','')+':'+r.value);
    });
    if(!out.length){alert('尚未選擇任何比賽');return;}

    callApi(
      'action=judgeSignupByGames&games_with_position='+encodeURIComponent(out.join(',')),
      ()=>{alert('報名完成');loadGames();}
    );
  };

  loadGames();
});
</script>

</body>
</html>
