<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判報名</title>
<style>
body{margin:0;font-family:system-ui;background:#f5f6f8}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#fff;border-bottom:1px solid #ddd}
.nav a{margin-right:16px;color:#0066cc;text-decoration:none}
.nav a:hover{text-decoration:underline}
.main{padding:20px}
.panel{background:#fff;padding:16px;border-radius:6px}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:8px;border-bottom:1px solid #eee}
th{background:#f0f2f5;text-align:left}
label{margin-right:8px}
.badge{color:#0b5ed7;font-weight:bold}
button{margin-top:10px}
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    <a href="index.html">首頁</a>
    <a href="judge_dashboard.html">裁判報名</a>
  </div>
  <div>
    <span id="u_name"></span>
    <a href="#" id="btnLogout" style="margin-left:12px;">登出</a>
  </div>
</div>

<div class="main">
  <div class="panel">
    <h3>可報名比賽</h3>
    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>組別</th>
          <th>對戰</th>
          <th>場地</th>
          <th>站位</th>
        </tr>
      </thead>
      <tbody id="gameBody">
        <tr><td colspan="5">載入中…</td></tr>
      </tbody>
    </table>
    <button id="btnSubmit">送出報名</button>
  </div>
</div>

<script src="js/config.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const token = localStorage.getItem('token');
  const session = JSON.parse(localStorage.getItem('session_user')||'{}');
  if(!token){location.href='login.html';return;}

  document.getElementById('u_name').textContent=session.name||'';
  document.getElementById('btnLogout').onclick=e=>{
    e.preventDefault();
    localStorage.clear();
    location.href='login.html';
  };

  const body=document.getElementById('gameBody');

  function callApi(action,cb){
    const f='cb_'+Date.now();
    window[f]=r=>{delete window[f];cb(r);};
    const s=document.createElement('script');
    s.src=API_URL+'?action='+action+'&token='+token+'&callback='+f;
    document.body.appendChild(s);
  }

  callApi('getSignableGames',res=>{
    body.innerHTML='';
    if(!res||res.result!=='ok'){body.innerHTML='<tr><td colspan="5">讀取失敗</td></tr>';return;}
    res.games.forEach(g=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`
        <td>${g.date}</td>
        <td>${g.category}</td>
        <td>${g.away_team||''} vs ${g.home_team||''}</td>
        <td>${g.field||''}</td>
        <td>
          ${
            g.signed
              ? `<span class="badge">已報名</span>`
              : `
                <label><input type="radio" name="pos_${g.game_id}" value="auto">排班</label>
              `
          }
        </td>
      `;
      body.appendChild(tr);
    });
  });

  document.getElementById('btnSubmit').onclick=()=>{
    const list=[];
    document.querySelectorAll('input[type=radio]:checked').forEach(r=>{
      list.push(r.name.replace('pos_','')+':'+r.value);
    });
    if(!list.length){alert('尚未選擇任何比賽');return;}
    callApi(
      'judgeSignupByGames&games_with_position='+encodeURIComponent(list.join(',')),
      ()=>{alert('已送出報名');location.reload();}
    );
  };
});
</script>
</body>
</html>
