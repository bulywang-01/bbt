<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>可報名比賽</title>
</head>

<body>

<header>
  <nav>
    <a href="dashboard.html">可報名比賽</a>
    <a href="judge_dashboard.html">報名頁</a>
  </nav>
  <div>
    <span id="userName"></span>
    <a href="login.html" id="btnLogout">登出</a>
  </div>
</header>

<main>
  <h2>可報名比賽</h2>
  <table>
    <thead>
      <tr>
        <th>狀態</th>
        <th>日期</th>
        <th>組別</th>
        <th>對戰</th>
        <th>場地</th>
        <th>站位狀態</th>
      </tr>
    </thead>
    <tbody id="gameBody">
      <tr><td colspan="6">載入中…</td></tr>
    </tbody>
  </table>
</main>

<!-- ✅ 正確的 JS 載入（重點） -->
<script src="js/config.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const token = localStorage.getItem('token');
  const session = JSON.parse(localStorage.getItem('session_user') || '{}');

  if (!token) {
    location.href = 'login.html';
    return;
  }

  document.getElementById('userName').textContent = session.name || '';
  document.getElementById('btnLogout').onclick = e => {
    e.preventDefault();
    localStorage.clear();
    location.href = 'login.html';
  };

  const body = document.getElementById('gameBody');

  function callApi(action, cb) {
    const cbName = 'cb_' + Date.now();
    window[cbName] = r => { delete window[cbName]; cb(r); };
    const s = document.createElement('script');
    s.src = API_URL + '?action=' + action + '&token=' + token + '&callback=' + cbName;
    document.body.appendChild(s);
  }

  callApi('getSignableGames', res => {
    body.innerHTML = '';
    if (!res || res.result !== 'ok') {
      body.innerHTML = '<tr><td colspan="6">無法讀取資料</td></tr>';
      return;
    }

    res.games.forEach(g => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${g.past ? '已結束' : '進行中'}</td>
        <td>${g.date}</td>
        <td>${g.category}</td>
        <td>${g.away_team || ''} vs ${g.home_team || ''}</td>
        <td>${g.field || ''}</td>
        <td>${g.signed ? '已報名' : '尚未報名'}</td>
      `;
      body.appendChild(tr);
    });
  });
});
</script>

</body>
</html>
