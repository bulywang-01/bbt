<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判報名表</title>

<style>
body{margin:0;font-family:system-ui;background:#f5f6f8}
.header{display:flex;justify-content:space-between;align-items:center;
 padding:12px 20px;background:#0f3d5e;color:#fff}
.nav a{margin-right:16px;color:#fff;text-decoration:none}
.main{padding:20px}
.panel{background:#fff;padding:16px;border-radius:6px}

table{width:100%;border-collapse:collapse;font-size:14px;margin-bottom:24px}
th,td{border:1px solid #dcdcdc;padding:6px 8px;text-align:center}
th{background:#e9eef3}

tr.full{background:#fff3f6}
tr.date-alt{background:#f9fbfd}

.badge{padding:2px 10px;border-radius:999px;font-size:13px;
 background:#2c7be5;color:#fff}
.badge.me{background:#ffd6e5;color:#0f3d5e}
.badge.gray{background:#999}

button{margin-top:12px;padding:8px 18px}
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="judge_dashboard.html">🧑‍⚖️ 裁判報名</a>
  </div>
  <div>
    <span id="u_name"></span>
    <a id="btnLogout" style="margin-left:12px;cursor:pointer;color:#fff;">登出</a>
  </div>
</div>

<div class="main">
<div class="panel">
<h2>BBT軟式棒球聯盟第18季賽程排班表</h2>

<div id="monthContainer"></div>

<button id="btnSubmit">送出報名</button>
</div>
</div>

<script src="js/config.js"></script>

<script>
document.addEventListener('DOMContentLoaded',()=>{

const token=localStorage.getItem('token');
const session=JSON.parse(localStorage.getItem('session_user')||'{}');
if(!token){location.href='login.html';return;}
document.getElementById('u_name').textContent=session.name||'';
document.getElementById('btnLogout').onclick=()=>{localStorage.clear();location.href='login.html';};

function callApi(q,cb){
  const f='cb_'+Date.now();
  window[f]=r=>{delete window[f];cb(r);};
  const s=document.createElement('script');
  s.src=API_URL+'?'+q+'&token='+token+'&callback='+f;
  document.body.appendChild(s);
}

function needRole(n,r){
  if(n>=4)return true;
  if(n===3)return r!=='U2';
  if(n===2)return r==='PU'||r==='U1';
  if(n===1)return r==='PU';
  return false;
}

function monthKey(d){
  const [y,m]=d.split('/');
  return `${y}年 ${m}月`;
}

function renderBadge(g,r){
  if(!needRole(g.need_count,r)){
    const s=document.createElement('span');
    s.className='badge gray';
    s.textContent='不需要';
    return s;
  }
  const name=(g.occupied_positions||{})[r];
  if(name){
    const s=document.createElement('span');
    s.className=g.my_position===r?'badge me':'badge';
    s.textContent=name;
    return s;
  }
  const label=document.createElement('label');
  const i=document.createElement('input');
  i.type='radio';i.name='pos_'+g.game_id;i.value=r;
  label.appendChild(i);
  label.append(r);
  return label;
}

function cell(tr,text){
  const td=document.createElement('td');
  td.textContent=text;
  tr.appendChild(td);
}

function loadGames(){
callApi('action=getSignableGames',res=>{
  if(!res||!Array.isArray(res.games))return;

  const data=res.games.slice().sort((a,b)=>{
    if(a.date!==b.date)return a.date.localeCompare(b.date);
    if(a.category!==b.category)return a.category.localeCompare(b.category);
    return a.time_range.localeCompare(b.time_range);
  });

  const byMonth={};
  data.forEach(g=>{
    const k=monthKey(g.date);
    if(!byMonth[k])byMonth[k]=[];
    byMonth[k].push(g);
  });

  const root=document.getElementById('monthContainer');
  root.innerHTML='';

  Object.keys(byMonth).forEach(mon=>{
    const h=document.createElement('h3');h.textContent=mon;root.appendChild(h);

    const table=document.createElement('table');
    const thead=document.createElement('thead');
    thead.innerHTML=`<tr>
      <th>日期</th><th>組別</th><th>時間</th>
      <th>客隊</th><th>主隊</th><th>地點</th>
      <th>裁判制</th><th>主審</th><th>一壘</th>
      <th>二壘</th><th>三壘</th></tr>`;
    table.appendChild(thead);

    const tbody=document.createElement('tbody');
    table.appendChild(tbody);

    let lastDate='',alt=false;

    byMonth[mon].forEach(g=>{
      const tr=document.createElement('tr');
      if(g.full)tr.classList.add('full');
      if(g.date!==lastDate){alt=!alt;lastDate=g.date;}
      if(alt)tr.classList.add('date-alt');

      cell(tr,g.date);
      cell(tr,g.category);
      cell(tr,g.time_range);
      cell(tr,g.away_team);
      cell(tr,g.home_team);
      cell(tr,g.field);
      cell(tr,`${g.need_count}人制`);

      ['PU','U1','U2','U3'].forEach(r=>{
        const td=document.createElement('td');
        td.appendChild(renderBadge(g,r));
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    root.appendChild(table);
  });
});
}

document.getElementById('btnSubmit').onclick=()=>{
  const sel=[];
  document.querySelectorAll('input[type=radio]:checked')
    .forEach(r=>sel.push(r.name.replace('pos_','')+':'+r.value));
  if(!sel.length){alert('尚未選擇');return;}
  callApi('action=judgeSignupByGames&games_with_position='+encodeURIComponent(sel.join(',')),
    ()=>{alert('報名完成');loadGames();});
};

loadGames();
});
</script>

</body>
</html>
