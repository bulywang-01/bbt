<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判報名表</title>

<style>
body {
  margin:0;
  font-family:system-ui,-apple-system;
  background:#f5f6f8;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#0f3d5e;
  color:#fff;
}
.nav a{
  margin-right:16px;
  color:#fff;
  text-decoration:none;
  font-weight:500;
}

.main{padding:20px}
.panel{
  background:#fff;
  padding:16px;
  border-radius:6px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
  margin-bottom:28px;
}
th,td{
  border:1px solid #dcdcdc;
  padding:6px 8px;
  text-align:center;
  vertical-align:middle;
}
th{background:#e9eef3}

tr.full{background:#fff3f6}
tr.date-alt{background:#f9fbfd}

.badge{
  display:inline-block;
  padding:2px 10px;
  border-radius:999px;
  font-size:13px;
  background:#2c7be5;
  color:#fff;
}
.badge.me{
  background:#ffd6e5;
  color:#0f3d5e;
}
.badge.gray{
  background:#999;
  color:#fff;
}

label.option{
  cursor:pointer;
  white-space:nowrap;
}

button{
  margin-top:12px;
  padding:8px 18px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="judge_dashboard.html">🧑‍⚖️ 裁判報名</a>
  </div>
  <div>
    <span id="u_name"></span>
    <a id="btnLogout" style="margin-left:12px;cursor:pointer;color:#fff;">登出</a>
  </div>
</div>

<div class="main">
<div class="panel">
<h3>裁判報名表</h3>

<div id="monthContainer"></div>

<button id="btnSubmit">送出報名</button>
</div>
</div>

<!-- ✅ 正確的 JS 載入（重點） -->
<script src="js/config.js"></script>

<script>
document.addEventListener('DOMContentLoaded',()=>{

const token=localStorage.getItem('token');
const session=JSON.parse(localStorage.getItem('session_user')||'{}');
if(!token){location.href='login.html';return;}

document.getElementById('u_name').textContent=session.name||'';
document.getElementById('btnLogout').onclick=()=>{
  localStorage.clear();
  location.href='login.html';
};

function callApi(q,cb){
  const f='cb_'+Date.now();
  window[f]=r=>{delete window[f];cb(r);};
  const s=document.createElement('script');
  s.src=API_URL+'?'+q+'&token='+token+'&callback='+f;
  document.body.appendChild(s);
}

function needRole(n,r){
  if(n>=4)return true;
  if(n===3)return r!=='U2';
  if(n===2)return r==='PU'||r==='U1';
  if(n===1)return r==='PU';
  return false;
}

function renderCell(g,r){
  if(!needRole(g.need_count,r))
    return '<span class="badge gray">不需要</span>';

  const name=(g.occupied_positions||{})[r];
  if(name){
    const c=g.my_position===r?'badge me':'badge';
    return `<span class="${c}">${name}</span>`;
  }

  return `
    <label class="option">
      <input type="radio" name="pos_${g.game_id}" value="${r}"> ${r}
    </label>`;
}

function monthKey(d){
  const [y,m]=d.split('/');
  return `${y}年 ${m}月`;
}

function loadGames(){
callApi('action=getSignableGames',res=>{
  if(!res||!Array.isArray(res.games))return;

  const sorted=res.games.slice().sort((a,b)=>{
    if(a.date!==b.date)return a.date.localeCompare(b.date);
    if(a.category!==b.category)return a.category.localeCompare(b.category);
    return a.time_range.localeCompare(b.time_range);
  });

  const byMonth={};
  sorted.forEach(g=>{
    const k=monthKey(g.date);
    if(!byMonth[k])byMonth[k]=[];
    byMonth[k].push(g);
  });

  const container=document.getElementById('monthContainer');
  container.innerHTML='';

  Object.keys(byMonth).forEach(m=>{
    const h=document.createElement('h3');
    h.textContent=m;
    container.appendChild(h);

    const tbl=document.createElement('table');
    tbl.innerHTML=`
    <thead><tr>
      <th>日期</th><th>組別</th><th>時間</th>
      <th>客隊</th><th>主隊</th><th>地點</th>
      <th>裁判制</th>
      <th>主審</th><th>一壘</th>
      <th>二壘</th><th>三壘</th>
    </tr></thead>`;
    const tb=document.createElement('tbody');

    const data=byMonth[m];
    let i=0;
    let dateFlip=false;

    while(i<data.length){
      let dEnd=i;
      while(dEnd<data.length&&data[dEnd].date===data[i].date)dEnd++;

      let c=i;
      while(c<dEnd){
        let cEnd=c;
        while(cEnd<dEnd&&data[cEnd].category===data[c].category)cEnd++;

        let l=c;
        while(l<cEnd){
          let lEnd=l;
          while(lEnd<cEnd&&data[lEnd].field===data[l].field)lEnd++;

          for(let r=l;r<lEnd;r++){
            const g=data[r];
            const tr=document.createElement('tr');
            if(dateFlip)tr.classList.add('date-alt');
            if(g.full)tr.classList.add('full');

            if(r===i){
              const td=document.createElement('td');
              td.rowSpan=dEnd-i;
              td.textContent=g.date;
              tr.appendChild(td);
              dateFlip=!dateFlip;
            }
            if(r===c){
              const td=document.createElement('td');
              td.rowSpan=cEnd-c;
              td.textContent=g.category;
              tr.appendChild(td);
            }
            if(r===l){
              const td=document.createElement('td');
              td.rowSpan=lEnd-l;
              td.textContent=g.field;
              tr.appendChild(td);
            }

            tr.innerHTML+=`
              <td>${g.time_range}</td>
              <td>${g.away_team}</td>
              <td>${g.home_team}</td>
              <td>${g.need_count}人制</td>
              <td>${renderCell(g,'PU')}</td>
              <td>${renderCell(g,'U1')}</td>
              <td>${renderCell(g,'U2')}</td>
              <td>${renderCell(g,'U3')}</td>`;

            tb.appendChild(tr);
          }
          l=lEnd;
        }
        c=cEnd;
      }
      i=dEnd;
    }

    tbl.appendChild(tb);
    container.appendChild(tbl);
  });
});
}

document.getElementById('btnSubmit').onclick=()=>{
  const sel=[];
  document.querySelectorAll('input[type=radio]:checked')
    .forEach(r=>sel.push(r.name.replace('pos_','')+':'+r.value));

  if(!sel.length){alert('尚未選擇站位');return;}

  callApi(
    'action=judgeSignupByGames&games_with_position='+
    encodeURIComponent(sel.join(',')),
    ()=>{alert('報名完成');loadGames();}
  );
};

loadGames();
});
</script>

</body>
</html>
