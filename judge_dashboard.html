<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>иЈҒеҲӨе ұеҗҚ</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f5f6f8;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#ffffff;
  border-bottom:1px solid #ddd;
}
.nav a{
  margin-right:16px;
  color:#0066cc;
  text-decoration:none;
}
.main{padding:20px}
.panel{
  background:#ffffff;
  padding:16px;
  border-radius:6px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
th, td{
  padding:8px;
  border-bottom:1px solid #eee;
  vertical-align:top;
}
th{
  background:#f0f2f5;
}
tr.full{
  background:#f4f4f4;
  color:#777;
}
.position-selected{
  margin-left:6px;
  color:#0b5ed7;
  font-weight:bold;
}
button{
  margin-top:16px;
  padding:6px 14px;
}
</style>
</head>

<body>

<div class="header">
  <div class="nav">

    <a href="index.html">йҰ–й Ғ</a>
    <a href="judge_dashboard.html">иЈҒеҲӨе ұеҗҚ</a>

  </div>
  <div>
    <b id="u_name"></b>
    <a id="btnLogout" style="margin-left:12px;cursor:pointer;">зҷ»еҮә</a>
  </div>
</div>

<div class="main">
  <div class="panel">
    <h3>еҸҜе ұеҗҚжҜ”иіҪ</h3>

    <table id="gameTable">
      <thead>
        <tr>
          <th>ж—Ҙжңҹ</th>
          <th>зө„еҲҘ</th>
          <th>е°ҚжҲ°</th>
          <th>е ҙең°</th>
          <th>з«ҷдҪҚеҒҸеҘҪ</th>
        </tr>
      </thead>
      <tbody id="gameBody">
        <tr><td colspan="5">ијүе…ҘдёӯвҖҰ</td></tr>
      </tbody>
    </table>

    <button id="btnSubmit">йҖҒеҮәе ұеҗҚ</button>
  </div>
</div>


<!-- вң… жӯЈзўә script еј•е…Ҙ -->
<script src="js/config.js"></script>


<script>
document.addEventListener('DOMContentLoaded', () => {

  const token = localStorage.getItem('token');
  const session = JSON.parse(localStorage.getItem('session_user')||'{}');
  if(!token){
    location.href='login.html';
    return;
  }

  document.getElementById('u_name').textContent=session.name;
  document.getElementById('btnLogout').onclick=()=>{
    localStorage.clear();
    location.href='login.html';
  };

  const gameBody=document.getElementById('gameBody');
  const btnSubmit=document.getElementById('btnSubmit');

  function formatDate(v){
    const d=new Date(v);
    if(isNaN(d)) return v;
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  }

  function posText(p){
    return {auto:'жҺ’зҸӯ',PU:'дё»еҜ©',U1:'дёҖеЈҳ',U3:'дёүеЈҳ'}[p]||p;
  }

  function allowedPositions(n){
    if(n===2) return ['auto','PU','U1'];
    if(n===3) return ['auto','PU','U1','U3'];
    return ['auto'];
  }

  function callApi(q,cb){
    const f='cb_'+Date.now();
    window[f]=r=>{delete window[f];cb(r);};
    const s=document.createElement('script');
    s.src=API_URL+'?'+q+'&token='+token+'&callback='+f;
    document.body.appendChild(s);
  }

  function loadGames(){
    gameBody.innerHTML='<tr><td colspan="5">ијүе…ҘдёӯвҖҰ</td></tr>';

    callApi('action=getSignableGames',res=>{
      if(res.result!=='ok'||!res.games.length){
        gameBody.innerHTML='<tr><td colspan="5">зӣ®еүҚжІ’жңүеҸҜе ұеҗҚжҜ”иіҪ</td></tr>';
        return;
      }

      gameBody.innerHTML='';
      res.games.forEach(g=>{
        const tr=document.createElement('tr');
        if(g.full) tr.classList.add('full');

        let posHTML='';
        if(g.position_mode!=='allow_select'){
          posHTML='жҺ’зҸӯ';
        }else{
          posHTML=allowedPositions(g.need_count).map(p=>`
            <label>
              <input type="radio" name="pos_${g.game_id}" value="${p}" ${p==='auto'?'checked':''}>
              ${posText(p)}
            </label>
          `).join('');
        }

        tr.innerHTML=`
          <td>${formatDate(g.date)}</td>
          <td>${g.category}${g.full?'пјҲе·ІйЎҚж»ҝпјү':''}</td>
          <td>${g.away_team||''} vs ${g.home_team||''}</td>
          <td>${g.field}</td>
          <td>${posHTML}</td>
        `;

        gameBody.appendChild(tr);
      });
    });
  }

  btnSubmit.onclick=()=>{
    const list=[];
    document.querySelectorAll('tbody tr').forEach(tr=>{
      const radio=tr.querySelector('input[type=radio]:checked');
      const name=radio?radio.name:null;
      if(name){
        list.push(name.replace('pos_','')+':'+radio.value);
      }
    });

    if(!list.length){
      alert('е°ҡжңӘйҒёж“Үд»»дҪ•жҜ”иіҪ');
      return;
    }

    callApi(
      'action=judgeSignupByGames&games_with_position='+encodeURIComponent(list.join(',')),
      ()=>{
        alert('е ұеҗҚе®ҢжҲҗ');
        loadGames();
      }
    );
  };

  loadGames();
});
</script>

</body>
</html>
