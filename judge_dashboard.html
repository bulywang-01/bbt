<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>裁判報名</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system;
      background: #f5f6f8;
    }

    /* ===== Header ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: #0f3d5e;
      color: #fff;
    }
    .nav a {
      margin-right: 16px;
      color: #fff;
      text-decoration: none;
      font-weight: 500;
    }
    .nav a:hover {
      text-decoration: underline;
    }

    /* ===== Content ===== */
    .main {
      padding: 20px;
    }
    .panel {
      background: #fff;
      padding: 16px;
      border-radius: 6px;
    }

    h3 {
      margin-top: 0;
      margin-bottom: 12px;
    }

    /* ===== Table ===== */
    table.schedule {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    table.schedule th,
    table.schedule td {
      border: 1px solid #dcdcdc;
      padding: 6px 8px;
      text-align: center;
      vertical-align: middle;
    }
    table.schedule th {
      background: #e9eef3;
      font-weight: 600;
    }

    tr.locked {
      background: #f2f2f2;
      color: #777;
    }

    /* ===== Badge (裁判姓名) ===== */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      background: #2c7be5;
      color: #fff;
      white-space: nowrap;
    }
    .badge.gray {
      background: #b0b0b0;
    }
    .badge.empty {
      background: #f1f1f1;
      color: #555;
      font-weight: normal;
    }

    button {
      margin-top: 12px;
      padding: 6px 16px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="judge_dashboard.html">🧑‍⚖️ 裁判報名</a>
  </div>
  <div>
    <span id="u_name"></span>
    <a id="btnLogout" style="margin-left:12px; cursor:pointer; color:#fff;">登出</a>
  </div>
</div>

<div class="main">
  <div class="panel">
    <h3>裁判報名表</h3>

    <table class="schedule">
      <thead>
        <tr>
          <th>組別</th>
          <th>日期</th>
          <th>時間</th>
          <th>客隊</th>
          <th>主隊</th>
          <th>地點</th>
          <th>裁判人數</th>
          <th>主審</th>
          <th>一壘審</th>
          <th>二壘審</th>
          <th>三壘審</th>
        </tr>
      </thead>
      <tbody id="gameBody">
        <tr><td colspan="11">載入中…</td
