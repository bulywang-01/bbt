<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判報名</title>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system;
  background:#f5f6f8;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#ffffff;
  border-bottom:1px solid #ddd;
}
.nav a{
  margin-right:16px;
  color:#0066cc;
  text-decoration:none;
  font-weight:500;
}

.main{padding:20px}
.panel{
  background:#fff;
  padding:16px;
  border-radius:6px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
  margin-bottom:24px;
}

h2{margin-top:0}
h3{
  margin:30px 0 10px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
  background:#fff;
}
th,td{
  border:1px solid #dcdcdc;
  padding:6px 8px;
  text-align:center;
}
th{background:#eef2f6}

/* ===== 狀態樣式 ===== */
tr.expired{
  background:#f2f2f2;
  color:#999;
}

.badge{
  padding:2px 10px;
  border-radius:999px;
  font-size:13px;
  background:#2c7be5;
  color:#fff;
  display:inline-block;
}
.badge.me{
  background:#ffd6e5;
  color:#0f3d5e;
}
.badge.gray{
  background:#999;
}

label{
  cursor:pointer;
  white-space:nowrap;
}

.control{
  margin-bottom:12px;
}

button{
  padding:8px 16px;
  margin-top:16px;
}
</style>
</head>

<body>

<!-- ===== Header ===== -->
<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="judge_dashboard.html"><b>🧑‍⚖️ 裁判報名</b></a>
  </div>
  <div>
    <b id="u_name"></b>
    <a href="#" onclick="logout()" style="margin-left:12px;color:#c00;">登出</a>
  </div>
</div>

<div class="main">
<h2>裁判報名</h2>

<div class="control">
  <label>
    <input type="checkbox" id="showPast" onchange="render()">
    顯示已過期比賽
  </label>
</div>

<div id="content"></div>

<button onclick="submitSignup()">送出報名</button>
</div>

<!-- 共用 API -->
<script src="js/config.js"></script>

<script>
const today = new Date();
today.setHours(0,0,0,0);

let allGames = [];

/* ===== 初始化 ===== */
document.addEventListener('DOMContentLoaded', ()=>{
  const session = JSON.parse(localStorage.getItem('session_user') || '{}');
  if(!session.user_id){
    location.replace('login.html');
    return;
  }
  document.getElementById('u_name').textContent = session.name || '';
  loadGames();
});

/* ===== 讀取賽事 ===== */
function loadGames(){
  callApi('action=getSignableGames', res=>{
    if(!res || res.result!=='ok'){
      alert('無法取得比賽資料');
      return;
    }
    allGames = res.games || [];
    render();
  });
}

/* ===== 顯示邏輯 ===== */
function render(){
  const showPast = document.getElementById('showPast').checked;
  const container = document.getElementById('content');
  container.innerHTML = '';

  // 先依月份分組
  const byMonth = {};
  allGames.forEach(g=>{
    const d = parseDate(g.date);
    if(!d) return;
    g._dateObj = d;
    const ym = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    if(!byMonth[ym]) byMonth[ym] = [];
    byMonth[ym].push(g);
  });

  Object.keys(byMonth).sort().forEach(month=>{
    const games = byMonth[month]
      .filter(g=>{
        if(showPast) return true;
        return g._dateObj >= today;
      })
      .sort((a,b)=>a._dateObj - b._dateObj);

    if(games.length === 0) return;

    const title = document.createElement('h3');
    title.textContent = month.replace('-', ' 年 ') + ' 月';
    container.appendChild(title);

    const panel = document.createElement('div');
    panel.className = 'panel';

    const table = document.createElement('table');
    table.innerHTML = `
      <thead>
      <tr>
        <th>日期</th>
        <th>時間</th>
        <th>組別</th>
        <th>客隊</th>
        <th>主隊</th>
        <th>地點</th>
        <th>裁判制</th>
        <th>主審</th>
        <th>一壘</th>
        <th>二壘</th>
        <th>三壘</th>
      </tr>
      </thead>
      <tbody></tbody>
    `;

    const tbody = table.querySelector('tbody');

    // 日期合併用
    let lastDate = null;
let dateCell = null;
let dateRowspan = 0;

games.forEach(g => {
  const tr = document.createElement('tr');
  const isExpired = g._dateObj < today;
  if (isExpired) tr.classList.add('expired');

  // ===== 日期欄處理 =====
  if (lastDate !== g.date) {
    // 結束上一組日期 rowspan
    if (dateCell) {
      dateCell.rowSpan = dateRowspan;
    }

    // 新日期
    dateCell = document.createElement('td');
    dateCell.textContent = g.date;
    dateRowspan = 1;
    tr.appendChild(dateCell);
    lastDate = g.date;
  } else {
    // ✅ 同日期的後續列：補「日期佔位 td」
    const placeholder = document.createElement('td');
    placeholder.style.display = 'none';
    tr.appendChild(placeholder);
    dateRowspan++;
  }

  // ===== 其餘欄位（順序固定）=====
  tr.innerHTML += `
    <td>${g.time_range}</td>
    <td>${g.category || ''}</td>
    <td>${g.away_team || ''}</td>
    <td>${g.home_team || ''}</td>
    <td>${g.field || ''}</td>
    <td>${g.need_count}人制</td>
    <td>${renderCell(g,'PU',isExpired)}</td>
    <td>${renderCell(g,'U1',isExpired)}</td>
    <td>${renderCell(g,'U2',isExpired)}</td>
    <td>${renderCell(g,'U3',isExpired)}</td>
  `;

  tbody.appendChild(tr);
});

// ✅ 最後一組日期回填 rowspan
if (dateCell) {
  dateCell.rowSpan = dateRowspan;
}

    panel.appendChild(table);
    container.appendChild(panel);
  });
}

/* ===== 站位呈現 ===== */
function renderCell(g, role, isExpired){
  if(!needRole(g.need_count, role)){
    return '<span class="badge gray">不需要</span>';
  }

  const name = (g.occupied_positions||{})[role];
  if(name){
    const cls = g.my_position === role ? 'badge me' : 'badge';
    return `<span class="${cls}">${name}</span>`;
  }

  if(isExpired){
    return '<span class="badge gray">已過期</span>';
  }

  return `
    <label>
      <input type="radio" name="pos_${g.game_id}" value="${role}">
      ${role}
    </label>
  `;
}

/* ===== 工具 ===== */
function needRole(n,r){
  if(n>=4) return true;
  if(n===3) return r!=='U2';
  if(n===2) return r==='PU'||r==='U1';
  if(n===1) return r==='PU';
  return false;
}

function parseDate(str){
  const p = (str||'').split('/');
  if(p.length!==3) return null;
  return new Date(+p[0],+p[1]-1,+p[2]);
}

function submitSignup(){
  const sel=[];
  document.querySelectorAll('input[type=radio]:checked')
    .forEach(r=>sel.push(r.name.replace('pos_','')+':'+r.value));

  if(!sel.length){
    alert('尚未選擇站位');
    return;
  }

  callApi(
    'action=judgeSignupByGames&games_with_position=' +
    encodeURIComponent(sel.join(',')),
    ()=>{
      alert('報名完成');
      loadGames();
    }
  );
}

function logout(){
  localStorage.clear();
  location.replace('login.html');
}
</script>

</body>
</html>
