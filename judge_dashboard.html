<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>裁判報名</title>

<style>
/* ===============================
   Header 導覽列保護修正
   （避免被內文樣式影響）
================================ */
#header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#ffffff;
  border-bottom:1px solid #ddd;
}

#header a {
  color: #0066cc;
  text-decoration: none;
  margin-right: 14px;
  font-weight: 500;
}

#header a:hover {
  text-decoration: underline;
}

/* Header 裡的工具列對齊 */
#header .nav,
#header .header,
#header .header-right {
  display: flex;
  align-items: center;
}

/* 使用者名稱 */
#header #u_name {
  font-weight: 600;
  margin-left: 8px;
}

/* ===============================
   基本版型
================================ */
body {
  margin: 0;
  font-family: system-ui, -apple-system;
  background: #f5f6f8;
  font-size: 15px;
}

.main {
  padding: 20px;
}

/* ===============================
   Panel / 區塊
================================ */
.panel {
  background: #fff;
  padding: 18px;
  margin-bottom: 24px;
  border-radius: 10px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);
}

/* 日期標題 */
h3 {
  margin: 28px 0 10px;
  font-size: 20px;
  font-weight: 800;
  color: #1a237e;
}

/* 組別標題（大聯盟／小聯盟） */
.panel > div:first-child {
  font-size: 16px;
  font-weight: 800;
  color: #0d47a1;
  margin-bottom: 10px;
  padding-left: 6px;
  border-left: 4px solid #0d47a1;
}

/* ===============================
   Table（桌機）
================================ */
table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  border-radius: 8px;
  overflow: hidden;
}

th, td {
  border: 1px solid #dcdcdc;
  padding: 6px 8px;
  text-align: center;
}

th {
  background: #f2f5fa;
  font-weight: 700;
  color: #37474f;
}

tbody tr:hover {
  background: #f9fbff;
}

.col-game-id {
  font-weight: 800;
  background: #eef3fb;
  color: #263238;
  white-space: nowrap;
}

/* 已額滿 */
tr.full {
  background: #fff3f3;
}

umpire-full
  color: #d32f2f;

/* 過期 */
tr.expired {
  background: #f2f2f2;
  color: #999;
}

/* ===============================
   桌機站位
================================ */
.pos-cell {
  min-width: 70px;
}

.cell-na {
  background: #424242;
}

/* 已選 */
.pos-choice {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 50px;
  height: 28px;
  border: 1px solid #cfd8dc;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
}

.pos-choice:hover {
  background: #e3f2fd;
  border-color: #4a7ef5;
}

.pos-choice.selected {
  background: #4a7ef5;
  color: #fff;
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(74,126,245,0.35);
}

.pos-na {
  /* color: #d32f2f; */ 
  color: #919191;
  font-weight: 600;
}

/* 已報名其它站位 */
.pos-hint {
  font-size: 13px;
  color: #90a4ae;
}

/* 裁判姓名 */
.judge-name {
  padding: 4px 6px;
  border-radius: 6px;
  font-weight: 600;
  color: #0b3c8a;
}

.judge-name.me {
  background: #e8f5e9;
  color: #2e7d32;
}

.judge-star {
  margin-right: 4px;
}

/* 取消（桌機） */
.cancel-btn {
  margin-left: 6px;
  color: #c62828;
  font-size: 13px;
  cursor: pointer;
}

.cancel-btn:hover {
  opacity: 0.7;
}

/* ===============================
   RWD：桌機/手機切換
================================ */
#desktopView { display: block; }
#mobileView { display: none; }

@media (max-width: 768px) {
  #desktopView { display: none; }
  #mobileView { display: block; padding: 12px; }
}

/* ===== 共用訊息遮罩（桌機＋手機） ===== */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

#overlay.show {
  display: flex;
}

#overlay-box {
  background: #fff;
  padding: 20px 26px;
  border-radius: 10px;
  min-width: 260px;
  text-align: center;
  box-shadow: 0 6px 18px rgba(0,0,0,0.25);
}

#overlay-text {
  font-size: 16px;
}

/* ===============================
   手機卡片
================================ */
.game-card {
  background: #fff;
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 14px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.12);
}

.game-header {
  display: flex;
  justify-content: space-between;
  font-size: 18px;
  margin-bottom: 6px;
}

.game-main {
  display: flex;
  justify-content: space-between;
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 8px;
}

.game-main .teams {
  color: #1a237e;
}

/* ===============================
   手機站位 Grid
================================ */
.mobile-pos-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 10px;
}

.mobile-pos {
  text-align: center;
  font-size: 16px;
}

.mobile-pos-btn {
  width: 100%;
  padding: 6px 0;
  border: 1px solid #4a7ef5;
  border-radius: 8px;
  color: #4a7ef5;
  background: #fff;
  font-weight: 600;
}

.mobile-pos-btn.selected {
  background: #4a7ef5;
  color: #fff;
}

.mobile-pos-na {
  color: #d32f2f;
  font-weight: 600;
}

.mobile-pos-hint {
  color: #90a4ae;
  font-size: 13px;
}

.mobile-judge-me {
  color: #2e7d32;
  font-weight: 700;
}

/* 手機取消（文字型，避免紅色大塊） */
.mobile-cancel {
  display: block;
  margin-top: 4px;
  padding: 0;
  background: none;
  border: none;
  color: #c62828;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

.mobile-cancel:active {
  opacity: 0.7;
}

/* ===============================
   手機送出列
================================ */
.submit-bar {
  position: sticky;
  bottom: 0;
  background: #fff;
  padding: 12px;
  border-top: 1px solid #ddd;
}

.submit-bar button {
  width: 100%;
  font-size: 16px;
  padding: 10px 0;
}

/* 手機站位標籤（主審/一壘/二壘/三壘） */
.mobile-pos-labels {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 6px;
  font-size: 13px;
  color: #607d8b;
  text-align: center;
  font-weight: 600;
}

</style>
  
</head>


<!-- 共用 Header -->
<body data-page-title="裁判報名">
<!-- 畫面中間呈現訊息 -->
<div id="overlay"">
  <div id="overlay-box">
    <div id="overlay-text">處理中...</div>
    <button id="overlay-ok">確定</button>
  </div>
</div>



<div id="header"></div>

<div class="main">

  <!-- 篩選 -->
  <div class="filter-bar">
    目前顯示的資料是：
    <select id="filterRange" onchange="render()">
      <option value="all">全部</option>
      <option value="month">本月</option>
      <option value="week">本週</option>
    </select>

    <label style="margin-left:10px;">
      <input type="checkbox" id="showPast" onchange="render()"> 顯示過期賽事　　　
    </label>
    關鍵字搜尋：<input type="text" id="keyword" placeholder="搜尋球隊/場地/組別" style="margin-left:8px;" oninput="render()">
  </div>
  
  <!-- 桌機表格 -->
  <div id="desktopView">
    <div id="content"></div>
  </div>

  <!-- 手機卡片 -->
  <div id="mobileView"></div>

  <!-- ✅ 全站唯一的送出按鈕 -->
  <div class="submit-bar">
    <button onclick="submitSignup()">送出報名</button>
  </div>

</div>
  <!--
  <button onclick="cancelSelectedByDate()">取消當日選擇</button>
  <button onclick="cancelAllSelected()" style="margin-left:8px;">
  全部取消
  </button>
  <button onclick="submitSignup()">送出報名</button>
  -->
</div>
  

  
<script src="js/config.js"></script>

<script>

function hideLoading() {
  const overlay = document.getElementById('loadingOverlay');
  if (overlay) overlay.remove();
}

function timeToMinutesSafe(t) {
  if (!t) return 0;
  if (typeof t === 'string' && t.includes(':')) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }
  const d = new Date(t);
  if (isNaN(d)) return 0;
  return d.getHours() * 60 + d.getMinutes();
}

/* ===== 給共用header.html使用 ===== */
/* ===== 初始化（含共用 header） ===== */
document.addEventListener('DOMContentLoaded', () => {

  // 1️⃣ 先載入共用 header
  fetch('header.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('header').innerHTML = html;

      // 2️⃣ 設定頁面標題（從 body data-page-title）
      const title = document.body.dataset.pageTitle;
      if (title) {
        const el = document.querySelector('.page-title');
        if (el) el.textContent = title;
      }

      // 3️⃣ 設定使用者名稱（現在 header 已經存在）
      const session = JSON.parse(localStorage.getItem('session_user') || '{}');
      if (!session.user_id) {
        location.replace('login.html');
        return;
      }

      const userEl = document.getElementById('u_name');
      if (userEl) {
        userEl.textContent = session.name || '';
      }

      // 4️⃣ 載入頁面主要資料
      loadGames();
    });
});

/* ===== 狀態 ===== */
let allGames = [];
let selectedPositions = {}; // game_id -> role

/* ===== API ===== */
function loadGames() {
  const session = JSON.parse(localStorage.getItem('session_user') || {});
  showLoading('載入賽事資料中...');

  callApi(
    { action:'getSignableGames', user_id: session.user_id || '' },
    res => {
      hideOverlay();

      if (!res || res.result !== 'ok') {
        showMessage(res?.message || '無法取得賽事資料');
        return;
      }

      allGames = res.games || [];
      render();
      renderMobile();

    }
  );
}

/* ===== 工具 ===== */
function cancelSelected(gameId) {
  delete selectedPositions[gameId];
  render();
  renderMobile();

}
  
function cancelSelectedByDate() {
  if (!Object.keys(selectedPositions).length) {
    alert('目前沒有已選擇的站位');
    return;
  }

  const date = prompt('請輸入要取消的日期（yyyy/MM/dd）');
  if (!date) return;

  let removed = 0;

  allGames.forEach(g => {
    if (g.date === date && selectedPositions[g.game_id]) {
      delete selectedPositions[g.game_id];
      removed++;
    }
  });

  if (!removed) {
    alert('該日期沒有已選擇的站位');
  } else {
    alert(`已取消 ${date} 的 ${removed} 筆選擇`);
    render();
    renderMobile();

  }
}

function formatTime(t){
  const d = new Date(t);
  return d.getHours().toString().padStart(2,'0') + ':' +
         d.getMinutes().toString().padStart(2,'0');
}

function rememberSelection(gameId, role, btn) {
  // 清掉舊選擇
  // delete selectedPositions[gameId];
  selectedPositions[gameId] = role;

  // 清除同場所有已選外觀
  document
    .querySelectorAll(`.signup-btn[data-game="${gameId}"]`)
    .forEach(b => b.classList.remove('selected'));

  // 標記目前按下的按鈕
  if (btn) {
    btn.classList.add('selected');
  }

  // ✅ 一定要在 if 外
  render();
  renderMobile();
}


/* ===== 產置出表格及內容 ===== */
function render() {
  function timeToMinutes(t) {
    const d = new Date(t);
    return d.getHours() * 60 + d.getMinutes();
  }

  const box = document.getElementById('content');
  box.innerHTML = '';

  if (!allGames || allGames.length === 0) {
    box.innerHTML = '<div class="panel">目前沒有可報名賽事</div>';
    return;
  }

  const range = filterRange.value;
  const showPastChecked = showPast.checked;
  const kw = keyword.value.trim();

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  function inThisMonth(dateStr) {
    const d = new Date(dateStr.replace(/\//g, '-'));
    return (
      d.getFullYear() === today.getFullYear() &&
      d.getMonth() === today.getMonth()
    );
  }

  function inThisWeek(dateStr) {
    const d = new Date(dateStr.replace(/\//g, '-'));
    const s = new Date(today);
    s.setDate(today.getDate() - today.getDay());
    const e = new Date(s);
    e.setDate(s.getDate() + 6);
    return d >= s && d <= e;
  }

  // ✅ 前置篩選
  const filtered = allGames.filter(g => {
    const gd = new Date(g.date.replace(/\//g, '-'));
    if (gd < today && !showPastChecked) return false;
    if (range === 'month' && !inThisMonth(g.date)) return false;
    if (range === 'week' && !inThisWeek(g.date)) return false;
    if (kw) {
      const txt = `${g.away_team} ${g.home_team} ${g.field} ${g.category}`;
      if (!txt.includes(kw)) return false;
    }
    return true;
  });

  if (!filtered.length) {
    box.innerHTML = '<div class="panel">沒有符合條件的賽事</div>';
    return;
  }

  // ✅ 依日期分組
  const dateGroups = {};
  filtered.forEach(g => {
    if (!dateGroups[g.date]) dateGroups[g.date] = [];
    dateGroups[g.date].push(g);
  });

  // ✅ 日期排序
  Object.keys(dateGroups)
    .sort()
    .forEach(date => {
      const h3 = document.createElement('h3');
      h3.textContent = date;
      box.appendChild(h3);

      // ✅ 同一天再依「組別」分組
      const categoryGroups = {};
      dateGroups[date].forEach(g => {
        const cat = g.category || '未分類';
        if (!categoryGroups[cat]) categoryGroups[cat] = [];
        categoryGroups[cat].push(g);
      });

      Object.keys(categoryGroups).forEach(category => {
        const panel = document.createElement('div');
        panel.className = 'panel';

        // ✅ 組別標題（大聯盟／小聯盟）
        const categoryTitle = document.createElement('div');
        categoryTitle.textContent = category;
        categoryTitle.style.fontSize = '16px';
        categoryTitle.style.fontWeight = '700';
        categoryTitle.style.marginBottom = '8px';
        categoryTitle.style.color = '#1a237e';
        
        panel.appendChild(categoryTitle);

        const table = document.createElement('table');
        table.innerHTML = `
          <thead>
            <tr>
              <th class="col-game-id">場次</th>
              <th>時間</th>
              <th>組別</th>
              <th>客隊</th>
              <th>主隊</th>
              <th>場地</th>
              <th>時長</th>
              <th>裁判數</th>
              <th class="pos-cell">主審</th>
              <th class="pos-cell">一壘</th>
              <th class="pos-cell">二壘</th>
              <th class="pos-cell">三壘</th>
            </tr>
          </thead>
          <tbody></tbody>
        `;

        const tbody = table.querySelector('tbody');

        // ✅ 同日期＋同組別 → 依時間排序
        categoryGroups[category]
          .sort(
            (a, b) =>
              timeToMinutes(a.time_range) -
              timeToMinutes(b.time_range)
          )
          .forEach(g => {
            const tr = document.createElement('tr');

            const gd = new Date(g.date.replace(/\//g, '-'));
            const isPast = gd < today;
            if (isPast) tr.classList.add('expired');

            const filled = Object.keys(g.occupied_positions || {}).length;
            if (filled >= g.need_count) tr.classList.add('full');

  function renderPos(role) {
    // === 不需要此站位 ===
    if (
      g.need_count === 0 ||
      (g.need_count === 1 && role !== 'PU') ||
      (g.need_count === 2 && ['U2', 'U3'].includes(role)) ||
      (g.need_count === 3 && role === 'U2')
    ) {
      return '<span class="pos-na">不需要</span>';
    }
  
    // === 已被佔用（含自己） ===
    if (g.occupied_positions && g.occupied_positions[role]) {
      const isMe = g.my_position === role;
  
      if (isMe) {
        return `
          <div class="judge-name me">
            <span class="judge-star">★</span>
            ${g.occupied_positions[role]}
            <span class="cancel-btn"
                  title="取消此站位"
                  onclick="cancelMySignup('${g.my_signup_id}')">
              [取消]
            </span>
          </div>
        `;
      }
  
      return `<div class="judge-name">${g.occupied_positions[role]}</div>`;
    }
  
    // === 已過期 ===
    if (isPast) {
      return '';
    }
  
    // ✅ 我已報名此場，但不是這個站位 → 顯示「待位中」
    if (g.my_position && g.my_position !== role) {
      return `<span class="pos-hint">待位中</span>`;
    }
  
    // === 尚未送出，且是我選的 ===
    if (selectedPositions[g.game_id] === role) {
      return `
        <div class="pos-choice selected"
             onclick="cancelSelected('${g.game_id}')">
          選定
        </div>
      `;
    }
  
    // === 尚未選，可選 ===
    return `
      <label class="pos-choice">
        <input type="radio"
               onchange="rememberSelection('${g.game_id}','${role}')">
      </label>
    `;
  }


            let umpireCell = g.need_count;
            if (g.need_count === 0) {
              umpireCell = '<span class="umpire-na">不需裁判</span>';
            } else if (filled >= g.need_count) {
              umpireCell = '<span class="umpire-full">已額滿</span>';
            }

            tr.innerHTML = `
              <td class="col-game-id">${g.game_code}</td>
              <td>${formatTime(g.time_range)}</td>
              <td>${g.category || ''}</td>
              <td>${g.away_team || ''}</td>
              <td>${g.home_team || ''}</td>
              <td>${g.field || ''}</td>
              <td>${g.duration || ''}</td>
              <td>${umpireCell}</td>
              ${['PU','U1','U2','U3'].map(r => {
                const v = renderPos(r);
                return v === '__NA__'
                  ? '<td class="pos-cell cell-na"></td>'
                  : `<td class="pos-cell">${v}</td>`;
              }).join('')}
            `;

            tbody.appendChild(tr);
          });

        panel.appendChild(table);
        box.appendChild(panel);
      });
    });
}

// 手機版 ${renderTimeHHmm(g.time_range)}
 
function renderMobile() {
  const box = document.getElementById('mobileView');
  if (!box) return;
  box.innerHTML = '';

  if (!allGames || !allGames.length) return;

  // ✅ 依日期分組
  const groups = {};
  allGames.forEach(g => {
    if (!groups[g.date]) groups[g.date] = [];
    groups[g.date].push(g);
  });

  Object.keys(groups).sort().forEach(date => {
    groups[date]
      .sort((a, b) =>
        timeToMinutesSafe(a.time_range) -
        timeToMinutesSafe(b.time_range)
      )
      .forEach(g => {
        const card = document.createElement('div');
        card.className = 'game-card';

        card.innerHTML = `
          <div class="game-header">
            <div>📅 <strong>${g.date}</strong></div>
            <div>⏰ <strong>${formatTime(g.time_range)}</strong></div>
          </div>

          <div class="game-main">
            <div class="teams">${g.away_team} vs ${g.home_team}</div>
            <div>📍 ${g.field}</div>
          </div>

          ${renderMobilePosGrid(g)}

          <div style="margin-top:10px;font-size:14px;font-weight:700;text-align:center;">
            ${g.tournament || ''} - ${g.category || ''}
          </div>
        `;

        box.appendChild(card);
      });
  });
}

function renderMobilePosGrid(g) {
  const ROLE_NAME = {
  PU: '主審',
  U1: '一壘',
  U2: '二壘',
  U3: '三壘'
  };
  
  const roles = ['PU', 'U1', 'U2', 'U3'];
  const today = new Date(); today.setHours(0,0,0,0);
  const isPast = new Date(g.date.replace(/\//g,'-')) < today;


  const occupied = g.occupied_positions || {};

  function needNA(role) {
    return (
      g.need_count === 0 ||
      (g.need_count === 1 && role !== 'PU') ||
      (g.need_count === 2 && ['U2','U3'].includes(role)) ||
      (g.need_count === 3 && role === 'U2')
    );
  }

  return `
  
     <!-- ✅ 站位標籤列 -->
     <div class="mobile-pos-labels">
       <div>主審</div>
       <div>一壘</div>
       <div>二壘</div>
       <div>三壘</div>
     </div>
   
     <!-- ✅ 站位內容 -->

    <div class="mobile-pos-grid">
      ${roles.map(role => {
        if (needNA(role)) {
          return `<div class="mobile-pos"><span class="mobile-pos-na">-</span></div>`;
        }

        if (occupied[role]) {
          const isMe = g.my_position === role;
          return `
            <div class="mobile-pos">
              <span class="${isMe ? 'mobile-judge-me' : ''}">
                ${isMe ? '★ ' : ''}${occupied[role]}
              </span>
              ${
                isMe
                  ? `<span class="mobile-cancel"
                         onclick="cancelMySignup('${g.my_signup_id}')">取消</span>`
                  : ''
              }
            </div>
          `;
        }

        if (g.my_position) {
          return `<div class="mobile-pos"><span class="mobile-pos-hint">待位中</span></div>`;
        }

        if (selectedPositions[g.game_id] === role) {
          return `
            <div class="mobile-pos">
              <div class="mobile-pos-btn selected"
                   onclick="cancelSelected('${g.game_id}')">選定</div>
            </div>
          `;
        }

        return `
          <div class="mobile-pos">
            <div class="mobile-pos-btn"
                 onclick="rememberSelection('${g.game_id}','${role}')">
              ${ROLE_NAME[role]}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

 
function renderTimeHHmm(t) {
  if (!t) return '';

  // ✅ 已經是字串（08:30）
  if (typeof t === 'string') {
    // 保險：如果已經是 HH:mm，直接回傳
    if (/^\d{1,2}:\d{2}$/.test(t)) {
      return t;
    }
    // 其他字串就原樣回
    return t;
  }

  // ✅ 是 Date 物件（1899-12-30）
  if (t instanceof Date) {
    return (
      t.getHours().toString().padStart(2, '0') +
      ':' +
      t.getMinutes().toString().padStart(2, '0')
    );
  }

  // 其他型別（保險）
  return String(t);
}
 
/* ===== 送出 ===== */

function submitSignup(){
  const entries = Object.keys(selectedPositions);
  if (!entries.length){
    showMessage('尚未選擇站位');
    return;
  }

  const session = JSON.parse(localStorage.getItem('session_user') || {});
  if (!session.user_id) {
    showMessage('登入狀態已失效，請重新登入');
    return;
  }

  const payload = entries.map(
    id => `${id}:${selectedPositions[id]}`
  );

  // ✅ 顯示存入中
  showLoading('報名資料存入中...');

  callApi(
    {
      action: 'judgeSignupByGames',
      user_id: session.user_id,
      games_with_position: payload.join(',')
    },
    res => {
      if (res && res.result === 'ok') {
        showMessage('✅ 報名成功');
        setTimeout(() => location.reload(), 800);
      } else {
        showMessage(res?.message || '❌ 報名失敗');
      }
    }
  );
}

function showLoading(msg) {
  const overlay = document.getElementById('overlay');
  document.getElementById('overlay-text').textContent = msg;
  document.getElementById('overlay-ok').style.display = 'none';
  overlay.classList.add('show');
}

function showMessage(msg) {
  const overlay = document.getElementById('overlay');
  const text = document.getElementById('overlay-text');
  const ok = document.getElementById('overlay-ok');

  text.textContent = msg;
  ok.style.display = 'none';

  // ✅ 重點：點遮罩即可關閉（只綁一次）
  overlay.onclick = () => {
    hideOverlay();
    overlay.onclick = null; // 避免影響後續 loading
  };

  overlay.classList.add('show');
}

function hideOverlay() {
  document.getElementById('overlay').classList.remove('show');
}

function logout(){
  localStorage.clear();
  location.replace('login.html');
}

// 取消自已報名的賽事
function cancelMySignup(signupId) {
  if (!signupId) return;

  if (!confirm('確定要取消這個站位嗎？')) return;

  const session = JSON.parse(localStorage.getItem('session_user') || {});
  if (!session.user_id) {
    showMessage('登入狀態已失效');
    return;
  }

  // ✅ 顯示取消中
  showLoading('取消報名中...');

  callApi(
    {
      action: 'cancelJudgeSignup',
      user_id: session.user_id,
      signup_id: signupId
    },
    res => {
      if (res && res.result === 'ok') {
        showMessage('✅ 已取消站位');
        setTimeout(() => location.reload(), 800);
      } else {
        showMessage(res?.message || '❌ 取消失敗');
      }
    }
  );
}
