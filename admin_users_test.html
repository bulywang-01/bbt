<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>使用者帳號管理</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system;
  background: #f5f6f8;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  background: #fff;
  border-bottom: 1px solid #ddd;
}
.nav a {
  margin-right: 16px;
  text-decoration: none;
  color: #0066cc;
}
.main { padding: 20px; }

/* ===== Tabs ===== */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.tab {
  padding: 6px 14px;
  border-radius: 16px;
  border: 1px solid #ccc;
  background: #f3f4f6;
  cursor: pointer;
}
.tab.active {
  background: #2c7be5;
  color: #fff;
}

/* ===== Table ===== */
.user-table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
}
.user-table th,
.user-table td {
  border: 1px solid #ddd;
  padding: 6px;
  text-align: center;
  font-size: 14px;
}
.user-table th {
  background: #f1f5f9;
}

.small-select { width: 70px; }

/* ===== 編輯提示 ===== */
tr.editing {
  background-color: #fff8dc;
}
tr.editing td {
  background-color: #fff8dc;
}
.action-edit { display: none; }
tr.editing .action-view { display: none; }
tr.editing .action-edit { display: inline-block; }

/* ===== Toast ===== */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 14px 20px;
  border-radius: 8px;
  color: #fff;
  opacity: 0;
  transition: .3s;
  z-index: 9999;
}
.toast.show { opacity: 1; }
.toast.success { background: #2e7d32; }
.toast.warn { background: #ed6c02; }
.toast.error { background: #c62828; }

button {
  padding: 4px 8px;
  cursor: pointer;
}
.primary {
  background: #2c7be5;
  color: #fff;
  border: none;
}
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    index.html🏠 首頁</a>
    judge_dashboard.html📋 報名</a>
    admin_dashboard.html⚙️ 管理</a>
  </div>
  <div>
    <span id="u_name"></span>
    #登出</a>
  </div>
</div>

<div class="main">

<!-- ================= Tabs ================= -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('judge',this)">⚖️ 裁判</button>
  <button class="tab" onclick="switchTab('record',this)">📝 紀錄</button>
  <button class="tab" onclick="switchTab('admin',this)">🛠 系統管理員</button>
</div>

<!-- ================= 裁判 / 紀錄 ================= -->
<table class="user-table" id="table-judge">
<thead>
<tr>
  <th>帳號</th>
  <th>姓名</th>
  <th>背號</th>
  <th>電話</th>
  <th>Email</th>
  <th>身份</th>
  <th>裁判證照</th>
  <th>紀錄證照</th>
  <th>狀態</th>
  <th>操作</th>
</tr>
</thead>
<tbody id="tbody-judge"></tbody>
</table>

<table class="user-table hidden" id="table-record">
<thead>
<tr>
  <th>帳號</th>
  <th>姓名</th>
  <th>背號</th>
  <th>電話</th>
  <th>Email</th>
  <th>身份</th>
  <th>裁判證照</th>
  <th>紀錄證照</th>
  <th>狀態</th>
  <th>操作</th>
</tr>
</thead>
<tbody id="tbody-record"></tbody>
</table>

<table class="user-table hidden" id="table-admin">
<thead>
<tr>
  <th>帳號</th>
  <th>姓名</th>
  <th>背號</th>
  <th>電話</th>
  <th>Email</th>
  <th>身份</th>
  <th>狀態</th>
</tr>
</thead>
<tbody id="tbody-admin"></tbody>
</table>

</div>

<script src="js/config.js"></script>
<script>
/* =====================================================
   全域狀態
   ===================================================== */
let allUsers = [];
let pendingUserUpdates = {};

/* =====================================================
   身份中文化 helper
   ===================================================== */
function renderRoleText(roleStr) {
  const map = {
    judge: '裁判',
    chief_judge: '裁判長',
    record: '紀錄',
    record_chief: '紀錄長',
    admin: '系統管理員'
  };
  return (roleStr || '')
    .split(',')
    .map(r => map[r] || r)
    .join('／');
}

/* =====================================================
   證照顯示 helper（N → 暫無）
   ===================================================== */
function displayLevel(val) {
  if (!val || val === 'N' || val === 'NONE') return '暫無';
  return val;
}

/* =====================================================
   Init
   ===================================================== */
document.addEventListener('DOMContentLoaded', () => {
  const session = JSON.parse(localStorage.getItem('session_user') || '{}');
  document.getElementById('u_name').textContent = session.name || '';
  loadUsers();
});

/* =====================================================
   Tabs
   ===================================================== */
function switchTab(type, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['judge','record','admin'].forEach(t => {
    document.getElementById('table-'+t).classList.toggle('hidden', t!==type);
  });
}

/* =====================================================
   Load users
   ===================================================== */
function loadUsers() {
  callApi({ action:'getUsers' }, res => {
    allUsers = (res.users || []).map(u => {
      if (!u.record_level) u.record_level = 'N';
      return u;
    });
    renderLists();
  });
}

/* =====================================================
   Render lists
   ===================================================== */
function renderLists() {
  tbodyJudge.innerHTML = '';
  tbodyRecord.innerHTML = '';
  tbodyAdmin.innerHTML = '';

  allUsers.forEach(u => {
    const roles = (u.role || '').split(',');

    if (roles.some(r => r==='judge' || r==='chief_judge'))
      tbodyJudge.appendChild(renderRow(u));

    if (roles.some(r => r==='record' || r==='record_chief'))
      tbodyRecord.appendChild(renderRow(u));

    if (roles.includes('admin'))
      tbodyAdmin.appendChild(renderRowAdmin(u));
  });
}

/* =====================================================
   Row renderer（裁判 / 紀錄）
   ===================================================== */
function renderRow(u) {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${u.username}</td>
    <td>${u.name || ''}</td>
    <td>${u.note || ''}</td>
    <td>${u.phone || ''}</td>
    <td>${u.email || ''}</td>
    <td>${renderRoleText(u.role)}</td>

    <td>
      <select class="small-select edit" disabled
        onchange="updateJudgeLevel('${u.user_id}',this.value)">
        ${['N','A','B','C'].map(v =>
          `<option value="${v}" ${u.level===v?'selected':''}>${displayLevel(v)}</option>`
        ).join('')}
      </select>
    </td>

    <td>
      <select class="small-select edit" disabled
        onchange="updateRecordLevel('${u.user_id}',this.value)">
        ${['N','A','B','C'].map(v =>
          `<option value="${v}" ${u.record_level===v?'selected':''}>${displayLevel(v)}</option>`
        ).join('')}
      </select>
    </td>

    <td>${u.active==='Y'?'啟用':'停用'}</td>

    <td>
      <div class="action-view">
        <button onclick="enableEdit(this)">✏️</button>
      </div>
      <div class="action-edit">
        <button class="primary" onclick="saveUser('${u.user_id}')">💾</button>
        <button onclick="cancelEdit(this)">❌</button>
      </div>
    </td>
  `;
  return tr;
}

/* =====================================================
   Row renderer（系統管理員唯讀）
   ===================================================== */
function renderRowAdmin(u) {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${u.username}</td>
    <td>${u.name||''}</td>
    <td>${u.note||''}</td>
    <td>${u.phone||''}</td>
    <td>${u.email||''}</td>
    <td>${renderRoleText(u.role)}</td>
    <td>${u.active==='Y'?'啟用':'停用'}</td>
  `;
  return tr;
}

/* =====================================================
   Editing
   ===================================================== */
function enableEdit(btn){
  const tr = btn.closest('tr');
  tr.classList.add('editing');
  tr.querySelectorAll('select').forEach(el => el.disabled=false);
}
function cancelEdit(btn){
  const tr = btn.closest('tr');
  tr.classList.remove('editing');
  tr.querySelectorAll('select').forEach(el => el.disabled=true);
}
function updateJudgeLevel(uid,val){
  const u = allUsers.find(x => x.user_id==uid);
  u.level = val;
  pendingUserUpdates[uid] = pendingUserUpdates[uid] || {};
  pendingUserUpdates[uid].level = val;
}
function updateRecordLevel(uid,val){
  const u = allUsers.find(x => x.user_id==uid);
  u.record_level = val;
}

/* =====================================================
   Save
   ===================================================== */
function saveUser(uid){
  const data = pendingUserUpdates[uid];
  if(!data) return;

  callApi({ action:'updateUser', user_id:uid, ...data }, ()=>{
    pendingUserUpdates[uid]=null;
    loadUsers();
  });
}
</script>
</body>
</html>
