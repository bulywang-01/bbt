/* ===== Toast ===== */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;

  font-size: 15px;
}
.toast.show {
  opacity: 1;
}
.toast.success { background:#15803d; }
.toast.error { background:#b91c1c; }
.toast.warn { background:#b45309; }

.toast.show {

}

  <th>йӣ»и©ұ</th>

</table>

<thead><tr><th>еёіиҷҹ</th><th>е§“еҗҚ</th><th>иЈҒеҲӨиӯүз…§</th></tr></thead>
<tbody id="tbody-chief_judge"></tbody>
</table>

<table id="table-record_chief" class="hidden">
<thead><tr><th>еёіиҷҹ</th><th>е§“еҗҚ</th><th>зҙҖйҢ„иӯүз…§</th></tr></thead>
<tbody id="tbody-record_chief"></tbody>
</table>

<table id="table-admin" class="hidden">

<script src="js/config.js"></script>
  
<script>
  
function displayLevel(v) {
  return (!v || v === 'N') ? 'з„Ў' : v;
}

let allUsers = [];
let pendingUserUpdates = {};
let currentTab = 'account';

/* helpers */
function renderRoleTextCN(roleStr){
  const map = {
    judge: 'иЈҒеҲӨ',
    chief_judge: 'иЈҒеҲӨй•·',
    record: 'зҙҖйҢ„',
    record_chief: 'зҙҖйҢ„й•·',
    admin: 'зі»зөұз®ЎзҗҶе“Ў'
  };
  return (roleStr||'')
    .split(',')
    .filter(Boolean)
    .map(r=>map[r]||r)
    .join('гҖҒ');
}

function splitLevel(level){
  if(!level || level==='NONE') return ['N','N'];
  if(!level.includes(',')) return [level,'N'];
  return level.split(',');
}

/* tabs */
function switchTab(type,btn){
  currentTab = type;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['account','judge','record','chief_judge','record_chief','admin']
    .forEach(t=>{
      document.getElementById('table-'+t).classList.toggle('hidden',t!==type);
    });
}

/* load */
document.addEventListener('DOMContentLoaded', ()=>{
  loadUsers();
});

function loadUsers(){
  callApi({action:'getUsers'}, res=>{
    allUsers = res.users || [];
    renderAll();
  });
}

/* render all tables */
function renderAll(){
  renderAccountList();
  renderReadonlyLists();
}

/* еёіиҷҹжё…е–®пјҲе”ҜдёҖеҸҜз·ЁијҜпјү */
function renderAccountList(){
  const tb = document.getElementById('tbody-account');
  tb.innerHTML='';
  allUsers.forEach(u=>{
    const roles = (u.role||'').split(',').filter(Boolean);
    const [jLv,rLv] = splitLevel(u.level);
    const tr=document.createElement('tr');
    // const [judgeLv, recordLv] = splitLevel(u.level || 'N,N');
    const [judgeLv, recordLv] = splitLevel(u.level);

    
    tr.innerHTML=`
<td>${u.username}</td>
<td><input value="${u.name||''}" onchange="markField('${u.user_id}','name',this.value)"></td>
<td><input value="${u.email||''}" onchange="markField('${u.user_id}','email',this.value)"></td>
<td><input value="${u.phone||''}" onchange="markField('${u.user_id}','phone',this.value)"></td>
<td>
  <div class="role-summary">зӣ®еүҚиә«д»Ҫпјҡ${renderRoleTextCN(u.role)}</div>
  <label><input type="checkbox" ${roles.includes('judge')?'checked':''} onchange="toggleRole('${u.user_id}','judge',this.checked)">иЈҒеҲӨ</label>
  <label><input type="checkbox" ${roles.includes('chief_judge')?'checked':''} onchange="toggleRole('${u.user_id}','chief_judge',this.checked)">иЈҒеҲӨй•·</label>
  <label><input type="checkbox" ${roles.includes('record')?'checked':''} onchange="toggleRole('${u.user_id}','record',this.checked)">зҙҖйҢ„</label>
  <label><input type="checkbox" ${roles.includes('record_chief')?'checked':''} onchange="toggleRole('${u.user_id}','record_chief',this.checked)">зҙҖйҢ„й•·</label>
  <label><input type="checkbox" ${roles.includes('admin')?'checked':''} onchange="toggleRole('${u.user_id}','admin',this.checked)">зі»зөұз®ЎзҗҶе“Ў</label>
</td>

<td>
  <select onchange="setLevel('${u.user_id}','judge',this.value)">
    ${['N','A','B','C'].map(v =>
      `<option value="${v}" ${v===judgeLv?'selected':''}>${displayLevel(v)}</option>`
    ).join('')}
  </select>
</td>

<td>
  <select onchange="setLevel('${u.user_id}','record',this.value)">
    ${['N','A','B','C'].map(v =>
      `<option value="${v}" ${v===recordLv?'selected':''}>${displayLevel(v)}</option>`
    ).join('')}
  </select>
</td>


      <td>
        <button class="primary" onclick="('${u.user_id}')">е„Іеӯҳ</button>
        ${u.username === 'admin'
            ? ''
            : `<button onclick="deleteUser('${u.user_id}','${u.username}')">рҹ—‘ еҲӘйҷӨ</button>`
        }
      </td>

`;
    tb.appendChild(tr);
  });
}

/* еҸӘи®ҖеҗҚе–® */
function renderReadonlyLists() {
  const clear = id => document.getElementById(id).innerHTML = '';

  clear('tbody-judge');
  clear('tbody-record');
  clear('tbody-chief_judge');
  clear('tbody-record_chief');
  clear('tbody-admin');

  allUsers.forEach(u => {
    const roles = (u.role || '').split(',').filter(Boolean);

    // вң… вҳ…вҳ… йҖҷдёҖиЎҢдёҖе®ҡиҰҒжңү вҳ…вҳ…
    const [judgeLv, recordLv] = splitLevel(u.level);

    // вң… иЈҒеҲӨеҗҚе–®
    if (roles.includes('judge') || roles.includes('chief_judge')) {
      addRow('tbody-judge', [
        u.username,
        u.name || '',
        displayLevel(judgeLv)
      ]);
    }

    // вң… зҙҖйҢ„еҗҚе–®
    if (roles.includes('record') || roles.includes('record_chief')) {
      addRow('tbody-record', [
        u.username,
        u.name || '',
        displayLevel(recordLv)
      ]);
    }

    // вң… иЈҒеҲӨй•·еҗҚе–®
    if (roles.includes('chief_judge')) {
      addRow('tbody-chief_judge', [
        u.username,
        u.name || '',
        displayLevel(judgeLv)
      ]);
    }

    // вң… зҙҖйҢ„й•·еҗҚе–®
    if (roles.includes('record_chief')) {
      addRow('tbody-record_chief', [
        u.username,
        u.name || '',
        displayLevel(recordLv)
      ]);
    }

    // вң… з®ЎзҗҶе“ЎеҗҚе–®
    if (roles.includes('admin')) {
      addRow('tbody-admin', [
        u.username,
        u.name || '',
        u.email || ''
      ]);
    }
  });
}

function addRow(tbodyId,cols){
  const tr=document.createElement('tr');
  tr.innerHTML = cols.map(c=>`<td>${c}</td>`).join('');
  document.getElementById(tbodyId).appendChild(tr);
}

/* editing helpers */
function markField(uid,key,val){
  if(!pendingUserUpdates[uid]) pendingUserUpdates[uid]={};
  pendingUserUpdates[uid][key]=val;
}
  
function toggleRole(uid,role,on){
  const u=allUsers.find(x=>x.user_id==uid);
  let roles=(u.role||'').split(',').filter(Boolean);
  roles=roles.filter(r=>r!==role);
  if(on) roles.push(role);
  const rStr=roles.join(',');
  u.role=rStr;
  if(!pendingUserUpdates[uid]) pendingUserUpdates[uid]={};
  pendingUserUpdates[uid].role=rStr;
}
  
function setLevel(uid,type,val){
  const u=allUsers.find(x=>x.user_id==uid);
  let [j,r]=splitLevel(u.level);
  if(type==='judge') j=val; else r=val;
  u.level=`${j},${r}`;
  if(!pendingUserUpdates[uid]) pendingUserUpdates[uid]={};
  pendingUserUpdates[uid].level=u.level;
}
  
function saveUser(uid) {
  const data = pendingUserUpdates[uid];
  if (!data) {
    showToast('е°ҡжңӘдҝ®ж”№','warn');
    return;
  }

  const entries = Object.entries(data);
  let finished = 0;
  let hasError = false;

  entries.forEach(([field, value]) => {
    callApi(
      {
        action: 'updateUserField',  // вң… жҸӣйҖҷеҖӢ
        user_id: uid,
        field,
        value
      },
      function(res) {

        if (res && res.result === 'error') {
          hasError = true;
          showToast(res.message || `жӣҙж–° ${field} еӨұж•—`,'error');
        }

        finished++;

        // вң… е…ЁйғЁж¬„дҪҚйҖҒе®ҢеҫҢжүҚ refresh
        if (finished === entries.length && !hasError) {
          showToast('е„ІеӯҳжҲҗеҠҹ','success');
          pendingUserUpdates[uid] = null;
          loadUsers();
        }
      }
    );
  });
}

/* create */
function openCreateUser(){
  const username=prompt('еёіиҷҹ'); if(!username) return;
  const name=prompt('е§“еҗҚ'); if(!name) return;
  const email=prompt('Email'); if(!email) return;
  
  callApi({ action:'createUser', username, name, email }, res => {
    if (!res) {
      showToast('ж–°еўһеӨұж•—пјҲз„ЎеӣһжҮүпјү','error');
      return;
    }
  
    // вң… ж”ҫеҜ¬еҲӨж–·жўқд»¶
    if (res.result === 'error') {
      showToast(res.message || 'ж–°еўһеӨұж•—','error');
      return;
    }
  
    showToast('ж–°еўһжҲҗеҠҹ','success');
    
    setTimeout(() => {
      loadUsers();
    }, 300);

    loadUsers();
  });
}


function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);

  setTimeout(()=>t.classList.add('show'),10);

  setTimeout(()=>{
    t.classList.remove('show');
    setTimeout(()=>t.remove(),300);
  },2000);
}


function deleteUser(uid, username) {
  if (!confirm(`зўәе®ҡиҰҒеҲӘйҷӨдҪҝз”ЁиҖ…гҖҢ${username}гҖҚпјҹ`)) return;

  const currentUserId = localStorage.getItem('user_id') || '';

  callApi(
    {
      action: 'deleteUsers',          // вң… е°ҚйҪҠеҫҢз«Ҝ
      user_ids: uid,                  // вң… е°ҚйҪҠеҫҢз«ҜпјҲйҖ—иҷҹеӯ—дёІпјү
      current_user_id: currentUserId  // вң… еҫҢз«ҜйңҖиҰҒ
    },
    function(res) {

      console.log('[deleteUsers response]', res);

      if (res && res.result === 'error') {
        showToast(res.message || 'еҲӘйҷӨеӨұж•—','error');
        return;
      }

      showToast(res.message || 'еҲӘйҷӨжҲҗеҠҹ','success');
      loadUsers();
    }
  );
}




</script>
