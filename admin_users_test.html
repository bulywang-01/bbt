<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<title>使用者帳號管理</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system;
  background: #f5f6f8;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  background: #fff;
  border-bottom: 1px solid #ddd;
}
.nav a {
  margin-right: 16px;
  text-decoration: none;
  color: #0066cc;
}
.main {
  padding: 20px;
}

/* ===== Tabs ===== */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.tab {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid #ccc;
  background: #f3f4f6;
  cursor: pointer;
}
.tab.active {
  background: #2c7be5;
  color: #fff;
  border-color: #2c7be5;
}
.hidden {
  display: none;
}

/* ===== User Card ===== */
.user-card {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 12px;
}
.user-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
}
.badge {
  margin-left: 6px;
  padding: 2px 8px;
  font-size: 12px;
  background: #eef2f6;
  border-radius: 10px;
}
.user-grid {
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 8px 12px;
}
.user-grid input,
.user-grid select {
  padding: 4px 6px;
  font-size: 14px;
}
.user-actions button {
  margin-left: 6px;
}
.edit-actions {
  margin-top: 10px;
  text-align: right;
}
button {
  padding: 6px 12px;
  cursor: pointer;
}
.primary {
  background: #2c7be5;
  color: #fff;
  border: none;
}
.danger {
  background: #c62828;
  color: #fff;
  border: none;
}

/* ===== Toast ===== */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 14px 20px;
  border-radius: 8px;
  color: #fff;
  opacity: 0;
  transition: opacity .3s;
  z-index: 9999;
}
.toast.show { opacity: 1; }
.toast.success { background: #2e7d32; }
.toast.error { background: #c62828; }
.toast.warn { background: #ed6c02; }
</style>
</head>

<body>
<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="judge_dashboard.html">📋 報名</a>
    <a href="admin_dashboard.html">⚙️ 管理</a>
    <a href="#" onclick="logout()">登出</a>（
    <span id="u_name"></span>）
  </div>
</div>

<div class="main">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('judge')">⚖️ 裁判</button>
    <button class="tab" onclick="switchTab('record')">📝 紀錄</button>
  </div>

  <div id="list-judge"></div>
  <div id="list-record" class="hidden"></div>
</div>

<script src="js/config.js"></script>

<script>
let pendingUserUpdates = {};
let allUsers = [];

document.addEventListener('DOMContentLoaded', () => {
  const raw = localStorage.getItem('session_user');
  if (!raw) return location.href = 'login.html';
  const session = JSON.parse(raw);
  document.getElementById('u_name').textContent = session.name;
  loadUsers();
});

/* ===== Tabs ===== */
function switchTab(type) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('#list-judge,#list-record').forEach(d => d.classList.add('hidden'));
  event.target.classList.add('active');
  document.getElementById('list-' + type).classList.remove('hidden');
}

/* ===== Toast ===== */
function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.classList.add('show'),50);
  setTimeout(()=>{ t.remove(); },3000);
}

/* ===== Load Users ===== */
function loadUsers() {
  callApi({ action:'getUsers' }, res => {
    if (!res || res.result !== 'ok') {
      showToast('讀取失敗','error');
      return;
    }
    allUsers = res.users || [];
    renderLists();
  });
}

function renderLists() {
  const judgeBox = document.getElementById('list-judge');
  const recordBox = document.getElementById('list-record');
  judgeBox.innerHTML = '';
  recordBox.innerHTML = '';

  allUsers.forEach(u => {
    const roles = (u.role || '').split(',');
    if (roles.includes('judge')) judgeBox.appendChild(renderCard(u,'裁判'));
    if (roles.includes('record')) recordBox.appendChild(renderCard(u,'紀錄'));
  });
}

/* ===== Render Card ===== */
function renderCard(u, label) {
  const card = document.createElement('div');
  card.className = 'user-card';
  card.innerHTML = `
    <div class="user-header">
      <div><b>${u.name}</b><span class="badge">${label}</span></div>
      <div class="user-actions">
        <button onclick="enableEdit(this)">✏️ 編輯</button>
        ${u.username!=='admin'
          ? `<button class="danger" onclick="deleteSingleUser('${u.user_id}','${u.username}')">刪除</button>`
          : ``}
      </div>
    </div>
    <div class="user-grid">
      <label>帳號</label><input value="${u.username}" disabled>
      <label>電話</label><input value="${u.phone||''}" disabled onchange="updateField('${u.user_id}','phone',this.value)">
      <label>Email</label><input value="${u.email||''}" disabled onchange="updateField('${u.user_id}','email',this.value)">
      <label>狀態</label>
      <select disabled onchange="updateField('${u.user_id}','active',this.value)">
        <option value="Y" ${u.active==='Y'?'selected':''}>啟用</option>
        <option value="N" ${u.active==='N'?'selected':''}>停用</option>
      </select>
    </div>
    <div class="edit-actions hidden">
      <button class="primary" onclick="saveUser('${u.user_id}',this)">💾 儲存</button>
      <button onclick="cancelEdit(this)">❌ 取消</button>
    </div>
  `;
  return card;
}

/* ===== Edit Mode ===== */
function enableEdit(btn) {
  const card = btn.closest('.user-card');
  card.querySelectorAll('input,select').forEach(el => el.disabled=false);
  card.querySelector('.edit-actions').classList.remove('hidden');
}
function cancelEdit(btn) {
  const card = btn.closest('.user-card');
  card.querySelectorAll('input,select').forEach(el => el.disabled=true);
  card.querySelector('.edit-actions').classList.add('hidden');
}

/* ===== Update ===== */
function updateField(uid, field, val) {
  if (!pendingUserUpdates[uid]) pendingUserUpdates[uid]={};
  pendingUserUpdates[uid][field]=val;
}
function saveUser(uid,btn) {
  const data = pendingUserUpdates[uid];
  if (!data) return showToast('未修改','warn');
  callApi({ action:'updateUser', user_id:uid, ...data }, res=>{
    if (!res||res.result!=='ok') return showToast('更新失敗','error');
    showToast('更新完成','success');
    pendingUserUpdates[uid]=null;
    loadUsers();
  });
}

/* ===== Delete / Logout ===== */
function deleteSingleUser(uid,name) {
  if (!confirm(`刪除 ${name}？`)) return;
  callApi({ action:'deleteUsers', user_ids:uid }, res=>{
    if(res.result==='ok'){ showToast('刪除完成'); loadUsers(); }
  });
}
function logout() {
  localStorage.clear();
  location.href='login.html';
}
</script>
</body>
</html>
