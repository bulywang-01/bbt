<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>使用者帳號管理</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system;
  background: #f5f6f8;
}

.header {
  padding: 12px 20px;
  background: #fff;
  border-bottom: 1px solid #ddd;
}

.main {
  padding: 20px;
}

/* ===== Tabs ===== */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.tab {
  padding: 6px 14px;
  border-radius: 16px;
  border: 1px solid #ccc;
  background: #f3f4f6;
  cursor: pointer;
}
.tab.active {
  background: #2c7be5;
  color: #fff;
}

/* ===== Table ===== */
table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  margin-bottom: 20px;
}
th, td {
  border: 1px solid #ddd;
  padding: 6px 8px;
  font-size: 14px;
  text-align: center;
}
th {
  background: #f4f6f8;
  font-weight: 600;
}
tr:nth-child(even) {
  background: #fafafa;
}
tr.editing {
  background: #fff9e6;
}

input[type="text"], select {
  width: 100%;
  box-sizing: border-box;
}

.hidden {
  display: none;
}

/* 操作欄 */
.action-edit { display: none; }
tr.editing .action-view { display: none; }
tr.editing .action-edit { display: inline-block; }
</style>
</head>

<body>

<div class="header">
  <strong>系統管理員</strong>
  <span id="u_name"></span>
</div>

<div class="header">
  <div class="nav">
    🏠<a href="index.html">首頁</a>　
    📋<a href="judge_dashboard.html">出勤班表</a>　
    <!--
    <a href="files.html">📂 下載</a>
    ✅<a href="review_dashboard.html">審核</a>　
    -->
    ⚙️<a href="admin_dashboard.html">管理</a>　
    🔐<a href="change_password.html" class="change-pwd">改密碼</a>　
    <a href="#" class="logout" onclick="logout()">登出</a>
         <span id="u_name" class="user-name"></span> 
  </div>
</div>

<div class="main">

<div class="tabs">
  <button class="tab active" onclick="switchTab('judge',this)">⚖️ 裁判</button>
  <button class="tab" onclick="switchTab('record',this)">📝 紀錄</button>
  <button class="tab" onclick="switchTab('admin',this)">🛠 系統管理員</button>
</div>

<table id="table-judge">
<thead>
<tr>
  <th>帳號</th>
  <th>姓名</th>
  <th>背號</th>
  <th>電話</th>
  <th>Email</th>
  <th>身份</th>
  <th>裁判證照</th>
  <th>紀錄證照</th>
  <th>狀態</th>
  <th>操作</th>
</tr>
</thead>
<tbody id="tbody-judge"></tbody>
</table>

<table id="table-record" class="hidden">
  <thead><tr>
    <th>帳號</th><th>姓名</th><th>背號</th><th>電話</th><th>Email</th>
    <th>身份</th><th>裁判證照</th><th>紀錄證照</th><th>狀態</th><th>操作</th>
  </tr></thead>
  <tbody id="tbody-record"></tbody>
</table>

<table id="table-admin" class="hidden">
  <thead><tr>
    <th>帳號</th><th>姓名</th><th>背號</th><th>電話</th><th>Email</th>
    <th>身份</th><th>狀態</th>
  </tr></thead>
  <tbody id="tbody-admin"></tbody>
</table>

</div>

<script src="js/config.js"></script>
  
<script>
let allUsers = [];
let pendingUserUpdates = {};
let currentTab = 'judge';  // ✅ 預設在裁判頁

function showToast(msg){ alert(msg); }

function switchTab(type, btn){
  currentTab = type; // ✅ 補這行
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['judge','record','admin'].forEach(t=>{
    document.getElementById('table-'+t).classList.toggle('hidden', t!==type);
  });
}

document.addEventListener('DOMContentLoaded', ()=>{
  const session = JSON.parse(localStorage.getItem('session_user')||'{}');
  document.getElementById('u_name').textContent = session.name||'';
  loadUsers();
});

function loadUsers(){
  callApi({action:'getUsers'}, res=>{
    if(!res || res.result!=='ok'){ showToast('載入失敗'); return; }
    allUsers = res.users.map(u=>{
      if(!u.role) u.role='';
      if(!u.record_level) u.record_level='N';
      return u;
    });
    renderLists();

    // ✅ 用 currentTab 切回原頁籤（這行位置是對的）
    const activeBtn =
      document.querySelector(`.tab[onclick*="${currentTab}"]`)
      || document.querySelector('.tab');

    switchTab(currentTab, activeBtn);

  });
}

function renderLists(){
  ['judge','record','admin'].forEach(t=>{
    document.getElementById('tbody-'+t).innerHTML='';
  });

  allUsers.forEach(u=>{
    const roles = u.role.split(',').map(r=>r.trim()).filter(Boolean);
    if(roles.includes('judge')||roles.includes('chief_judge')){
      document.getElementById('tbody-judge').appendChild(renderEditableRow(u));
    }
    if(roles.includes('record')||roles.includes('record_chief')){
      document.getElementById('tbody-record').appendChild(renderEditableRow(u));
    }
    if(roles.includes('admin')){
      document.getElementById('tbody-admin').appendChild(renderAdminRow(u));
    }
  });
}

function renderEditableRow(u){
  const roles = u.role.split(',').map(r=>r.trim());
  const tr=document.createElement('tr');
  tr.dataset.uid=u.user_id;
  tr.innerHTML=`
<td>${u.username}</td>
<td>${u.name||''}</td>
<td><input disabled value="${u.note||''}" onchange="markField('${u.user_id}','note',this.value)"></td>
<td><input disabled value="${u.phone||''}" onchange="markField('${u.user_id}','phone',this.value)"></td>
<td><input disabled value="${u.email||''}" onchange="markField('${u.user_id}','email',this.value)"></td>
<td>
<label><input type="radio" name="j_${u.user_id}" value="judge" ${roles.includes('judge')?'checked':''} disabled onchange="markRole('${u.user_id}')">裁判</label>
<label><input type="radio" name="j_${u.user_id}" value="chief_judge" ${roles.includes('chief_judge')?'checked':''} disabled onchange="markRole('${u.user_id}')">裁判長</label>
<label><input type="radio" name="r_${u.user_id}" value="record" ${roles.includes('record')?'checked':''} disabled onchange="markRole('${u.user_id}')">紀錄</label>
<label><input type="radio" name="r_${u.user_id}" value="record_chief" ${roles.includes('record_chief')?'checked':''} disabled onchange="markRole('${u.user_id}')">紀錄長</label>
<label><input type="checkbox" data-role="admin" ${roles.includes('admin')?'checked':''} disabled onchange="markRole('${u.user_id}')">系統管理員</label>
</td>
<td>
<select disabled onchange="markField('${u.user_id}','level',this.value)">
  <option value="N" ${u.level === 'N' ? 'selected' : ''}>暫無</option>
  <option value="A" ${u.level === 'A' ? 'selected' : ''}>A</option>
  <option value="B" ${u.level === 'B' ? 'selected' : ''}>B</option>
  <option value="C" ${u.level === 'C' ? 'selected' : ''}>C</option>
</select>
</td>
<td>
<select disabled
  onchange="markFieldChanged('${u.user_id}', 'level', this.value)">
  <option value="N" ${u.level === 'N' ? 'selected' : ''}>暫無</option>
  <option value="A" ${u.level === 'A' ? 'selected' : ''}>A</option>
  <option value="B" ${u.level === 'B' ? 'selected' : ''}>B</option>
  <option value="C" ${u.level === 'C' ? 'selected' : ''}>C</option>
</select>
</td>
<td>${u.active==='Y'?'啟用':'停用'}</td>
<td>
<span class="action-view"><button onclick="enableEdit(this)">✏️</button></span>
<span class="action-edit">
<button onclick="saveUser('${u.user_id}')">💾</button>
<button onclick="cancelEdit(this)">❌</button>
</span>
</td>
`;
  return tr;
}

function renderAdminRow(u){
  const tr=document.createElement('tr');
  tr.innerHTML=`<td>${u.username}</td><td>${u.name}</td><td>${u.note||''}</td><td>${u.phone||''}</td><td>${u.email||''}</td><td>${u.role}</td><td>${u.active==='Y'?'啟用':'停用'}</td>`;
  return tr;
}

function enableEdit(btn){
  const tr=btn.closest('tr');
  tr.classList.add('editing');
  tr.querySelectorAll('input,select').forEach(el=>el.disabled=false);
}
function cancelEdit(btn){
  const tr=btn.closest('tr');
  tr.classList.remove('editing');
  tr.querySelectorAll('input,select').forEach(el=>el.disabled=true);
}

function markField(uid,key,val){
  if(!pendingUserUpdates[uid]) pendingUserUpdates[uid]={};
  pendingUserUpdates[uid][key]=val;
}
function markRole(uid){
  const row=document.querySelector(`tr[data-uid="${uid}"]`);
  const roles=[];
  const j=row.querySelector(`input[name="j_${uid}"]:checked`);
  const r=row.querySelector(`input[name="r_${uid}"]:checked`);
  if(j) roles.push(j.value);
  if(r) roles.push(r.value);
  if(row.querySelector('[data-role="admin"]').checked) roles.push('admin');
  markField(uid,'role',roles.join(','));
}
function saveUser(uid){
  const data=pendingUserUpdates[uid];
  if(!data){ showToast('尚未修改'); return;}
  callApi({action:'updateUser',user_id:uid,...data}, res=>{
    if(res.result!=='ok'){ showToast('失敗'); return;}
    Object.assign(allUsers.find(x=>x.user_id==uid),data);
    pendingUserUpdates[uid]=null;
    renderLists();
    switchTab(currentTab, document.querySelector('.tab.active'));
    
    showToast('更新成功');

  });
}

// JS 防呆 + 組 role 字串
function markRoleChanged(uid) {
  const row = document.querySelector(`tr[data-uid="${uid}"]`);
  if (!row) return;

  const roles = [];

  // 裁判群組（二選一）
  const judgeChecked = row.querySelector(`input[name="judge_${uid}"]:checked`);
  if (judgeChecked) roles.push(judgeChecked.value);

  // 紀錄群組（二選一）
  const recordChecked = row.querySelector(`input[name="record_${uid}"]:checked`);
  if (recordChecked) roles.push(recordChecked.value);

  // admin（獨立）
  if (row.querySelector('input[data-role="admin"]')?.checked) {
    roles.push('admin');
  }

  if (!pendingUserUpdates[uid]) pendingUserUpdates[uid] = {};
  pendingUserUpdates[uid].role = roles.join(',');
}
</script>
</body>
</html>
