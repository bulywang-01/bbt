<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>使用者帳號管理</title>

<style>
body { margin:0; font-family:system-ui,-apple-system; background:#f5f6f8; }
.header {
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 20px; background:#fff; border-bottom:1px solid #ddd;
}
.nav a { margin-right:16px; text-decoration:none; color:#0066cc; }
.main { padding:20px; }

/* Toolbar */
.toolbar {
  display:flex; gap:12px; align-items:center; margin-bottom:12px;
}
.toolbar input[type="text"] { padding:6px 8px; width:220px; }

/* Tabs */
.tabs { display:flex; gap:8px; margin-bottom:12px; }
.tab {
  padding:6px 14px; border-radius:16px;
  border:1px solid #ccc; background:#f3f4f6; cursor:pointer;
}
.tab.active { background:#2c7be5; color:#fff; border-color:#2c7be5; }
.hidden { display:none; }

/* Table */
.user-table {
  width:100%; border-collapse:collapse; background:#fff;
}
.user-table th, .user-table td {
  border:1px solid #ddd; padding:6px; text-align:center; font-size:14px;
}
.user-table th { background:#f1f5f9; }

.user-table input, .user-table select {
  padding:4px; font-size:13px; box-sizing:border-box;
}
.user-table input:disabled, .user-table select:disabled {
  background:#f5f5f5;
}

/* Column sizes */
.col-name input { width:120px; }
.col-phone input { width:120px; }
.col-note input { width:60px; text-align:center; }

/* Placeholder style */
.placeholder { color:#999; font-style:italic; }

/* Roles */
.role-group {
  display:flex; gap:8px; justify-content:center; white-space:nowrap;
}
.role-group label {
  display:flex; align-items:center; gap:4px; font-size:13px;
}

/* Small selects */
.small-select { width:70px; font-size:13px; text-align:center; }

/* Action column */
.action-edit { display:none; }
tr.editing .action-view { display:none; }
tr.editing .action-edit { display:inline-block; }

button { padding:4px 8px; cursor:pointer; }
.primary { background:#2c7be5; color:#fff; border:none; }
.danger { background:#c62828; color:#fff; border:none; }

/* Toast */
.toast {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  padding:14px 20px; border-radius:8px; color:#fff;
  opacity:0; transition:.3s; z-index:9999;
}
.toast.show { opacity:1; }
.toast.success { background:#2e7d32; }
.toast.error { background:#c62828; }
.toast.warn { background:#ed6c02; }

/* ===== 編輯中列提示 ===== */
tr.editing {
  background-color: #fff8dc;   /* 淡黃色 */
}
tr.editing td {
  background-color: #fff8dc;
}

</style>
</head>

<body>
<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="judge_dashboard.html">📋 報名</a>
    <a href="admin_dashboard.html">⚙️ 管理</a>
  </div>
  <div>
    <span id="u_name"></span>
    <a href="#" onclick="logout()">登出</a>
  </div>
</div>


<div class="main">

  <hr style="margin:24px 0">

    <h3>➕ 新增使用者</h3>
    <div class="toolbar">
      <input id="new_username" placeholder="帳號">
      <input id="new_name" placeholder="姓名">
      <input id="new_phone" placeholder="電話">
      <input id="new_email" placeholder="Email">
    
      <select id="new_level">
        <option value="NONE">裁判證：無</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
      </select>
    
      <label><input type="checkbox" id="r_judge"> 裁判</label>
      <label><input type="checkbox" id="r_chief_judge"> 裁判長</label>
      <label><input type="checkbox" id="r_record"> 紀錄</label>
      <label><input type="checkbox" id="r_record_chief"> 紀錄長</label>
      <label><input type="checkbox" id="r_admin"> 管理員</label>
    
      <button class="primary" onclick="createUser()">新增</button>
    </div>
    
    <p style="font-size:12px;color:#666">
      新帳號預設密碼：<b>12345678</b>（首次登入需修改）
    </p>

  <div class="toolbar">
    <input type="text" id="keyword" placeholder="搜尋帳號 / 姓名">
    <label><input type="checkbox" id="onlyActive"> 只顯示啟用帳號</label>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('judge',this)">⚖️ 裁判</button>
    <button class="tab" onclick="switchTab('record',this)">📝 紀錄</button>
    <button class="tab" onclick="switchTab('admin',this)">🛠 系統管理員</button>
  </div>

  <!-- Tables -->
  <table class="user-table" id="table-judge">
    <thead>
      <tr>
        <th>帳號</th><th>姓名</th><th>背號</th><th>電話</th>
        <th>Email</th><th>身份</th><th>裁判等級</th>
        <th>狀態</th><th>操作</th>
      </tr>
    </thead>
    <tbody id="tbody-judge"></tbody>
  </table>

  <table class="user-table hidden" id="table-record">
    <thead>
      <tr>
        <th>帳號</th><th>姓名</th><th>背號</th><th>電話</th>
        <th>Email</th><th>身份</th><th>裁判等級</th>
        <th>狀態</th><th>操作</th>
      </tr>
    </thead>
    <tbody id="tbody-record"></tbody>
  </table>

  <table class="user-table hidden" id="table-admin">
    <thead>
      <tr>
        <th>帳號</th><th>姓名</th><th>背號</th><th>電話</th>
        <th>Email</th><th>身份</th><th>裁判等級</th>
        <th>狀態</th><th>操作</th>
      </tr>
    </thead>
    <tbody id="tbody-admin"></tbody>
  </table>

</div>


<script src="js/config.js"></script>

<script>
let allUsers = [];
let pendingUserUpdates = {};

document.addEventListener('DOMContentLoaded', () => {
  const raw = localStorage.getItem('session_user');
  if (!raw) return location.href = 'login.html';
  const session = JSON.parse(raw);
  document.getElementById('u_name').textContent = session.name || '';
  document.getElementById('keyword').addEventListener('input', renderLists);
  document.getElementById('onlyActive').addEventListener('change', renderLists);
  loadUsers();
});

/* Tabs */
function switchTab(type, btn) {
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['judge','record','admin'].forEach(t=>{
    document.getElementById('table-'+t).classList.toggle('hidden', t!==type);
  });
}

/* Toast */
function showToast(msg,type='success'){
  const t=document.createElement('div');
  t.className=`toast ${type}`; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.classList.add('show'),50);
  setTimeout(()=>t.remove(),3000);
}

/* Load & Render */
function loadUsers(){
  callApi({action:'getUsers'},res=>{
    if(!res||res.result!=='ok') return showToast('讀取失敗','error');
    allUsers=res.users||[];
    renderLists();
  });
}

function renderLists(){
  const kw=document.getElementById('keyword').value.trim();
  const onlyActive=document.getElementById('onlyActive').checked;

  const bodies={
    judge:document.getElementById('tbody-judge'),
    record:document.getElementById('tbody-record'),
    admin:document.getElementById('tbody-admin')
  };
  Object.values(bodies).forEach(b=>b.innerHTML='');

  allUsers.forEach(u=>{
    const username=u.username||'';
    const name=u.name||'';
    if(onlyActive && u.active!=='Y') return;
    if(kw && !(username.includes(kw)||name.includes(kw))) return;

    const roles=(u.role||'').split(',');

    if (roles.includes('admin')) {
      adminBody.appendChild(renderRowAdmin(u));
    }
    if (roles.includes('judge') || roles.includes('chief_judge'))
      bodies.judge.appendChild(renderRow(u));

    if (roles.includes('record') || roles.includes('record_chief'))
      bodies.record.appendChild(renderRow(u));

    //if (roles.includes('admin'))
    //  bodies.admin.appendChild(renderRow(u));
  });
}

function renderRow(u){
  const tr=document.createElement('tr');
  const displayName=u.name||'（未填姓名）';
  tr.innerHTML=`
    <td>${u.username}</td>
    <td class="col-name">
      <input class="${u.name?'':'placeholder'}" value="${displayName}"
        disabled onchange="updateField('${u.user_id}','name',this.value)">
    </td>
    <td class="col-note">
      <input value="${u.note||''}" disabled
        onchange="updateField('${u.user_id}','note',this.value)">
    </td>
    <td class="col-phone">
      <input class="${u.phone?'':'placeholder'}"
        value="${u.phone||'（未填電話）'}" disabled
        onchange="updateField('${u.user_id}','phone',this.value)">
    </td>
    <td>
      <input value="${u.email||''}" disabled
        onchange="updateField('${u.user_id}','email',this.value)">
    </td>
    <td>
      <div class="role-group">
        <!-- 裁判群組：judge / chief_judge（二選一） -->
        <label>
          <input type="radio"
            name="judge_${u.user_id}"
            value="judge"
            ${u.role.includes('judge') ? 'checked' : ''}
            disabled
            onchange="toggleRoleGroup('${u.user_id}','judge','chief_judge','judge')">
          裁判
        </label>
    
        <label>
          <input type="radio"
            name="judge_${u.user_id}"
            value="chief_judge"
            ${u.role.includes('chief_judge') ? 'checked' : ''}
            disabled
            onchange="toggleRoleGroup('${u.user_id}','judge','chief_judge','chief_judge')">
          裁判長
        </label>
    
        <!-- 紀錄群組：record / record_chief（二選一） -->
        <label>
          <input type="radio"
            name="record_${u.user_id}"
            value="record"
            ${u.role.includes('record') ? 'checked' : ''}
            disabled
            onchange="toggleRoleGroup('${u.user_id}','record','record_chief','record')">
          紀錄
        </label>
    
        <label>
          <input type="radio"
            name="record_${u.user_id}"
            value="record_chief"
            ${u.role.includes('record_chief') ? 'checked' : ''}
            disabled
            onchange="toggleRoleGroup('${u.user_id}','record','record_chief','record_chief')">
          紀錄長
        </label>
    
        <!-- 系統管理員（可並存） -->
        <label>
          <input type="checkbox"
            ${u.role.includes('admin') ? 'checked' : ''}
            disabled
            onchange="toggleAdmin('${u.user_id}', this.checked)">
          管理員
        </label>
      </div>
    </td>
    <td>
      <select class="small-select" disabled
        onchange="updateField('${u.user_id}','level',this.value)">
        <option value="NONE">無</option>
        <option value="A" ${u.level==='A'?'selected':''}>A</option>
        <option value="B" ${u.level==='B'?'selected':''}>B</option>
        <option value="C" ${u.level==='C'?'selected':''}>C</option>
      </select>
    </td>
    <td>
      <select class="small-select" disabled
        onchange="handleActiveChange('${u.user_id}', this.value)">
        <option value="Y" ${u.active === 'Y' ? 'selected' : ''}>啟用</option>
        <option value="N" ${u.active === 'N' ? 'selected' : ''}>停用</option>
      </select>
    </td>
    <td>
      <div class="action-view">
        <button onclick="enableEdit(this)">✏️</button>
      </div>
      <div class="action-edit">
        <button class="primary" onclick="saveUser('${u.user_id}')">💾</button>
        <button onclick="cancelEdit(this)">❌</button>
      </div>
    </td>
  `;
  return tr;
}

function enableEdit(btn){
  const tr=btn.closest('tr');
  tr.classList.add('editing');
  tr.querySelectorAll('input,select').forEach(el=>el.disabled=false);
}
function cancelEdit(btn){
  const tr=btn.closest('tr');
  tr.classList.remove('editing');
  tr.querySelectorAll('input,select').forEach(el=>el.disabled=true);
}

function updateField(uid,field,val){
  if(!pendingUserUpdates[uid]) pendingUserUpdates[uid]={};
  pendingUserUpdates[uid][field]=val;
}
function saveUser(uid){
  const data=pendingUserUpdates[uid];
  if(!data) return showToast('尚未修改','warn');
  callApi({action:'updateUser',user_id:uid,...data},res=>{
    if(!res||res.result!=='ok') return showToast('更新失敗','error');
    showToast('更新完成');
    pendingUserUpdates[uid]=null;
    loadUsers();
  });
}

function createUser() {
  const username = document.getElementById('new_username').value.trim();
  if (!username) return showToast('請填寫帳號','warn');

  const roles = [];

  // 裁判群組（2 選 1）
  if (document.getElementById('r_judge').checked) roles.push('judge');
  if (document.getElementById('r_chief_judge').checked) roles.push('chief_judge');
  if (roles.includes('judge') && roles.includes('chief_judge')) {
    return showToast('裁判 / 裁判長只能擇一','warn');
  }

  // 紀錄群組（2 選 1）
  if (document.getElementById('r_record').checked) roles.push('record');
  if (document.getElementById('r_record_chief').checked) roles.push('record_chief');
  if (roles.includes('record') && roles.includes('record_chief')) {
    return showToast('紀錄 / 紀錄長只能擇一','warn');
  }

  if (document.getElementById('r_admin').checked) roles.push('admin');

  callApi({
    action: 'createUser',
    username,
    name: document.getElementById('new_name').value,
    phone: document.getElementById('new_phone').value,
    email: document.getElementById('new_email').value,
    level: document.getElementById('new_level').value,
    role: roles.join(','),
    active: 'Y'
  }, res => {
    if (!res || res.result !== 'ok')
      return showToast('新增失敗','error');
    showToast('新增成功');
    loadUsers();
  });
}


function toggleRole(uid, role, checked) {
  const u = allUsers.find(x => x.user_id === uid);
  let roles = (u.role || '').split(',').filter(Boolean);

  // 裁判群組互斥
  if (role === 'judge' && checked) roles = roles.filter(r => r !== 'chief_judge');
  if (role === 'chief_judge' && checked) roles = roles.filter(r => r !== 'judge');

  // 紀錄群組互斥
  if (role === 'record' && checked) roles = roles.filter(r => r !== 'record_chief');
  if (role === 'record_chief' && checked) roles = roles.filter(r => r !== 'record');

  if (checked && !roles.includes(role)) roles.push(role);
  if (!checked) roles = roles.filter(r => r !== role);

  const newRole = roles.join(',');

  // ✅ 同步前端狀態
  u.role = newRole;

  // ✅ 丟進待儲存
  updateField(uid,'role',newRole);

  // ✅ 立刻重畫（多頁籤同步）
  renderLists();
}

// 裁判 / 紀錄（群組互斥）
function toggleRoleGroup(uid, roleA, roleB, selected) {
  const u = allUsers.find(x => String(x.user_id) === String(uid));
  if (!u) {
    showToast('找不到使用者資料，請重新整理', 'error');
    return;
  }

  // 目前角色轉成陣列
  let roles = (u.role || '').split(',').filter(Boolean);

  // 🔒 同群組互斥（先移除 judge/chief_judge 或 record/record_chief）
  roles = roles.filter(r => r !== roleA && r !== roleB);

  // 加上新的角色
  roles.push(selected);

  const newRole = roles.join(',');

  // ✅ 同步畫面狀態
  u.role = newRole;

  // ✅ 記錄待儲存資料（儲存才不會顯示「尚未修改」）
  updateField(uid, 'role', newRole);

  // ❗ 重點：不要 renderLists()，否則會被 disabled
}



// 系統管理員（可並存）
function toggleAdmin(uid, checked) {
  const u = allUsers.find(x => String(x.user_id) === String(uid));
  if (!u) {
    showToast('找不到使用者資料', 'error');
    return;
  }

  let roles = (u.role || '').split(',').filter(Boolean);

  // 🔒 最後一個 admin 不可取消
  if (!checked && roles.includes('admin')) {
    const activeAdminCount = allUsers.filter(x => {
      if (x.active !== 'Y') return false;
      return (x.role || '').split(',').includes('admin');
    }).length;

    if (activeAdminCount <= 1) {
      showToast('至少需保留一位系統管理員', 'warn');
      return;
    }
  }

  if (checked && !roles.includes('admin')) roles.push('admin');
  if (!checked) roles = roles.filter(r => r !== 'admin');

  const newRole = roles.join(',');
  u.role = newRole;
  updateField(uid, 'role', newRole);
}


// ===== 只給管理員頁籤用 =====
function renderRowAdmin(u) {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${u.username}</td>
    <td>${u.name || '（未填姓名）'}</td>
    <td>${u.note || ''}</td>
    <td>${u.phone || ''}</td>
    <td>${u.email || ''}</td>
    <td>${u.role}</td>
    <td>${u.level || 'NONE'}</td>
    <td>${u.active === 'Y' ? '啟用' : '停用'}</td>
  `;
  return tr;
}

// ===== 裁判長 / 紀錄長 必須 active =====
function handleActiveChange(uid, newValue) {
  const u = allUsers.find(x => String(x.user_id) === String(uid));
  if (!u) return;

  const roles = (u.role || '').split(',').filter(Boolean);

  // 🔒 裁判長 / 紀錄長 必須為啟用
  if (newValue === 'N' &&
      (roles.includes('chief_judge') || roles.includes('record_chief'))) {
    showToast('裁判長 / 紀錄長 必須為啟用狀態', 'warn');
    return;
  }

  // ✅ 合法才更新
  u.active = newValue;
  updateField(uid, 'active', newValue);
}
  
function logout(){
  localStorage.clear();
  location.href='login.html';
}
</script>
</body>
</html>
