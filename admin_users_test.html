<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>使用者管理</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system;
  background: #f5f6f8;
}
.header {
  background: #ffffff;
  border-bottom: 1px solid #ddd;
  padding: 12px 20px;
}
.header b { font-size: 18px; }

.main {
  padding: 20px;
}

/* Tabs */
.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}
.tab {
  padding: 6px 14px;
  border-radius: 18px;
  border: 1px solid #bbb;
  background: #f3f4f6;
  cursor: pointer;
  font-size: 14px;
}
.tab.active {
  background: #2c7be5;
  color: #fff;
  border-color: #2c7be5;
}

/* Tables */
table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
}
th, td {
  border: 1px solid #ddd;
  padding: 6px 8px;
  font-size: 14px;
  text-align: left;
}
th {
  background: #f1f5f9;
}
tr:nth-child(even) {
  background: #fafafa;
}
tr.editing {
  background: #fff8dc;
}

/* Inputs */
input[type="text"], select {
  width: 100%;
  box-sizing: border-box;
}

/* Buttons */
button {
  padding: 4px 8px;
  cursor: pointer;
}
.primary {
  background: #2c7be5;
  color: #fff;
  border: none;
}

.hidden {
  display: none;
}

.role-summary {
  font-size: 13px;
  color: #555;
  margin-bottom: 4px;
}

/* ===== 表格優化 ===== */
table th {
  background: #f8fafc;
  font-weight: 600;
}

table td {
  vertical-align: top;
}

/* ===== 角色 badge ===== */
.role-badges {
  margin-bottom: 6px;
}
.role-badge {
  display: inline-block;
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 8px;
  margin-right: 4px;
  background: #e5e7eb;
  color: #333;
}
.role-badge.judge { background:#e0f2fe; color:#0369a1; }
.role-badge.record { background:#ede9fe; color:#5b21b6; }
.role-badge.chief { background:#fde68a; color:#92400e; }
.role-badge.admin { background:#fee2e2; color:#991b1b; }

/* ===== Toast ===== */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #333;
  color: #fff;
  padding: 14px 22px;
  border-radius: 10px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s, transform .3s;
  z-index: 9999;
  font-size: 15px;
}
.toast.show {
  opacity: 1;
}
.toast.success { background:#15803d; }
.toast.error { background:#b91c1c; }
.toast.warn { background:#b45309; }

.toast.show {
  opacity: 1;
}
.toast.success { background:#15803d; }
.toast.error { background:#b91c1c; }

</style>
</head>

<body>
  
<div class="header">
  <div class="nav">
    🏠<a href="index.html">首頁</a>　
    📋<a href="judge_dashboard.html">出勤班表</a>

         <span id="u_name" class="user-name"></span> 
  </div>
</div>
  
<div class="header">
  <b>使用者管理</b>
  <button style="margin-left:12px;" onclick="openCreateUser()">＋ 新增使用者</button>
</div>

<div class="main">

<div class="tabs">
  <button class="tab active" onclick="switchTab('account',this)">帳號清單</button>
  <button class="tab" onclick="switchTab('judge',this)">裁判名單</button>
  <button class="tab" onclick="switchTab('record',this)">紀錄名單</button>
  <button class="tab" onclick="switchTab('chief_judge',this)">裁判長名單</button>
  <button class="tab" onclick="switchTab('record_chief',this)">紀錄長名單</button>
  <button class="tab" onclick="switchTab('admin',this)">管理員名單</button>
</div>

<!-- 帳號清單：唯一可編輯 -->
<table id="table-account">
<thead>
<tr>
  <th>帳號</th>
  <th>姓名</th>
  <th>Email</th>
  <th>電話</th>
  <th>身份</th>
  <th>裁判證</th>
  <th>紀錄證</th>
  <th>操作</th>
</tr>
</thead>
<tbody id="tbody-account"></tbody>
</table>

<!-- 只讀名單 -->
<table id="table-judge" class="hidden">
<thead><tr><th>帳號</th><th>姓名</th><th>裁判證照</th></tr></thead>
<tbody id="tbody-judge"></tbody>
</table>

<table id="table-record" class="hidden">
<thead><tr><th>帳號</th><th>姓名</th><th>紀錄證照</th></tr></thead>
<tbody id="tbody-record"></tbody>
</table>

<table id="table-chief_judge" class="hidden">
<thead><tr><th>帳號</th><th>姓名</th><th>裁判證照</th></tr></thead>
<tbody id="tbody-chief_judge"></tbody>
</table>

<table id="table-record_chief" class="hidden">
<thead><tr><th>帳號</th><th>姓名</th><th>紀錄證照</th></tr></thead>
<tbody id="tbody-record_chief"></tbody>
</table>

<table id="table-admin" class="hidden">
<thead><tr><th>帳號</th><th>姓名</th><th>Email</th></tr></thead>
<tbody id="tbody-admin"></tbody>
</table>

</div>

<script src="js/config.js"></script>
  
<script>
  
function displayLevel(v) {
  return (!v || v === 'N') ? '無' : v;
}

let allUsers = [];
let pendingUserUpdates = {};
let currentTab = 'account';

/* helpers */
function renderRoleTextCN(roleStr){
  const map = {
    judge: '裁判',
    chief_judge: '裁判長',
    record: '紀錄',
    record_chief: '紀錄長',
    admin: '系統管理員'
  };
  return (roleStr||'')
    .split(',')
    .filter(Boolean)
    .map(r=>map[r]||r)
    .join('、');
}

function splitLevel(level){
  if(!level || level==='NONE') return ['N','N'];
  if(!level.includes(',')) return [level,'N'];
  return level.split(',');
}

/* tabs */
function switchTab(type,btn){
  currentTab = type;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['account','judge','record','chief_judge','record_chief','admin']
    .forEach(t=>{
      document.getElementById('table-'+t).classList.toggle('hidden',t!==type);
    });
}

/* load */
document.addEventListener('DOMContentLoaded', ()=>{
  loadUsers();
});

function loadUsers(){
  callApi({action:'getUsers'}, res=>{
    allUsers = res.users || [];
    renderAll();
  });
}

/* render all tables */
function renderAll(){
  renderAccountList();
  renderReadonlyLists();
}


/* 帳號清單（唯一可編輯） */
function renderAccountList(){
  const tb = document.getElementById('tbody-account');
  tb.innerHTML='';
  allUsers.forEach(u=>{
    const roles = (u.role||'').split(',').filter(Boolean);
    const [jLv,rLv] = splitLevel(u.level);
    const tr=document.createElement('tr');
    // const [judgeLv, recordLv] = splitLevel(u.level || 'N,N');
    const [judgeLv, recordLv] = splitLevel(u.level);

    
    tr.innerHTML=`
<td>${u.username}</td>
<td><input value="${u.name||''}" oninput="markField('${u.user_id}','name',this.value)"></td>
<td><input value="${u.email||''}" oninput="markField('${u.user_id}','email',this.value)"></td>
<td><input value="${u.phone||''}" oninput="markField('${u.user_id}','phone',this.value)"></td>
<td>
  <div class="role-summary">目前身份：${renderRoleTextCN(u.role)}</div>
  <label><input type="checkbox" ${roles.includes('judge')?'checked':''} onchange="toggleRole('${u.user_id}','judge',this.checked)">裁判</label>
  <label><input type="checkbox" ${roles.includes('chief_judge')?'checked':''} onchange="toggleRole('${u.user_id}','chief_judge',this.checked)">裁判長</label>
  <label><input type="checkbox" ${roles.includes('record')?'checked':''} onchange="toggleRole('${u.user_id}','record',this.checked)">紀錄</label>
  <label><input type="checkbox" ${roles.includes('record_chief')?'checked':''} onchange="toggleRole('${u.user_id}','record_chief',this.checked)">紀錄長</label>
  <label><input type="checkbox" ${roles.includes('admin')?'checked':''} onchange="toggleRole('${u.user_id}','admin',this.checked)">系統管理員</label>
</td>

<td>
  <select onchange="setLevel('${u.user_id}','judge',this.value)">
    ${['N','A','B','C'].map(v =>
      `<option value="${v}" ${v===judgeLv?'selected':''}>${displayLevel(v)}</option>`
    ).join('')}
  </select>
</td>

<td>
  <select onchange="setLevel('${u.user_id}','record',this.value)">
    ${['N','A','B','C'].map(v =>
      `<option value="${v}" ${v===recordLv?'selected':''}>${displayLevel(v)}</option>`
    ).join('')}
  </select>
</td>


      <td>

        <!-- ✅ 重點：不寫 onclick -->
        <button class="primary save-btn"
                data-uid="${u.user_id}">
          儲存
        </button>

        ${u.username === 'admin'
            ? ''
            : `<button onclick="deleteUser('${u.user_id}','${u.username}')">🗑 刪除</button>`
        }
      </td>

`;
    tb.appendChild(tr);
  });
}

/* 只讀名單 */
function renderReadonlyLists() {
  const clear = id => document.getElementById(id).innerHTML = '';

  clear('tbody-judge');
  clear('tbody-record');
  clear('tbody-chief_judge');
  clear('tbody-record_chief');
  clear('tbody-admin');

  allUsers.forEach(u => {
    const roles = (u.role || '').split(',').filter(Boolean);

    // ✅ ★★ 這一行一定要有 ★★
    const [judgeLv, recordLv] = splitLevel(u.level);

    // ✅ 裁判名單
    if (roles.includes('judge') || roles.includes('chief_judge')) {
      addRow('tbody-judge', [
        u.username,
        u.name || '',
        displayLevel(judgeLv)
      ]);
    }

    // ✅ 紀錄名單
    if (roles.includes('record') || roles.includes('record_chief')) {
      addRow('tbody-record', [
        u.username,
        u.name || '',
        displayLevel(recordLv)
      ]);
    }

    // ✅ 裁判長名單
    if (roles.includes('chief_judge')) {
      addRow('tbody-chief_judge', [
        u.username,
        u.name || '',
        displayLevel(judgeLv)
      ]);
    }

    // ✅ 紀錄長名單
    if (roles.includes('record_chief')) {
      addRow('tbody-record_chief', [
        u.username,
        u.name || '',
        displayLevel(recordLv)
      ]);
    }

    // ✅ 管理員名單
    if (roles.includes('admin')) {
      addRow('tbody-admin', [
        u.username,
        u.name || '',
        u.email || ''
      ]);
    }
  });
}

function addRow(tbodyId,cols){
  const tr=document.createElement('tr');
  tr.innerHTML = cols.map(c=>`<td>${c}</td>`).join('');
  document.getElementById(tbodyId).appendChild(tr);
}

/* editing helpers */
function markField(uid,key,val){
  
  console.log('[markField]', uid, key, val);

  if(!pendingUserUpdates[uid]) pendingUserUpdates[uid]={};
  pendingUserUpdates[uid][key]=val;
}
  
function toggleRole(uid,role,on){
  
  console.log('[toggleRole]', uid, role, on);

  const u=allUsers.find(x=>x.user_id==uid);
  let roles=(u.role||'').split(',').filter(Boolean);
  roles=roles.filter(r=>r!==role);
  if(on) roles.push(role);
  const rStr=roles.join(',');
  u.role=rStr;
  if(!pendingUserUpdates[uid]) pendingUserUpdates[uid]={};
  pendingUserUpdates[uid].role=rStr;
}
  
function setLevel(uid, type, val) {
  const u = allUsers.find(x => x.user_id == uid);
  if (!u) return;

  // 現有 level 拆開
  const [judgeLv = 'N', recordLv = 'N'] = (u.level || 'N,N').split(',');

  // 改其中一個
  const newJudgeLv = (type === 'judge') ? val : judgeLv;
  const newRecordLv = (type === 'record') ? val : recordLv;

  const newLevel = `${newJudgeLv},${newRecordLv}`;

  // ✅ 更新前端狀態
  u.level = newLevel;

  if (!pendingUserUpdates[uid]) pendingUserUpdates[uid] = {};
  pendingUserUpdates[uid].level = newLevel;

  console.log('[setLevel merged]', uid, newLevel);
}
  
  
function saveUser(uid) {
  console.log('✅ saveUser triggered:', uid);

  const data = pendingUserUpdates[uid];

  if (!data || Object.keys(data).length === 0) {
    showToast('尚未修改','warn');
    return;
  }

  const entries = Object.entries(data);
  let finished = 0;
  let hasError = false;

  entries.forEach(([field, value]) => {
    callApi(
      {
        action: 'updateUserField',
        user_id: uid,
        field,
        value
      },
      function(res) {
        console.log('[updateUserField]', uid, field, value, res);

        if (res && res.result === 'error') {
          hasError = true;
          showToast(res.message || `更新 ${field} 失敗`,'error');
        }

        finished++;

        if (finished === entries.length && !hasError) {
          showToast('儲存成功','success');
          pendingUserUpdates[uid] = {};
          loadUsers();
        }
      }
    );
  });
}


/* create */
function openCreateUser(){
  const username=prompt('帳號'); if(!username) return;
  const name=prompt('姓名'); if(!name) return;
  const email=prompt('Email'); if(!email) return;
  
  callApi({ action:'createUser', username, name, email }, res => {
    if (!res) {
      showToast('新增失敗（無回應）','error');
      return;
    }
  
    // ✅ 放寬判斷條件
    if (res.result === 'error') {
      showToast(res.message || '新增失敗','error');
      return;
    }
  
    showToast('新增成功','success');
    
    setTimeout(() => {
      loadUsers();
    }, 300);

    loadUsers();
  });
}


function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);

  setTimeout(()=>t.classList.add('show'),10);

  setTimeout(()=>{
    t.classList.remove('show');
    setTimeout(()=>t.remove(),300);
  },2000);
}


function deleteUser(uid, username) {
  if (!confirm(`確定要刪除使用者「${username}」？`)) return;

  const currentUserId = localStorage.getItem('user_id') || '';

  callApi(
    {
      action: 'deleteUsers',          // ✅ 對齊後端
      user_ids: uid,                  // ✅ 對齊後端（逗號字串）
      current_user_id: currentUserId  // ✅ 後端需要
    },
    function(res) {

      console.log('[deleteUsers response]', res);

      if (res && res.result === 'error') {
        showToast(res.message || '刪除失敗','error');
        return;
      }

      showToast(res.message || '刪除成功','success');
      loadUsers();
    }
  );
}

// ===== 不確定是不是放在這裏 =====
document.addEventListener('click', function (e) {
  const btn = e.target.closest('.save-btn');
  if (!btn) return;

  const uid = btn.dataset.uid;
  console.log('✅ Save button clicked, uid =', uid);
  saveUser(uid);
});


</script>
</body>
