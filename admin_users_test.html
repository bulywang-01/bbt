
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>使用者帳號管理</title>

<style>
body { margin:0; font-family:system-ui,-apple-system; background:#f5f6f8; }
.header {
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 20px; background:#fff; border-bottom:1px solid #ddd;
}
.nav a { margin-right:16px; text-decoration:none; color:#0066cc; }
.main { padding:20px; }

/* Toolbar */
.toolbar {
  display:flex; gap:12px; align-items:center; margin-bottom:12px;
}
.toolbar input[type="text"] { padding:6px 8px; width:220px; }

/* Tabs */
.tabs { display:flex; gap:8px; margin-bottom:12px; }
.tab {
  padding:6px 14px; border-radius:16px;
  border:1px solid #ccc; background:#f3f4f6; cursor:pointer;
}
.tab.active { background:#2c7be5; color:#fff; border-color:#2c7be5; }
.hidden { display:none; }

/* Table */
.user-table {
  width:100%; border-collapse:collapse; background:#fff;
}
.user-table th, .user-table td {
  border:1px solid #ddd; padding:6px; text-align:center; font-size:14px;
}
.user-table th { background:#f1f5f9; }

.user-table input, .user-table select {
  padding:4px; font-size:13px; box-sizing:border-box;
}
.user-table input:disabled, .user-table select:disabled {
  background:#f5f5f5;
}

/* Column sizes */
.col-name input { width:120px; }
.col-phone input { width:120px; }
.col-note input { width:60px; text-align:center; }

/* Placeholder style */
.placeholder { color:#999; font-style:italic; }

/* Roles */
.role-group {
  display:flex; gap:8px; justify-content:center; white-space:nowrap;
}
.role-group label {
  display:flex; align-items:center; gap:4px; font-size:13px;
}

/* Small selects */
.small-select { width:70px; font-size:13px; text-align:center; }

/* Action column */
.action-edit { display:none; }
tr.editing .action-view { display:none; }
tr.editing .action-edit { display:inline-block; }

button { padding:4px 8px; cursor:pointer; }
.primary { background:#2c7be5; color:#fff; border:none; }
.danger { background:#c62828; color:#fff; border:none; }

/* Toast */
.toast {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  padding:14px 20px; border-radius:8px; color:#fff;
  opacity:0; transition:.3s; z-index:9999;
}
.toast.show { opacity:1; }
.toast.success { background:#2e7d32; }
.toast.error { background:#c62828; }
.toast.warn { background:#ed6c02; }
</style>
</head>

<body>
<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="judge_dashboard.html">📋 報名</a>
    <a href="admin_dashboard.html">⚙️ 管理</a>
  </div>
  <div>
    <span id="u_name"></span>
    <a href="#" onclick="logout()">登出</a>
  </div>
</div>


<div class="main">

  <div class="toolbar">
    <input type="text" id="keyword" placeholder="搜尋帳號 / 姓名">
    <label><input type="checkbox" id="onlyActive"> 只顯示啟用帳號</label>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('judge',this)">⚖️ 裁判</button>
    <button class="tab" onclick="switchTab('record',this)">📝 紀錄</button>
    <button class="tab" onclick="switchTab('admin',this)">🛠 系統管理員</button>
  </div>

  <!-- Tables -->
  <table class="user-table" id="table-judge">
    <thead>
      <tr>
        <th>帳號</th><th>姓名</th><th>背號</th><th>電話</th>
        <th>Email</th><th>身份</th><th>裁判等級</th>
        <th>狀態</th><th>操作</th>
      </tr>
    </thead>
    <tbody id="tbody-judge"></tbody>
  </table>

  <table class="user-table hidden" id="table-record">
    <thead>
      <tr>
        <th>帳號</th><th>姓名</th><th>背號</th><th>電話</th>
        <th>Email</th><th>身份</th><th>裁判等級</th>
        <th>狀態</th><th>操作</th>
      </tr>
    </thead>
    <tbody id="tbody-record"></tbody>
  </table>

  <table class="user-table hidden" id="table-admin">
    <thead>
      <tr>
        <th>帳號</th><th>姓名</th><th>背號</th><th>電話</th>
        <th>Email</th><th>身份</th><th>裁判等級</th>
        <th>狀態</th><th>操作</th>
      </tr>
    </thead>
    <tbody id="tbody-admin"></tbody>
  </table>

</div>


<script src="js/config.js"></script>

<script>
let allUsers = [];
let pendingUserUpdates = {};

document.addEventListener('DOMContentLoaded', () => {
  const raw = localStorage.getItem('session_user');
  if (!raw) return location.href = 'login.html';
  const session = JSON.parse(raw);
  document.getElementById('u_name').textContent = session.name || '';
  document.getElementById('keyword').addEventListener('input', renderLists);
  document.getElementById('onlyActive').addEventListener('change', renderLists);
  loadUsers();
});

/* Tabs */
function switchTab(type, btn) {
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['judge','record','admin'].forEach(t=>{
    document.getElementById('table-'+t).classList.toggle('hidden', t!==type);
  });
}

/* Toast */
function showToast(msg,type='success'){
  const t=document.createElement('div');
  t.className=`toast ${type}`; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.classList.add('show'),50);
  setTimeout(()=>t.remove(),3000);
}

/* Load & Render */
function loadUsers(){
  callApi({action:'getUsers'},res=>{
    if(!res||res.result!=='ok') return showToast('讀取失敗','error');
    allUsers=res.users||[];
    renderLists();
  });
}

function renderLists(){
  const kw=document.getElementById('keyword').value.trim();
  const onlyActive=document.getElementById('onlyActive').checked;

  const bodies={
    judge:document.getElementById('tbody-judge'),
    record:document.getElementById('tbody-record'),
    admin:document.getElementById('tbody-admin')
  };
  Object.values(bodies).forEach(b=>b.innerHTML='');

  allUsers.forEach(u=>{
    const username=u.username||'';
    const name=u.name||'';
    if(onlyActive && u.active!=='Y') return;
    if(kw && !(username.includes(kw)||name.includes(kw))) return;

    const roles=(u.role||'').split(',');

    if (roles.includes('judge') || roles.includes('chief_judge'))
      bodies.judge.appendChild(renderRow(u));

    if (roles.includes('record') || roles.includes('record_chief'))
      bodies.record.appendChild(renderRow(u));

    if (roles.includes('admin'))
      bodies.admin.appendChild(renderRow(u));
  });
}

function renderRow(u){
  const tr=document.createElement('tr');
  const displayName=u.name||'（未填姓名）';
  tr.innerHTML=`
    <td>${u.username}</td>
    <td class="col-name">
      <input class="${u.name?'':'placeholder'}" value="${displayName}"
        disabled onchange="updateField('${u.user_id}','name',this.value)">
    </td>
    <td class="col-note">
      <input value="${u.note||''}" disabled
        onchange="updateField('${u.user_id}','note',this.value)">
    </td>
    <td class="col-phone">
      <input class="${u.phone?'':'placeholder'}"
        value="${u.phone||'（未填電話）'}" disabled
        onchange="updateField('${u.user_id}','phone',this.value)">
    </td>
    <td>
      <input value="${u.email||''}" disabled
        onchange="updateField('${u.user_id}','email',this.value)">
    </td>
    <td>
      <div class="role-group">${u.role}</div>
    </td>
    <td>
      <select class="small-select" disabled
        onchange="updateField('${u.user_id}','level',this.value)">
        <option value="NONE">無</option>
        <option value="A" ${u.level==='A'?'selected':''}>A</option>
        <option value="B" ${u.level==='B'?'selected':''}>B</option>
        <option value="C" ${u.level==='C'?'selected':''}>C</option>
      </select>
    </td>
    <td>
      <select class="small-select" disabled
        onchange="updateField('${u.user_id}','active',this.value)">
        <option value="Y" ${u.active==='Y'?'selected':''}>啟用</option>
        <option value="N" ${u.active==='N'?'selected':''}>停用</option>
      </select>
    </td>
    <td>
      <div class="action-view">
        <button onclick="enableEdit(this)">✏️</button>
      </div>
      <div class="action-edit">
        <button class="primary" onclick="saveUser('${u.user_id}')">💾</button>
        <button onclick="cancelEdit(this)">❌</button>
      </div>
    </td>
  `;
  return tr;
}

function enableEdit(btn){
  const tr=btn.closest('tr');
  tr.classList.add('editing');
  tr.querySelectorAll('input,select').forEach(el=>el.disabled=false);
}
function cancelEdit(btn){
  const tr=btn.closest('tr');
  tr.classList.remove('editing');
  tr.querySelectorAll('input,select').forEach(el=>el.disabled=true);
}

function updateField(uid,field,val){
  if(!pendingUserUpdates[uid]) pendingUserUpdates[uid]={};
  pendingUserUpdates[uid][field]=val;
}
function saveUser(uid){
  const data=pendingUserUpdates[uid];
  if(!data) return showToast('尚未修改','warn');
  callApi({action:'updateUser',user_id:uid,...data},res=>{
    if(!res||res.result!=='ok') return showToast('更新失敗','error');
    showToast('更新完成');
    pendingUserUpdates[uid]=null;
    loadUsers();
  });
}
function logout(){
  localStorage.clear();
  location.href='login.html';
}
</script>
</body>
</html>
