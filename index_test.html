<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>BBT 出勤管理系統｜首頁</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="common.css">
  <script src="js/auth.js"></script>
  <script src="js/config.js"></script>

  <style>
    body { margin:0; background:#f5f6f8; font-family:system-ui,-apple-system; }
    .main { max-width:1100px; margin:auto; padding:24px; }
    .panel {
      background:#fff; border-radius:14px; padding:22px;
      margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,.08);
    }
    h3 { margin-top:0; border-left:4px solid #4a7ef5; padding-left:10px; }

    /* ===== Welcome ===== */
    .welcome-box { position:relative; padding:26px; border-radius:16px;
      background:linear-gradient(135deg,#f5f8ff,#fff); }
    .welcome-role { font-size:22px; font-weight:800; color:#1a237e; }
    .welcome-name { font-size:18px; font-weight:600; margin:6px 0; }
    .welcome-bg {
      position:absolute; right:18px; bottom:6px;
      font-size:110px; font-weight:900; opacity:.06;
    }

    /* ===== Schedule ===== */
    .schedule-block { margin-bottom:16px; }
    .schedule-title { font-weight:700; margin-bottom:6px; }
    .date-block { margin:10px 0; }
    .date { font-weight:700; color:#1a237e; }
    .item { padding:4px 0; font-size:14px; }

    .empty { color:#777; font-style:italic; }

    /* ===== Tabs ===== */
    .tabs { display:flex; gap:8px; margin-bottom:10px; }
    .tabs button {
      border:none; padding:8px 14px; border-radius:6px;
      background:#e9ecf4; font-weight:600; cursor:pointer;
    }
    .tabs button.active { background:#4a7ef5; color:#fff; }
  </style>
</head>

<body>

<div id="header-container"></div>

<div class="main">

  <!-- ✅ Welcome -->
  <div class="panel welcome-box">
    <div class="welcome-role" id="welcome-role"></div>
    <div class="welcome-name" id="welcome-name"></div>
    <div class="welcome-bg" id="license-bg"></div>
  </div>

  <!-- ✅ 我的班表 -->
  <div class="panel">
    <h3>📅 我的班表</h3>

    <div class="tabs">
      <button onclick="setRange('week')" id="tab-week">本週</button>
      <button onclick="setRange('next')" id="tab-next">下週</button>
      <button onclick="setRange('month')" id="tab-month">本月</button>
      <span style="flex:1"></span>
      <a href="javascript:void(0)" onclick="openFullSchedule()">查看完整班表 ▶</a>
    </div>

    <!-- 裁判 -->
    <div id="judge-schedule" class="schedule-block" style="display:none;">
      <div class="schedule-title">🧑‍⚖️ 裁判班表</div>
      <div id="judge-list"></div>
    </div>

    <!-- 紀錄 -->
    <div id="record-schedule" class="schedule-block" style="display:none;">
      <div class="schedule-title">📝 紀錄班表</div>
      <div id="record-list"></div>
    </div>

    <div id="no-schedule" class="empty" style="display:none;">
      目前此期間尚無班表。
    </div>
  </div>

  <!-- ✅ 聯盟賽制 -->
  <div class="panel">
    <h3>📢 聯盟賽制</h3>
    <ul>
      <li>例行賽七局制或 2.5 小時制。</li>
      <li>第五局起分差達 10 分（含）提早結束。</li>
      <li>平手且時間到，進入突破僵局制（二壘有人）。</li>
      <li>裁判不得執法所屬母隊正式賽。</li>
    </ul>
  </div>

  <!-- ✅ 裁判守則 -->
  <div class="panel">
    <h3>🧑‍⚖️ 裁判守則</h3>
    <ul>
      <li>請穿著聯盟裁判制服及裁判帽。</li>
      <li>主審須確認先發單與換人規定。</li>
      <li>投手累計觸身球達規定須強制更換。</li>
    </ul>
  </div>

  <!-- ✅ 文件 -->
  <div class="panel">
    <h3>📄 文件下載</h3>
    <ul>
      <li><a href="ctba_rules.pdf" target="_blank">中華民國棒球規則</a></li>
      <li><a href="umpire_2man_rotation.pdf" target="_blank">兩人制裁判移補位</a></li>
    </ul>
  </div>

</div>

<script src="js/index.js"></script>
<script>
/* ===== Header ===== */
fetch('header.html').then(r=>r.text()).then(h=>{
  document.getElementById('header-container').innerHTML = h;
  initHeaderVisibility();
});

/* ===== Welcome ===== */
const s = getSession();
if (s) {
  document.getElementById('welcome-name').textContent = `${s.name} 您好`;
  document.getElementById('welcome-role').textContent = s.role;
  if (s.level) document.getElementById('license-bg').textContent = s.level;
}

/* ===== Schedule Render（核心，index.js 給資料） ===== */
/*
index.js 請提供：
- getJudgeSchedule(range)
- getRecordSchedule(range)
回傳格式：
[
  { date:'2026-05-18', time:'18:30', field:'天母', role:'主審' }
]
*/
let currentRange = 'week';

function setRange(r){
  currentRange = r;
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  document.getElementById(`tab-${r}`).classList.add('active');
  renderSchedule();
}

function renderSchedule(){
  const judge = typeof getJudgeSchedule === 'function' ? getJudgeSchedule(currentRange) : [];
  const record = typeof getRecordSchedule === 'function' ? getRecordSchedule(currentRange) : [];

  document.getElementById('judge-schedule').style.display = judge.length ? 'block':'none';
  document.getElementById('record-schedule').style.display = record.length ? 'block':'none';
  document.getElementById('no-schedule').style.display = (!judge.length && !record.length) ? 'block':'none';

  renderList('judge-list', judge);
  renderList('record-list', record);
}

function renderList(elId, list){
  const el = document.getElementById(elId);
  el.innerHTML = '';
  const grouped = {};
  list.forEach(i=>{
    if(!grouped[i.date]) grouped[i.date]=[];
    grouped[i.date].push(i);
  });
  Object.keys(grouped).sort().forEach(d=>{
    const div = document.createElement('div');
    div.className='date-block';
    div.innerHTML = `<div class="date">${d}</div>` +
      grouped[d].map(i=>`<div class="item">${i.time} ｜ ${i.field} ｜ ${i.role}</div>`).join('');
    el.appendChild(div);
  });
}

setRange('week');
</script>

</body>
</html>
