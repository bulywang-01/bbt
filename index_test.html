<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>BBT 出勤管理系統｜首頁</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="common.css">
  
<!-- ================= Script ================= -->
  <script src="js/index.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/config.js"></script>

  <style>
    body { margin:0; background:#f5f6f8; font-family:system-ui,-apple-system; }
    .main { max-width:1100px; margin:auto; padding:24px; }
    .panel {
      background:#fff; border-radius:14px; padding:22px;
      margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,.08);
    }
    h3 { margin-top:0; border-left:4px solid #4a7ef5; padding-left:10px; }

    /* ===== Welcome ===== */
    .welcome-box { position:relative; padding:26px; border-radius:16px;
      background:linear-gradient(135deg,#f5f8ff,#fff); }
    .welcome-role { font-size:22px; font-weight:800; color:#1a237e; }
    .welcome-name { font-size:18px; font-weight:600; margin:6px 0; }
    .welcome-bg {
      position:absolute; right:18px; bottom:6px;
      font-size:110px; font-weight:900; opacity:.06;
    }

    /* ===== Schedule ===== */
    .schedule-block { margin-bottom:16px; }
    .schedule-title { font-weight:700; margin-bottom:6px; }
    .date-block { margin:10px 0; }
    .date { font-weight:700; color:#1a237e; }
    .item { padding:4px 0; font-size:14px; }

    .empty { color:#777; font-style:italic; }

    /* ===== Tabs ===== */
    .tabs { display:flex; gap:8px; margin-bottom:10px; }
    .tabs button {
      border:none; padding:8px 14px; border-radius:6px;
      background:#e9ecf4; font-weight:600; cursor:pointer;
    }
    .tabs button.active { background:#4a7ef5; color:#fff; }

    /* ===== Schedule Cards ===== */
    .schedule-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 10px;
    }
    
    .schedule-card {
      background: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 3px 12px rgba(0,0,0,.10);
      font-size: 14px;
      position: relative;
    }
    
    /* 裁判 / 紀錄配色 */
    .schedule-card.judge {
      border-left: 6px solid #4a7ef5;
    }
    .schedule-card.record {
      border-left: 6px solid #2e7d32;
    }
    
    /* 日期 */
    .card-date {
      font-size: 15px;
      font-weight: 800;
      color: #1a237e;
      margin-bottom: 6px;
    }
    
    /* 每一行 */
    .card-line {
      margin: 3px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    /* 今日 / 明日 */
    .card-badge {
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      color: #fff;
    }
    .badge-today { background: #d32f2f; }
    .badge-tomorrow { background: #f57c00; }
    
    /* 空狀態 */
    .schedule-empty {
      color: #777;
      font-style: italic;
      margin-top: 8px;
    }

    /* ===== Modal Overlay ===== */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .overlay-box {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      width: 90%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,.3);
    }
    
    /* ===== Role Buttons ===== */
    .role-btn {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    
    .role-btn.judge {
      background: #eaf1ff;
      color: #1a237e;
    }
    
    .role-btn.record {
      background: #e8f5e9;
      color: #2e7d32;
    }
    
    .role-btn:hover {
      opacity: 0.9;
    }
    
    .close-btn {
      margin-top: 16px;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #e0e0e0;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="header-container"></div>

<!-- ✅ 雙重身份：查看完整班表選擇框 -->
<div id="fullScheduleRoleModal" class="overlay" style="display:none;">
  <div class="overlay-box">
    <h3>查看完整班表</h3>
    <p style="color:#555;margin-bottom:16px;">
      請選擇要查看的班表類型
    </p>

    <div style="display:flex;gap:12px;">
      <button onclick="goFullSchedule('judge')" class="role-btn judge">
        🧑‍⚖️ 裁判班表
      </button>
      <button onclick="goFullSchedule('record')" class="role-btn record">
        📝 紀錄班表
      </button>
    </div>

    <button onclick="closeFullScheduleModal()" class="close-btn">
      取消
    </button>
  </div>
</div>


<div class="main">

  <!-- ✅ Welcome -->
  <div class="panel welcome-box">
    <div class="welcome-role" id="welcome-role"></div>
    <div class="welcome-name" id="welcome-name"></div>
    <div class="welcome-bg" id="license-bg"></div>
  </div>

  <!-- ✅ 我的班表 -->
  <div class="panel">
    <h3>📅 我的班表</h3>
    <div id="schedule-loading" class="schedule-empty" style="display:none;">🔄 班表載入中…</div>

    <div class="tabs">
      <button onclick="setRange('week')" id="tab-week">本週</button>
      <button onclick="setRange('next')" id="tab-next">下週</button>
      <button onclick="setRange('month')" id="tab-month">本月</button>
      <span style="flex:1"></span>
      <a javascript:void(0)onClickViewFullSchedule()">查看完整班表 ▶</a>

    </div>

    <!-- 裁判 -->
    <div id="judge-schedule" class="schedule-block" style="display:none;">
      <div class="schedule-title">🧑‍⚖️ 裁判班表</div>
      <div id="judge-list"></div>
    </div>

    <!-- 紀錄 -->
    <div id="record-schedule" class="schedule-block" style="display:none;">
      <div class="schedule-title">📝 紀錄班表</div>
      <div id="record-list"></div>
    </div>

    <div id="no-schedule" class="empty" style="display:none;">
      目前此期間尚無班表。
    </div>
  </div>

  <!-- ✅ 聯盟賽制 -->
  <div class="panel">
    <h3>📢 聯盟賽制</h3>
    <ul>
      <li>例行賽七局制或 2.5 小時制。</li>
      <li>第五局起分差達 10 分（含）提早結束。</li>
      <li>平手且時間到，進入突破僵局制（二壘有人）。</li>
      <li>裁判不得執法所屬母隊正式賽。</li>
    </ul>
  </div>

  <!-- ✅ 裁判守則 -->
  <div class="panel">
    <h3>🧑‍⚖️ 裁判守則</h3>
    <ul>
      <li>請穿著聯盟裁判制服及裁判帽。</li>
      <li>主審須確認先發單與換人規定。</li>
      <li>投手累計觸身球達規定須強制更換。</li>
    </ul>
  </div>

  <!-- ✅ 文件 -->
  <div class="panel">
    <h3>📄 文件下載</h3>
    <ul>
      <li><a href="ctba_rules.pdf" target="_blank">中華民國棒球規則</a></li>
      <li><a href="umpire_2man_rotation.pdf" target="_blank">兩人制裁判移補位</a></li>
    </ul>
  </div>

</div>

<script>
/* ===== Header ===== */
fetch('header.html').then(r=>r.text()).then(h=>{
  document.getElementById('header-container').innerHTML = h;
  initHeaderVisibility();
});

// ===== Welcome 區：身份顯示（中文）=====
const session = getSession();
if (session) {
  const nameEl = document.getElementById('welcome-name');
  const roleEl = document.getElementById('welcome-role');

  if (nameEl) {
    nameEl.textContent = `${session.name} 您好`;
  }

  if (roleEl) {
    const roleMap = {
      admin: '系統管理員',
      judge: '裁判員',
      chief_judge: '裁判長',
      record: '紀錄員',
      record_admin: '紀錄長'
    };

    const roles = getRoles(session);
    const roleText = roles
      .map(r => roleMap[r])
      .filter(Boolean)
      .join('／');

    roleEl.textContent = roleText;
  }
}

/* ===== Schedule Render（核心，index.js 給資料） ===== */
/*
index.js 請提供：
- getJudgeSchedule(range)
- getRecordSchedule(range)
回傳格式：
[
  { date:'2026-05-18', time:'18:30', field:'天母', role:'主審' }
]
*/
let currentRange = 'week';

function setRange(range) {
  currentRange = range;

  document.querySelectorAll('.schedule-tabs button')
    .forEach(btn => btn.classList.remove('active'));

  const activeBtn = document.getElementById(`tab-${range}`);
  if (activeBtn) activeBtn.classList.add('active');

  // ✅ 立刻顯示 loading
  const loading = document.getElementById('schedule-loading');
  if (loading) loading.style.display = 'block';

  // ✅ 再 render
  renderSchedule();
}



function renderSchedule() {
  const judge = getJudgeSchedule(currentRange) || [];
  const record = getRecordSchedule(currentRange) || [];

  const judgeBlock = document.getElementById('judge-schedule');
  const recordBlock = document.getElementById('record-schedule');
  const noBlock = document.getElementById('no-schedule');
  const loadingBlock = document.getElementById('schedule-loading');

  // ✅ 先全部關掉
  if (judgeBlock) judgeBlock.style.display = 'none';
  if (recordBlock) recordBlock.style.display = 'none';
  if (noBlock) noBlock.style.display = 'none';
  if (loadingBlock) loadingBlock.style.display = 'none';

  // ✅ 如果資料都還沒準備好（第一次）
  if (
    typeof judgeGames !== 'undefined' &&
    typeof recordGames !== 'undefined' &&
    judgeGames.length === 0 &&
    recordGames.length === 0
  ) {
    if (loadingBlock) loadingBlock.style.display = 'block';
    return;
  }

  // ✅ 有任何一種班表
  let hasAny = false;

  if (judge.length > 0) {
    judgeBlock.style.display = 'block';
    renderScheduleCards('judge-list', judge, 'judge');
    hasAny = true;
  }

  if (record.length > 0) {
    recordBlock.style.display = 'block';
    renderScheduleCards('record-list', record, 'record');
    hasAny = true;
  }

  // ✅ 真的完全沒有
  if (!hasAny) {
    noBlock.textContent = '目前此期間尚無排定班表。';
    noBlock.style.display = 'block';
  }
}


function renderList(elId, list){
  const el = document.getElementById(elId);
  el.innerHTML = '';
  const grouped = {};
  list.forEach(i=>{
    if(!grouped[i.date]) grouped[i.date]=[];
    grouped[i.date].push(i);
  });
  Object.keys(grouped).sort().forEach(d=>{
    const div = document.createElement('div');
    div.className='date-block';
    div.innerHTML = `<div class="date">${d}</div>` +
      grouped[d].map(i=>`<div class="item">${i.time} ｜ ${i.field} ｜ ${i.role}</div>`).join('');
    el.appendChild(div);
  });
}

setRange('week');  // 預設本週

function renderSchedule(){
  // ✅ 1. 取得資料（你剛剛貼的那段）
  const judge = typeof getJudgeSchedule === 'function'
    ? getJudgeSchedule(currentRange)
    : [];

  const record = typeof getRecordSchedule === 'function'
    ? getRecordSchedule(currentRange)
    : [];

  // ✅ 2. 控制哪些區塊要顯示（身分關鍵）
  document.getElementById('judge-schedule').style.display =
    judge.length ? 'block' : 'none';

  document.getElementById('record-schedule').style.display =
    record.length ? 'block' : 'none';

  document.getElementById('no-schedule').style.display =
    (!judge.length && !record.length) ? 'block' : 'none';

  // ✅ 3. 用「產品級卡片 UI」render（剛剛給你的）
  renderScheduleCards('judge-list', judge, 'judge');
  renderScheduleCards('record-list', record, 'record');
}


/* 共用工具 */

function getJudgeSchedule(range){
  const { start, end } = getPeriodRange(range);
  return judgeGames.filter(g => {
    const t = new Date(`${g.date}T${g.time || '00:00'}`);
    return t >= start && t <= end;
  });
}

// ✅ 依身份決定「查看完整班表」要去哪
(function initFullScheduleLink(){
  const link = document.getElementById('view-full-schedule');
  if (!link) return;

  const session = getSession?.();
  if (!session) return;

  const roles = getRoles(session);

  // 僅裁判
  if (roles.includes('judge') && !roles.includes('record') && !roles.includes('admin')) {
    link.href = 'judge_dashboard.html';
    return;
  }

  // 僅紀錄
  if (roles.includes('record') && !roles.includes('judge') && !roles.includes('admin')) {
    link.href = 'record_dashboard.html';
    return;
  }

  // 兼具身份或 admin → 導到管理／整合頁（你可再優化）
  link.href = 'index.html'; // 或之後的整合頁
})();


function isToday(dateStr) {
  const d = new Date(dateStr);
  const t = new Date();
  return d.toDateString() === t.toDateString();
}

function isTomorrow(dateStr) {
  const d = new Date(dateStr);
  const t = new Date();
  t.setDate(t.getDate() + 1);
  return d.toDateString() === t.toDateString();
}

function formatZhDate(dateStr) {
  const d = new Date(dateStr);
  const week = ['日','一','二','三','四','五','六'];
  return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}（${week[d.getDay()]}）`;
}

/* 裁判  紀錄卡片 render */
function renderScheduleCards(containerId, list, type) {
  const box = document.getElementById(containerId);
  box.innerHTML = '';

  if (!list || list.length === 0) {
    box.innerHTML = `<div class="schedule-empty">此期間尚無班表</div>`;
    return;
  }

  // ✅ 排序：日期 → 時間
  list.sort((a,b) => {
    if (a.date === b.date) {
      return a.time.localeCompare(b.time);
    }
    return a.date.localeCompare(b.date);
  });

  const wrap = document.createElement('div');
  wrap.className = 'schedule-cards';

  list.forEach(g => {
    const card = document.createElement('div');
    card.className = `schedule-card ${type}`;

    let badge = '';
    if (isToday(g.date)) badge = `<div class="card-badge badge-today">今日</div>`;
    else if (isTomorrow(g.date)) badge = `<div class="card-badge badge-tomorrow">明日</div>`;

    card.innerHTML = `
      ${badge}
      <div class="card-date">${formatZhDate(g.date)}</div>
      <div class="card-line">⏰ ${g.time}</div>
      <div class="card-line">📍 ${g.field}</div>
      <div class="card-line">
        ${type === 'judge' ? '🧑‍⚖️ 裁判' : '📝 紀錄'}｜${g.role}
      </div>
    `;

    wrap.appendChild(card);
  });

  box.appendChild(wrap);
}

/* 1️⃣ 點「查看完整班表」時的統一入口 */
function onClickViewFullSchedule(){
  const session = getSession();
  const roles = getRoles(session);

  const hasJudge = roles.includes('judge');
  const hasRecord = roles.includes('record');

  // ✅ 雙重身份 → 跳選單
  if (hasJudge && hasRecord) {
    document.getElementById('fullScheduleRoleModal').style.display = 'flex';
    return;
  }

  // ✅ 單一身份 → 直接跳正確頁面
  if (hasJudge) {
    location.href = buildScheduleUrl('judge');
    return;
  }

  if (hasRecord) {
    location.href = buildScheduleUrl('record');
    return;
  }
}

/* 2️⃣ 關閉選單 */
function closeFullScheduleModal(){
  document.getElementById('fullScheduleRoleModal').style.display = 'none';
}

/* 3️⃣ 依角色跳轉（含期間參數）*/
function goFullSchedule(type){
  location.href = buildScheduleUrl(type);
}

function buildScheduleUrl(type){
  const range = currentRange || 'week';

  if (type === 'judge') {
    return `judge_dashboard.html?range=${range}`;
  }

  if (type === 'record') {
    return `record_dashboard.html?range=${range}`;
  }
}

</script>

</body>
</html>
