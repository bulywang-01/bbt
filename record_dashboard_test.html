<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紀錄員報名</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system;
  background: #f3f5f7;
}

/* ===== Header 保命橫向 ===== */
#header nav {
  display: flex !important;
  flex-direction: row !important;
  align-items: center;
  gap: 16px;
}
#header nav a {
  display: inline-flex;
  align-items: center;
}

/* ===== 標題 ===== */
.page-title {
  background: #0d4c63;
  color: #fff;
  padding: 12px;
  font-size: 20px;
  font-weight: 800;
  text-align: center;
}

.hint {
  font-size: 13px;
  color: #555;
  margin: 8px 12px;
}

/* ===== 日期 / 組別 ===== */
.date-title {
  margin: 20px 12px 8px;
  font-size: 20px;
  font-weight: 800;
}
.group-title {
  margin: 10px 12px 6px;
  font-weight: 700;
  border-left: 4px solid #1976d2;
  padding-left: 8px;
}

/* ===== 表格 ===== */
.record-table {
  width: calc(100% - 24px);
  margin: 0 12px 16px;
  border-collapse: collapse;
  background: #fff;
}
.record-table th,
.record-table td {
  border: 1px solid #ccc;
  padding: 6px 8px;
  text-align: center;
}
.record-table th {
  background: #0d4c63;
  color: #fff;
}

/* ===== select ===== */
select {
  width: 100%;
  padding: 4px 6px;
  border-radius: 12px;
  font-weight: 600;
}
select.me {
  background: #e8f5e9;
  border: 2px solid #2e7d32;
}
select.locked {
  background: #e0e0e0;
}
</style>
</head>

<body>
<div id="header"></div>

<div class="page-title">BBT 軟式棒球聯盟｜紀錄員報名表</div>
<div class="hint">※ 只能在「無」的欄位選擇自己</div>

<!-- ✅ 唯一主容器 -->
<div id="recordContainer"></div>

<script src="js/config.js"></script>
<script>
let session;
let games = [];

/* ===== 初始化 ===== */
document.addEventListener('DOMContentLoaded', () => {
  fetch('header.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('header').innerHTML = html;
      session = JSON.parse(localStorage.getItem('session_user') || '{}');
      if (!session.user_id) {
        location.replace('login.html');
        return;
      }
      loadGames();
    });
});

/* ===== 取資料 ===== */
function loadGames() {
  callApi({
    action: 'getRecordSignableGames',
    user_id: session.user_id
  }, res => {
    if (!res || res.result !== 'ok') {
      alert('載入賽事失敗');
      return;
    }
    games = Array.isArray(res.games) ? res.games : [];
    renderRecordDashboard(games);
  });
}

/* ===== 分組（日期 → 組別 → 時間） ===== */
function groupGames(games) {
  const map = {};
  games.forEach(g => {
    const d = formatDateTW(g.date);
    const c = g.category || '未分類';
    if (!map[d]) map[d] = {};
    if (!map[d][c]) map[d][c] = [];
    map[d][c].push(g);
  });
  Object.values(map).forEach(groupMap => {
    Object.values(groupMap).forEach(list => {
      list.sort((a, b) => new Date(a.time) - new Date(b.time));
    });
  });
  return map;
}

/* ===== Render 主畫面 ===== */
function renderRecordDashboard(games) {
  const root = document.getElementById('recordContainer');
  root.innerHTML = '';

  const grouped = groupGames(games);
  Object.keys(grouped).sort().forEach(date => {
    root.insertAdjacentHTML('beforeend',
      `<div class="date-title">${date}</div>`
    );

    Object.keys(grouped[date]).forEach(group => {
      root.insertAdjacentHTML('beforeend',
        `<div class="group-title">│ ${group}</div>`
      );
      root.insertAdjacentHTML('beforeend',
        buildGroupTable(grouped[date][group])
      );
    });
  });
}

/* ===== 組別 table ===== */
function buildGroupTable(list) {
  return `
  <table class="record-table">
    <thead>
      <tr>
        <th>時間</th>
        <th>客隊（三壘）</th>
        <th>主隊（一壘）</th>
        <th>地點</th>
        <th>記錄員</th>
        <th>見習記錄員</th>
        <th>影像記錄員</th>
      </tr>
    </thead>
    <tbody>
      ${list.map(buildRow).join('')}
    </tbody>
  </table>`;
}

function buildRow(g) {
  return `
    <tr>
      <td>${formatTimeTW(g.time)}</td>
      <td>${g.away_team}</td>
      <td>${g.home_team}</td>
      <td>${g.field}</td>
      <td>${renderSelect(g, 'REC_MAIN')}</td>
      <td>${renderSelect(g, 'REC_TRAINEE')}</td>
      <td>${renderSelect(g, 'REC_VIDEO')}</td>
    </tr>`;
}

/* ===== 紀錄員帶入自己 ===== */
function renderSelect(g, role) {
  const slot = g.record_slots?.[role];
  const isMe = slot && slot.user_id === session.user_id;

  if (slot) {
    return `
      <select class="${isMe ? 'me' : 'locked'}" ${isMe ? '' : 'disabled'}
        onchange="onChange('${g.game_id}','${role}',this.value)">
        <option value="${slot.user_id}">
          ${slot.name}${isMe ? '（我）' : ''}
        </option>
        ${isMe ? '<option value="">取消</option>' : ''}
      </select>`;
  }

  return `
    <select onchange="onChange('${g.game_id}','${role}',this.value)">
      <option value="">無</option>
      <option value="${session.user_id}">我</option>
    </select>`;
}

function onChange(gameId, role, val) {
  callApi({
    action: val ? 'recordSignup' : 'cancelRecordSignup',
    user_id: session.user_id,
    game_id: gameId,
    record_role: role
  }, loadGames);
}

/* ===== 台灣時間 ===== */
function formatDateTW(v) {
  return new Date(v).toLocaleDateString('zh-TW',
    { timeZone:'Asia/Taipei' });
}
function formatTimeTW(v) {
  return new Date(v).toLocaleTimeString('zh-TW',
    { timeZone:'Asia/Taipei', hour:'2-digit', minute:'2-digit', hour12:false });
}
</script>
</body>
</html>
