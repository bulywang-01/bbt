<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>📦 模板管理</title>
<style>
body{font-family:system-ui;margin:20px;background:#fafafa}
.header a{margin-right:12px;color:#0066cc;text-decoration:none}
.panel{background:#fff;padding:14px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ddd;padding:6px 8px;text-align:center}
th{background:#f0f0f0}
</style>
</head>
<body>

<script>
if(!localStorage.getItem('role'))location.href='login.html';
</script>

<div class="header">
  <a href="index.html">🏠 回首頁</a>
  <a href="games_manage.html">⚾ 比賽管理</a>
  <a href="audit_log.html">📋 操作紀錄</a>
</div>

<h2>📦 模板管理</h2>

<div class="panel">
  <label>
    <input type="checkbox" id="onlyLatest" checked onchange="render()">
    只顯示最新版本
  </label>
</div>

<div id="content">載入中…</div>

js/config.js>
<script>
const token=localStorage.getItem('token');
let templates=[];

function load(){
  const cb='cb_'+Date.now();
  window[cb]=res=>{
    if(!res||res.result!=='ok'){content.textContent='❌ 載入失敗';return;}
    templates=res.templates||[];
    render();
  };
  const s=document.createElement('script');
  s.src=API_URL+'?action=getTemplates&token='+token+'&callback='+cb;
  document.body.appendChild(s);
}

function render(){
  let list=[...templates];
  if(onlyLatest.checked){
    const map={};
    list.forEach(t=>{
      if(!map[t.name]||t.version>map[t.name].version) map[t.name]=t;
    });
    list=Object.values(map);
  }

  let html='<div class="panel"><table><tr><th>名稱</th><th>盃賽</th><th>組別</th><th>場地</th><th>裁判</th><th>版本</th></tr>';
  list.forEach(t=>{
    html+=`<tr>
      <td>${t.name}</td>
      <td>${t.tournament||''}</td>
      <td>${t.category||''}</td>
      <td>${t.field||''}</td>
      <td>${t.umpire_count||''}</td>
      <td>v${t.version}</td>
    </tr>`;
  });
  html+='</table></div>';
  content.innerHTML=html;
}

load();
</script>
</body>
</html>
