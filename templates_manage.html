<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>📦 比賽模板管理 📦</title>
<style>
  body {
    font-family: system-ui;
    margin: 20px;
    line-height: 1.6;
  }
  h2 { margin-top: 0; }

  a {
    color: #0066cc;
    text-decoration: none;
  }
  a:hover { text-decoration: underline; }

  table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 10px;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 6px 8px;
    text-align: center;
  }
  th { background: #f0f0f0; }

  input, select {
    width: 100%;
    box-sizing: border-box;
  }

  .actions button {
    margin: 0 2px;
  }

  tr.editing {
    background: #fff8dc;
  }

  .toolbar {
    background: #f9f9f9;
    padding: 10px;
    margin: 10px 0;
  }

  .msg {
    margin: 8px 0;
    color: #555;
  }
</style>
</head>
<body>

<!-- ===== 權限檢查 ===== -->
<script>
if (!localStorage.getItem('role')) location.href = 'login.html';
if (localStorage.getItem('role') !== 'admin') {
  alert('僅限管理者使用');
  location.href = 'index.html';
}
</script>

<h2>📦 比賽模板管理 📦</h2>
<p class="msg">
  <a href="index.html">🏠 回首頁</a> |
  <a href="games_manage.html">⚾ 回比賽管理</a>
</p>

<!-- ===== 工具列 ===== -->
<div class="toolbar">
  🔍 搜尋：
  名稱 <input id="q_name" style="width:120px">
  盃賽 <input id="q_tournament" style="width:120px">
  組別 <input id="q_category" style="width:80px">
  <button onclick="renderTemplates()">查詢</button>
  |
  <button onclick="showNewTemplate()">➕ 新增模板</button>
</div>

<div id="content">載入中…</div>

<!-- ✅ 正確載入 -->
<script src="js/config.js"></script>

<script>
const token = localStorage.getItem('token');
const content = document.getElementById('content');
let templates = [];

/* ===== 載入模板 ===== */
function loadTemplates() {
  content.textContent = '載入中…';

  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    if (!res || res.result !== 'ok') {
      content.textContent = '❌ 無法取得模板資料';
      return;
    }
    templates = res.templates || [];
    renderTemplates();
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=getTemplates' +
    '&token=' + encodeURIComponent(token) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===== 顯示模板 ===== */
function renderTemplates() {
  let list = templates;

  const qName = q_name.value.trim();
  const qT = q_tournament.value.trim();
  const qC = q_category.value.trim();

  if (qName) list = list.filter(t => t.name.includes(qName));
  if (qT) list = list.filter(t => t.tournament.includes(qT));
  if (qC) list = list.filter(t => t.category.includes(qC));

  if (!list.length) {
    content.textContent = '目前尚無符合條件的模板';
    return;
  }

  let html = `<table>
    <tr>
      <th>名稱</th>
      <th>版本</th>
      <th>球場</th>
      <th>盃賽</th>
      <th>組別</th>
      <th>客隊</th>
      <th>主隊</th>
      <th>裁判數</th>
      <th>操作</th>
    </tr>`;

  list.forEach(t => {
html += `
<tr id="row_${t.template_id}">
  <td>${t.name}</td>
  <td>v${t.version}</td>
  <td>${t.field}</td>
  <td>${t.tournament}</td>
  <td>${t.category}</td>
  <td>${t.away_team}</td>
  <td>${t.home_team}</td>
  <td>${t.umpire_count}</td>
  <td class="actions">
    <button onclick="editTemplate('${t.template_id}')">✏️ 新版</button>
    <button onclick="useTemplate('${t.template_id}')">▶️ 使用</button>
    <button onclick="deleteTemplate('${t.template_id}')">🗑</button>
  </td>
</tr>`;

  });

  html += '</table>';
  content.innerHTML = html;
}

/* ===== 新增模板 ===== */
function showNewTemplate() {
  content.innerHTML = `
    <h3>➕ 新增模板（v1）</h3>
    <table>
      <tr><td>名稱</td><td><input id="n_name"></td></tr>
      <tr><td>球場</td><td><input id="n_field"></td></tr>
      <tr><td>盃賽</td><td><input id="n_tournament"></td></tr>
      <tr><td>組別</td><td><input id="n_category"></td></tr>
      <tr><td>客隊</td><td><input id="n_away"></td></tr>
      <tr><td>主隊</td><td><input id="n_home"></td></tr>
      <tr><td>裁判數</td><td><input id="n_count" type="number" value="1"></td></tr>
    </table>
    <button onclick="createTemplate()">✅ 建立</button>
    <button onclick="loadTemplates()">❌ 取消</button>
  `;
}

function createTemplate() {
  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    if (res && res.result === 'ok') {
      alert('✅ 模板已建立');
      loadTemplates();
    } else {
      alert('❌ 建立失敗');
    }
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=saveGameAsTemplate' +
    '&token=' + encodeURIComponent(token) +
    '&name=' + encodeURIComponent(n_name.value) +
    '&version=1' +
    '&field=' + encodeURIComponent(n_field.value) +
    '&tournament=' + encodeURIComponent(n_tournament.value) +
    '&category=' + encodeURIComponent(n_category.value) +
    '&away_team=' + encodeURIComponent(n_away.value) +
    '&home_team=' + encodeURIComponent(n_home.value) +
    '&umpire_count=' + encodeURIComponent(n_count.value) +
    '&callback=' + cb;

  document.body.appendChild(s);
}

/* ===== 編輯模板（另存新版本） ===== */
function editTemplate(templateId) {
  const t = templates.find(x => x.template_id === templateId);
  if (!t) return;

  const row = document.getElementById('row_' + templateId);
  if (!row) return;

  row.classList.add('editing');

  row.innerHTML = `
    <td><input id="e_name" value="${t.name}"></td>
    <td>v${t.version + 1}</td>
    <td><input id="e_field" value="${t.field}"></td>
    <td><input id="e_tournament" value="${t.tournament}"></td>
    <td><input id="e_category" value="${t.category}"></td>
    <td><input id="e_away" value="${t.away_team}"></td>
    <td><input id="e_home" value="${t.home_team}"></td>
    <td><input id="e_count" type="number" value="${t.umpire_count}"></td>
    <td>
      <button onclick="saveTemplateNewVersion('${t.name}', ${t.version})">✅ 儲存新版</button>
      <button onclick="loadTemplates()">❌ 取消</button>
    </td>
  `;
}

function saveTemplateNewVersion(name, oldVersion) {
  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    if (res && res.result === 'ok') {
      alert('✅ 已建立新版本');
      loadTemplates();
    } else {
      alert('❌ 建立失敗');
    }
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=saveGameAsTemplate' +
    '&token=' + encodeURIComponent(token) +
    '&name=' + encodeURIComponent(name) +
    '&version=' + encodeURIComponent(oldVersion + 1) +
    '&field=' + encodeURIComponent(e_field.value) +
    '&tournament=' + encodeURIComponent(e_tournament.value) +
    '&category=' + encodeURIComponent(e_category.value) +
    '&away_team=' + encodeURIComponent(e_away.value) +
    '&home_team=' + encodeURIComponent(e_home.value) +
    '&umpire_count=' + encodeURIComponent(e_count.value) +
    '&callback=' + cb;

  document.body.appendChild(s);
}

/* 初始化 */
loadTemplates();
</script>

</body>
</html>
