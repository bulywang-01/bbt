<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>📦 模板管理</title>

<style>
  body { font-family: system-ui; margin: 20px; background:#fafafa; }
  h2 { margin-top:0; }

  a { color:#0066cc; text-decoration:none; margin-right:12px; }
  a:hover { text-decoration:underline; }

  .header { margin-bottom:16px; }

  .panel {
    background:#fff;
    padding:14px;
    border-radius:6px;
    box-shadow:0 1px 4px rgba(0,0,0,.08);
    margin-bottom:20px;
  }

  table {
    border-collapse:collapse;
    width:100%;
  }

  th, td {
    border:1px solid #ddd;
    padding:6px 8px;
    text-align:center;
    white-space:nowrap;
  }

  th { background:#f0f0f0; }

  .actions button { margin:0 2px; }

  .readonly {
    background:#f5f5f5;
    color:#999;
  }
</style>
</head>
<body>

<script>
const role = localStorage.getItem('role');
if (!role) location.href = 'login.html';
</script>

<div class="header">
  <a href="index.html">🏠 回首頁</a>
  <a href="games_manage.html">⚾ 比賽管理</a>
  <a href="audit_log.html">📋 操作紀錄</a>
</div>

<h2>📦 模板管理</h2>

<!-- ===== 新增模板（僅 admin） ===== -->
<div class="panel" id="addPanel" style="display:none">
  <h3>➕ 新增模板</h3>
  名稱 <input id="n_name">
  盃賽 <input id="n_tournament">
  組別 <input id="n_category">
  場地 <input id="n_field">
  裁判數 <input id="n_count" type="number" value="4" style="width:60px">
  <button onclick="addTemplate()">新增</button>
</div>

<div id="content">載入中…</div>

<script src="js/config.js"></script>
<script>
const token = localStorage.getItem('token');
const content = document.getElementById('content');

if (role === 'admin') {
  document.getElementById('addPanel').style.display = 'block';
}

function loadTemplates() {
  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    if (!res || res.result !== 'ok') {
      content.textContent = '❌ 載入失敗';
      return;
    }
    renderTemplates(res.templates || []);
  };

  const s = document.createElement('script');
  s.src = API_URL + '?action=getTemplates&token=' + token + '&callback=' + cb;
  document.body.appendChild(s);
}

function renderTemplates(list) {
  let html = `
    <div class="panel">
    <table>
      <tr>
        <th>名稱</th>
        <th>盃賽</th>
        <th>組別</th>
        <th>場地</th>
        <th>裁判</th>
        <th>版本</th>
        <th>操作</th>
      </tr>
  `;

  list.forEach(t => {
    html += `
      <tr class="${role !== 'admin' ? 'readonly' : ''}">
        <td>${t.name}</td>
        <td>${t.tournament || ''}</td>
        <td>${t.category || ''}</td>
        <td>${t.field || ''}</td>
        <td>${t.umpire_count || ''}</td>
        <td>v${t.version}</td>
        <td class="actions">
          ${role === 'admin'
            ? `
              <button onclick="newVersion('${t.template_id}')">新版</button>
              <button onclick="useTemplate('${t.template_id}')">使用</button>
              <button onclick="deleteTemplate('${t.template_id}')">刪除</button>
            `
            : '唯讀'}
        </td>
      </tr>
    `;
  });

  html += '</table></div>';
  content.innerHTML = html;
}

function addTemplate() {
  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    if (res && res.result === 'ok') {
      alert('✅ 新增成功');
      loadTemplates();
    } else alert('❌ 失敗');
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=saveTemplate' +
    '&token=' + token +
    '&name=' + encodeURIComponent(n_name.value) +
    '&tournament=' + encodeURIComponent(n_tournament.value) +
    '&category=' + encodeURIComponent(n_category.value) +
    '&field=' + encodeURIComponent(n_field.value) +
    '&umpire_count=' + encodeURIComponent(n_count.value) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

function deleteTemplate(id) {
  if (!confirm('確定刪除模板？')) return;
  const cb = 'cb_' + Date.now();
  window[cb] = () => loadTemplates();
  const s = document.createElement('script');
  s.src = API_URL + '?action=deleteTemplate&token=' + token + '&template_id=' + id + '&callback=' + cb;
  document.body.appendChild(s);
}

function newVersion(id) {
  const cb = 'cb_' + Date.now();
  window[cb] = () => loadTemplates();
  const s = document.createElement('script');
  s.src = API_URL + '?action=cloneTemplateNewVersion&token=' + token + '&template_id=' + id + '&callback=' + cb;
  document.body.appendChild(s);
}

function useTemplate(id) {
  alert('模板使用流程（你已完成 weekly / multi-weekly）');
}

loadTemplates();
</script>
</body>
</html>
