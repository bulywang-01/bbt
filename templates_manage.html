<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>📦 模板管理</title>
<style>
  body { font-family: system-ui; margin: 20px; }
  h2 { margin-top: 0; }

  a { color: #0066cc; text-decoration: none; }
  a:hover { text-decoration: underline; }

  table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 10px;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 6px 8px;
    text-align: center;
    white-space: nowrap;
  }
  th { background: #f0f0f0; }

  .actions button { margin: 0 2px; }
  tr.editing { background: #fff8dc; }
</style>
</head>
<body>

<!-- ===== 權限檢查 ===== -->
<script>
if (!localStorage.getItem('role')) location.href = 'login.html';
if (localStorage.getItem('role') !== 'admin') {
  alert('僅限管理者使用');
  location.href = 'index.html';
}
</script>

<h2>📦 模板管理</h2>
<p>
  index.html🏠 回首頁</a> |
  games_manage.html⚾ 回比賽管理</a>
</p>

<!-- ===== 新增模板 ===== -->
<div>
  <h3>➕ 新增模板</h3>
  名稱：
  <input id="n_name">
  <button onclick="addTemplate()">新增</button>
</div>

<hr>

<div id="list">載入中…</div>

<!-- ✅ 一定要這樣寫 -->
js/config.js

<script>
const token = localStorage.getItem('token');
const listBox = document.getElementById('list');
let templates = [];

/* ===============================
 * 載入模板清單
 * =============================== */
function loadTemplates() {
  listBox.textContent = '載入中…';

  const cb = 'cb_' + Date.now();
  window[cb] = function(res) {
    if (!res || res.result !== 'ok') {
      listBox.textContent = '❌ 讀取模板失敗';
      return;
    }

    templates = res.templates || [];

    if (templates.length === 0) {
      listBox.textContent = '目前尚無模板';
      return;
    }

    renderTemplates();
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=getTemplates' +
    '&token=' + encodeURIComponent(token) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===============================
 * 顯示模板表格
 * =============================== */
function renderTemplates() {
  let html = `
    <table>
      <tr>
        <th>ID</th>
        <th>名稱</th>
        <th>版本</th>
        <th>操作</th>
      </tr>
  `;

  templates.forEach(t => {
    html += `
      <tr id="row_${t.template_id}">
        <td>${t.template_id}</td>
        <td>${t.name}</td>
        <td>v${t.version}</td>
        <td class="actions">
          <button onclick="newVersion('${t.template_id}')">新版</button>
          <button onclick="useTemplate('${t.template_id}')">使用</button>
          <button onclick="deleteTemplate('${t.template_id}')">刪除</button>
        </td>
      </tr>
    `;
  });

  html += '</table>';
  listBox.innerHTML = html;
}

/* ===============================
 * 新增模板（v1）
 * =============================== */
function addTemplate() {
  const name = n_name.value.trim();
  if (!name) {
    alert('請輸入模板名稱');
    return;
  }

  const cb = 'cb_' + Date.now();
  window[cb] = function(res) {
    if (res && res.result === 'ok') {
      alert('✅ 新增成功，ID=' + res.template_id);
      n_name.value = '';
      loadTemplates();   // ✅ 立即刷新
    } else {
      alert('❌ 新增失敗');
    }
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=saveTemplate' +
    '&token=' + encodeURIComponent(token) +
    '&name=' + encodeURIComponent(name) +
    '&version=1' +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===============================
 * 建立新版（v+1）
 * =============================== */
function newVersion(templateId) {
  if (!confirm('確定建立新版本？')) return;

  const cb = 'cb_' + Date.now();
  window[cb] = function(res) {
    if (res && res.result === 'ok') {
      alert('✅ 已建立 v' + res.version);
      loadTemplates();   // ✅ 關鍵：立刻更新清單
    } else {
      alert('❌ 建立新版失敗');
    }
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=cloneTemplateNewVersion' +
    '&token=' + encodeURIComponent(token) +
    '&template_id=' + encodeURIComponent(templateId) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===============================
 * 使用模板建立比賽
 * =============================== */
function useTemplate(templateId) {
  const startDate = prompt('請輸入起始日期（yyyy/MM/dd）');
  if (!startDate) return;

  const days = prompt('請輸入連續天數', '1');
  if (!days || Number(days) <= 0) {
    alert('天數不正確');
    return;
  }

  const cb = 'cb_' + Date.now();
  window[cb] = function(res) {
    if (res && res.result === 'ok') {
      alert('✅ 已建立比賽：\n' + res.created_ids.join(', '));
    } else {
      alert('❌ 建立比賽失敗');
    }
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=useTemplateCreateGames' +
    '&token=' + encodeURIComponent(token) +
    '&template_id=' + encodeURIComponent(templateId) +
    '&start_date=' + encodeURIComponent(startDate) +
    '&days=' + encodeURIComponent(days) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===============================
 * 刪除模板
 * =============================== */
function deleteTemplate(templateId) {
  if (!confirm('確定刪除此模板？')) return;

  const cb = 'cb_' + Date.now();
  window[cb] = function(res) {
    if (res && res.result === 'ok') {
      alert('✅ 已刪除');
      loadTemplates();
    } else {
      alert('❌ 刪除失敗');
    }
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=deleteTemplate' +
    '&token=' + encodeURIComponent(token) +
    '&template_id=' + encodeURIComponent(templateId) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* 初始化 */
loadTemplates();
</script>

</body>
</html>
