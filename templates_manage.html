<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>📦 比賽模板管理</title>
<style>
  body { font-family: system-ui; margin: 20px; }
  table { border-collapse: collapse; width: 100%; margin-top: 10px; }
  th, td { border: 1px solid #ccc; padding: 6px 8px; text-align: center; }
  th { background: #f0f0f0; }
  .actions button { margin: 0 2px; }
  tr.editing { background: #fff8dc; }
</style>
</head>
<body>

<h2>📦 比賽模板管理 📦</h2>
<p>
  <a href="index.html">🏠 回首頁</a> |
  <a href="games_manage.html">⚾ 回比賽管理</a>
</p>

<div id="content">載入中…</div>

<script src="js/config.js"></script>
<script>
const token = localStorage.getItem('token');
const content = document.getElementById('content');
let templates = [];

/* ===== 載入模板 ===== */
function loadTemplates() {
  const cb = 'cb_' + Date.now();
  window[cb] = function(res) {
    if (!res || res.result !== 'ok') {
      content.textContent = '❌ 無法取得模板資料';
      return;
    }
    templates = res.templates || [];
    renderTemplates();
  };

  const s = document.createElement('script');
  s.src = API_URL +
    '?action=getTemplates' +
    '&token=' + encodeURIComponent(token) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===== 顯示模板 ===== */
function renderTemplates() {
  if (!templates.length) {
    content.textContent = '目前尚無模板';
    return;
  }

  let html = `<table>
    <tr>
      <th>名稱</th>
      <th>版本</th>
      <th>球場</th>
      <th>盃賽</th>
      <th>組別</th>
      <th>客隊</th>
      <th>主隊</th>
      <th>裁判數</th>
      <th>操作</th>
    </tr>`;

  templates.forEach(t => {
    const id = t.template_id; // ✅ 關鍵

    html += `
    <tr data-template-id="${id}">
      <td>${t['名稱'] || t.name || ''}</td>
      <td>v${t.version || ''}</td>
      <td>${t['球場'] || ''}</td>
      <td>${t['盃賽'] || ''}</td>
      <td>${t['組別'] || ''}</td>
      <td>${t['客隊'] || ''}</td>
      <td>${t['主隊'] || ''}</td>
      <td>${t['裁判數'] || ''}</td>
      <td class="actions">
        <button onclick="editTemplate('${id}')">✏️ 新版</button>
        <button onclick="useTemplate('${id}')">▶️ 使用</button>
        <button onclick="deleteTemplate('${id}')">🗑</button>
      </td>
    </tr>`;
  });

  html += '</table>';
  content.innerHTML = html;
}

/* ===== 刪除模板 ===== */
function deleteTemplate(templateId) {
  if (!templateId) {
    alert('❌ template_id 為空');
    return;
  }
  if (!confirm('確定刪除此模板？')) return;

  const cb = 'cb_' + Date.now();
  window[cb] = function(res) {
    if (res && res.result === 'ok') {
      alert('✅ 模板已刪除');
      loadTemplates();
    } else {
      alert('❌ 刪除失敗');
    }
  };

  const s = document.createElement('script');
  s.src = API_URL +
    '?action=deleteTemplate' +
    '&token=' + encodeURIComponent(token) +
    '&template_id=' + encodeURIComponent(templateId) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===== 使用模板 ===== */
function useTemplate(templateId) {
  if (!templateId) {
    alert('❌ template_id 為空');
    return;
  }
  alert('✅ 使用模板：' + templateId);
}

/* ===== 新版模板 ===== */
function editTemplate(templateId) {
  if (!templateId) {
    alert('❌ template_id 為空');
    return;
  }
  alert('✅ 新版模板：' + templateId);
}

/* 初始化 */
loadTemplates();
</script>

</body>
</html>
