<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>📦 模板管理</title>
<style>
  body { font-family: system-ui; margin: 20px; }
  h2 { margin-top: 0; }

  a { color: #0066cc; text-decoration: none; margin-right: 10px; }
  a:hover { text-decoration: underline; }

  table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 10px;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 6px 8px;
    text-align: center;
    white-space: nowrap;
  }
  th { background: #f0f0f0; }

  .actions button { margin: 0 2px; }

  .toolbar {
    background: #f9f9f9;
    padding: 10px;
    margin: 10px 0;
  }

  /* ===== Modal ===== */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    align-items: center;
    justify-content: center;
  }
  .modal .box {
    background: #fff;
    padding: 20px;
    width: 420px;
  }

  .preview {
    background: #f5f5f5;
    padding: 10px;
    margin-top: 10px;
    max-height: 150px;
    overflow-y: auto;
    font-size: 14px;
  }
</style>
</head>
<body>

<!-- ===== 權限檢查 ===== -->
<script>
if (!localStorage.getItem('role')) location.href = 'login.html';
if (localStorage.getItem('role') !== 'admin') {
  alert('僅限管理者使用');
  location.href = 'index.html';
}
</script>

<!-- ===== Header（超連結固定）===== -->
<div>
  <a href="index.html">🏠 回首頁</a>
  <a href="games_manage.html">⚾ 比賽管理</a>
</div>

<h2>📦 模板管理（只顯示最新版本）</h2>

<!-- ===== 新增模板 ===== -->
<div>
  <h3>➕ 新增模板（v1）</h3>
  名稱：
  <input id="n_name">
  <button onclick="addTemplate()">新增</button>
</div>

<!-- ===== 搜尋工具列 ===== -->
<div class="toolbar">
  🔍 搜尋：
  名稱 <input id="q_name" oninput="renderTemplates()">
  盃賽 <input id="q_tournament" oninput="renderTemplates()">
  組別 <input id="q_category" oninput="renderTemplates()">
  場地 <input id="q_field" oninput="renderTemplates()">
  裁判數 <input id="q_umpire" type="number" min="1" style="width:70px" oninput="renderTemplates()">
</div>

<hr>

<div id="list">載入中…</div>

<!-- ===== Weekly Modal ===== -->
<div id="weeklyModal" class="modal">
  <div class="box">
    <h3>📅 一鍵產生賽程（每週）</h3>

    起始日期<br>
    <input type="date" id="w_start" style="width:100%" onchange="updatePreview()"><br><br>

    星期<br>
    <select id="w_weekday" style="width:100%" onchange="updatePreview()">
      <option value="1">星期一</option>
      <option value="2">星期二</option>
      <option value="3">星期三</option>
      <option value="4">星期四</option>
      <option value="5">星期五</option>
      <option value="6">星期六</option>
      <option value="7">星期日</option>
    </select><br><br>

    產生幾週<br>
    <input type="number" id="w_weeks" value="4" min="1" style="width:100%" onchange="updatePreview()"><br><br>

    <div class="preview" id="previewBox">
      尚未產生預覽
    </div>

    <div style="text-align:right; margin-top:10px">
      <button onclick="closeWeekly()">取消</button>
      <button onclick="confirmWeekly()">✅ 確認產生</button>
    </div>
  </div>
</div>

<!-- ✅ API 設定 -->
<script src="js/config.js"></script>

<script>
const token = localStorage.getItem('token');
const listBox = document.getElementById('list');

let templates = [];
let latestTemplates = [];
let currentTemplateId = null;

/* ===============================
 * 載入模板
 * =============================== */
function loadTemplates() {
  listBox.textContent = '載入中…';

  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    if (!res || res.result !== 'ok') {
      listBox.textContent = '❌ 讀取模板失敗';
      return;
    }
    templates = res.templates || [];
    buildLatestTemplates();
    renderTemplates();
  };

  const s = document.createElement('script');
  s.src = API_URL +
    '?action=getTemplates' +
    '&token=' + encodeURIComponent(token) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===============================
 * 只顯示最新版本
 * =============================== */
function buildLatestTemplates() {
  const map = {};
  templates.forEach(t => {
    if (!map[t.name] || Number(t.version) > Number(map[t.name].version)) {
      map[t.name] = t;
    }
  });
  latestTemplates = Object.values(map);
}

/* ===============================
 * 顯示模板（含搜尋）
 * =============================== */
function renderTemplates() {
  let list = latestTemplates.slice();

  const qName = q_name.value.trim();
  const qTournament = q_tournament.value.trim();
  const qCategory = q_category.value.trim();
  const qField = q_field.value.trim();
  const qUmpire = q_umpire.value.trim();

  if (qName) list = list.filter(t => t.name.includes(qName));
  if (qTournament) list = list.filter(t => (t.tournament || '').includes(qTournament));
  if (qCategory) list = list.filter(t => (t.category || '').includes(qCategory));
  if (qField) list = list.filter(t => (t.field || '').includes(qField));
  if (qUmpire) list = list.filter(t => String(t.umpire_count) === qUmpire);

  if (!list.length) {
    listBox.textContent = '查無符合條件的模板';
    return;
  }

  let html = `
    <table>
      <tr>
        <th>名稱</th>
        <th>版本</th>
        <th>盃賽</th>
        <th>組別</th>
        <th>場地</th>
        <th>裁判數</th>
        <th>操作</th>
      </tr>
  `;

  list.forEach(t => {
    html += `
      <tr>
        <td>${t.name}</td>
        <td>v${t.version}</td>
        <td>${t.tournament || ''}</td>
        <td>${t.category || ''}</td>
        <td>${t.field || ''}</td>
        <td>${t.umpire_count || ''}</td>
        <td class="actions">
          <button onclick="newVersion('${t.template_id}')">新版</button>
          <button onclick="openWeekly('${t.template_id}')">一鍵產生賽程</button>
          <button onclick="deleteTemplate('${t.template_id}')">刪除</button>
        </td>
      </tr>
    `;
  });

  html += '</table>';
  listBox.innerHTML = html;
}

/* ===============================
 * 新增模板
 * =============================== */
function addTemplate() {
  const name = n_name.value.trim();
  if (!name) return alert('請輸入模板名稱');

  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    if (res && res.result === 'ok') {
      alert('✅ 新增成功');
      n_name.value = '';
      loadTemplates();
    } else {
      alert('❌ 新增失敗');
    }
  };

  const s = document.createElement('script');
  s.src = API_URL +
    '?action=saveTemplate' +
    '&token=' + encodeURIComponent(token) +
    '&name=' + encodeURIComponent(name) +
    '&version=1' +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===============================
 * 新版
 * =============================== */
function newVersion(templateId) {
  if (!confirm('確定建立新版本？')) return;

  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    if (res && res.result === 'ok') {
      alert('✅ 已建立 v' + res.version);
      loadTemplates();
    } else {
      alert('❌ 建立新版失敗');
    }
  };

  const s = document.createElement('script');
  s.src = API_URL +
    '?action=cloneTemplateNewVersion' +
    '&token=' + encodeURIComponent(token) +
    '&template_id=' + encodeURIComponent(templateId) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===============================
 * Weekly modal
 * =============================== */
function openWeekly(templateId) {
  currentTemplateId = templateId;
  document.getElementById('previewBox').textContent = '尚未產生預覽';
  document.getElementById('weeklyModal').style.display = 'flex';
}

function closeWeekly() {
  currentTemplateId = null;
  document.getElementById('weeklyModal').style.display = 'none';
}

/* ===============================
 * 預覽日期清單
 * =============================== */
function updatePreview() {
  const start = w_start.value;
  const weekday = Number(w_weekday.value);
  const weeks = Number(w_weeks.value);

  if (!start || !weekday || !weeks) return;

  let date = new Date(start);
  while ((date.getDay() === 0 ? 7 : date.getDay()) !== weekday) {
    date.setDate(date.getDate() + 1);
  }

  let html = '將建立以下賽程：<br>';
  for (let i = 0; i < weeks; i++) {
    const d = new Date(date);
    d.setDate(date.getDate() + i * 7);
    html += '• ' + d.toLocaleDateString('zh-TW') + '<br>';
  }

  document.getElementById('previewBox').innerHTML = html;
}

/* ===============================
 * 確認產生
 * =============================== */
function confirmWeekly() {
  const startDate = w_start.value;
  const weekday = w_weekday.value;
  const weeks = w_weeks.value;

  if (!startDate || !weeks) return alert('資料不完整');

  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    if (res && res.result === 'ok') {
      alert('✅ 已建立賽程：\n' + res.created_ids.join(', '));
    } else {
      alert('❌ 建立賽程失敗');
    }
    closeWeekly();
  };

  const s = document.createElement('script');
  s.src = API_URL +
    '?action=useTemplateWeekly' +
    '&token=' + encodeURIComponent(token) +
    '&template_id=' + encodeURIComponent(currentTemplateId) +
    '&start_date=' + encodeURIComponent(startDate) +
    '&weekday=' + encodeURIComponent(weekday) +
    '&weeks=' + encodeURIComponent(weeks) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===============================
 * 刪除模板
 * =============================== */
function deleteTemplate(templateId) {
  if (!confirm('確定刪除此模板（最新版本）？')) return;

  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    if (res && res.result === 'ok') {
      alert('✅ 已刪除');
      loadTemplates();
    } else {
      alert('❌ 刪除失敗');
    }
  };

  const s = document.createElement('script');
  s.src = API_URL +
    '?action=deleteTemplate' +
    '&token=' + encodeURIComponent(token) +
    '&template_id=' + encodeURIComponent(templateId) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* 初始化 */
loadTemplates();
</script>

</body>
</html>
``
