<!DOCTYPE html><html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>📦 比賽模板管理</title>
<style>
  body {
    font-family: system-ui;
    margin: 20px;
    line-height: 1.6;
  }
  h2 { margin-top: 0; }

  a {
    color: #0066cc;
    text-decoration: none;
  }
  a:hover { text-decoration: underline; }

  table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 10px;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 6px 8px;
    text-align: center;
  }
  th { background: #f0f0f0; }

  input, select {
    width: 100%;
    box-sizing: border-box;
  }

  .actions button {
    margin: 0 2px;
  }

  tr.editing {
    background: #fff8dc;
  }

  .msg {
    margin: 8px 0;
    color: #555;
  }
</style>
</head>
<body>

<!-- ===== 權限檢查 ===== -->
<script>
if (!localStorage.getItem('role')) location.href = 'login.html';
if (localStorage.getItem('role') !== 'admin') {
  alert('僅限管理者使用');
  location.href = 'index.html';
}
</script>

<h2>📦 比賽模板管理</h2>
<p class="msg">
  <a href="index.html">🏠 回首頁</a> |
  <a href="games_manage.html">⚾ 回比賽管理</a>
</p>

<div id="content">載入中…</div>

<!-- ✅ 正確的 script 寫法（這次不會錯） -->
<script src="js/config.js"></script>

<script>
const token = localStorage.getItem('token');
const content = document.getElementById('content');
let templates = [];

/* ===== 載入模板 ===== */
function loadTemplates() {
  content.textContent = '載入中…';

  const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  window[cb] = function(res) {
    if (!res || res.result !== 'ok') {
      content.textContent = '❌ 無法取得模板資料';
      delete window[cb];
      return;
    }

    templates = res.templates || [];
    renderTemplates();
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=getTemplates' +
    '&token=' + encodeURIComponent(token) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===== 顯示模板清單 ===== */
function renderTemplates() {
  if (!templates.length) {
    content.textContent = '目前尚無模板';
    return;
  }

  let html = `<table>
    <tr>
      <th>模板名稱</th>
      <th>球場</th>
      <th>盃賽</th>
      <th>組別</th>
      <th>客隊</th>
      <th>主隊</th>
      <th>裁判數</th>
      <th>操作</th>
    </tr>`;

  templates.forEach(t => {
    html += `
    <tr id="row_${t.template_id}">
      <td>${t.name}</td>
      <td>${t.field}</td>
      <td>${t.tournament}</td>
      <td>${t.category}</td>
      <td>${t.away_team}</td>
      <td>${t.home_team}</td>
      <td>${t.umpire_count}</td>
      <td class="actions">
        <button onclick="editTemplate('${t.template_id}')">✏️ 修改</button>
        <button onclick="useTemplate('${t.template_id}')">▶️ 使用</button>
        <button onclick="deleteTemplate('${t.template_id}')">🗑 刪除</button>
      </td>
    </tr>`;
  });

  html += '</table>';
  content.innerHTML = html;
}

/* ===== 編輯模板 ===== */
function editTemplate(templateId) {
  const t = templates.find(x => x.template_id === templateId);
  if (!t) return;

  const row = document.getElementById('row_' + templateId);
  row.classList.add('editing');

  row.innerHTML = `
    <td><input type="text" id="n_${templateId}" value="${t.name}"></td>
    <td><input type="text" id="f_${templateId}" value="${t.field}"></td>
    <td><input type="text" id="t_${templateId}" value="${t.tournament}"></td>
    <td><input type="text" id="c_${templateId}" value="${t.category}"></td>
    <td><input type="text" id="a_${templateId}" value="${t.away_team}"></td>
    <td><input type="text" id="h_${templateId}" value="${t.home_team}"></td>
    <td>
      <select id="u_${templateId}">
        <option ${t.umpire_count==1?'selected':''}>1</option>
        <option ${t.umpire_count==2?'selected':''}>2</option>
        <option ${t.umpire_count==3?'selected':''}>3</option>
        <option ${t.umpire_count==4?'selected':''}>4</option>
      </select>
    </td>
    <td class="actions">
      <button onclick="saveTemplate('${templateId}')">✅ 儲存</button>
      <button onclick="loadTemplates()">❌ 取消</button>
    </td>
  `;
}

/* ===== 儲存模板 ===== */
function saveTemplate(templateId) {
  const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);

  window[cb] = function(res) {
    if (res && res.result === 'ok') {
      alert('✅ 模板已更新');
      loadTemplates();
    } else {
      alert('❌ 更新模板失敗');
    }
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=updateTemplate' +
    '&token=' + encodeURIComponent(token) +
    '&template_id=' + encodeURIComponent(templateId) +
    '&name=' + encodeURIComponent(document.getElementById('n_'+templateId).value) +
    '&field=' + encodeURIComponent(document.getElementById('f_'+templateId).value) +
    '&tournament=' + encodeURIComponent(document.getElementById('t_'+templateId).value) +
    '&category=' + encodeURIComponent(document.getElementById('c_'+templateId).value) +
    '&away_team=' + encodeURIComponent(document.getElementById('a_'+templateId).value) +
    '&home_team=' + encodeURIComponent(document.getElementById('h_'+templateId).value) +
    '&umpire_count=' + encodeURIComponent(document.getElementById('u_'+templateId).value) +
    '&callback=' + cb;

  document.body.appendChild(s);
}

/* ===== 使用模板 ===== */
function useTemplate(templateId) {
  const t = templates.find(x => x.template_id === templateId);
  if (!t) return;

  const startDate = prompt('請輸入起始日期（yyyy/MM/dd）');
  if (!startDate) return;

  const days = prompt('請輸入連續天數', '1');
  if (!days || isNaN(days) || Number(days) <= 0) {
    alert('天數不正確');
    return;
  }

  if (!confirm(
    `確認使用模板「${t.name}」\n起始日：${startDate}\n天數：${days}`
  )) return;

  const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  window[cb] = function(res) {
    if (res && res.result === 'ok') {
      alert(
        '✅ 已建立比賽，新編號：\n' +
        res.created_ids.join(', ')
      );
    } else {
      alert('❌ 建立失敗');
    }
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=copyTemplateSeries' +
    '&token=' + encodeURIComponent(token) +
    '&template_id=' + encodeURIComponent(templateId) +
    '&start_date=' + encodeURIComponent(startDate) +
    '&days=' + encodeURIComponent(days) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* ===== 刪除模板 ===== */
function deleteTemplate(templateId) {
  if (!confirm('確定刪除此模板？')) return;

  const cb = 'cb_' + Date.now();
  window[cb] = function(res) {
    if (res && res.result === 'ok') {
      alert('✅ 已刪除模板');
      loadTemplates();
    } else {
      alert('❌ 刪除失敗');
    }
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=deleteTemplate' +
    '&token=' + encodeURIComponent(token) +
    '&template_id=' + encodeURIComponent(templateId) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

/* 初始化 */
loadTemplates();
</script>

</body>
</html>
