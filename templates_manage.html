<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>模板管理 V2</title>
</head>
<body>

<h2>模板管理</h2>
<div>
  名稱 <input id="n_name">
  <button onclick="add()">新增</button>
</div>

<hr>
<div id="list">載入中…</div>

<script src="js/config.js"></script>
<script>
const token = localStorage.getItem('token');
const list = document.getElementById('list');

function load() {
  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    let html = '<table border="1"><tr><th>ID</th><th>名稱</th><th>版本</th><th>操作</th></tr>';
    res.templates.forEach(t => {
      html += `
        <tr>
          <td>${t.template_id}</td>
          <td>${t.name}</td>
          <td>v${t.version}</td>
          <td>
          <button onclick="newVersion('${t.template_id}')">新版</button>
          <button onclick="del('${t.template_id}')">刪除</button>
          </td>
        </tr>`;
    });
    html += '</table>';
    list.innerHTML = html;
  };
  const s = document.createElement('script');
  s.src = API_URL + '?action=getTemplates&token=' + token + '&callback=' + cb;
  document.body.appendChild(s);
}

function newVersion(templateId) {
  if (!confirm('確定建立新版本？')) return;

  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    if (res && res.result === 'ok') {
      alert(`✅ 已建立 v${res.version}`);
      loadTemplates();
    } else {
      alert('❌ 建立新版失敗');
    }
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=cloneTemplateNewVersion' +
    '&token=' + token +
    '&template_id=' + templateId +
    '&callback=' + cb;

  document.body.appendChild(s);
}

  
function add() {
  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    alert('新增成功 ID=' + res.template_id);
    load();
  };
  const s = document.createElement('script');
  s.src = API_URL +
    '?action=saveTemplate' +
    '&token=' + token +
    '&name=' + encodeURIComponent(n_name.value) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

function del(id) {
  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    alert(res.result);
    load();
  };
  const s = document.createElement('script');
  s.src = API_URL +
    '?action=deleteTemplate' +
    '&token=' + token +
    '&template_id=' + id +
    '&callback=' + cb;
  document.body.appendChild(s);
}

load();
</script>
</body>
</html>
