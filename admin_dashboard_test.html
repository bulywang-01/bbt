<!DOCTYPE html><html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>管理中心</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ 一定要先載 auth.js -->
  <script src="js/auth.js"></script>
</head>
<body>

  <!-- ✅ 共用 Header -->
  <div id="header-container"></div>

  <!-- ===== 內容 ===== -->
  <div style="padding:20px;">
    <h2>管理中心</h2>
    <p>請依身份選擇可用的管理功能</p>

    <!-- 班表與統計 -->
    <div class="role-admin role-chief-judge role-record-chief" style="display:none;">
      <h3>📊 班表與年度統計</h3>
      <ul>
        <li><a href="judge_dashboard_admin.html">裁判班表安排</a></li>
        <li><a href="record_dashboard_admin.html">紀錄班表安排</a></li>
      </ul>
    </div>

    <!-- 系統管理 -->
    <div class="role-admin" style="display:none;">
      <h3>⚙️ 系統管理</h3>
      <ul>
        <li><a href="admin_users.html">帳號管理</a></li>
        <li><a href="admin_games.html">賽事管理</a></li>
      </ul>
    </div>
  </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // ✅ 先門禁
  guardAdminPage();

  const session = getSession();
  const roles = getRoles(session);

  // ✅ 載入 header（header DOM 建好後才會操作 u_name）
  fetch('header.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('header-container').innerHTML = html;

      // ✅ 顯示管理頁區塊
      if (hasAdmin(roles)) {
        document
          .querySelectorAll('.role-admin')
          .forEach(el => el.style.display = 'block');
      }

      if (roles.includes('chief_judge')) {
        document
          .querySelectorAll('.role-chief-judge')
          .forEach(el => el.style.display = 'block');
      }

      if (roles.includes('record_chief')) {
        document
          .querySelectorAll('.role-record-chief')
          .forEach(el => el.style.display = 'block');
      }
    });
});
</script>

</body>
</html>
