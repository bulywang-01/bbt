<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>裁判長排班</title>

<style>
body {
  margin: 0;
  background: #f5f6f8;
  font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC";
}

/* Header 容器 */
#header-container {
  background: #fff;
  border-bottom: 1px solid #ddd;
}

/* 主內容 */
.main {
  max-width: 1000px;
  margin: 0 auto;
  padding: 16px;
}

/* 比賽卡片 */
.panel {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.12);
}

.game-header {
  font-weight: 800;
  margin-bottom: 12px;
}

/* 站位橫向 */
.pos-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.pos-cell {
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 10px;
  text-align: center;
}

.pos-cell.assigned {
  background: #eef5ff;
  border-color: #4a7ef5;
}

.role {
  font-weight: 700;
}

.judge {
  margin: 6px 0;
}

.judge.preferred {
  font-size: 12px;
  color: #888;
}

button {
  border: none;
  border-radius: 6px;
  padding: 6px 12px;
  cursor: pointer;
}

.btn-assign { background: #4a7ef5; color: #fff; }
.btn-change { background: #f39c12; color: #fff; }

/* ===== 中央訊息 Overlay ===== */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

#overlay-box {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  min-width: 260px;
  text-align: center;
}

/* ===== 裁判選擇 Modal ===== */
#judgeModal.hidden { display:none; }

#judgeModal {
  position: fixed;
  inset:0;
  background: rgba(0,0,0,.45);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index: 10000;
}

.modal-box {
  background:#fff;
  padding:16px;
  border-radius:12px;
  max-width:420px;
  width:90%;
}

.judge-grid {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:10px;
  margin-top:10px;
}

.judge-card {
  border:1px solid #ddd;
  border-radius:8px;
  padding:10px;
  cursor:pointer;
  text-align:center;
  font-weight:700;
}

.judge-card:hover {
  background:#eef5ff;
  border-color:#4a7ef5;
}
</style>
</head>

<body>

<div id="header-container"></div>

<div class="main">
  <div id="content"></div>
</div>

<!-- 中央訊息 -->
<div id="overlay">
  <div id="overlay-box">
    <div id="overlay-text"></div>
    <button onclick="hideMessage()">確定</button>
  </div>
</div>

<!-- 裁判選擇 Modal -->
<div id="judgeModal" class="hidden">
  <div class="modal-box">
    <h3 id="judgeModalTitle">選擇裁判</h3>
    <div id="judgeList" class="judge-grid"></div>
    <div style="margin-top:10px;text-align:right;">
      <button onclick="closeJudgeModal()">取消</button>
    </div>
  </div>
</div>
  
 <!--
   ===============================
   ✅ 共用載入程式區
   ===============================
-->
<script>
fetch('header.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('header-container').innerHTML = html;
  });
</script>
<script src="js/config.js"></script>
<script src="js/judge_dashboard_admin.js"></script>

</body>
</html>
