<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>裁判長排班</title>

<style>
/* ===== 全域 ===== */
body {
  margin: 0;
  background: #f5f6f8;
  font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC";
}

/* ===== Header ===== */
#header-container {
  width: 100%;
  background: #fff;
  border-bottom: 1px solid #ddd;
}

/* ===== 主內容 ===== */
.main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 16px;
}

/* ===== 比賽卡片 ===== */
.panel {
  background: #fff;
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 18px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.1);
}

.game-header {
  font-weight: 800;
  font-size: 16px;
  margin-bottom: 12px;
}

/* ===== 裁判站位 ===== */
.pos-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr)); /* 永遠 4 格 */
  gap: 14px;
  overflow-x: auto;                 /* 手機橫向滑 */
  -webkit-overflow-scrolling: touch;
}

.pos-cell {
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}

.pos-cell.assigned {
  background: #eef5ff;
  border-color: #4a7ef5;
}

.role {
  font-weight: 700;
  font-size: 15px;
}

.judge {
  margin: 6px 0;
}

.judge.preferred {
  font-size: 13px;
  color: #777;
}

/* ===== 按鈕 ===== */
button {
  border: none;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 14px;
  cursor: pointer;
}

.btn-assign {
  background: #4a7ef5;
  color: #fff;
}

.btn-change {
  background: #f39c12;
  color: #fff;
}

/* ===== Modal ===== */
#judgeModal.hidden { display: none; }

#judgeModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.modal-box {
  background: #fff;
  border-radius: 14px;
  padding: 20px;
  max-width: 420px;
  width: 90%;
}

.judge-grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 12px;
  margin-top: 12px;
}

.judge-card {
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  font-weight: 700;
  cursor: pointer;
}

.judge-card:hover {
  background: #eef5ff;
  border-color: #4a7ef5;
}
</style>
</head>

<body>

<!-- ✅ Header（滿版） -->
<div id="header-container"></div>

<!-- ✅ 主內容 -->
<div class="main">
  <div id="content"></div>
</div>

<!-- ✅ 裁判選擇 Modal -->
<div id="judgeModal" class="hidden">
  <div class="modal-box">
    <h3 id="judgeModalTitle">選擇裁判</h3>
    <div id="judgeList" class="judge-grid"></div>
    <div style="margin-top:12px;text-align:right;">
      <button onclick="closeJudgeModal()">取消</button>
    </div>
  </div>
</div>

 <!--
   ===============================
   ✅ 共用載入程式區
   ===============================
-->
<script>
fetch('header.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('header-container').innerHTML = html;
  });
</script>
<script src="js/config.js"></script>
<script src="js/judge_dashboard_admin.js"></script>

</body>
</html>
