<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>裁判長排班</title>

<style>
/* ===== 全域 ===== */
/* ==================================================
   ✅ Header 樣式對齊 index.html（Admin 專用）
   目的：導覽列字體、寬度、高度完全一致
   ================================================== */

#header {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  background: #ffffff;
  border-bottom: 1px solid #e0e0e0;
}

/* 左邊導覽連結（首頁 / 出勤報名 / 管理 / 變更密碼 / 登出） */
#header a {
  display: flex;              /* ✅ 跟 index 一樣 */
  align-items: center;
  gap: 6px;

  font-size: 15px;            /* ✅ 字體大小對齊 */
  font-weight: 500;
  line-height: 1;

  padding: 10px 14px;         /* ✅ 寬度、高度來源 */
  min-height: 40px;           /* ✅ 視覺高度一致 */

  color: #0066cc;
  text-decoration: none;
  border-radius: 6px;

  margin-right: 0;            /* ❗不用舊的 margin 撐 */
  box-sizing: border-box;
}

/* hover 效果（index 有） */
#header a:hover {
  background: #f2f5fa;
}

/* 右側使用者名稱（王韶文） */
#header #u_name {
  margin-left: auto;          /* ✅ 右推 */
  padding: 10px 14px;

  font-size: 15px;
  font-weight: 600;
  color: #333;
  white-space: nowrap;
}

body {
  margin: 0;
  background: #f5f6f8;
  font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC";
}

/* ===== Header ===== */
#header-container {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#ffffff;
  border-bottom:1px solid #ddd;
}

/* ==================================================
   ✅ Header active 狀態（對齊 index.html）
   ================================================== */

/* 目前頁面 active */
#header a.active {
  background: #e3f2fd;     /* ✅ 跟 index 一樣的淡藍 */
  color: #1565c0;
  font-weight: 700;
}

/* hover + active 不打架 */
#header a.active:hover {
  background: #e3f2fd;
}
   
/* ===== 主內容 ===== */
.main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 16px;
}

/* ===== 比賽卡片 ===== */
.panel {
  background: #fff;
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 18px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.1);
}

.game-header {
  font-weight: 800;
  font-size: 16px;
  margin-bottom: 12px;
}

/* ===== 裁判站位 ===== */
.pos-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr)); /* 永遠 4 格 */
  gap: 14px;
  overflow-x: auto;                 /* 手機橫向滑 */
  -webkit-overflow-scrolling: touch;
}

.pos-cell {
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}

.pos-cell.assigned {
  background: #eef5ff;
  border-color: #4a7ef5;
}

.role {
  font-weight: 700;
  font-size: 15px;
}

.judge {
  margin: 6px 0;
}

.judge.preferred {
  font-size: 15px;
  color: #777;
}

/* ===== 按鈕 ===== */
button {
  border: none;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 14px;
  cursor: pointer;
}

.btn-assign {
  background: #4a7ef5;
  color: #fff;
}

.btn-change {
  background: #f39c12;
  color: #fff;
}

/* ===== Modal ===== */
#judgeModal.hidden { display: none; }

#judgeModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.modal-box {
  background: #fff;
  border-radius: 14px;
  padding: 20px;
  max-width: 420px;
  width: 90%;
}

.judge-grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 12px;
  margin-top: 12px;
}

.judge-card {
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  font-weight: 700;
  cursor: pointer;
}

.judge-card:hover {
  background: #eef5ff;
  border-color: #4a7ef5;
}
</style>
</head>

<body>

<!-- ✅ Header（滿版） -->
<div id="header-container"></div>

<!-- ✅ 主內容 -->
<div class="main">
  <div id="content"></div>
</div>

<!-- ✅ 裁判選擇 Modal -->
<div id="judgeModal" class="hidden">
  <div class="modal-box">
    <h3 id="judgeModalTitle">選擇裁判</h3>
    <div id="judgeList" class="judge-grid"></div>
    <div style="margin-top:12px;text-align:right;">
      <button onclick="closeJudgeModal()">取消</button>
    </div>
  </div>
</div>

 <!--
   ===============================
   ✅ 共用載入程式區
   ===============================
-->

<script>
   document.addEventListener('DOMContentLoaded', () => {
     fetch('header.html')
       .then(res => res.text())
       .then(html => {
         // ✅ 這時 #header 一定存在
         document.getElementById('header').innerHTML = html;
   
         // ✅ active（對齊 index.html）
         const page = location.pathname.split('/').pop();
   
         document.querySelectorAll('#header a').forEach(a => {
           const href = a.getAttribute('href');
           if (href === page) {
             a.classList.add('active');
           }
         });
       });
   });
</script>

<script src="js/config.js"></script>
<script src="js/judge_dashboard_admin.js"></script>

</body>
</html>
