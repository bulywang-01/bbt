<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判出勤統計</title>
<style>
  body { font-family: system-ui; }
  table { border-collapse: collapse; margin-top: 10px; }
  th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: center; }
  th { background: #eee; }
  .msg { margin: 10px 0; padding: 8px; background: #f7f7f7; }
</style>
</head>
<body>

<script>
if (!localStorage.getItem('role')) location.href='login.html';
if (localStorage.getItem('role') !== 'admin') {
  alert('僅限管理者');
  location.href='index.html';
}
</script>

<h2>📊 裁判出勤統計</h2>

<div class="msg">
  <button onclick="exportExcel()">📥 匯出 Excel</button> |
  <a href="index.html">🏠 回首頁</a>
</div>

<div id="content" class="msg">載入中…</div>

<script src="js/config.js"></script>
<script>
const token = localStorage.getItem('token');
const content = document.getElementById('content');
const cb = 'cb_' + Date.now();

window[cb] = function(res){
  if (res.result !== 'ok') {
    content.innerHTML = '❌ 無法取得統計資料';
    return;
  }

  let html = `<table>
    <tr>
      <th>裁判</th><th>總出勤</th>
      <th>主審</th><th>一壘審</th>
      <th>二壘審</th><th>三壘審</th>
    </tr>`;

  if (res.rows.length === 0) {
    html += `<tr><td colspan="6">尚無資料</td></tr>`;
  } else {
    res.rows.forEach(r=>{
      html += `
        <tr>
          <td>${r.name}</td>
          <td>${r.total}</td>
          <td>${r.主審}</td>
          <td>${r.一壘審}</td>
          <td>${r.二壘審}</td>
          <td>${r.三壘審}</td>
        </tr>`;
    });
  }

  html += '</table>';
  content.innerHTML = html;
};

const s = document.createElement('script');
s.src =
  API_URL +
  '?action=getAttendanceStatsView' +
  '&token=' + encodeURIComponent(token) +
  '&callback=' + cb;
document.body.appendChild(s);

function exportExcel(){
  const cb2='cb_'+Date.now();
  window[cb2]=res=>{
    if(res.result==='ok') window.open(res.url,'_blank');
    else alert('匯出失敗');
  };
  const s2=document.createElement('script');
  s2.src=
    API_URL+
    '?action=exportAttendanceStats'+
    '&token='+encodeURIComponent(token)+
    '&callback='+cb2;
  document.body.appendChild(s2);
}
</script>

</body>
</html>
