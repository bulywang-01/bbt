<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判審核</title>
<style>
body{margin:0;font-family:system-ui;background:#f5f6f8}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#fff;border-bottom:1px solid #ddd}
.nav a{margin-right:16px;color:#0066cc;text-decoration:none}
.nav a:hover{text-decoration:underline}
.main{padding:20px}
.panel{background:#fff;padding:16px;border-radius:6px;margin-bottom:20px}
.row{padding:6px;border-bottom:1px dashed #ddd}
.row:last-child{border-bottom:none}
.badge-p{color:#e6a700;font-weight:bold}
.badge-a{color:#2e7d32;font-weight:bold}
.badge-r{color:#c62828;font-weight:bold}
button{margin-left:6px}
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    <a href="index.html">首頁</a>
    <a href="admin_assignments.html">裁判審核</a>
  </div>
  <div>
    <span id="u_name"></span>
    <a href="#" id="btnLogout" style="margin-left:12px;">登出</a>
  </div>
</div>

<div class="main">

  <div class="panel">
    <h3>待審查</h3>
    <div id="pending">載入中…</div>
  </div>

  <div class="panel">
    <h3>已核准</h3>
    <div id="approved">載入中…</div>
  </div>

  <div class="panel">
    <h3>已拒絕</h3>
    <div id="rejected">載入中…</div>
  </div>

</div>

<script src="js/config.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const token=localStorage.getItem('token');
  const session=JSON.parse(localStorage.getItem('session_user')||'{}');
  if(!token){location.href='login.html';return;}
  document.getElementById('u_name').textContent=session.name||'';
  document.getElementById('btnLogout').onclick=e=>{
    e.preventDefault();localStorage.clear();location.href='login.html';
  };

  function callApi(action,cb){
    const f='cb_'+Date.now();
    window[f]=r=>{delete window[f];cb(r);};
    const s=document.createElement('script');
    s.src=API_URL+'?action='+action+'&token='+token+'&callback='+f;
    document.body.appendChild(s);
  }

  const box={
    pending:document.getElementById('pending'),
    approved:document.getElementById('approved'),
    rejected:document.getElementById('rejected')
  };

  callApi('getAllGameSignups',res=>{
    box.pending.innerHTML='';
    box.approved.innerHTML='';
    box.rejected.innerHTML='';
    if(!res||res.result!=='ok'){box.pending.textContent='無法讀取資料';return;}

    if(!res.items.length){box.pending.textContent='目前沒有資料';return;}

    res.items.forEach(s=>{
      const div=document.createElement('div');
      div.className='row';
      const badge=s.status==='pending'
        ?'<span class=badge-p>待審</span>'
        :s.status==='approved'
          ?'<span class=badge-a>已核准</span>'
          :'<span class=badge-r>已拒絕</span>';

      let actions='';
      if(s.status==='pending'){
        actions=`
          <button onclick="review('${s.signup_id}','approve')">核准</button>
          <button onclick="review('${s.signup_id}','reject')">拒絕</button>
        `;
      }

      div.innerHTML=`${s.date}｜${s.category}｜${s.judge_name} ${badge} ${actions}`;
      box[s.status].appendChild(div);
    });
  });

  window.review=(id,mode)=>{
    callApi(`reviewSingleGame&signup_id=${id}&mode=${mode}`,()=>location.reload());
  };
});
</script>
</body>
</html>
