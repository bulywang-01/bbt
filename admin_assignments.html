<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>管理端｜裁判審核與排班</title>
<style>
body{margin:0;font-family:system-ui;background:#f5f6f8}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#fff;border-bottom:1px solid #ddd}
.nav a{margin-right:16px;color:#0066cc;text-decoration:none;font-weight:500}
.main{padding:20px}
.panel{background:#fff;padding:16px;border-radius:6px}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:8px;border-bottom:1px solid #eee}
th{background:#f0f2f5}
button{padding:4px 10px;margin-right:4px}
</style>
</head>

<body>
<div class="header">
  <div class="nav">
    <a href="index.html">首頁</a>
    <a href="admin_assignments.html">裁判審核／排班</a>
  </div>
  <div>
    <b id="u_name"></b>
    <a id="btnLogout" style="margin-left:12px;cursor:pointer;">登出</a>
  </div>
</div>

<div class="main">
  <div class="panel">
    <table>
      <thead>
        <tr>
          <th>日期</th><th>組別</th><th>對戰</th><th>場地</th>
          <th>裁判</th><th>偏好</th><th>指派</th><th>狀態</th><th>操作</th>
        </tr>
      </thead>
      <tbody id="adminBody">
        <tr><td colspan="9">載入中…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="js/config.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const token=localStorage.getItem('token');
  if(!token){location.href='login.html';return;}
  document.getElementById('btnLogout').onclick=()=>{localStorage.clear();location.href='login.html';};

  const adminBody=document.getElementById('adminBody');
  function callApi(q,cb){
    const f='cb_'+Date.now();
    window[f]=r=>{delete window[f];cb(r);};
    const s=document.createElement('script');
    s.src=API_URL+'?'+q+'&token='+token+'&callback='+f;
    document.body.appendChild(s);
  }

  callApi('action=getAdminSignupList',res=>{
    adminBody.innerHTML='';
    res.items.forEach(i=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`<td>${i.date}</td><td>${i.category}</td>
        <td>${i.away_team} vs ${i.home_team}</td><td>${i.field}</td>
        <td>${i.judge_name}</td><td>${i.preferred_position}</td>
        <td>
          <select data-id="${i.signup_id}">
            ${i.available_positions.map(p=>`<option>${p}</option>`).join('')}
          </select>
        </td>
        <td>${i.status}</td>
        <td>
          <button onclick="approve('${i.signup_id}')">核准</button>
          <button onclick="reject('${i.signup_id}')">退回</button>
        </td>`;
      adminBody.appendChild(tr);
    });
  });

  window.approve=id=>{
    const s=document.querySelector(`select[data-id="${id}"]`);
    callApi(`action=assignUmpire&signup_id=${id}&assigned_position=${s.value}`,()=>location.reload());
  };
  window.reject=id=>{
    callApi(`action=assignUmpire&signup_id=${id}&mode=reject`,()=>location.reload());
  };
});
</script>
</body>
</html>
