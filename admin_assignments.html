<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>裁判審核／排班</title>

<style>
body{margin:0;font-family:system-ui;background:#f5f6f8}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#fff;border-bottom:1px solid #ddd}
.nav a{margin-right:16px;color:#0066cc;text-decoration:none;font-weight:500}
.nav a:hover{text-decoration:underline}
.main{padding:20px}
.panel{background:#fff;padding:16px;border-radius:6px;margin-bottom:20px}
.game{margin-bottom:12px;padding:8px;border:1px solid #ddd;border-radius:4px}
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    <a href="index.html">首頁</a>
    <a href="admin_assignments.html">裁判審核／排班</a>
  </div>
  <div>
    <span id="u_name"></span>
    <a href="#" id="btnLogout" style="margin-left:12px;">登出</a>
  </div>
</div>

<div class="main">

  <div class="panel">
    <h3>待審查</h3>
    <div id="pending">載入中…</div>
  </div>

  <div class="panel">
    <h3>已核准</h3>
    <div id="approved">載入中…</div>
  </div>

  <div class="panel">
    <h3>已拒絕</h3>
    <div id="rejected">載入中…</div>
  </div>

</div>

<!-- ✅ 正確載入 JS -->
<script src="js/config.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const token = localStorage.getItem('token');
  const session = JSON.parse(localStorage.getItem('session_user') || '{}');

  if (!token) {
    location.href = 'login.html';
    return;
  }

  document.getElementById('u_name').textContent = session.name || '';

  document.getElementById('btnLogout').onclick = e => {
    e.preventDefault();
    localStorage.clear();
    location.href = 'login.html';
  };

  function callApi(action, cb){
    const fn = 'cb_' + Date.now();
    window[fn] = r => { delete window[fn]; cb(r); };
    const s = document.createElement('script');
    s.src = API_URL + '?action=' + action + '&token=' + token + '&callback=' + fn;
    document.body.appendChild(s);
  }

  callApi('getAdminSignupList', res => {
    console.log('ADMIN API:', res);

    ['pending','approved','rejected'].forEach(id=>{
      document.getElementById(id).innerHTML = '';
    });

    if (!res || res.result !== 'ok') {
      document.getElementById('pending').textContent = '無法讀取資料';
      return;
    }

    if (!res.groups.length) {
      document.getElementById('pending').textContent = '目前沒有申請資料';
      return;
    }

    res.groups.forEach(g => {
      g.signups.forEach(s => {
        const box = document.createElement('div');
        box.className = 'game';
        box.textContent = `${g.date}｜${g.category}｜${s.judge_name}（${s.status}）`;
        document.getElementById(s.status).appendChild(box);
      });
    });
  });
});
</script>

</body>
</html>
