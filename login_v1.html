<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>系統登入</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100vh;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI";
  background: linear-gradient(135deg, #e9f0fb, #f7f9fc);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 登入卡片 */
.login-card {
  width: 100%;
  max-width: 360px;
  background: #ffffff;
  padding: 28px 32px 32px;
  border-radius: 10px;
  box-shadow: 0 8px 28px rgba(0,0,0,.1);
}

/* 標題 */
.login-card h2 {
  margin: 0 0 20px;
  text-align: center;
  font-size: 22px;
  color: #2c3e50;
}

/* 欄位 */
.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 13px;
  color: #555;
  margin-bottom: 6px;
}

.form-group input {
  width: 100%;
  padding: 9px 10px;
  font-size: 14px;
  border: 1px solid #ccd3dc;
  border-radius: 5px;
}

.form-group input:focus {
  outline: none;
  border-color: #2c7be5;
  box-shadow: 0 0 0 2px rgba(44,123,229,.15);
}

/* 登入按鈕 */
.login-btn {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  background: #2c7be5;
  border: none;
  border-radius: 5px;
  color: #fff;
  font-size: 15px;
  cursor: pointer;
}

.login-btn:hover {
  background: #1a68d1;
}

/* 提示訊息 */
.msg {
  margin-top: 14px;
  font-size: 13px;
  text-align: center;
  color: #c0392b;
  min-height: 18px;
}
</style>
</head>

<body>

<div class="login-card">
  <h2>BBT軟式棒球聯盟登入</h2>

  <div class="form-group">
    <label for="username">帳號</label>
    <input id="username" autocomplete="username">
  </div>

  <div class="form-group">
    <label for="password">密碼</label>
    <input id="password" type="password" autocomplete="current-password">
  </div>

  <button class="login-btn" onclick="login()">登入</button>

  <div id="msg" class="msg"></div>
</div>

<script src="js/config.js"></script>
<script>
function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const msg = document.getElementById('msg');

  msg.textContent = '';

  if (!username || !password) {
    msg.textContent = '請輸入帳號與密碼';
    return;
  }

  callApi({
    action: 'login',
    username: username,
    password: password
  }, res => {

    if (!res || res.result !== 'ok') {
      msg.textContent = res?.message || '登入失敗';
      return;
    }

    // ✅ 直接存整個 res（不要用 res.user）
    localStorage.setItem('session_user', JSON.stringify(res));

    // ✅ 關鍵：強制改密碼判斷
    if (res.must_change_pwd === 'Y') {
      location.href = 'change_password.html';
    } else {
      location.href = 'index.html';
    }
    
  });
}
</script>

</body>
</html>
