<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>✅ 裁判報名審核</title>
<style>
body{font-family:system-ui;margin:20px;background:#fafafa}
.header a{margin-right:12px;color:#0066cc;text-decoration:none}
.panel{background:#fff;padding:14px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ddd;padding:6px 8px;text-align:center}
th{background:#f0f0f0}
.badge{padding:2px 6px;border-radius:4px;font-size:12px}
.pending{background:#fff4cc}
.approved{background:#e6f4ea}
.rejected{background:#fdecea}
</style>
</head>
<body>

<script>
if(localStorage.getItem('role')!=='admin'){
  alert('僅限管理者');
  location.href='index.html';
}
</script>

<div class="header">
  <a href="index.html">🏠 首頁</a>
  <a href="audit_log.html">📋 操作紀錄</a>
  <a href="javascript:void(0)" onclick="logout()">🚪 登出</a>
</div>

<h2>裁判報名審核</h2>

<div id="content">載入中…</div>

<script src="js/config.js"></script>
<script>
const token=localStorage.getItem('token');

function logout(){
  localStorage.clear();
  location.href='login.html';
}

function load(){
  const cb='cb_'+Date.now();
  window[cb]=res=>{
    if(!res||res.result!=='ok'){content.textContent='載入失敗';return;}
    render(res.signups||[]);
  };
  const s=document.createElement('script');
  s.src=API_URL+'?action=getAllJudgeSignups&token='+token+'&callback='+cb;
  document.body.appendChild(s);
}

function render(list){
  if(!list.length){content.textContent='尚無報名';return;}
  let html='<div class="panel"><table><tr>'+
    '<th>裁判</th><th>盃賽</th><th>組別</th><th>日期</th>'+
    '<th>偏好</th><th>狀態</th><th>備註</th><th>操作</th></tr>';
  list.forEach(r=>{
    html+=`<tr>
      <td>${r.judge_id}</td>
      <td>${r.tournament}</td>
      <td>${r.category}</td>
      <td>${r.available_dates}</td>
      <td>${r.preference}</td>
      <td><span class="badge ${r.status}">${r.status}</span></td>
      <td><input id="n_${r.signup_id}" value="${r.note||''}"></td>
      <td>
        <button onclick="setStatus('${r.signup_id}','approved')">核准</button>
        <button onclick="setStatus('${r.signup_id}','rejected')">不核准</button>
      </td>
    </tr>`;
  });
  html+='</table></div>';
  content.innerHTML=html;
}

function setStatus(id,status){
  const note=document.getElementById('n_'+id).value;
  const cb='cb2_'+Date.now();
  window[cb]=()=>load();
  const s=document.createElement('script');
  s.src=API_URL+'?action=updateJudgeSignupStatus&token='+token+
    '&signup_id='+id+'&status='+status+
    '&note='+encodeURIComponent(note)+
    '&callback='+cb;
  document.body.appendChild(s);
}

load();
</script>

</body>
</html>
