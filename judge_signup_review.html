<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>報名審核</title>
<style>
body{font-family:system-ui;background:#f5f6f8}
.panel{margin:20px;background:#fff;padding:16px}
button{margin-left:8px}
</style>
</head>
<body>

<div class="panel">
  <h3>所有裁判報名</h3>
  <div id="list">載入中…</div>
</div>

<script src="js/config.js"></script>
<script>
const token=localStorage.getItem('token');
const u=JSON.parse(localStorage.getItem('session_user')||'{}');
if(!token||u.role!=='admin') location.replace('index.html');

function callApi(q,cb){
  const fn='cb'+Date.now();
  window[fn]=r=>{delete window[fn];cb(r);}
  const s=document.createElement('script');
  s.src=API_URL+'?'+q+'&token='+token+'&callback='+fn;
  document.body.appendChild(s);
}

function load(){
  callApi('action=getAllGameSignups',r=>{
    list.innerHTML='';
    r.signups.forEach(s=>{
      const d=document.createElement('div');
      d.innerHTML=
        `${s.name}：${s.games.length} 場（${s.status}）
         <button onclick="set('${s.signup_id}','approved')">核准</button>
         <button onclick="set('${s.signup_id}','rejected')">拒絕</button>`;
      list.appendChild(d);
    });
  });
}

function set(id,status){
  callApi('action=updateJudgeSignupStatus&signup_id='+id+'&status='+status,()=>load());
}

load();
</script>
</body>
</html>
