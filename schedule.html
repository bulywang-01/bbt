<script>
if (!localStorage.getItem('role')) {
  location.href = 'login.html';
}
</script>

<button onclick="logout()">登出</button>

<script>
function logout() {
  localStorage.clear();
  location.href = 'login.html';
}
</script>

<h2>📅 月班表</h2>
<script src="js/api.js"></script>
<script>
(async()=>{
const j=await apiGet('judges');
const a=await apiGet('attendance');
const days=[...new Set(a.map(x=>x.timestamp.substr(0,10)))];
document.write('<table border=1><tr><th>裁判</th>'+days.map(d=>`<th>${d}</th>`).join('')+'</tr>');
j.forEach(x=>{
  document.write('<tr><td>'+x.name+'</td>');
  days.forEach(d=>{
    document.write('<td>'+ (a.find(y=>y.judge_id===x.judge_id && y.timestamp.startsWith(d))?'✅':'❌') +'</td>');
  });
  document.write('</tr>');
});
})();
</script>
