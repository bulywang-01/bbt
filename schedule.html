<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>月班表（管理者）</title>
</head>
<body>

<script>
if (!localStorage.getItem('role')) location.href = 'login.html';
if (localStorage.getItem('role') !== 'admin') {
  alert('無權限');
  location.href = 'index.html';
}
</script>

<h2>📅 月班表（管理者）</h2>
<div id="content">載入中…</div>

<script>
const token = localStorage.getItem('token');
const cb = 'cb_' + Date.now();

window[cb] = function(res) {
  if (res.result !== 'ok') {
    document.getElementById('content').textContent = '無法取得資料';
    return;
  }

  const { games, attendance, judges } = res;
  let html = '';

  games.forEach(g => {
    html += `
      <h3>
        ${g.date}｜
        ${g.tournament} ${g.category}｜
        ${g.away_team} vs ${g.home_team}｜
        ${g.field}
      </h3>
      <ul>
    `;

    attendance
      .filter(a => a.game_id === g.game_id)
      .forEach(a => {
        const j = judges.find(j => j.judge_id === a.judge_id);
        html += `
          <li>
            ${j ? j.name : a.judge_id}
            （${a.role}，${a.attend || '未確認'}）
          </li>
        `;
      });

    html += '</ul>';
  });

  document.getElementById('content').innerHTML = html;
};

const s = document.createElement('script');
s.src =
  API_URL +
  '?action=getAllSchedule' +
  '&token=' + encodeURIComponent(token) +
  '&callback=' + cb;

document.body.appendChild(s);
</script>

</body>
</html>
``
