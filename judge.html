<h2>👤 裁判個人紀錄</h2>
<div id="info"></div>
<ul id="rec"></ul>

<script src="js/api.js"></script>
<script>
(async()=>{
const id=new URLSearchParams(location.search).get('judge_id')||USER_JUDGE_ID;
const j=(await apiGet('judges')).find(x=>x.judge_id===id);
const a=await apiGet('attendance');
info.innerText=`姓名：${j.name}`;
a.filter(x=>x.judge_id===id)
 .forEach(x=>rec.innerHTML+=`<li>${x.game_id}｜${x.role}</li>`);
})();
</script>
