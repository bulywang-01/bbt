<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>裁判管理</title>
</head>
<body>

<!-- ===== 登入與權限檢查（一定要最前面） ===== -->
<script>
if (!localStorage.getItem('role')) {
  location.href = 'login.html';
}
if (localStorage.getItem('role') !== 'admin') {
  alert('無管理權限');
  location.href = 'index.html';
}
</script>

<h2>📋 裁判清單（可修改姓名）</h2>

<div style="margin-bottom:10px;">
  <a href="index.html">🏠 回首頁</a> |
  <a href="login.html" onclick="logout()">登出</a>
</div>

<hr>

<h3>➕ 新增裁判（系統自動編號）</h3>

裁判姓名：
<input id="new_name" placeholder="例如 王小明">
<button onclick="addJudge()">新增</button>

<p style="color:#666;">
  ※ 裁判編號由系統自動產生（U001、U002…）
</p>

<hr>

<div id="judges">載入中…</div>

<!-- ==================================================
     ✅ 關鍵：一定要正確載入 config.js
     ================================================== -->
<script src="js/config.js"></script>

<script>
/* ===== 登出 ===== */
function logout() {
  localStorage.clear();
}

/* ==================================================
   載入裁判清單
================================================== */
function loadJudges() {
  const cb = 'handleJudges_' + Date.now();
  window[cb] = function(list) {
    renderJudges(list || []);
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=judges' +
    '&callback=' + cb +
    '&_=' + Date.now();
  document.body.appendChild(s);
}

/* ==================================================
   顯示裁判清單
================================================== */
function renderJudges(list) {
  const box = document.getElementById('judges');
  box.innerHTML = '';

  if (list.length === 0) {
    box.textContent = '目前沒有裁判資料';
    return;
  }

  list.forEach(j => {
    box.innerHTML += `
      <div style="margin-bottom:6px;">
        <b>${j.judge_id}</b>
        <input id="name_${j.judge_id}" value="${j.name}">
        <button onclick="updateJudge('${j.judge_id}')">💾 修改</button>
        <button onclick="deleteJudge('${j.judge_id}')">🗑 刪除</button>
      </div>
    `;
  });
}

/* ==================================================
   新增裁判（後端自動編號）
================================================== */
function addJudge() {
  const name = new_name.value.trim();
  if (!name) {
    alert('請輸入裁判姓名');
    return;
  }

  const cb = 'afterAddJudge_' + Date.now();
  window[cb] = function(res) {
    if (res && res.result === 'ok') {
      alert('新增成功，裁判編號：' + res.judge_id);
      new_name.value = '';
      loadJudges();
    } else {
      alert('新增失敗：' + JSON.stringify(res));
    }
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=add_judge' +
    '&name=' + encodeURIComponent(name) +
    '&callback=' + cb +
    '&_=' + Date.now();
  document.body.appendChild(s);
}

/* ==================================================
   修改裁判姓名
================================================== */
function updateJudge(id) {
  const name = document.getElementById('name_' + id).value.trim();
  if (!name) {
    alert('姓名不可空白');
    return;
  }

  const cb = 'afterUpdateJudge_' + Date.now();
  window[cb] = function(res) {
    if (res && res.result === 'ok') {
      alert('修改成功');
      loadJudges();
    } else {
      alert('修改失敗：' + JSON.stringify(res));
    }
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=update_judge' +
    '&judge_id=' + encodeURIComponent(id) +
    '&name=' + encodeURIComponent(name) +
    '&callback=' + cb +
    '&_=' + Date.now();
  document.body.appendChild(s);
}

/* ==================================================
   刪除裁判
================================================== */
function deleteJudge(id) {
  if (!confirm('確定要刪除此裁判？')) return;

  const cb = 'afterDeleteJudge_' + Date.now();
  window[cb] = function(res) {
    if (res && res.result === 'ok') {
      alert('已刪除');
      loadJudges();
    } else {
      alert('刪除失敗：' + JSON.stringify(res));
    }
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=delete_judge' +
    '&judge_id=' + encodeURIComponent(id) +
    '&callback=' + cb +
    '&_=' + Date.now();
  document.body.appendChild(s);
}

/* ==================================================
   初始載入
================================================== */
loadJudges();
</script>

</body>
</html>
``
