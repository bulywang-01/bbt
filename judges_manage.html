<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>裁判管理</title>
</head>
<body>

<!-- ===== 登入與權限檢查 ===== -->
<script>
if (!localStorage.getItem('role')) {
  location.href = 'login.html';
}
if (localStorage.getItem('role') !== 'admin') {
  alert('無管理權限');
  location.href = 'index.html';
}
</script>

<h2>👨‍⚖️ 裁判管理（Admin）</h2>

<div style="margin-bottom:10px;">
  <a href="index.html">🏠 回首頁</a> |
  <a href="#" onclick="logout()">登出</a>
</div>

<hr>

<h3>➕ 新增裁判（系統自動編號）</h3>

裁判姓名：
<input id="new_name" placeholder="例如 李四">
<button onclick="addJudge()">新增</button>

<p style="color:#555;">
  ※ 裁判編號將由系統自動產生（U001、U002…）
</p>

<hr>

<h3>📋 裁判清單（可修改姓名）</h3>

<div id="judges">載入中…</div>

<!-- ===== 載入 API 設定（一定要正確） ===== -->
<script src="js/config.js"></script>

<script>
/* ========= 登出 ========= */
function logout() {
  localStorage.clear();
  location.href = 'login.html';
}

/* ========= 載入裁判清單 ========= */
function loadJudges() {
  const cb = 'handleJudges_' + Date.now();
  window[cb] = function(list) {
    renderJudges(list);
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=judges' +
    '&callback=' + cb +
    '&_=' + Date.now();
  document.body.appendChild(s);
}

/* ========= 顯示裁判清單 ========= */
function renderJudges(list) {
  const box = document.getElementById('judges');
  box.innerHTML = '';

  if (!list || list.length === 0) {
    box.innerHTML = '<p>目前沒有裁判資料</p>';
    return;
  }

  list.forEach(j => {
    box.innerHTML += `
      <div style="margin-bottom:6px;">
        <b>${j.judge_id}</b>
        <input id="name_${j.judge_id}" value="${j.name}">
        <button onclick="updateJudge('${j.judge_id}')">💾 修改</button>
        <button onclick="deleteJudge('${j.judge_id}')">🗑 刪除</button>
      </div>
    `;
  });
}

/* ========= 新增裁判（診斷版） ========= */
if (action === 'add_judge') {
  try {
    const sheet = SpreadsheetApp.getActive().getSheetByName(SHEET_JUDGES);
    if (!sheet) {
      return jsonp(callback, { result: 'fail', message: '找不到 Judges Sheet' });
    }

    const rows = sheet.getDataRange().getValues();
    const name = String(e.parameter.name || '').trim();
    if (!name) {
      return jsonp(callback, { result: 'fail', message: '缺少姓名' });
    }

    // 取得最大編號
    let maxNum = 0;
    for (let i = 1; i < rows.length; i++) {
      const id = rows[i][0];
      if (typeof id === 'string' && id.startsWith('U')) {
        const num = parseInt(id.substring(1), 10);
        if (!isNaN(num)) maxNum = Math.max(maxNum, num);
      }
    }

    const newId = 'U' + String(maxNum + 1).padStart(3, '0');

    sheet.appendRow([newId, name]);  // ✅ 真正關鍵行

    return jsonp(callback, {
      result: 'ok',
      judge_id: newId,
      debug: 'appendRow 成功'
    });

  } catch (err) {
    return jsonp(callback, {
      result: 'fail',
      message: err.toString()
    });
  }
}
``

/* ========= 修改裁判 ========= */
function updateJudge(id) {
  const name = document.getElementById('name_' + id).value.trim();
  if (!name) {
    alert('姓名不可空白');
    return;
  }

  const cb = 'afterUpdateJudge_' + Date.now();
  window[cb] = function(res) {
    if (res && res.result === 'ok') {
      alert('修改成功');
      loadJudges();
    } else {
      alert('修改失敗：' + JSON.stringify(res));
    }
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=update_judge' +
    '&judge_id=' + encodeURIComponent(id) +
    '&name=' + encodeURIComponent(name) +
    '&callback=' + cb +
    '&_=' + Date.now();
  document.body.appendChild(s);
}

/* ========= 刪除裁判 ========= */
function deleteJudge(id) {
  if (!confirm('確定要刪除此裁判？')) return;

  const cb = 'afterDeleteJudge_' + Date.now();
  window[cb] = function(res) {
    if (res && res.result === 'ok') {
      alert('已刪除');
      loadJudges();
    } else {
      alert('刪除失敗：' + JSON.stringify(res));
    }
    delete window[cb];
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=delete_judge' +
    '&judge_id=' + encodeURIComponent(id) +
    '&callback=' + cb +
    '&_=' + Date.now();
  document.body.appendChild(s);
}

/* ========= 初始載入 ========= */
loadJudges();
</script>

</body>
</html>
