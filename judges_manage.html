<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>🧑‍⚖️ 裁判人員管理</title>
<style>
body{font-family:system-ui;margin:20px;background:#fafafa}
.header a{margin-right:12px;color:#0066cc;text-decoration:none}
.panel{background:#fff;padding:14px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ddd;padding:6px 8px;text-align:center}
th{background:#f0f0f0}
.actions button{margin:0 2px}
input,select{padding:4px}
.inactive{color:#aaa;background:#f5f5f5}
</style>
</head>
<body>

<script>
if(!localStorage.getItem('role'))location.href='login.html';
if(localStorage.getItem('role')!=='admin'){
  alert('僅限管理者');
  location.href='index.html';
}
</script>

<div class="header">
  <a href="index.html">🏠 回首頁</a>
  <a href="games_manage.html">⚾ 比賽管理</a>
  <a href="templates_manage.html">📦 模板管理</a>
  <a href="audit_log.html">📋 操作紀錄</a>
</div>

<h2>🧑‍⚖️ 裁判人員管理</h2>

<div class="panel">
  <b>➕ 新增裁判</b><br>
  姓名 <input id="n_name">
  電話 <input id="n_phone">
  Email <input id="n_email">
  等級 <input id="n_level" style="width:60px">
  備註 <input id="n_note">
  <button onclick="addJudge()">新增</button>
</div>

<div id="content">載入中…</div>

<script src="js/config.js"></script>
<script>
const token = localStorage.getItem('token');
let judges=[];

/* 載入 */
function load(){
  const cb='cb_'+Date.now();
  window[cb]=res=>{
    judges=res.judges||[];
    render();
  };
  const s=document.createElement('script');
  s.src=API_URL+'?action=getJudges&token='+token+'&callback='+cb;
  document.body.appendChild(s);
}

/* 顯示 */
function render(){
  if(!judges.length){content.textContent='尚無裁判';return;}
  let html='<div class="panel"><table><tr>'+
    '<th>ID</th><th>姓名</th><th>電話</th><th>Email</th><th>等級</th><th>狀態</th><th>備註</th><th>操作</th></tr>';
  judges.forEach(j=>{
    html+=`<tr class="${j.active!=='Y'?'inactive':''}">
      <td>${j.judge_id}</td>
      <td><input id="n_${j.judge_id}" value="${j.name||''}"></td>
      <td><input id="p_${j.judge_id}" value="${j.phone||''}"></td>
      <td><input id="e_${j.judge_id}" value="${j.email||''}"></td>
      <td><input id="l_${j.judge_id}" value="${j.level||''}" style="width:50px"></td>
      <td>${j.active}</td>
      <td><input id="m_${j.judge_id}" value="${j.note||''}"></td>
      <td class="actions">
        <button onclick="updateJudge('${j.judge_id}')">💾</button>
        <button onclick="toggleJudge('${j.judge_id}')">${j.active==='Y'?'停用':'啟用'}</button>
      </td>
    </tr>`;
  });
  html+='</table></div>';
  content.innerHTML=html;
}

/* CRUD */
function addJudge(){
  const cb='cb_'+Date.now();
  window[cb]=()=>load();
  const s=document.createElement('script');
  s.src=API_URL+'?action=addJudge&token='+token+
    '&name='+n_name.value+'&phone='+n_phone.value+
    '&email='+n_email.value+'&level='+n_level.value+
    '&note='+n_note.value+'&callback='+cb;
  document.body.appendChild(s);
}
function updateJudge(id){
  const cb='cb_'+Date.now();
  window[cb]=()=>load();
  const s=document.createElement('script');
  s.src=API_URL+'?action=updateJudge&token='+token+
    '&judge_id='+id+
    '&name='+document.getElementById('n_'+id).value+
    '&phone='+document.getElementById('p_'+id).value+
    '&email='+document.getElementById('e_'+id).value+
    '&level='+document.getElementById('l_'+id).value+
    '&note='+document.getElementById('m_'+id).value+
    '&callback='+cb;
  document.body.appendChild(s);
}
function toggleJudge(id){
  const cb='cb_'+Date.now();
  window[cb]=()=>load();
  const s=document.createElement('script');
  s.src=API_URL+'?action=toggleJudge&token='+token+
    '&judge_id='+id+'&callback='+cb;
  document.body.appendChild(s);
}

load();
</script>
</body>
</html>
``
