<style>
#header {
  display:flex;
  align-items:center;
  padding:6px 12px;
  background:#fff;
  border-bottom:1px solid #ddd;
}
#header nav {
  display:flex;
  align-items:center;
  gap:6px;
  width:100%;
}
#header a {
  padding:10px 14px;
  min-height:40px;
  text-decoration:none;
  color:#0066cc;
  border-radius:6px;
}
#header a:hover { background:#f2f5fa; }

#u_name {
  margin-left:auto;
  font-weight:600;
}

/* 預設全隱藏 */
.nav-judge,
.nav-record,
.nav-admin {
  display:none;
}
</style>

<div id="header">
  <nav>
    <a href="index.html">🏠 首頁</a>

    <a href="judge_dashboard.html" class="nav-judge">📋 裁判班表</a>
    <a href="record_dashboard.html" class="nav-record">🎥 紀錄班表</a>
    <a href="admin_dashboard.html" class="nav-admin">⚙️ 管理</a>
    <a href="change_password.html">🔐 改密碼</a>
    <a href="#" onclick="logout()">登出</a>
    <span id="u_name"></span>
  </nav>
</div>

<script src="common/auth.js"></script>

<script>
(function applyHeader() {
  const session = getSession();
  if (!session) return;
  const roles = getRoles(session);

  document.getElementById('u_name').textContent = session.name || '';

  if (hasJudge(roles) || hasAdmin(roles)) {
    document.querySelectorAll('.nav-judge')
      .forEach(el => el.style.display = 'inline-flex');
  }

  if (hasRecord(roles) || hasAdmin(roles)) {
    document.querySelectorAll('.nav-record')
      .forEach(el => el.style.display = 'inline-flex');
  }

  if (hasManage(roles)) {
    document.querySelectorAll('.nav-admin')
      .forEach(el => el.style.display = 'inline-flex');
  }
})();

function logout() {
  if (!confirm('確定要登出？')) return;
  localStorage.clear();
  location.replace('login.html');
}
</script>
