<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>裁判報名</title>

<style>
/* === 基本 === */
body {
  margin: 0;
  font-family: system-ui, -apple-system;
  background: #f5f6f8;
  font-size: 15px;
}
.main { padding: 20px; }
.panel {
  background: #fff;
  padding: 16px;
  border-radius: 6px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  margin-bottom: 24px;
}
h3 { margin: 20px 0 8px }

/* === 桌機表格 === */
table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  font-size: 14px;
}
thead th {
  background: #e9eef5;
  font-weight: 700;
  border: 1px solid #d6dbe3;
  padding: 6px 8px;
}
td {
  border: 1px solid #d6dbe3;
  padding: 6px 8px;
  text-align: center;
}
td.col-date {
  background: #eef2f8;
  font-weight: 700;
  vertical-align: middle;
  white-space: nowrap;
}
td.col-category {
  background: #f6f8fb;
  font-weight: 600;
  vertical-align: middle;
  white-space: nowrap;
}
tr.date-odd { background: #fafbfe; }
tr.full { background: #ffecec; }
tr.expired { color: #999; }

/* === overlay === */
#overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.35);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
#overlay.show { display: flex; }
#overlay-box {
  background: #fff;
  padding: 24px;
  border-radius: 8px;
  text-align: center;
}

/* === 手機 === */
#desktopView { display: block; }
#mobileView { display: none; }

@media (max-width: 768px) {
  #desktopView { display: none; }
  #mobileView { display: block; }
}

/* =====================
   裁判站位 - 統一樣式
   ===================== */

/* 共用文字 */
.pos-label {
  font-weight: 600;
}

/* 可報名 */
.pos-available {
  color: #4a7ef5;
}

/* 已選（未送出） */
.pos-selected {
  background: #4a7ef5;
  color: #ffffff;
  font-weight: 700;
  padding: 4px 8px;
  border-radius: 4px;
  display: inline-block;
}

/* 已佔用（他人） */
.pos-occupied {
  color: #999;
  font-weight: 600;
}

/* 自己已報名 */
.pos-me {
  color: #2e7d32;
  font-weight: 800;
}

/* 不需裁判：黑底 */
/*
.pos-na {
  background: #000;
  color: #000;
}
*/
  
/* 不需裁判：紅色 X */
.pos-na {
  color: #c00;
  font-weight: 900;
  font-size: 18px;
  line-height: 1;
}
  
/* 取消操作樣式 */
.cancel-btn {
  margin-left: 6px;
  color: #c00;
  font-weight: 700;
  cursor: pointer;
}

.cancel-btn:hover {
  text-decoration: underline;
  opacity: 0.85;
}
</style>
</head>

<body>

<div id="overlay">
  <div id="overlay-box">
    <div id="overlay-text">處理中...</div>
    <button id="overlay-ok" style="display:none;">確定</button>
  </div>
</div>

<div class="main">

<div class="filter-bar">
  顯示：
  <select id="filterRange" onchange="render()">
    <option value="all">全部</option>
    <option value="month">本月</option>
    <option value="week">本週</option>
  </select>
  <label>
    <input type="checkbox" id="showPast" onchange="render()"> 顯示過期
  </label>
  搜尋：
  <input type="text" id="keyword" oninput="render()">
</div>

<div id="desktopView">
  <div id="content"></div>
</div>

<div id="mobileView"></div>

<button onclick="submitSignup()">送出報名</button>

</div>

<script src="js/config.js"></script>

<script>

/* ======================
   全域常數 / 設定
   ====================== */
const ROLE_NAME_MAP = {
  PU: '主審',
  U1: '一壘',
  U2: '二壘',
  U3: '三壘'
};

const CURRENT_USER_NAME =
  JSON.parse(localStorage.getItem('session_user') || {}).name;
  
/* ======================
   全域狀態
   ====================== */
let allGames = [];
let selectedPositions = {};


/* ======================
   共用工具
   ====================== */
function formatTime(t) {
  const d = new Date(t);
  return d.getHours().toString().padStart(2,'0') + ':' +
         d.getMinutes().toString().padStart(2,'0');
}
function timeToMinutes(t) {
  const d = new Date(t);
  return d.getHours()*60 + d.getMinutes();
}

function rememberSelection(gameId, role) {
  selectedPositions[gameId] = role;
  render();
  renderMobile();
}

function cancelSelected(gameId) {
  delete selectedPositions[gameId];
  render();
  renderMobile();

}
  
function cancelSelectedByDate() {
  if (!Object.keys(selectedPositions).length) {
    alert('目前沒有已選擇的站位');
    return;
  }

  const date = prompt('請輸入要取消的日期（yyyy/MM/dd）');
  if (!date) return;

  let removed = 0;

  allGames.forEach(g => {
    if (g.date === date && selectedPositions[g.game_id]) {
      delete selectedPositions[g.game_id];
      removed++;
    }
  });

  if (!removed) {
    alert('該日期沒有已選擇的站位');
  } else {
    alert(`已取消 ${date} 的 ${removed} 筆選擇`);
    render();
    renderMobile();

  }
}

    function showLoading(msg = '處理中...') {
      const overlay = document.getElementById('overlay');
      document.getElementById('overlay-text').textContent = msg;
      document.getElementById('overlay-ok').style.display = 'none';
      overlay.classList.add('show');
    }
    
    function showMessage(msg, reload = true) {
      const overlay = document.getElementById('overlay');
      document.getElementById('overlay-text').textContent = msg;
    
      const ok = document.getElementById('overlay-ok');
      ok.style.display = 'inline-block';
      ok.onclick = () => {
        overlay.classList.remove('show');
        if (reload) location.reload();
      };
    
      overlay.classList.add('show');
    }
/*    
    function hideOverlay() {
      document.getElementById('overlay').classList.remove('show');
    }
*/
  
function showMessage(msg, reload = true) {
  document.getElementById('overlay-text').textContent = msg;
  const ok = document.getElementById('overlay-ok');
  ok.style.display = 'inline-block';

  ok.onclick = () => {
    document.getElementById('overlay').style.display = 'none';
    if (reload) {
      location.reload();
    }
  };

  // ✅ 重點：這裡一定要顯示 overlay
  document.getElementById('overlay').style.display = 'flex';
}

function hideOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

function logout(){
  localStorage.clear();
  location.replace('login.html');
}

/* ======================
   render / API / 行為
   ====================== */
function loadGames() {
  showOverlay('載入賽事中...');
  callApi(
    { action:'getSignableGames' },
    res => {
      hideOverlay();
      if (!res || res.result !== 'ok') {
        showMessage('載入失敗'); return;
      }
      allGames = res.games || [];
      render();
    }
  );
}

/* ===== render ===== */
function render() {
  const box = document.getElementById('content');
  box.innerHTML = '';

  const range = document.getElementById('filterRange').value;
  const showPast = document.getElementById('showPast').checked;
  const kw = document.getElementById('keyword').value.trim();
  const today = new Date(); today.setHours(0,0,0,0);

  const filtered = allGames.filter(g => {
    const gd = new Date(g.date.replace(/\//g,'-'));
    if (gd < today && !showPast) return false;
    if (kw && !(`${g.away_team} ${g.home_team}`.includes(kw))) return false;
    return true;
  });

  renderDesktopTable(filtered);
}

/* 裁判站位 render 函式 */
function renderPos(g, role) {

  /* 0️⃣ 不需裁判 → 紅色 X */
  if (
    g.need_count === 0 ||
    (g.need_count === 1 && role !== 'PU') ||
    (g.need_count === 2 && ['U2','U3'].includes(role)) ||
    (g.need_count === 3 && role === 'U2')
  ) {
    return '<div class="pos-na">X</div>';
  }

  const occupiedName = g.occupied_positions?.[role];
  const isMe = occupiedName && occupiedName === CURRENT_USER_NAME;

  /* ✅ 1️⃣ 自己已正式報名這一場 */
  if (isMe) {
    return `
      <div class="pos-me">
        <span class="judge-star">★</span>
        ${occupiedName}
        <span class="cancel-btn"
              onclick="cancelMySignup('${g.my_signup_id}')">
          [取消]
        </span>
      </div>
    `;
  }

  /* ✅ 2️⃣ 其他已被佔用（他人） */
  if (occupiedName) {
    return `
      <div class="pos-occupied">
        ${occupiedName}
      </div>
    `;
  }

  /* ✅ 3️⃣ 我已在這場報名其他站位 → 待位中 */
  const iAmInThisGame = Object.values(g.occupied_positions || {})
    .includes(CURRENT_USER_NAME);

  if (iAmInThisGame) {
    return '<span style="color:#999;">待位中</span>';
  }

  /* 4️⃣ 尚未送出，但我選了這個站位 */
  if (selectedPositions[g.game_id] === role) {
    return '<span class="pos-selected">待位中</span>';
  }

  /* 5️⃣ 尚未選 → 可報名 */
  return `
    <label class="pos-available">
      <input type="radio"
             onchange="rememberSelection('${g.game_id}','${role}')">
      ${ROLE_NAME_MAP[role]}
    </label>
  `;
}

  
/* ===== 桌機表格 ===== */
function renderDesktopTable(list) {
  const box = document.getElementById('content');

  const dateGroups = {};
  list.forEach(g => {
    if (!dateGroups[g.date]) dateGroups[g.date] = [];
    dateGroups[g.date].push(g);
  });

  let dateIdx = 0;

  Object.keys(dateGroups).sort().forEach(date => {
    const games = dateGroups[date];

    const panel = document.createElement('div');
    panel.className = 'panel';

    const table = document.createElement('table');
    table.innerHTML = `
      <thead>
        <tr>
          <th>日期</th>
          <th>組別</th>
          <th>場次</th>
          <th>時間</th>
          <th>客隊</th>
          <th>主隊</th>
          <th>場地</th>
          <th>主審</th>
          <th>一壘</th>
          <th>二壘</th>
          <th>三壘</th>
        </tr>
      </thead><tbody></tbody>`;

    const tbody = table.querySelector('tbody');
    let dateDone = false;

    games
      .sort((a,b)=>timeToMinutes(a.time_range)-timeToMinutes(b.time_range))
      .forEach(g => {
        const tr = document.createElement('tr');
        tr.className = (dateIdx%2===0?'date-odd':'');

        if (!dateDone) {
          const td = document.createElement('td');
          td.rowSpan = games.length;
          td.className = 'col-date';
          td.textContent = date;
          tr.appendChild(td);
          dateDone = true;
        }

          tr.innerHTML += `
            <td>${g.game_code}</td>
            <td>${formatTime(g.time_range)}</td>
            <td>${g.category || ''}</td>
            <td>${g.away_team || ''}</td>
            <td>${g.home_team || ''}</td>
            <td>${g.field || ''}</td>
            <td>${renderPos(g, 'PU')}</td>
            <td>${renderPos(g, 'U1')}</td>
            <td>${renderPos(g, 'U2')}</td>
            <td>${renderPos(g, 'U3')}</td>
          `;

        tbody.appendChild(tr);
      });

    panel.appendChild(table);
    box.appendChild(panel);
    dateIdx++;
  });
}

  /* =====================================
   * 手機版 ${renderTimeHHmm(g.time_range)}
   *    
   * ===================================== */
  
function renderMobile() {
  const box = document.getElementById('mobileView');
  if (!box) return;

  box.innerHTML = '';

  allGames.forEach(g => {
    const card = document.createElement('div');
    card.className = 'game-card';

    card.innerHTML = `
      <div class="game-header">
        <div>📅 <strong>${g.date}</strong></div>
        <div>⏰ <strong>${formatTime(g.time_range)}</strong></div>
      </div>

      <div class="game-main">
        <div class="teams">${g.away_team} vs ${g.home_team}</div>
        <div>📍 ${g.field}</div>
      </div>
      ${renderMobilePositions(g)}
    `;

    box.appendChild(card);
  });
}

function renderMobilePositions(g) {
  const ROLE_NAME_MAP = {
    PU: '主審',
    U1: '一壘審',
    U2: '二壘審',
    U3: '三壘審'
  };

  let roles = [];
  switch (Number(g.need_count)) {
    case 0:
      return `<div class="position-row">本場次不需要裁判</div>`;
    case 1:
      roles = ['PU'];
      break;
    case 2:
      roles = ['PU', 'U1'];
      break;
    case 3:
      roles = ['PU', 'U1', 'U3'];
      break;
    default:
      roles = ['PU', 'U1', 'U2', 'U3'];
  }

  return roles.map(role => {
    const roleName = ROLE_NAME_MAP[role];
    const occupied = g.occupied_positions?.[role];
    const isMe = g.my_position === role;

    if (occupied) {
      if (isMe) {
        return `
          <div class="position-row">
            <span>${roleName}：${occupied}（你）</span>
            <button class="mobile-cancel"
              onclick="cancelMySignup('${g.my_signup_id}')">
              取消
            </button>
          </div>
        `;
      }
      return `
        <div class="position-row">
          <span>${roleName}：${occupied}</span>
        </div>
      `;
    }

    if (g.my_position) {
      return `
        <div class="position-row">
          <span>${roleName}</span>
          <span>—</span>
        </div>
      `;
    }

    const isSelected = selectedPositions[g.game_id] === role;

    return `
    <div class="position-row">
      <span>${roleName}</span>
      <button class="signup-btn ${isSelected ? 'selected' : ''}"
        data-game="${g.game_id}"
        onclick="rememberSelection('${g.game_id}','${role}')">
        ${isSelected ? '已選' : '報名'}
      </button>
    </div>
    `;
  }).join('');
}
 
function renderTimeHHmm(t) {
  if (!t) return '';

  // ✅ 已經是字串（08:30）
  if (typeof t === 'string') {
    // 保險：如果已經是 HH:mm，直接回傳
    if (/^\d{1,2}:\d{2}$/.test(t)) {
      return t;
    }
    // 其他字串就原樣回
    return t;
  }

  // ✅ 是 Date 物件（1899-12-30）
  if (t instanceof Date) {
    return (
      t.getHours().toString().padStart(2, '0') +
      ':' +
      t.getMinutes().toString().padStart(2, '0')
    );
  }

  // 其他型別（保險）
  return String(t);
}

/* ===== overlay ===== */
function showOverlay(msg){
  document.getElementById('overlay-text').textContent = msg;
  document.getElementById('overlay').classList.add('show');
}

function showMessage(msg){
  document.getElementById('overlay-text').textContent = msg;
  document.getElementById('overlay-ok').style.display='inline-block';
  document.getElementById('overlay').classList.add('show');
}

/* ===== submit ===== */
/*
function submitSignup(){
  alert('送出報名');
}
*/

function submitSignup(){
  const entries = Object.keys(selectedPositions);
  if (!entries.length){
    showMessage('尚未選擇站位', false);
    return;
  }

  const session = JSON.parse(localStorage.getItem('session_user') || {});
  if (!session.user_id) {
    showMessage('登入狀態已失效，請重新登入', false);
    return;
  }

  const payload = entries.map(
    id => `${id}:${selectedPositions[id]}`
  );

  showLoading('送出報名中...');
 
  callApi(
   {
     action: 'judgeSignupByGames',
     user_id: session.user_id,
     games_with_position: payload.join(',')
   },
   res => {
     if (res && res.result === 'ok') {
 
       // ✅ 新增：顯示「曾取消過」提醒
       if (res.has_cancelled_before) {
         alert('⚠️ 提醒：你曾取消過此場，已成功重新報名，請務必確認可出勤。');
       } else {
         alert('報名成功');
       }
 
       location.reload();
     } else {
       alert(res?.message || '報名失敗');
     }
   }
 );
}


// 取消自已報名的賽事
function cancelMySignup(signupId) {
  console.log('🔥 cancelMySignup called', signupId);

  if (!confirm('確定要取消這個站位嗎？')) return;

  const session = JSON.parse(localStorage.getItem('session_user') || {});
  if (!session.user_id) {
    alert('登入狀態已失效');
    return;
  }

  showLoading('取消站位中...');

  callApi(
    {
      action: 'cancelJudgeSignup',
      user_id: session.user_id,
      signup_id: signupId
    },
    res => {
      hideOverlay();

      if (res && res.result === 'ok') {
        alert('已取消站位，請於 Line 群組告知取消原因，謝謝。');
        location.reload();
      } else {
        alert(res?.message || '取消失敗');
      }
    }
  );
}


/* init */
document.addEventListener('DOMContentLoaded', loadGames);
</script>

</body>
</html>
