<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>裁判報名</title>

<style>
/* === 基本 === */
body {
  margin: 0;
  font-family: system-ui, -apple-system;
  background: #f5f6f8;
  font-size: 15px;
}
.main { padding: 20px; }
.panel {
  background: #fff;
  padding: 16px;
  border-radius: 6px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  margin-bottom: 24px;
}
h3 { margin: 20px 0 8px }

/* === 桌機表格 === */
table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  font-size: 14px;
}
thead th {
  background: #e9eef5;
  font-weight: 700;
  border: 1px solid #d6dbe3;
  padding: 6px 8px;
}
td {
  border: 1px solid #d6dbe3;
  padding: 6px 8px;
  text-align: center;
}
td.col-date {
  background: #eef2f8;
  font-weight: 700;
  vertical-align: middle;
  white-space: nowrap;
}
td.col-category {
  background: #f6f8fb;
  font-weight: 600;
  vertical-align: middle;
  white-space: nowrap;
}
tr.date-odd { background: #fafbfe; }
tr.full { background: #ffecec; }
tr.expired { color: #999; }

/* === overlay === */
#overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.35);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
#overlay.show { display: flex; }
#overlay-box {
  background: #fff;
  padding: 24px;
  border-radius: 8px;
  text-align: center;
}

/* === 手機 === */
#desktopView { display: block; }
#mobileView { display: none; }

@media (max-width: 768px) {
  #desktopView { display: none; }
  #mobileView { display: block; }
}
</style>
</head>

<body>

<div id="overlay">
  <div id="overlay-box">
    <div id="overlay-text">處理中...</div>
    <button id="overlay-ok" style="display:none;">確定</button>
  </div>
</div>

<div class="main">

<div class="filter-bar">
  顯示：
  <select id="filterRange" onchange="render()">
    <option value="all">全部</option>
    <option value="month">本月</option>
    <option value="week">本週</option>
  </select>
  <label>
    <input type="checkbox" id="showPast" onchange="render()"> 顯示過期
  </label>
  搜尋：
  <input type="text" id="keyword" oninput="render()">
</div>

<div id="desktopView">
  <div id="content"></div>
</div>

<div id="mobileView"></div>

<button onclick="submitSignup()">送出報名</button>

</div>

<script src="js/config.js"></script>

<script>
let allGames = [];
let selectedPositions = {};

/* ===== utils ===== */
function formatTime(t) {
  const d = new Date(t);
  return d.getHours().toString().padStart(2,'0') + ':' +
         d.getMinutes().toString().padStart(2,'0');
}
function timeToMinutes(t) {
  const d = new Date(t);
  return d.getHours()*60 + d.getMinutes();
}

/* ===== API ===== */
function loadGames() {
  showOverlay('載入賽事中...');
  callApi(
    { action:'getSignableGames' },
    res => {
      hideOverlay();
      if (!res || res.result !== 'ok') {
        showMessage('載入失敗'); return;
      }
      allGames = res.games || [];
      render();
    }
  );
}

/* ===== render ===== */
function render() {
  const box = document.getElementById('content');
  box.innerHTML = '';

  const range = document.getElementById('filterRange').value;
  const showPast = document.getElementById('showPast').checked;
  const kw = document.getElementById('keyword').value.trim();
  const today = new Date(); today.setHours(0,0,0,0);

  const filtered = allGames.filter(g => {
    const gd = new Date(g.date.replace(/\//g,'-'));
    if (gd < today && !showPast) return false;
    if (kw && !(`${g.away_team} ${g.home_team}`.includes(kw))) return false;
    return true;
  });

  renderDesktopTable(filtered);
}

/* 裁判站位 render 函式 */
function renderPos(g, role) {

  /* 0️⃣ 不需裁判 → 黑格 */
  if (
    g.need_count === 0 ||
    (g.need_count === 1 && role !== 'PU') ||
    (g.need_count === 2 && ['U2','U3'].includes(role)) ||
    (g.need_count === 3 && role === 'U2')
  ) {
    return '<div class="cell-na">&nbsp;</div>';
  }

  /* 1️⃣ 已佔用（approved） */
  if (g.occupied_positions && g.occupied_positions[role]) {
    const isMe = g.my_position === role;

    // ✅ 自己的站位
    if (isMe) {
      return `
        <div class="judge-name me">
          <span class="judge-star">★</span>
          ${g.occupied_positions[role]}
          <span class="cancel-btn"
                onclick="cancelMySignup('${g.my_signup_id}')">
            [取消]
          </span>
        </div>
      `;
    }

    // ✅ 別人的站位
    return `
      <div class="judge-name">
        ${g.occupied_positions[role]}
      </div>
    `;
  }

  /* 2️⃣ 我已報名此場其他站位 → 留空 */
  if (g.my_position && g.my_position !== role) {
    return '';
  }

  /* 3️⃣ 尚未送出，且是我選的 */
  if (selectedPositions[g.game_id] === role) {
    return `
      <label>
        <input type="radio" checked>
        ${role}
      </label>
      <span class="cancel-btn"
            onclick="cancelSelected('${g.game_id}')">✖</span>
    `;
  }

  /* 4️⃣ 尚未選 → 可報名 */
  return `
    <label>
      <input type="radio"
             onchange="rememberSelection('${g.game_id}','${role}')">
      ${role}
    </label>
  `;
}
  
/* ===== 桌機表格 ===== */
function renderDesktopTable(list) {
  const box = document.getElementById('content');

  const dateGroups = {};
  list.forEach(g => {
    if (!dateGroups[g.date]) dateGroups[g.date] = [];
    dateGroups[g.date].push(g);
  });

  let dateIdx = 0;

  Object.keys(dateGroups).sort().forEach(date => {
    const games = dateGroups[date];

    const panel = document.createElement('div');
    panel.className = 'panel';

    const table = document.createElement('table');
    table.innerHTML = `
      <thead>
        <tr>
          <th>日期</th>
          <th>組別</th>
          <th>場次</th>
          <th>時間</th>
          <th>客隊</th>
          <th>主隊</th>
          <th>場地</th>
          <th>主審</th>
          <th>一壘</th>
          <th>二壘</th>
          <th>三壘</th>
        </tr>
      </thead><tbody></tbody>`;

    const tbody = table.querySelector('tbody');
    let dateDone = false;

    games
      .sort((a,b)=>timeToMinutes(a.time_range)-timeToMinutes(b.time_range))
      .forEach(g => {
        const tr = document.createElement('tr');
        tr.className = (dateIdx%2===0?'date-odd':'');

        if (!dateDone) {
          const td = document.createElement('td');
          td.rowSpan = games.length;
          td.className = 'col-date';
          td.textContent = date;
          tr.appendChild(td);
          dateDone = true;
        }

          tr.innerHTML += `
            <td>${g.game_code}</td>
            <td>${formatTime(g.time_range)}</td>
            <td>${g.away_team || ''}</td>
            <td>${g.home_team || ''}</td>
            <td>${g.field || ''}</td>
          
            <td>${renderPos(g, 'PU')}</td>
            <td>${renderPos(g, 'U1')}</td>
            <td>${renderPos(g, 'U2')}</td>
            <td>${renderPos(g, 'U3')}</td>
          `;

        tbody.appendChild(tr);
      });

    panel.appendChild(table);
    box.appendChild(panel);
    dateIdx++;
  });
}

/* ===== overlay ===== */
function showOverlay(msg){
  document.getElementById('overlay-text').textContent = msg;
  document.getElementById('overlay').classList.add('show');
}
function hideOverlay(){
  document.getElementById('overlay').classList.remove('show');
}
function showMessage(msg){
  document.getElementById('overlay-text').textContent = msg;
  document.getElementById('overlay-ok').style.display='inline-block';
  document.getElementById('overlay').classList.add('show');
}

/* ===== submit ===== */
function submitSignup(){
  alert('送出報名（示意）');
}

/* init */
document.addEventListener('DOMContentLoaded', loadGames);
</script>

</body>
</html>
