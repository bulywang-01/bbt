<h2>📋 操作紀錄（Audit Log）</h2>

<div id="log">載入中…</div>


<!-- ✅ JS 設定檔（這一行一定要長這樣） -->
<script src="js/config.js"></script>

<script>
const token = localStorage.getItem('token');
const logBox = document.getElementById('log');

function loadLog() {
  const cb = 'cb_' + Date.now();
  window[cb] = res => {
    if (!res || res.result !== 'ok') {
      logBox.textContent = '❌ 無法讀取紀錄';
      return;
    }

    let html = `
      <table>
        <tr>
          <th>時間</th>
          <th>帳號</th>
          <th>角色</th>
          <th>動作</th>
          <th>目標</th>
          <th>ID</th>
          <th>說明</th>
        </tr>
    `;

    res.logs.forEach(r => {
      html += `
        <tr>
          <td>${r.timestamp}</td>
          <td>${r.username}</td>
          <td>${r.role}</td>
          <td>${r.action}</td>
          <td>${r.target}</td>
          <td>${r.target_id}</td>
          <td>${r.detail}</td>
        </tr>
      `;
    });

    html += '</table>';
    logBox.innerHTML = html;
  };

  const s = document.createElement('script');
  s.src =
    API_URL +
    '?action=getAuditLog' +
    '&token=' + encodeURIComponent(token) +
    '&callback=' + cb;
  document.body.appendChild(s);
}

loadLog();
</script>

</body>
