<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>賽事管理</title>
</head>

<body>

<!-- ✅ 導覽列（超連結正確） -->
<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="admin_users.html">👤 帳號管理</a>
    <b>⚾ 賽事管理</b>
  </div>
  <div>
    <b id="u_name"></b>
    <a href="#" onclick="logout()">登出</a>
  </div>
</div>

<!-- ✅ 畫面主體 -->
<div>
  <table>
    <thead>
      <tr>
        <th>日期</th>
        <th>時間</th>
        <th>賽事</th>
        <th>組別</th>
        <th>場地</th>
        <th>客隊</th>
        <th>主隊</th>
        <th>裁判數</th>
        <th>站位</th>
      </tr>
    </thead>
    <tbody id="gameBody">
      <tr><td colspan="9">載入中…</td></tr>
    </tbody>
  </table>
</div>

<!-- ✅ 一定要在 body 最後正確載入 -->
<script src="js/config.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const s = JSON.parse(localStorage.getItem('session_user') || '{}');
  if (!s.user_id) {
    location.href = 'login.html';
    return;
  }
  document.getElementById('u_name').textContent = s.name || '';
  loadGames();
});

function loadGames() {
  callApi({ action: 'getGames' }, res => {
    console.log('getGames response:', res);

    const body = document.getElementById('gameBody');
    body.innerHTML = '';

    if (!res || res.result !== 'ok') {
      body.innerHTML = '<tr><td colspan="9">讀取失敗</td></tr>';
      return;
    }

    res.games.forEach(g => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${g.date}</td>
        <td>${g.time_range}</td>
        <td>${g.tournament}</td>
        <td>${g.category}</td>
        <td>${g.field}</td>
        <td>${g.away_team}</td>
        <td>${g.home_team}</td>
        <td>${g.umpire_count}</td>
        <td>${g.position_mode}</td>
      `;
      body.appendChild(tr);
    });
  });
}

function logout() {
  localStorage.clear();
  location.href = 'login.html';
}
</script>

</body>
</html>
