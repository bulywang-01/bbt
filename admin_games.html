<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>賽事管理</title>

  <!-- 共用 CSS（一定要是單獨一行，必須有關閉 >） -->
  <link rel="stylesheet" href="common.css">

  <!-- 頁面內 CSS（一定只能在 <style> 裡） -->
  <style>

    .main{padding:20px}
    .panel{
      background:#fff;
      padding:16px;
      border-radius:6px;
      box-shadow:0 1px 4px rgba(0,0,0,.08);
      margin-bottom:24px
    }
    .month-title{
      font-size:18px;
      font-weight:700;
      margin-bottom:12px
    }
    .filter-bar{
      display:flex;
      flex-wrap:wrap;
      gap:16px;
      align-items:center
    }
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{border:1px solid #e0e0e0;padding:6px 8px;text-align:center}
    th{background:#eef2f6;font-weight:600}
    tbody tr:nth-child(even){background:#fafafa}
    tbody tr:hover{background:#f0f6ff}
    input,select{width:100%;padding:4px;box-sizing:border-box}
    button{padding:4px 10px;cursor:pointer}
    .delete-btn{color:#c00}
    .expired{background:#f3f3f3;color:#888}
    .finished{font-weight:600;color:#999}
  </style>
</head>

<body>

<div id="header-container"></div>

<div class="main">

<!-- 篩選 -->
<div class="panel">
  <div class="filter-bar">
    <label><input type="radio" name="range" value="all" checked> 全部</label>
    <label><input type="radio" name="range" value="week"> 本週</label>
    <label><input type="radio" name="range" value="month"> 本月</label>
    <label><input type="checkbox" id="showExpired"> 顯示已完賽</label>
    <input id="searchInput" placeholder="搜尋賽事 / 場地 / 球隊">
    <button onclick="loadGames()">重新整理</button>
  </div>
</div>

<div id="gamesContainer"></div>

<!-- 匯入 -->
<div class="panel">
  <h3>📥 匯入賽事（Excel）</h3>
  <input type="file" id="importFile" accept=".xlsx">
  <button onclick="previewImport()">預覽</button>
  <div id="importPreview"></div>
  <button id="confirmImportBtn" style="display:none" onclick="confirmImport()">確認匯入</button>
  <pre>
date,time,duration,tournament,category,field,away_team,home_team,umpire_count,position_mode
2026-04-12,08:30,90,學齡盃,六年級,A球場,三峽,板橋,2,allow_select
  </pre>
</div>

</div>

  <!-- 外部 JS：一行一個 script，一定要成對 -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="js/config.js"></script>

<script>
function loadHeader(){
  fetch('header.html').then(r=>r.text()).then(h=>{
    document.getElementById('header-container').innerHTML=h
  })
}

function gameDT(g){return new Date(g.date+'T'+g.time)}
function isExpired(g){return gameDT(g)<new Date()}
function isInWeek(g){
  const d=gameDT(g),n=new Date
  const s=new Date(n);s.setDate(n.getDate()-n.getDay());s.setHours(0,0,0,0)
  const e=new Date(s);e.setDate(s.getDate()+7)
  return d>=s&&d<e
}
function isInMonth(g){
  const d=gameDT(g),n=new Date
  return d.getFullYear()==n.getFullYear()&&d.getMonth()==n.getMonth()
}
function match(g,k){
  if(!k)return true;k=k.toLowerCase()
  return [g.tournament,g.field,g.home_team,g.away_team].some(v=>(v||'').toLowerCase().includes(k))
}

function loadGames() {

  callApi({ action: 'getGames' }, function (res) {

    const container = document.getElementById('gamesContainer');
    container.innerHTML = '';

    if (!res || res.result !== 'ok' || !Array.isArray(res.games) || res.games.length === 0) {
      container.innerHTML = '<div class="panel">目前沒有賽事</div>';
      return;
    }

    const range = document.querySelector('input[name="range"]:checked')?.value || 'all';
    const showExpired = document.getElementById('showExpired')?.checked || false;
    const keyword = document.getElementById('searchInput')?.value.trim().toLowerCase() || '';

    // 依照 date + time 排序（這邊不影響月份顯示）
    const games = res.games.slice().sort((a, b) => {
      return new Date(a.date + ' ' + (a.time || '00:00')) -
             new Date(b.date + ' ' + (b.time || '00:00'));
    });

    // ===== 用「字串」分組，不用 Date =====
    const groups = {};

    games.forEach(g => {

      if (keyword && !matchKeyword(g, keyword)) return;

      const expired = isExpired(g);
      if (expired && !showExpired) return;

      if (!expired) {
        if (range === 'week' && !isInThisWeek(g)) return;
        if (range === 'month' && !isInThisMonth(g)) return;
      }

      // ✅ 假設 g.date 為 yyyy-MM-dd 或 yyyy/MM/dd
      const dateStr = g.date || '';
      const parts = dateStr.includes('-')
        ? dateStr.split('-')
        : dateStr.split('/');

      if (parts.length < 2) return;

      const year = parts[0];
      const month = parts[1].padStart(2, '0');
      const ymKey = year + '-' + month;

      if (!groups[ymKey]) groups[ymKey] = [];
      groups[ymKey].push(g);
    });

    // ===== 輸出每個月份 =====
    Object.keys(groups).sort().forEach(ym => {

      const [year, month] = ym.split('-');
      const list = groups[ym];

      let html = '';
      html += '<div class="panel">';
      html += `<div class="month-title">📅 ${year} 年 ${month} 月</div>`;
      html += '<table class="styled-table">';
      html += '<thead><tr>';
      html += '<th>日期</th><th>時間</th><th>賽事</th><th>場地</th>';
      html += '<th>主隊</th><th>客隊</th><th>操作</th>';
      html += '</tr></thead><tbody>';

      list.forEach(g => {

        if (isExpired(g)) {
          html += '<tr class="expired">';
          html += `<td>${g.date || ''}</td>`;
          html += `<td>${g.time || ''}</td>`;
          html += `<td>${g.tournament || ''}</td>`;
          html += `<td>${g.field || ''}</td>`;
          html += `<td>${g.home_team || ''}</td>`;
          html += `<td>${g.away_team || ''}</td>`;
          html += '<td class="finished">已完賽</td>';
          html += '</tr>';
        } else {
          html += '<tr>';
          html += `<td><input type="date" value="${g.date || ''}"
                    onchange="updateGame('${g.game_id}','date',this.value)"></td>`;
          html += `<td><input type="time" value="${g.time || ''}"
                    onchange="updateGame('${g.game_id}','time',this.value)"></td>`;
          html += `<td><input value="${g.tournament || ''}"
                    onchange="updateGame('${g.game_id}','tournament',this.value)"></td>`;
          html += `<td><input value="${g.field || ''}"
                    onchange="updateGame('${g.game_id}','field',this.value)"></td>`;
          html += `<td><input value="${g.home_team || ''}"
                    onchange="updateGame('${g.game_id}','home_team',this.value)"></td>`;
          html += `<td><input value="${g.away_team || ''}"
                    onchange="updateGame('${g.game_id}','away_team',this.value)"></td>`;
          html += `<td><button class="delete-btn"
                    onclick="deleteGame('${g.game_id}')">刪除</button></td>`;
          html += '</tr>';
        }

      });

      html += '</tbody></table></div>';
      container.insertAdjacentHTML('beforeend', html);
    });

  });

}

function updateGame(id,f,v){
  callApi({action:'updateGame',game_id:id,field_name:f,value:v})
}
function deleteGame(id){
  if(!confirm('確定刪除？'))return
  callApi({action:'deleteGame',game_id:id},loadGames)
}

let importRows=[]
function previewImport(){
  const f=document.getElementById('importFile').files[0]
  if(!f)return alert('請選擇檔案')
  const r=new FileReader()
  r.onload=e=>{
    const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'})
    importRows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]])
    document.getElementById('importPreview').innerText='共 '+importRows.length+' 筆'
    document.getElementById('confirmImportBtn').style.display='inline'
  }
  r.readAsArrayBuffer(f)
}
function confirmImport(){
  callApi({action:'importGames',rows:JSON.stringify(importRows)},()=>loadGames())
}

document.addEventListener('DOMContentLoaded',()=>{
  loadHeader()
  loadGames()
})
</script>

</body>
</html>
