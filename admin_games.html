<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>賽事管理</title>

  <!-- 共用 CSS（一定要是單獨一行，必須有關閉 >） -->
  <link rel="stylesheet" href="common.css">

  <!-- 頁面內 CSS（一定只能在 <style> 裡） -->
  <style>

    .main{padding:20px}
    .panel{
      background:#fff;
      padding:16px;
      border-radius:6px;
      box-shadow:0 1px 4px rgba(0,0,0,.08);
      margin-bottom:24px
    }
    .month-title{
      font-size:18px;
      font-weight:700;
      margin-bottom:12px
    }
    .filter-bar{
      display:flex;
      flex-wrap:wrap;
      gap:16px;
      align-items:center
    }
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{border:1px solid #e0e0e0;padding:6px 8px;text-align:center}
    th{background:#eef2f6;font-weight:600}
    tbody tr:nth-child(even){background:#fafafa}
    tbody tr:hover{background:#f0f6ff}
    input,select{width:100%;padding:4px;box-sizing:border-box}
    button{padding:4px 10px;cursor:pointer}
    .delete-btn{color:#c00}
    .expired{background:#f3f3f3;color:#888}
    .finished{font-weight:600;color:#999}
  </style>
</head>

<body>

<div id="header-container"></div>

<div class="main">

<!-- 篩選 -->
<div class="panel">
  <div class="filter-bar">

    <label>
      <input type="radio" id="rangeAll" name="range" value="all" checked>
      全部
    </label>
    
    <label>
      <input type="radio" id="rangeWeek" name="range" value="week">
      本週
    </label>
    
    <label>
      <input type="radio" id="rangeMonth" name="range" value="month">
      本月
    </label>

    <label>
      <input type="checkbox" id="showExpired">
      顯示已完成
    </label>

    <input
      id="searchInput"
      placeholder="搜尋賽事 / 場地 / 球隊"
    >

  </div>
</div>

</div>

<div id="gamesContainer"></div>

<!-- 匯入 -->
<div class="panel">
  <h3>📥 匯入賽事（Excel）</h3>
  <input type="file" id="importFile" accept=".xlsx">
  <button onclick="previewImport()">預覽</button>
  <div id="importPreview"></div>
  <button id="confirmImportBtn" style="display:none" onclick="confirmImport()">確認匯入</button>
  <pre>
匯入格式樣式：
date,time,duration,tournament,category,field,away_team,home_team,umpire_count,position_mode
2026-04-12,08:30,90,學齡盃,六年級,A球場,三峽,板橋,2,allow_select
  </pre>
</div>

</div>

  <!-- 外部 JS：一行一個 script，一定要成對 -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="js/config.js"></script>

<script>
function loadHeader(){
  fetch('header.html').then(r=>r.text()).then(h=>{
    document.getElementById('header-container').innerHTML=h
  })
}

function gameDT(g){return new Date(g.date+'T'+g.time)}
function isExpired(g){return gameDT(g)<new Date()}
function isInWeek(g){
  const d=gameDT(g),n=new Date
  const s=new Date(n);s.setDate(n.getDate()-n.getDay());s.setHours(0,0,0,0)
  const e=new Date(s);e.setDate(s.getDate()+7)
  return d>=s&&d<e
}
function isInMonth(g){
  const d=gameDT(g),n=new Date
  return d.getFullYear()==n.getFullYear()&&d.getMonth()==n.getMonth()
}
function match(g,k){
  if(!k)return true;k=k.toLowerCase()
  return [g.tournament,g.field,g.home_team,g.away_team].some(v=>(v||'').toLowerCase().includes(k))
}

// 將各種 Date 字串轉成 yyyy-mm-dd
function normalizeDate(d) {
  if (!d) return '';
  const date = new Date(d);
  if (isNaN(date)) return '';
  return date.toISOString().slice(0, 10);
}

// 將各種 Date / Time 字串轉成 HH:mm
function normalizeTime(t) {
  if (!t) return '';

  // 已經是 HH:mm（例如 8:30 / 13:50）
  if (/^\d{1,2}:\d{2}$/.test(t)) {
    const [h, m] = t.split(':');
    return h.padStart(2, '0') + ':' + m;
  }

  // 來自 Excel（1899-12-30 的那種）
  const d = new Date(t);
  if (isNaN(d)) return '';

  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  return `${hh}:${mm}`;
}

function positionModeText(v) {
  if (v === 'allow_select') return '自行選';
  if (v === 'auto_only') return '系統排';
  return v || '';
}

let currentRange = 'all';

function loadGames() {

  callApi({ action: 'getGames' }, function (res) {

    const container = document.getElementById('gamesContainer');
    container.innerHTML = '';

    if (!res || res.result !== 'ok' || !Array.isArray(res.games) || res.games.length === 0) {
      container.innerHTML = '<div class="panel">目前沒有賽事</div>';
      return;
    }

    //const range =
    //  document.querySelector('input[name="range"]:checked')?.value || 'all';

    const range = currentRange;
    
    document.getElementById('rangeAll').addEventListener('change', function () {
  if (this.checked) {
    currentRange = 'all';
    loadGames();
  }
});

document.getElementById('rangeWeek').addEventListener('change', function () {
  if (this.checked) {
    currentRange = 'week';
    loadGames();
  }
});

document.getElementById('rangeMonth').addEventListener('change', function () {
  if (this.checked) {
    currentRange = 'month';
    loadGames();
  }
});

    const showExpired =
      document.getElementById('showExpired')?.checked || false;
    const keyword =
      document.getElementById('searchInput')?.value.trim().toLowerCase() || '';

    // 正規化資料
    const games = res.games.map(g => ({
      ...g,
      _date: normalizeDate(g.date),
      _time: normalizeTime(g.time)
    }));

    // 日期時間排序
    games.sort((a, b) => {
      return new Date(a._date + 'T' + a._time) - new Date(b._date + 'T' + b._time);
    });

    // 依年月分組
    const groups = {};

    games.forEach(g => {

      if (keyword) {
        const hit = [
          g.tournament, g.field, g.home_team, g.away_team, g.category
        ].some(v => (v || '').toLowerCase().includes(keyword));
        if (!hit) return;
      }

      const gameDT = new Date(g._date + 'T' + g._time);
      const expired = gameDT < new Date();

      if (expired && !showExpired) return;

      const year = g._date.slice(0, 4);
      const month = g._date.slice(5, 7);
      const ymKey = year + '-' + month;

      if (!groups[ymKey]) groups[ymKey] = [];
      groups[ymKey].push({ ...g, expired });
    });

    // 輸出畫面
    Object.keys(groups).sort().forEach(ym => {

      const [year, month] = ym.split('-');
      const list = groups[ym];

      let html = '';
      html += '<div class="panel">';
      html += `<div class="month-title">📅 ${year} 年 ${month} 月</div>`;
      html += '<table class="styled-table">';
      html += '<thead><tr>';

      html += '<th>日期</th>';
      html += '<th>時間</th>';
      html += '<th>分鐘</th>';
      html += '<th>賽事名稱</th>';
      html += '<th>組別</th>';
      html += '<th>場地</th>';
      html += '<th>客隊</th>';
      html += '<th>主隊</th>';
      html += '<th>裁判數</th>';
      html += '<th>站位方式</th>';
      html += '<th>操作</th>';

      html += '</tr></thead><tbody>';

      list.forEach(g => {

        if (g.expired) {
          html += `
            <tr class="expired">
              <td>${g._date}</td>
              <td>${g._time}</td>
              <td>${g.duration || ''}</td>
              <td>${g.tournament || ''}</td>
              <td>${g.category || ''}</td>
              <td>${g.field || ''}</td>
              <td>${g.away_team || ''}</td>
              <td>${g.home_team || ''}</td>
              <td>${g.umpire_count}</td>
              <td>${positionModeText(g.position_mode)}</td>
              <td class="finished">已完賽</td>
            </tr>`;
        } else {
          html += `
            <tr>
              <td><input type="date" value="${g._date}" onchange="updateGame('${g.game_id}','date',this.value)"></td>
              <td><input type="time" value="${g._time}" onchange="updateGame('${g.game_id}','time',this.value)"></td>
              <td><input type="number" value="${g.duration || ''}" onchange="updateGame('${g.game_id}','duration',this.value)"></td>
              <td><input value="${g.tournament || ''}" onchange="updateGame('${g.game_id}','tournament',this.value)"></td>
              <td><input value="${g.category || ''}" onchange="updateGame('${g.game_id}','category',this.value)"></td>
              <td><input value="${g.field || ''}" onchange="updateGame('${g.game_id}','field',this.value)"></td>
              <td><input value="${g.away_team || ''}" onchange="updateGame('${g.game_id}','away_team',this.value)"></td>
              <td><input value="${g.home_team || ''}" onchange="updateGame('${g.game_id}','home_team',this.value)"></td>
              <td>
                <select onchange="updateGame('${g.game_id}','umpire_count',this.value)">
                  ${[0,1,2,3,4].map(n =>
                    `<option value="${n}" ${Number(g.umpire_count)===n?'selected':''}>${n}</option>`
                  ).join('')}
                </select>
              </td>
              <td>${positionModeText(g.position_mode)}</td>
              <td>
                <button class="delete-btn" onclick="deleteGame('${g.game_id}')">刪除</button>
              </td>
            </tr>`;
        }

      });

      html += '</tbody></table></div>';
      container.insertAdjacentHTML('beforeend', html);
    });

  });

}


//
function updateGame(id,f,v){
  callApi({action:'updateGame',game_id:id,field_name:f,value:v})
}
function deleteGame(id){
  if(!confirm('確定刪除？'))return
  callApi({action:'deleteGame',game_id:id},loadGames)
}

let importRows=[]
function previewImport(){
  const f=document.getElementById('importFile').files[0]
  if(!f)return alert('請選擇檔案')
  const r=new FileReader()
  r.onload=e=>{
    const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'})
    importRows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]])
    document.getElementById('importPreview').innerText='共 '+importRows.length+' 筆'
    document.getElementById('confirmImportBtn').style.display='inline'
  }
  r.readAsArrayBuffer(f)
}
function confirmImport(){
  callApi({action:'importGames',rows:JSON.stringify(importRows)},()=>loadGames())
}

document.addEventListener('DOMContentLoaded',()=>{
  loadHeader()
  loadGames()
})


function logout() {
  // 清掉登入資訊
  localStorage.removeItem('session_user');

  // 直接回登入頁
  window.location.href = 'login.html';
}

document.addEventListener('DOMContentLoaded', function () {

  loadHeader();
  loadGames();

  // ✅ 所有 radio（全部 / 本週 / 本月）
  document.querySelectorAll('input[name="range"]').forEach(function(radio){
    radio.addEventListener('change', function(){
      loadGames();
    });
  });

  // ✅ 顯示已完成
  var showExpired = document.getElementById('showExpired');
  if (showExpired) {
    showExpired.addEventListener('change', function(){
      loadGames();
    });
  }

  // ✅ 搜尋即時觸發
  var search = document.getElementById('searchInput');
  if (search) {
    search.addEventListener('input', function(){
      loadGames();
    });
  }

});

</script>

</body>
</html>
