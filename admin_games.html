<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>賽事管理</title>

    <!-- ✅ 正確載入共用樣式 -->
  <link rel="stylesheet" href="common.css">


  <style>
    .main { padding: 20px; }

    .panel{
      background:#fff;
      padding:16px;
      border-radius:6px;
      box-shadow:0 1px 4px rgba(0,0,0,.08);
      margin-bottom:32px;
    }

    .month-title{
      font-size:18px;
      font-weight:700;
      margin-bottom:12px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }

    th,td{
      border:1px solid #ddd;
      padding:6px 8px;
      text-align:center;
    }

    th{ background:#eef2f6; }

    /* 表格美化 */
    .styled-table tbody tr:nth-child(even){
      background:#fafbfc;
    }
    .styled-table tbody tr:hover{
      background:#f0f6ff;
    }

    input,select{
      width:100%;
      padding:4px;
      box-sizing:border-box;
    }

    .delete-btn{ color:#c00; }

    /* 過期賽事 */
    .expired-row{
      background:#f3f3f3 !important;
      color:#888;
    }
    .finished{
      font-weight:600;
      color:#999;
    }

    #toast{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:#2c7be5;
      color:#fff;
      padding:14px 26px;
      border-radius:8px;
      font-size:16px;
      opacity:0;
      pointer-events:none;
      transition:opacity .3s;
      z-index:9999;
    }
  </style>
</head>

<body>

<!-- 共用 Header -->
<div id="header-container"></div>

<div class="main">

<!-- 新增賽事 -->
<div class="panel">
  <h2>➕ 新增賽事</h2>
  <table>
    <tr>
      <td><input id="g_date" type="date"></td>
      <td><input id="g_time" type="time"></td>
      <td><input id="g_duration" type="number" min="10" step="10"></td>
      <td><input id="g_tournament" placeholder="賽事"></td>
      <td><input id="g_category" placeholder="組別"></td>
      <td><input id="g_field" placeholder="場地"></td>
      <td><input id="g_away" placeholder="客隊"></td>
      <td><input id="g_home" placeholder="主隊"></td>
      <td>
        <select id="g_umpire">
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
        </select>
      </td>
      <td>
        <select id="g_mode">
          <option value="allow_select">自行選</option>
          <option value="auto_only">系統排</option>
        </select>
      </td>
      <td><button onclick="createGame()">新增</button></td>
    </tr>
  </table>
</div>

<!-- 月份分組容器 -->
<div id="gamesContainer"></div>

</div>

<div id="toast"></div>

js/config.jsscript>

<script>
/* ===== Header ===== */
function loadHeader(){
  fetch('header.html')
    .then(r=>r.text())
    .then(html=>{
      document.getElementById('header-container').innerHTML = html;
      const s = JSON.parse(localStorage.getItem('session_user')||'{}');
      if(s.name){
        const u = document.getElementById('u_name');
        if(u) u.textContent = s.name;
      }
    });
}

/* ===== Utils ===== */
function fmtDate(v){
  const d = new Date(v);
  if(isNaN(d)) return '';
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtTime(v){
  if(/^\d{2}:\d{2}$/.test(v)) return v;
  const d = new Date(v);
  if(isNaN(d)) return '';
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function sortKey(g){
  return new Date(`${fmtDate(g.date)}T${fmtTime(g.time)}`);
}
function isExpired(g){
  return sortKey(g) < new Date();
}
function posText(v){
  return v === 'auto_only' ? '系統排' : '自行選';
}

/* ===== Toggle expired ===== */
function toggleExpired(id){
  const el = document.getElementById(id);
  if(!el) return;
  el.style.display = el.style.display === 'none' ? 'table' : 'none';
}

/* ===== Load Games ===== */
function loadGames(){
  callApi({action:'getGames'}, res=>{
    const box = document.getElementById('gamesContainer');
    box.innerHTML = '';

    if(!res || res.result !== 'ok' || !res.games.length){
      box.innerHTML = '<div class="panel">目前沒有賽事</div>';
      return;
    }

    res.games.sort((a,b)=>sortKey(a)-sortKey(b));

    const byMonth = {};
    res.games.forEach(g=>{
      const d = new Date(g.date);
      const key = `${d.getFullYear()}-${d.getMonth()}`;
      (byMonth[key] = byMonth[key] || []).push(g);
    });

    Object.keys(byMonth).forEach(key=>{
      const list = byMonth[key];
      const d = new Date(list[0].date);
      const active = list.filter(g=>!isExpired(g));
      const expired = list.filter(g=>isExpired(g));
      const expId = `expired-${key}`;

      const panel = document.createElement('div');
      panel.className = 'panel';

      let html = `
        <div class="month-title">📅 ${d.getFullYear()} 年 ${d.getMonth()+1} 月</div>
        <table class="styled-table">
        <thead>
          <tr>
            <th>日期</th><th>時間</th><th>分鐘</th>
            <th>賽事</th><th>組別</th><th>場地</th>
            <th>客隊</th><th>主隊</th>
            <th>裁判</th><th>站位</th><th>操作</th>
          </tr>
        </thead><tbody>`;

      /* 未過期（可編輯） */
      active.forEach(g=>{
        html += `
          <tr>
            <td><input type="date" value="${fmtDate(g.date)}" onchange="updateGame('${g.game_id}','date',this.value)"></td>
            <td><input type="time" value="${fmtTime(g.time)}" onchange="updateGame('${g.game_id}','time',this.value)"></td>
            <td><input type="number" value="${g.duration||''}" onchange="updateGame('${g.game_id}','duration',this.value)"></td>
            <td><input value="${g.tournament||''}" onchange="updateGame('${g.game_id}','tournament',this.value)"></td>
            <td><input value="${g.category||''}" onchange="updateGame('${g.game_id}','category',this.value)"></td>
            <td><input value="${g.field||''}" onchange="updateGame('${g.game_id}','field',this.value)"></td>
            <td><input value="${g.away_team||''}" onchange="updateGame('${g.game_id}','away_team',this.value)"></td>
            <td><input value="${g.home_team||''}" onchange="updateGame('${g.game_id}','home_team',this.value)"></td>
            <td>
              <select onchange="updateGame('${g.game_id}','umpire_count',this.value)">
                ${[0,1,2,3,4].map(n=>`
                  <option value="${n}" ${Number(g.umpire_count)===n?'selected':''}>${n}</option>`
                ).join('')}
              </select>
            </td>
            <td>
              <select onchange="updateGame('${g.game_id}','position_mode',this.value)">
                <option value="allow_select" ${g.position_mode==='allow_select'?'selected':''}>自行選</option>
                <option value="auto_only" ${g.position_mode==='auto_only'?'selected':''}>系統排</option>
              </select>
            </td>
            <td><button class="delete-btn" onclick="deleteGame('${g.game_id}')">刪除</button></td>
          </tr>`;
      });

      html += `</tbody></table>`;

      /* 過期（隱藏） */
      if(expired.length){
        html += `
          <div style="margin:8px 0;">
            <button onclick="toggleExpired('${expId}')">
              顯示 / 隱藏 已完賽（${expired.length}）
            </button>
          </div>

          <table id="${expId}" class="styled-table" style="display:none">
          <tbody>`;

        expired.forEach(g=>{
          html += `
            <tr class="expired-row">
              <td>${fmtDate(g.date)}</td>
              <td>${fmtTime(g.time)}</td>
              <td>${g.duration||''}</td>
              <td>${g.tournament||''}</td>
              <td>${g.category||''}</td>
              <td>${g.field||''}</td>
              <td>${g.away_team||''}</td>
              <td>${g.home_team||''}</td>
              <td>${g.umpire_count}</td>
              <td>${posText(g.position_mode)}</td>
              <td class="finished">已完賽</td>
            </tr>`;
        });

        html += `</tbody></table>`;
      }

      panel.innerHTML = html;
      box.appendChild(panel);
    });
  });
}

/* ===== CRUD ===== */
function createGame(){
  callApi({
    action:'createGame',
    date:g_date.value, time:g_time.value, duration:g_duration.value,
    tournament:g_tournament.value, category:g_category.value,
    field:g_field.value, away_team:g_away.value, home_team:g_home.value,
    umpire_count:g_umpire.value, position_mode:g_mode.value
  }, r=>{
    if(r && r.result==='ok'){ showToast('✅ 已新增'); loadGames(); }
  });
}

function updateGame(id,f,v){
  callApi({action:'updateGame',game_id:id,field_name:f,value:v}, r=>{
    if(r && r.result==='ok') showToast('✅ 已更新');
  });
}

function deleteGame(id){
  if(!confirm('確定刪除?')) return;
  callApi({action:'deleteGame',game_id:id}, r=>{
    if(r && r.result==='ok'){ showToast('🗑 已刪除'); loadGames(); }
  });
}

function showToast(msg){
  toast.textContent = msg;
  toast.style.opacity = '1';
  setTimeout(()=>toast.style.opacity='0',2000);
}

document.addEventListener('DOMContentLoaded',()=>{
  loadHeader();
  loadGames();
});
</script>
</body>
</html>
