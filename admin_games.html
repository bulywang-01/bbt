<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>賽事管理</title>
<style>
body{margin:0;font-family:system-ui,-apple-system;background:#f5f6f8;}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#fff;border-bottom:1px solid #ddd;}
.nav a{margin-right:16px;color:#0066cc;text-decoration:none;font-weight:500;}
.main{padding:20px;}
.panel{background:#fff;padding:16px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:24px;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th,td{border:1px solid #ddd;padding:6px 8px;text-align:center;}
th{background:#eef2f6;}
input,select{width:100%;padding:4px;box-sizing:border-box;}
.delete-btn{color:#c00;}
#toast{position:fixed;top:20px;right:20px;background:#2c7be5;color:#fff;padding:10px 16px;border-radius:6px;opacity:0;transition:.3s;}
</style>
</head>

<body>
<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="admin_users.html">👤 帳號管理</a>
    <b>⚾ 賽事管理</b>
  </div>
  <div>
    <b id="u_name"></b>
    <a href="#" onclick="logout()" style="margin-left:12px;color:#c00;">登出</a>
  </div>
</div>

<div class="main">
<div class="panel">
<h2>➕ 新增賽事</h2>
<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;">
<input id="g_date" type="date">
<input id="g_time" type="time">
<input id="g_duration" type="number" placeholder="分鐘">
<input id="g_field" placeholder="場地">
<input id="g_tournament" placeholder="賽事名稱">
<input id="g_category" placeholder="組別">
<input id="g_away" placeholder="客隊">
<input id="g_home" placeholder="主隊">
<select id="g_umpire">
<option value="1">1 人</option>
<option value="2">2 人</option>
<option value="3">3 人</option>
<option value="4">4 人</option>
</select>
<select id="g_mode">
<option value="allow_select">裁判自行選</option>
<option value="auto_only">系統排</option>
</select>
<button onclick="createGame()">新增</button>
</div>
</div>

<div class="panel">
<h2>📋 賽事列表</h2>
<table>
<thead>
<tr>
<th>日期</th><th>時間</th><th>賽事</th><th>組別</th>
<th>場地</th><th>客隊</th><th>主隊</th>
<th>裁判數</th><th>站位</th><th>操作</th>
</tr>
</thead>
<tbody id="gameBody"><tr><td colspan="10">載入中…</td></tr></tbody>
</table>
</div>
</div>

<div id="toast"></div>

<script src="js/config.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const s = JSON.parse(localStorage.getItem('session_user')||'{}');
  if(!s.user_id){location.href='login.html';return;}
  u_name.textContent=s.name;
  loadGames();
});

/* ✅ 關鍵：時間正規化 */
function normalizeTime(val){
  if(!val) return '';
  if(typeof val==='string' && /^\d{2}:\d{2}$/.test(val)) return val;
  if(typeof val==='string' && val.includes('–')) return normalizeTime(val.split('–')[0]);
  const d=new Date(val);
  if(!isNaN(d)){
    return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }
  return '';
}

function timeToMinSafe(val){
  const t=normalizeTime(val);
  if(!t) return 0;
  const [h,m]=t.split(':').map(Number);
  return h*60+m;
}

function formatDateForInput(val){
  if(val instanceof Date){
    return `${val.getFullYear()}-${String(val.getMonth()+1).padStart(2,'0')}-${String(val.getDate()).padStart(2,'0')}`;
  }
  return val||'';
}

function loadGames(){
  callApi({action:'getGames'},res=>{
    const body=gameBody;
    body.innerHTML='';
    if(!res||res.result!=='ok'){body.innerHTML='<tr><td colspan=10>讀取失敗</td></tr>';return;}

    res.games
    .sort((a,b)=>timeToMinSafe(a.time)-timeToMinSafe(b.time))
    .forEach(g=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`
      <td><input type="date" value="${formatDateForInput(g.date)}"
        onchange="updateGame('${g.game_id}','date',this.value)"></td>
      <td><input type="time" value="${normalizeTime(g.time)}"
        onchange="updateGame('${g.game_id}','time',this.value)">
        <br><small>
        <input type="number" value="${g.duration||''}"
        onchange="updateGame('${g.game_id}','duration',this.value)"> 分鐘</small></td>
      <td><input value="${g.tournament||''}" onchange="updateGame('${g.game_id}','tournament',this.value)"></td>
      <td><input value="${g.category||''}" onchange="updateGame('${g.game_id}','category',this.value)"></td>
      <td><input value="${g.field||''}" onchange="updateGame('${g.game_id}','field',this.value)"></td>
      <td><input value="${g.away_team||''}" onchange="updateGame('${g.game_id}','away_team',this.value)"></td>
      <td><input value="${g.home_team||''}" onchange="updateGame('${g.game_id}','home_team',this.value)"></td>
      <td><select onchange="updateGame('${g.game_id}','umpire_count',this.value)">
        ${[1,2,3,4].map(n=>`<option ${g.umpire_count==n?'selected':''}>${n}</option>`).join('')}
      </select></td>
      <td><select onchange="updateGame('${g.game_id}','position_mode',this.value)">
        <option value="allow_select" ${g.position_mode==='allow_select'?'selected':''}>自行選</option>
        <option value="auto_only" ${g.position_mode==='auto_only'?'selected':''}>系統排</option>
      </select></td>
      <td><button class="delete-btn" onclick="deleteGame('${g.game_id}')">刪除</button></td>`;
      body.appendChild(tr);
    });
  });
}

function createGame(){
  callApi({
    action:'createGame',
    date:g_date.value,
    time:g_time.value,
    duration:g_duration.value,
    field:g_field.value,
    tournament:g_tournament.value,
    category:g_category.value,
    away_team:g_away.value,
    home_team:g_home.value,
    umpire_count:g_umpire.value,
    position_mode:g_mode.value
  },res=>{if(res.result==='ok'){showToast('✅ 已新增');loadGames();}});
}

function updateGame(id,f,v){
  callApi({action:'updateGame',game_id:id,field_name:f,value:v},
    r=>{if(r.result==='ok')showToast('✅ 已更新');});
}

function deleteGame(id){
  if(!confirm('確定刪除？'))return;
  callApi({action:'deleteGame',game_id:id},r=>{if(r.result==='ok')loadGames();});
}

function showToast(m){toast.textContent=m;toast.style.opacity=1;setTimeout(()=>toast.style.opacity=0,2000);}
function logout(){localStorage.clear();location.href='login.html';}
</script>
</body>
</html>
