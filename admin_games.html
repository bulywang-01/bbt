<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>賽事管理</title>

  <!-- 共用樣式 -->
  <link rel="stylesheet" href="common.css">

  <style>
    body { margin:0; }
    .main { padding:20px; }

    .panel {
      background:#ffffff;
      padding:16px;
      border-radius:6px;
      box-shadow:0 1px 4px rgba(0,0,0,.08);
      margin-bottom:20px;
    }

    .filter-bar{
      display:flex;
      flex-wrap:wrap;
      gap:16px;
      align-items:center;
    }

    table {
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }

    th, td {
      border:1px solid #e0e0e0;
      padding:6px 8px;
      text-align:center;
    }

    th {
      background:#eef2f6;
      font-weight:600;
    }

    tr:nth-child(even){ background:#fafafa; }
    tr:hover{ background:#f0f6ff; }

    input {
      width:100%;
      box-sizing:border-box;
      padding:4px;
    }

    button {
      padding:4px 10px;
      cursor:pointer;
    }

    .delete-btn {
      color:#c00;
    }

    .expired {
      background:#f3f3f3;
      color:#888;
    }
  </style>
</head>

<body>

<!-- 共用 Header -->
<div id="header-container"></div>

<div class="main">

  <!-- 篩選 -->
  <div class="panel">
    <div class="filter-bar">
      <label>
        <input type="radio" name="range" value="all" checked>
        全部
      </label>
      <label>
        <input type="radio" name="range" value="week">
        本週
      </label>
      <label>
        <input type="radio" name="range" value="month">
        本月
      </label>

      <input id="searchInput" type="text" placeholder="搜尋賽事 / 場地 / 球隊">
      <button onclick="loadGames()">重新整理</button>
    </div>
  </div>

  <!-- 賽事列表 -->
  <div id="gamesContainer"></div>

</div>

<!-- 後端 API -->
<script src="js/config.js"></script>

<script>
/* ===== Header ===== */
function loadHeader(){
  fetch('header.html')
    .then(function(res){ return res.text(); })
    .then(function(html){
      document.getElementById('header-container').innerHTML = html;

      var s = localStorage.getItem('session_user');
      if(s){
        try{
          var user = JSON.parse(s);
          var el = document.getElementById('u_name');
          if(el && user.name){
            el.textContent = user.name;
          }
        }catch(e){}
      }
    });
}

/* ===== 工具 ===== */
function gameDateTime(g){
  return new Date(g.date + 'T' + g.time);
}

function isInThisWeek(g){
  var d = gameDateTime(g);
  var now = new Date();
  var start = new Date(now);
  start.setDate(now.getDate() - now.getDay());
  start.setHours(0,0,0,0);
  var end = new Date(start);
  end.setDate(start.getDate() + 7);
  return d >= start && d < end;
}

function isInThisMonth(g){
  var d = gameDateTime(g);
  var now = new Date();
  return d.getFullYear() === now.getFullYear() &&
         d.getMonth() === now.getMonth();
}

function matchKeyword(g, kw){
  if(!kw) return true;
  kw = kw.toLowerCase();
  return (g.tournament || '').toLowerCase().includes(kw) ||
         (g.field || '').toLowerCase().includes(kw) ||
         (g.home_team || '').toLowerCase().includes(kw) ||
         (g.away_team || '').toLowerCase().includes(kw);
}

/* ===== 讀取賽事 ===== */
function loadGames(){

  callApi({ action:'getGames' }, function(res){

    var container = document.getElementById('gamesContainer');
    container.innerHTML = '';

    if(!res || res.result !== 'ok' || !Array.isArray(res.games) || res.games.length === 0){
      container.innerHTML = '<div class="panel">目前沒有賽事</div>';
      return;
    }

    // 取得篩選條件
    var rangeRadio = document.querySelector('input[name="range"]:checked');
    var range = rangeRadio ? rangeRadio.value : 'all';

    var showExpiredCheckbox = document.getElementById('showExpired');
    var showExpired = showExpiredCheckbox ? showExpiredCheckbox.checked : false;

    var searchInput = document.getElementById('searchInput');
    var keyword = searchInput ? searchInput.value.trim().toLowerCase() : '';

    // 依日期時間排序
    var games = res.games.slice().sort(function(a, b){
      return gameDateTime(a) - gameDateTime(b);
    });

    // === 依「年月」分組 ===
    var groups = {};

    games.forEach(function(g){

      if(keyword && !matchKeyword(g, keyword)){
        return;
      }

      var expired = isExpired(g);

      if(expired && !showExpired){
        return;
      }

      if(!expired){
        if(range === 'week' && !isInThisWeek(g)) return;
        if(range === 'month' && !isInThisMonth(g)) return;
      }

      var d = gameDateTime(g);
      var ym = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2,'0');

      if(!groups[ym]){
        groups[ym] = [];
      }
      groups[ym].push(g);
    });

    // === 逐月輸出 ===
    Object.keys(groups).sort().forEach(function(ym){

      var list = groups[ym];
      var title = ym.split('-');
      var year = title[0];
      var month = title[1];

      var html = '';
      html += '<div class="panel">';
      html += '<div class="month-title">📅 ' + year + ' 年 ' + month + ' 月</div>';
      html += '<table class="styled-table">';
      html += '<thead><tr>';
      html += '<th>日期</th>';
      html += '<th>時間</th>';
      html += '<th>賽事</th>';
      html += '<th>場地</th>';
      html += '<th>主隊</th>';
      html += '<th>客隊</th>';
      html += '<th>操作</th>';
      html += '</tr></thead>';
      html += '<tbody>';

      list.forEach(function(g){

        var expired = isExpired(g);

        if(expired){
          html += '<tr class="expired-row">';
          html += '<td>' + g.date + '</td>';
          html += '<td>' + g.time + '</td>';
          html += '<td>' + (g.tournament || '') + '</td>';
          html += '<td>' + (g.field || '') + '</td>';
          html += '<td>' + (g.home_team || '') + '</td>';
          html += '<td>' + (g.away_team || '') + '</td>';
          html += '<td class="finished">已完賽</td>';
          html += '</tr>';
        }else{
          html += '<tr>';
          html += '<td><input type="date" value="' + g.date + '" onchange="updateGame(\'' + g.game_id + '\',\'date\',this.value)"></td>';
          html += '<td><input type="time" value="' + g.time + '" onchange="updateGame(\'' + g.game_id + '\',\'time\',this.value)"></td>';
          html += '<td><input value="' + (g.tournament || '') + '" onchange="updateGame(\'' + g.game_id + '\',\'tournament\',this.value)"></td>';
          html += '<td><input value="' + (g.field || '') + '" onchange="updateGame(\'' + g.game_id + '\',\'field\',this.value)"></td>';
          html += '<td><input value="' + (g.home_team || '') + '" onchange="updateGame(\'' + g.game_id + '\',\'home_team\',this.value)"></td>';
          html += '<td><input value="' + (g.away_team || '') + '" onchange="updateGame(\'' + g.game_id + '\',\'away_team\',this.value)"></td>';
          html += '<td><button class="delete-btn" onclick="deleteGame(\'' + g.game_id + '\')">刪除</button></td>';
          html += '</tr>';
        }

      });

      html += '</tbody></table>';
      html += '</div>';

      container.insertAdjacentHTML('beforeend', html);
    });

  });

}

/* ===== CRUD ===== */
function updateGame(id, field, value){
  callApi({
    action:'updateGame',
    game_id:id,
    field_name:field,
    value:value
  });
}

function deleteGame(id){
  if(!confirm('確定刪除？')) return;
  callApi({ action:'deleteGame', game_id:id }, loadGames);
}

/* ===== Init ===== */
document.addEventListener('DOMContentLoaded', function(){
  loadHeader();
  loadGames();
});
</script>

</body>
</html>
