<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>賽事管理</title>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system;
  background:#f5f6f8;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#ffffff;
  border-bottom:1px solid #ddd;
}
.nav a{
  margin-right:16px;
  color:#0066cc;
  text-decoration:none;
  font-weight:500;
}
.main{ padding:20px; }

.panel{
  background:#fff;
  padding:16px;
  border-radius:6px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
  margin-bottom:24px;
}
h2{ margin:0 0 12px; }

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
th,td{
  border:1px solid #ddd;
  padding:6px 8px;
  text-align:center;
}
th{
  background:#eef2f6;
}

input,select{
  width:100%;
  padding:4px;
  box-sizing:border-box;
}

button{
  padding:4px 10px;
  cursor:pointer;
}
.delete-btn{
  color:#c00;
}

/* toast */
#toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#2c7be5;
  color:#fff;
  padding:10px 16px;
  border-radius:6px;
  font-size:14px;
  opacity:0;
  pointer-events:none;
  transition:opacity .3s;
}
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="admin_users.html">👤 帳號管理</a>
    <b>⚾ 賽事管理</b>
  </div>
  <div>
    <b id="u_name"></b>
    <a href="#" onclick="logout()" style="margin-left:12px;color:#c00;">登出</a>
  </div>
</div>

<div class="main">

<!-- 新增賽事 -->
<div class="panel">
<h2>➕ 新增賽事</h2>
<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;">
  <input id="g_date" type="date">
  <input id="g_time" placeholder="開始時間 08:30">
  <input id="g_duration" type="number" placeholder="分鐘 90">
  <input id="g_field" placeholder="場地">
  <input id="g_tournament" placeholder="賽事名稱">
  <input id="g_category" placeholder="組別">
  <input id="g_away" placeholder="客隊">
  <input id="g_home" placeholder="主隊">
  <select id="g_umpire">
    <option value="1">1 人</option>
    <option value="2">2 人</option>
    <option value="3">3 人</option>
    <option value="4">4 人</option>
  </select>
  <select id="g_mode">
    <option value="allow_select">裁判自行選站位</option>
    <option value="auto_only">系統自動排</option>
  </select>
  <button onclick="createGame()">新增</button>
</div>
</div>

<!-- 賽事列表 -->
<div class="panel">
<h2>📋 賽事列表</h2>
<table>
<thead>
<tr>
  <th>日期</th>
  <th>時間</th>
  <th>賽事</th>
  <th>組別</th>
  <th>場地</th>
  <th>客隊</th>
  <th>主隊</th>
  <th>裁判數</th>
  <th>站位</th>
  <th>操作</th>
</tr>
</thead>
<tbody id="gameBody">
<tr><td colspan="10">載入中…</td></tr>
</tbody>
</table>
</div>

</div>

<div id="toast"></div>

<!-- ✅ 一定要正確載入 -->
<script src="js/config.js"></script>

<script>
document.addEventListener('DOMContentLoaded',()=>{
  const s = JSON.parse(localStorage.getItem('session_user')||'{}');
  if(!s.user_id){ location.href='login.html'; return; }
  document.getElementById('u_name').textContent = s.name || '';
  loadGames();
});

/* ===== 載入賽事 ===== */
function loadGames(){
  callApi({ action:'getGames' }, res=>{
    const body = document.getElementById('gameBody');
    body.innerHTML='';

    if(!res || res.result!=='ok'){
      body.innerHTML='<tr><td colspan="10">讀取失敗</td></tr>';
      return;
    }

const games = res.games
  .map(g=>{
    const d = parseDateSafe(g.date);
    return {
      ...g,
      _dateObj: d,
      _startMin: timeToMinSafe(g.time)
    };
  })
  .filter(g => g._dateObj)   // ✅ 過濾壞資料
  .sort((a,b)=>{
    if(a._dateObj - b._dateObj !== 0){
      return a._dateObj - b._dateObj;
    }
    return a._startMin - b._startMin;
  });

    games.forEach(g=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`
        <td>${formatDate(g._dateObj)}</td>
        <td>${formatTimeRange(g.time_range)}</td>
        <td><input value="${g.tournament}" onchange="updateGame('${g.game_id}','tournament',this.value)"></td>
        <td><input value="${g.category}" onchange="updateGame('${g.game_id}','category',this.value)"></td>
        <td><input value="${g.field}" onchange="updateGame('${g.game_id}','field',this.value)"></td>
        <td><input value="${g.away_team}" onchange="updateGame('${g.game_id}','away_team',this.value)"></td>
        <td><input value="${g.home_team}" onchange="updateGame('${g.game_id}','home_team',this.value)"></td>
        <td>
          <select onchange="updateGame('${g.game_id}','umpire_count',this.value)">
            ${[1,2,3,4].map(n=>`<option value="${n}" ${g.umpire_count==n?'selected':''}>${n}</option>`).join('')}
          </select>
        </td>
        <td>
          <select onchange="updateGame('${g.game_id}','position_mode',this.value)">
            <option value="allow_select" ${g.position_mode==='allow_select'?'selected':''}>自行選</option>
            <option value="auto_only" ${g.position_mode==='auto_only'?'selected':''}>系統排</option>
          </select>
        </td>
        <td>
          <button class="delete-btn" onclick="deleteGame('${g.game_id}')">刪除</button>
        </td>
      `;
      body.appendChild(tr);
    });
  });
}

/* ===== CRUD ===== */
function createGame(){
  if(!g_date.value||!g_time.value||!g_duration.value){
    alert('請填寫日期、時間、分鐘');
    return;
  }
  callApi({
    action:'createGame',
    date:g_date.value,
    time:g_time.value,
    duration:g_duration.value,
    field:g_field.value,
    tournament:g_tournament.value,
    category:g_category.value,
    away_team:g_away.value,
    home_team:g_home.value,
    umpire_count:g_umpire.value,
    position_mode:g_mode.value
  },res=>{
    if(res && res.result==='ok'){
      showToast('✅ 已新增賽事');
      loadGames();
    }
  });
}

function updateGame(id, field, value){
  callApi({
    action:'updateGame',
    game_id:id,
    field_name:field,
    value:value
  },res=>{
    if(res && res.result==='ok'){
      showToast('✅ 已更新');
    }
  });
}

function deleteGame(id){
  if(!confirm('確定刪除此賽事？')) return;
  callApi({ action:'deleteGame', game_id:id },res=>{
    if(res && res.result==='ok'){
      showToast('🗑 已刪除');
      loadGames();
    }
  });
}

/* ===== Utils ===== */
function parseDateSafe(val){
  if(!val) return null;

  // yyyy-mm-dd
  if(/^\d{4}-\d{2}-\d{2}$/.test(val)){
    const [y,m,d] = val.split('-').map(Number);
    return new Date(y, m-1, d);
  }

  // yyyy/m/d or yyyy/mm/dd
  if(/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(val)){
    const [y,m,d] = val.split('/').map(Number);
    return new Date(y, m-1, d);
  }

  return null; // ❗ 不炸，回 null
}
  
function timeToMin(t){
  const [h,m]=t.split(':').map(Number);
  return h*60+m;
}

function timeToMinSafe(val){
  if(!val || !val.includes(':')) return 0;
  const [h,m] = val.split(':').map(n => parseInt(n,10));
  if(isNaN(h) || isNaN(m)) return 0;
  return h*60 + m;
}

function formatDate(d){
  const w=['日','一','二','三','四','五','六'][d.getDay()];
  return `${d.getMonth()+1}/${d.getDate()}（${w}）`;
}
function pad(t){ return t.split(':').map(x=>x.padStart(2,'0')).join(':'); }
function formatTimeRange(r){
  const [s,e]=r.split('–');
  return `${pad(s)}–${pad(e)}`;
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',2000);
}
function logout(){
  localStorage.clear();
  location.href='login.html';
}
</script>
</body>
</html>
``
