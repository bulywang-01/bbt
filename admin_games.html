<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>賽事管理</title>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system;
  background:#f5f6f8;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#ffffff;
  border-bottom:1px solid #ddd;
}
.nav a{
  margin-right:16px;
  color:#0066cc;
  text-decoration:none;
  font-weight:500;
}
.main{ padding:20px; }
.panel{
  background:#fff;
  padding:16px;
  border-radius:6px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
  margin-bottom:24px;
}
h2{ margin:0 0 12px; }

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
th,td{
  border:1px solid #ddd;
  padding:6px 8px;
  text-align:center;
}
th{ background:#eef2f6; }

input,select{
  width:100%;
  padding:4px;
  box-sizing:border-box;
}
button{
  padding:6px 12px;
  cursor:pointer;
}

#toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#2c7be5;
  color:#fff;
  padding:10px 16px;
  border-radius:6px;
  font-size:14px;
  opacity:0;
  pointer-events:none;
  transition:opacity .3s;
  z-index:9999;
}
</style>
</head>

<body>

<div class="header">
  <div class="nav">
    <a href="index.html">🏠 首頁</a>
    <a href="admin_users.html">👤 帳號管理</a>
    <b>⚾ 賽事管理</b>
  </div>
  <div>
    <b id="u_name"></b>
    <a href="#" onclick="logout()" style="margin-left:12px;color:#c00;">登出</a>
  </div>
</div>

<div class="main">

<div class="panel">
<h2>➕ 新增賽事</h2>
<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;">
  <input id="g_date" type="date">
  <input id="g_time" placeholder="開始時間 (08:30)">
  <input id="g_duration" type="number" placeholder="分鐘 (90)">
  <input id="g_field" placeholder="場地">
  <input id="g_tournament" placeholder="賽事">
  <input id="g_category" placeholder="組別">
  <input id="g_away" placeholder="客隊">
  <input id="g_home" placeholder="主隊">
  <select id="g_umpire">
    <option value="1">1 人</option>
    <option value="2">2 人</option>
    <option value="3">3 人</option>
    <option value="4">4 人</option>
  </select>
  <select id="g_mode">
    <option value="allow_select">裁判自行選</option>
    <option value="auto_only">系統自動排</option>
  </select>
  <button onclick="createGame()">新增賽事</button>
</div>
</div>

<div class="panel">
<h2>📋 賽事列表</h2>
<table>
<thead>
<tr>
  <th>日期</th>
  <th>時間</th>
  <th>賽事</th>
  <th>組別</th>
  <th>場地</th>
  <th>客隊</th>
  <th>主隊</th>
  <th>裁判數</th>
  <th>站位模式</th>
</tr>
</thead>
<tbody id="gameBody">
<tr><td colspan="9">載入中…</td></tr>
</tbody>
</table>
</div>

</div>

<div id="toast"></div>

<script src="js/config.js"></script>
<script>
const ROLE_ALLOW = ['admin','match_admin'];

document.addEventListener('DOMContentLoaded',()=>{
  const s = JSON.parse(localStorage.getItem('session_user')||'{}');
  if(!s.user_id){ location.href='login.html'; return; }
  document.getElementById('u_name').textContent = s.name || '';
  if(!ROLE_ALLOW.includes(s.role)){
    alert('沒有權限');
    location.href='index.html';
    return;
  }
  loadGames();
});

/* ===== 載入＆排序賽事 ===== */
function loadGames(){
  callApi({ action:'getGames' }, res=>{
    const body = document.getElementById('gameBody');
    body.innerHTML = '';
    if(!res || res.result !== 'ok'){
      body.innerHTML='<tr><td colspan="9">讀取失敗</td></tr>';
      return;
    }

    const games = res.games
      .map(g=>({...g, _dateObj:parseDate(g.date), _startMin:timeToMin(g.time)}))
      .sort((a,b)=>{
        if(a._dateObj - b._dateObj !== 0) return a._dateObj - b._dateObj;
        return a._startMin - b._startMin;
      });

    games.forEach(g=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`
        <td>${formatDate(g._dateObj)}</td>
        <td>${formatTimeRange(g.time_range)}</td>
        <td>${g.tournament}</td>
        <td>${g.category}</td>
        <td>${g.field}</td>
        <td>${g.away_team}</td>
        <td>${g.home_team}</td>
        <td>${g.umpire_count} 人</td>
        <td>${g.position_mode==='allow_select'?'自行選站位':'系統自動排'}</td>
      `;
      body.appendChild(tr);
    });
  });
}

/* ===== 新增賽事 ===== */
function createGame(){
  if(!g_date.value || !g_time.value || !g_duration.value){
    alert('請填日期、時間與分鐘');
    return;
  }
  callApi({
    action:'createGame',
    date:g_date.value,
    time:g_time.value,
    duration:g_duration.value,
    field:g_field.value,
    tournament:g_tournament.value,
    category:g_category.value,
    away_team:g_away.value,
    home_team:g_home.value,
    umpire_count:g_umpire.value,
    position_mode:g_mode.value
  },res=>{
    if(res && res.result==='ok'){
      showToast('✅ 賽事已新增');
      loadGames();
    }
  });
}

/* ===== Helpers ===== */
function parseDate(str){
  const [y,m,d]=str.split('/').map(n=>parseInt(n,10));
  return new Date(y,m-1,d);
}
function timeToMin(t){
  const [h,m]=t.split(':').map(n=>parseInt(n,10));
  return h*60+m;
}
function formatDate(d){
  const week=['日','一','二','三','四','五','六'][d.getDay()];
  return `${d.getMonth()+1}/${d.getDate()}（${week}）`;
}
function pad(t){ return t.split(':').map(x=>x.padStart(2,'0')).join(':'); }
function formatTimeRange(r){
  const [s,e]=r.split('–');
  return `${pad(s)}–${pad(e)}`;
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',2000);
}
function logout(){
  localStorage.clear();
  location.href='login.html';
}
</script>
</body>
</html>
