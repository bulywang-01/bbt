<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>賽事管理</title>

  <!-- ✅ 正確載入共用樣式 -->
  <link rel="stylesheet" href="common.css">
  <style>
    .panel{
      background:#fff;
      padding:16px;
      border-radius:6px;
      box-shadow:0 1px 4px rgba(0,0,0,.08);
      margin-bottom:24px;
    }

    .month-title{
      font-size:18px;
      font-weight:700;
      margin-bottom:12px;
    }

    table{ width:100%; border-collapse:collapse; font-size:14px; }
    th,td{ border:1px solid #e0e0e0; padding:6px 8px; text-align:center; }
    th{ background:#eef2f6; font-weight:600; }
    tbody tr:nth-child(even){ background:#fafafa; }
    tbody tr:hover{ background:#f0f6ff; }

    input,select{
      width:100%;
      padding:4px;
      box-sizing:border-box;
      font-size:13px;
    }

    button{ padding:4px 10px; cursor:pointer; }
    .delete-btn{ color:#c00; }

    .expired-row{ background:#f3f3f3; color:#888; }
    .finished{ font-weight:600; color:#999; }

    .filter-bar{
      display:flex;
      flex-wrap:wrap;
      gap:16px;
      align-items:center;
    }
  </style>
</head>

<body>

<!-- 共用 Header -->
<div id="header-container"></div>

<div class="main">

  <!-- 篩選 -->
  <div class="panel">
    <div class="filter-bar">
      <label><input type="radio" name="range" value="all" onchange="loadGames()"> 全部</label>
      <label><input type="radio" name="range" value="week" checked onchange="loadGames()"> 本週</label>
      <label><input type="radio" name="range" value="month" onchange="loadGames()"> 本月</label>

      <label><input type="checkbox" id="showExpired" onchange="loadGames()"> 顯示已完賽</label>

      <input id="searchInput"
             type="text"
             placeholder="即時搜尋（賽事 / 組別 / 場地 / 球隊）"
             style="min-width:260px"
             oninput="loadGames()">
    </div>
  </div>

  <!-- 賽事列表 -->
  <div id="gamesContainer"></div>
</div>

<!-- 後端通訊 -->
<script src="js/config.js"></script>

<script>
/* ========= Header ========= */
function loadHeader(){
  fetch('header.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('header-container').innerHTML = html;

      const s = JSON.parse(localStorage.getItem('session_user') || '{}');
      const uName = document.getElementById('u_name');
      if(s.name && uName) uName.textContent = s.name;

      const pageTitle = document.getElementById('pageTitle');
      if(pageTitle) pageTitle.textContent = '賽事管理';
    });
}

/* ========= Utils ========= */
function gameDateTime(g){
  return new Date(`${g.date}T${g.time}`);
}
function isExpired(g){
  return gameDateTime(g) < new Date();
}
function isInThisWeek(g){
  const d = gameDateTime(g);
  const now = new Date();
  const start = new Date(now);
  start.setDate(now.getDate() - now.getDay());
  start.setHours(0,0,0,0);
  const end = new Date(start);
  end.setDate(start.getDate() + 7);
  return d >= start && d < end;
}
function isInThisMonth(g){
  const d = gameDateTime(g);
  const now = new Date();
  return d.getFullYear() === now.getFullYear()
      && d.getMonth() === now.getMonth();
}
function matchKeyword(g, kw){
  if(!kw) return true;
  kw = kw.toLowerCase();
  return [g.tournament,g.category,g.field,g.home_team,g.away_team]
    .some(v => (v||'').toLowerCase().includes(kw));
}

/* ========= Load Games ========= */
function loadGames(){
  callApi({ action:'getGames' }, res => {
    const box = document.getElementById('gamesContainer');
    box.innerHTML = '';

    if(!res || res.result !== 'ok' || !res.games || res.games.length === 0){
      box.innerHTML = '<div class="panel">目前沒有賽事</div>';
      return;
    }

    const range =
      document.querySelector('input[name="range"]:checked').value;
    const showExpired =
      document.getElementById('showExpired').checked;
    const kw =
      document.getElementById('searchInput').value.trim();

    const games = res.games.slice().sort(
      (a,b) => gameDateTime(a) - gameDateTime(b)
    );

    const panel = document.createElement('div');
    panel.className = 'panel';

    let html = `
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>時間</th>
            <th>賽事</th>
            <th>場地</th>
            <th>主隊</th>
            <th>客隊</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
    `;

    games.forEach(g => {
      if(!matchKeyword(g, kw)) return;

      const expired = isExpired(g);
      if(expired && !showExpired) return;

      if(!expired){
        if(range === 'week' && !isInThisWeek(g)) return;
        if(range === 'month' && !isInThisMonth(g)) return;
      }

      html += expired
        ? `
          <tr class="expired-row">
            <td>${g.date}</td>
            <td>${g.time}</td>
            <td>${g.tournament||''}</td>
            <td>${g.field||''}</td>
            <td>${g.home_team||''}</td>
            <td>${g.away_team||''}</td>
            <td class="finished">已完賽</td>
          </tr>
        `
        : `
          <tr>
            <td><input type="date" value="${g.date}"
                onchange="updateGame('${g.game_id}','date',this.value)"></td>
            <td><input type="time" value="${g.time}"
                onchange="updateGame('${g.game_id}','time',this.value)"></td>
            <td><input value="${g.tournament||''}"
                onchange="updateGame('${g.game_id}','tournament',this.value)"></td>
            <td><input value="${g.field||''}"
                onchange="updateGame('${g.game_id}','field',this.value)"></td>
            <td><input value="${g.home_team||''}"
                onchange="updateGame('${g.game_id}','home_team',this.value)"></td>
            <td><input value="${g.away_team||''}"
                onchange="updateGame('${g.game_id}','away_team',this.value)"></td>
            <td>
              <button class="delete-btn"
                onclick="deleteGame('${g.game_id}')">刪除</button>
            </td>
          </tr>
        `;
    });

    html += '</tbody></table>';
    panel.innerHTML = html;
    box.appendChild(panel);
  });
}

/* ========= CRUD ========= */
function updateGame(id, field, value){
  callApi({
    action:'updateGame',
    game_id:id,
    field_name:field,
    value:value
  });
}

function deleteGame(id){
  if(!confirm('確定刪除這筆賽事？')) return;
  callApi({ action:'deleteGame', game_id:id }, loadGames);
}

/* ========= Init ========= */
document.addEventListener('DOMContentLoaded', () => {
  loadHeader();
  loadGames();
});
</script>

</body>
</html>
