<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>賽事管理｜裁判出勤管理系統</title>
  
  <!-- ✅ 正確載入共用樣式 -->
  <link rel="stylesheet" href="common.css">

  <style>
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 6px;
      text-align: center;
    }

    th {
      background: #eef2f6;
      font-weight: 600;
    }

    .expired-row {
      background: #f2f2f2;
      color: #888;
    }

    .finished {
      font-weight: 600;
      color: #999;
    }

    .editing-row {
      background: #fff7ed;
    }

    .inline {
      width: 100%;
      box-sizing: border-box;
    }
  </style>
</head>

<body>

<div id="header-container"></div>

<div class="main">
  <h2>賽事管理</h2>

  <div class="panel">
    <h3>➕ 新增賽事</h3>
    <table>
      <tr>
        <td><input id="g_date" type="date"></td>
        <td><input id="g_time" type="time"></td>
        <td><input id="g_duration" type="number"></td>
        <td><input id="g_tournament"></td>
        <td><input id="g_category"></td>
        <td><input id="g_field"></td>
        <td><input id="g_away"></td>
        <td><input id="g_home"></td>
        <td>
          <select id="g_umpire">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </td>
        <td>
          <select id="g_mode">
            <option value="allow_select">自行選</option>
            <option value="auto_only">系統排</option>
          </select>
        </td>
        <td><button onclick="createGame()">新增</button></td>
      </tr>
    </table>
  </div>

  <div id="gamesContainer"></div>
</div>

<script src="js/config.js"></script>
  
<script>
let editingId = null;

function loadHeader() {
  fetch('header.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('header-container').innerHTML = html;
      document.getElementById('pageTitle').textContent = '賽事管理';
      const s = JSON.parse(localStorage.getItem('session_user') || '{}');
      if (s.name) document.getElementById('u_name').textContent = s.name;
    });
}

function isExpired(g) {
  return new Date(g.date + 'T' + g.time) < new Date();
}

function posText(v) {
  return v === 'auto_only' ? '系統排' : '自行選';
}

function loadGames() {
  callApi({ action: 'getGames' }, res => {
    if (!res || res.result !== 'ok') return;
    const box = document.getElementById('gamesContainer');
    box.innerHTML = '';

    let html = '<div class="panel"><table>';
    html += '<tr><th>日期</th><th>時間</th><th>賽事</th><th>站位</th><th>操作</th></tr>';

    res.games.forEach(g => {
      if (isExpired(g)) {
        html += '<tr class="expired-row">';
        html += '<td>' + g.date + '</td>';
        html += '<td>' + g.time + '</td>';
        html += '<td>' + (g.tournament || '') + '</td>';
        html += '<td>' + posText(g.position_mode) + '</td>';
        html += '<td class="finished">已完賽</td>';
        html += '</tr>';
      } else {
        if (editingId === g.game_id) {
          html += '<tr class="editing-row">';
          html += '<td><input id="e_date" class="inline" value="' + g.date + '"></td>';
          html += '<td><input id="e_time" class="inline" value="' + g.time + '"></td>';
          html += '<td><input id="e_tournament" class="inline" value="' + (g.tournament || '') + '"></td>';
          html += '<td>';
          html += '<select id="e_mode" class="inline">';
          html += '<option value="allow_select"' + (g.position_mode==='allow_select'?'selected':'') + '>自行選</option>';
          html += '<option value="auto_only"' + (g.position_mode==='auto_only'?'selected':'') + '>系統排</option>';
          html += '</select></td>';
          html += '<td>';
          html += '<button onclick="saveEdit(\'' + g.game_id + '\')">儲存</button>';
          html += '<button onclick="cancelEdit()">取消</button>';
          html += '</td>';
          html += '</tr>';
        } else {
          html += '<tr>';
          html += '<td>' + g.date + '</td>';
          html += '<td>' + g.time + '</td>';
          html += '<td>' + (g.tournament || '') + '</td>';
          html += '<td>' + posText(g.position_mode) + '</td>';
          html += '<td><button onclick="startEdit(\'' + g.game_id + '\')">編輯</button></td>';
          html += '</tr>';
        }
      }
    });

    html += '</table></div>';
    box.innerHTML = html;
  });
}

function startEdit(id) {
  editingId = id;
  loadGames();
}

function cancelEdit() {
  editingId = null;
  loadGames();
}

function saveEdit(id) {
  callApi({
    action: 'updateGame',
    game_id: id,
    field_name: 'date',
    value: document.getElementById('e_date').value
  }, () => {
    callApi({
      action: 'updateGame',
      game_id: id,
      field_name: 'time',
      value: document.getElementById('e_time').value
    }, () => {
      callApi({
        action: 'updateGame',
        game_id: id,
        field_name: 'position_mode',
        value: document.getElementById('e_mode').value
      }, () => {
        editingId = null;
        loadGames();
      });
    });
  });
}

function createGame() {
  callApi({
    action: 'createGame',
    date: g_date.value,
    time: g_time.value,
    duration: g_duration.value,
    tournament: g_tournament.value,
    category: g_category.value,
    field: g_field.value,
    away_team: g_away.value,
    home_team: g_home.value,
    umpire_count: g_umpire.value,
    position_mode: g_mode.value
  }, () => loadGames());
}

document.addEventListener('DOMContentLoaded', () => {
  loadHeader();
  loadGames();
});
</script>

</body>
</html>
