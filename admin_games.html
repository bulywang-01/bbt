<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>賽事管理</title>
<style>
body{margin:0;font-family:system-ui,-apple-system;background:#f5f6f8;}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#fff;border-bottom:1px solid #ddd;}
.nav a{margin-right:16px;color:#0066cc;text-decoration:none;font-weight:500;}
.main{padding:20px;}
.panel{background:#fff;padding:16px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:24px;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th,td{border:1px solid #ddd;padding:6px 8px;text-align:center;}
th{background:#eef2f6;}
input,select{width:100%;padding:4px;box-sizing:border-box;}
button{padding:4px 10px;cursor:pointer;}
.delete-btn{color:#c00;}
#toast{position:fixed;top:20px;right:20px;background:#2c7be5;color:#fff;padding:10px 16px;border-radius:6px;opacity:0;transition:.3s;}
</style>
</head>

<body>
<div class="header">
  <div class="nav">
    <b>⚾ 賽事管理</b>
  </div>
  <div>
    <b id="u_name"></b>
    <a href="#" onclick="logout()" style="margin-left:12px;color:#c00;">登出</a>
  </div>
</div>

<div class="main">

<!-- ✅ 新增賽事（欄位順序與表格一致） -->
<div class="panel">
<h2>➕ 新增賽事</h2>
<table>
<tr>
  <td><input id="g_date" type="date"></td>
  <td><input id="g_time" type="time"></td>
  <td><input id="g_duration" type="number" min="10" step="10"></td>
  <td><input id="g_tournament" placeholder="賽事"></td>
  <td><input id="g_category" placeholder="組別"></td>
  <td><input id="g_field" placeholder="場地"></td>
  <td><input id="g_away" placeholder="客隊"></td>
  <td><input id="g_home" placeholder="主隊"></td>
  <td>
    <select id="g_umpire">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
    </select>
  </td>
  <td>
    <select id="g_mode">
      <option value="allow_select">自行選</option>
      <option value="auto_only">系統排</option>
    </select>
  </td>
  <td>
    <button onclick="createGame()">新增</button>
  </td>
</tr>
</table>
</div>

<!-- 賽事列表（略，維持你現在已正常的版本） -->
<!-- ⚠️ 下方 loadGames / normalize 函式不用改 -->

<script src="js/config.js"></script>
<script>
/* 只列出 createGame，其餘你現有的 그대로 */

function createGame(){
  if(!g_date.value || !g_time.value || !g_duration.value){
    alert('請填寫日期、時間、分鐘');
    return;
  }
  callApi({
    action:'createGame',
    date: g_date.value,
    time: g_time.value,
    duration: g_duration.value,
    tournament: g_tournament.value,
    category: g_category.value,
    field: g_field.value,
    away_team: g_away.value,
    home_team: g_home.value,
    umpire_count: g_umpire.value,
    position_mode: g_mode.value
  },res=>{
    if(res && res.result==='ok'){
      showToast('✅ 已新增賽事');
      loadGames();
    }
  });
}
</script>
</body>
</html>
