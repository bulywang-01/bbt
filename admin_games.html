<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>賽事管理</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont; background:#f5f6f8; }
    .main { padding: 20px; }
    .panel {
      background: #fff;
      padding: 14px;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      margin-bottom: 16px;
    }
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      border: 1px solid #e0e0e0;
      padding: 4px 6px;
      text-align: center;
    }
    th {
      background: #eef2f6;
      font-weight: 600;
    }
    input[type="date"],
    input[type="time"],
    input[type="number"],
    input[type="text"] {
      width: 100%;
      height: 28px;
      padding: 2px 4px;
      box-sizing: border-box;
      font-size: 13px;
    }
    button {
      padding: 6px 12px;
      cursor: pointer;
    }
    .month-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .expired {
      background: #f3f3f3;
      color: #888;
    }
    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .loading-box {
      background: #fff;
      padding: 24px 32px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #ddd;
      border-top: 4px solid #2c7be5;
      border-radius: 50%;
      margin: 0 auto 12px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>

<div class="main">

  <!-- 篩選 -->
  <div class="panel">
    <div class="filter-bar">
      <label><input type="radio" name="range" value="all" checked> 全部</label>
      <label><input type="radio" name="range" value="week"> 本週</label>
      <label><input type="radio" name="range" value="month"> 本月</label>
      <label><input type="checkbox" id="showExpired"> 顯示已完成</label>
      <input id="searchInput" placeholder="搜尋賽事 / 場地 / 球隊">
    </div>
  </div>

  <!-- 列表 -->
  <div id="gamesContainer"></div>

  <!-- 匯入 -->
  <div class="panel">
    <h3>📥 匯入賽事（Excel）</h3>
    <input type="file" id="importFile" accept=".xlsx">
    <button onclick="previewImport()">預覽</button>
    <div id="importPreview"></div>
    <button id="confirmImportBtn" style="display:none" onclick="confirmImport()">確認匯入</button>
  </div>

</div>

<!-- Loading -->
<div id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <div id="loadingText">處理中...</div>
  </div>
</div>

<!-- XLSX -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>
  /* ===== Loading ===== */
  let loadingTimer = null;
  function showLoading(text) {
    document.getElementById('loadingText').textContent = text || '處理中...';
    loadingTimer = setTimeout(() => {
      document.getElementById('loadingOverlay').style.display = 'flex';
    }, 300);
  }
  function hideLoading() {
    clearTimeout(loadingTimer);
    document.getElementById('loadingOverlay').style.display = 'none';
  }

  /* ===== 資料正規化 ===== */
  function normalizeDate(d) {
    const x = new Date(d);
    return isNaN(x) ? '' : x.toISOString().slice(0,10);
  }
  function normalizeTime(t) {
    if (/^\d{1,2}:\d{2}$/.test(t)) {
      const [h,m] = t.split(':');
      return h.padStart(2,'0') + ':' + m;
    }
    const d = new Date(t);
    return isNaN(d) ? '' : String(d.getHours()).padStart(2,'0') + ':' +
      String(d.getMinutes()).padStart(2,'0');
  }

  /* ===== 載入賽事（GAS 直呼） ===== */
  function loadGames() {
    showLoading('賽事資料載入中...');
    google.script.run
      .withSuccessHandler(res => {
        hideLoading();
        if (!res || res.result !== 'ok') {
          document.getElementById('gamesContainer').innerHTML =
            '<div class="panel">資料讀取失敗</div>';
          return;
        }
        renderGames(res.games || []);
      })
      .withFailureHandler(err => {
        hideLoading();
        alert('載入失敗');
        console.error(err);
      })
      .getGames();
  }

  function renderGames(games) {
    const container = document.getElementById('gamesContainer');
    container.innerHTML = '';

    if (!games.length) {
      container.innerHTML = '<div class="panel">目前沒有賽事</div>';
      return;
    }

    const range = document.querySelector('input[name="range"]:checked').value;
    const showExpired = document.getElementById('showExpired').checked;
    const keyword = document.getElementById('searchInput').value.toLowerCase();

    const groups = {};
    games.map(g => ({
      ...g,
      _date: normalizeDate(g.date),
      _time: normalizeTime(g.time)
    })).forEach(g => {

      if (keyword && ![g.tournament,g.field,g.home_team,g.away_team]
        .some(v => (v||'').toLowerCase().includes(keyword))) return;

      const expired = new Date(g._date + 'T' + g._time) < new Date();
      if (expired && !showExpired) return;

      const ym = g._date.slice(0,7);
      (groups[ym] = groups[ym] || []).push({...g, expired});
    });

    Object.keys(groups).sort().forEach(ym => {
      const [y,m] = ym.split('-');
      let html = `<div class="panel">
        <div class="month-title">📅 ${y} 年 ${m} 月</div>
        <table><thead><tr>
          <th>日期</th><th>時間</th><th>賽事</th><th>場地</th>
          <th>主隊</th><th>客隊</th><th>狀態</th>
        </tr></thead><tbody>`;

      groups[ym].forEach(g => {
        html += `<tr class="${g.expired?'expired':''}">
          <td>${g._date}</td>
          <td>${g._time}</td>
          <td>${g.tournament||''}</td>
          <td>${g.field||''}</td>
          <td>${g.home_team||''}</td>
          <td>${g.away_team||''}</td>
          <td>${g.expired?'已完賽':''}</td>
        </tr>`;
      });

      html += '</tbody></table></div>';
      container.insertAdjacentHTML('beforeend', html);
    });
  }

  /* ===== 匯入 ===== */
  let importRows = [];

  function previewImport() {
    const f = document.getElementById('importFile').files[0];
    if (!f) { alert('請選擇檔案'); return; }

    showLoading('解析 Excel 中...');
    const reader = new FileReader();
    reader.onload = function(e) {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type:'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(sheet, { defval:'' });

      importRows = [];
      raw.forEach(r => {
        importRows.push({
          date: normalizeDate(r.date),
          time: normalizeTime(r.time),
          duration: r.duration,
          tournament: r.tournament,
          category: r.category,
          field: r.field,
          away_team: r.away_team,
          home_team: r.home_team,
          umpire_count: r.umpire_count,
          position_mode: r.position_mode
        });
      });

      document.getElementById('importPreview').innerHTML = '✅ 共 ' + importRows.length + ' 筆';
      document.getElementById('confirmImportBtn').style.display = 'inline-block';
      hideLoading();
    };
    reader.readAsArrayBuffer(f);
  }

  function confirmImport() {
    if (!importRows.length) { alert('沒有資料'); return; }

    showLoading('賽事匯入中...');
    google.script.run
      .withSuccessHandler(res => {
        hideLoading();
        if (res.result === 'ok') {
          alert(`✅ 匯入成功 ${res.count} 筆`);
          importRows = [];
          document.getElementById('importPreview').innerHTML = '';
          document.getElementById('confirmImportBtn').style.display = 'none';
          loadGames();
        } else {
          alert('❌ 匯入失敗：' + res.msg);
        }
      })
      .withFailureHandler(err => {
        hideLoading();
        alert('❌ 匯入失敗');
        console.error(err);
      })
      .importGames(importRows);
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadGames();
  });
</script>

</body>
</html>
